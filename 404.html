<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
var hash = window.location.hash;
var search = window.location.search;
var base = '/funergy-growth-os/';
if (hash.includes('access_token') || hash.includes('error=')) {
window.location.replace(base + hash);
} else if (search.includes('access_token') || search.includes('error=')) {
window.location.replace(base + '#' + search.substring(1));
} else {
window.location.replace(base);
}
</script>
</head>
<body></body>
</html>
