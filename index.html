<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Funergy Growth OS — Demo v2.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
/* ============================================================
   FUNERGY GROWTH OS — Demo v2.0
   ============================================================ */
:root{
  --or:#F07820; --or-dk:#D4641A; --or-lt:#FEF0E6; --or-bd:#F9C49A;
  --bg:#F5F5F5; --surface:#fff; --border:#F0E8E0; --border-s:#EDEDED;
  --text:#111; --ts:#666; --tm:#999;
  --green:#166534; --gbg:#D1FAE5; --gbd:#6EE7B7;
  --red:#C00; --rbg:#FEE2E2; --rbd:#FCA5A5;
  --amber:#B45309; --abg:#FEF3C7; --abd:#FCD34D;
  --blue:#185FA5; --bbg:#E6F1FB; --bbd:#93C5FD;
  --toriton:#F07820; --tenkichi:#D4A800; --kaimuki:#3A8FD6;
  --piikoi:#0E78C4; --aiea:#1B9AD6; --waikiki:#5DB554;
  --marujuu:#8B5E3C; --lala:#C00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
.shell{display:flex;height:100vh;}

/* ===== SIDEBAR ===== */
.sb{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .22s cubic-bezier(.4,0,.2,1);z-index:200;}
.sb.closed{width:56px;}
.sb-head{display:flex;align-items:center;gap:9px;padding:13px 12px;border-bottom:1px solid var(--border);min-height:52px;flex-shrink:0;}
.logo{width:27px;height:27px;border-radius:7px;background:var(--or);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(240,120,32,.28);}
.logo-txt{overflow:hidden;flex:1;}
.logo-name{font-size:12px;font-weight:600;white-space:nowrap;color:var(--text);}
.logo-sub{font-size:9px;color:var(--or);font-weight:500;letter-spacing:.08em;white-space:nowrap;}
.sb-toggle{margin-left:auto;border:none;background:transparent;cursor:pointer;color:var(--tm);flex-shrink:0;padding:2px;line-height:1;}
.sb.closed .logo-txt,.sb.closed .nav-lbl,.sb.closed .nav-bdg,.sb.closed .sec-lbl,.sb.closed .sub-items,.sb.closed .user-info,.sb.closed .sb-demo-bar{opacity:0;pointer-events:none;}
.sb.closed .nav-lbl,.sb.closed .sec-lbl{width:0;}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sec{padding:7px 8px 0;}
.sec-lbl{font-size:9px;font-weight:600;color:#bbb;letter-spacing:.1em;padding:3px 7px;white-space:nowrap;overflow:hidden;transition:opacity .18s;}
.ni{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;margin-bottom:1px;min-width:0;position:relative;transition:background .12s;}
.ni:hover{background:#F9F9F9;}
.ni.act{background:var(--or-lt);}
.ni-icon{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.nav-lbl{font-size:12px;font-weight:500;color:var(--ts);white-space:nowrap;overflow:hidden;flex:1;transition:opacity .18s;}
.ni.act .nav-lbl{color:var(--or);}
.nav-bdg{font-size:9px;background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;flex-shrink:0;font-weight:600;transition:opacity .18s;}
.chevron{font-size:11px;color:var(--tm);flex-shrink:0;transition:transform .2s,opacity .18s;}
.chevron.open{transform:rotate(90deg);}
.sub-items{overflow:hidden;transition:max-height .22s cubic-bezier(.4,0,.2,1);max-height:0;}
.sub-items.open{max-height:200px;}
.sub-ni{display:flex;align-items:center;gap:8px;padding:5px 8px 5px 20px;border-radius:7px;cursor:pointer;margin-bottom:1px;transition:background .12s;}
.sub-ni:hover{background:#F9F9F9;}
.sub-ni.act{background:var(--or-lt);}
.sub-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sub-lbl{font-size:11px;font-weight:500;color:var(--ts);white-space:nowrap;overflow:hidden;}
.sub-ni.act .sub-lbl{color:var(--or);}
.sb.closed .ni:hover::after,.sb.closed .sub-ni:hover::after{content:attr(data-label);position:absolute;left:46px;top:50%;transform:translateY(-50%);background:#222;color:#fff;font-size:11px;font-weight:500;padding:4px 9px;border-radius:6px;white-space:nowrap;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.sb-foot{border-top:1px solid var(--border);padding:9px 8px 12px;flex-shrink:0;}
.user-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;}
.user-av{width:27px;height:27px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.user-info{overflow:hidden;}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;color:var(--text);}
.user-role{font-size:9px;color:var(--tm);white-space:nowrap;}
.sb.closed .user-info{display:none;}
.sb-demo-bar{background:var(--or-lt);border-top:1px solid var(--or-bd);padding:6px 10px;font-size:10px;color:var(--or);font-weight:500;white-space:nowrap;overflow:hidden;}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:8px;flex-shrink:0;}
.bc{display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
.bc-root{font-size:11px;color:var(--tm);}
.bc-sep{font-size:10px;color:#ccc;}
.bc-cur{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.store-pills{display:flex;gap:3px;overflow-x:auto;flex-shrink:0;}
.store-pills::-webkit-scrollbar{display:none;}
.sp{display:flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:10px;font-weight:500;color:var(--ts);white-space:nowrap;transition:all .12s;}
.sp.act{font-weight:600;}
.sp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sp-group{display:flex;gap:2px;padding:2px;border-radius:22px;border:1px solid var(--border);background:var(--bg);}
.sp-group .sp{border:none;background:transparent;padding:2px 8px;}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.notif-btn{position:relative;cursor:pointer;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--tm);transition:background .12s;}
.notif-btn:hover{background:var(--bg);}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--surface);}
.period-sel{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;}
.role-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;background:var(--or-lt);color:var(--or);border:1px solid var(--or-bd);cursor:pointer;}
.logout-btn{font-size:10px;padding:4px 10px;border-radius:6px;background:var(--bg);color:var(--ts);border:1px solid var(--border);cursor:pointer;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.page{flex:1;overflow-y:auto;padding:1.25rem;}
.page::-webkit-scrollbar{width:5px;}
.page::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ===== LOGIN ===== */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a0f05 0%,#2d1a08 50%,#1a0f05 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
.login-card{background:rgba(255,255,255,.96);border-radius:20px;padding:2rem 1.75rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo{width:52px;height:52px;border-radius:14px;background:var(--or);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 4px 12px rgba(240,120,32,.4);}
.login-title{font-size:22px;font-weight:700;text-align:center;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--tm);text-align:center;margin-bottom:1.5rem;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.role-btn{padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .15s;}
.role-btn:hover{border-color:var(--or-bd);background:var(--or-lt);}
.role-btn.sel{border-color:var(--or);background:var(--or-lt);}
.role-btn-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;}
.role-btn-sub{font-size:10px;color:var(--tm);}
.store-sel-wrap{margin-bottom:1rem;}
.store-sel-label{font-size:11px;color:var(--ts);margin-bottom:5px;font-weight:500;}
.store-btns{display:flex;gap:5px;flex-wrap:wrap;}
.store-sel-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--ts);transition:all .12s;}
.store-sel-btn.sel{font-weight:600;}
.staff-sel{margin-bottom:1rem;}
.staff-sel select{width:100%;padding:9px 11px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;color:var(--text);background:var(--surface);}
.staff-sel select:focus{outline:2px solid var(--or);border-color:var(--or);}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--or);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s;}
.login-btn:hover{background:var(--or-dk);}
.login-btn:disabled{background:#ccc;cursor:not-allowed;}
.demo-notice{font-size:10px;color:var(--tm);text-align:center;margin-top:10px;}

/* ===== CARDS ===== */
.card{background:var(--surface);border-radius:11px;padding:1rem 1.25rem;margin-bottom:10px;border:1px solid var(--border);}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin:0 0 12px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.kpi{background:var(--surface);border-radius:10px;padding:10px 12px;border:1px solid var(--border);}
.kpi-lbl{font-size:10px;color:var(--tm);margin:0 0 4px;}
.kpi-val{font-size:20px;font-weight:700;margin:0;line-height:1.1;color:var(--text);}
.kpi-sub{font-size:10px;color:var(--tm);margin:2px 0 0;}
.row-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.two-col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.prog{height:5px;background:#F0E8E0;border-radius:3px;overflow:hidden;}
.prog-f{height:5px;border-radius:3px;transition:width .4s;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap;}
.btn-p{background:var(--or);color:#fff;}
.btn-p:hover{background:var(--or-dk);}
.btn-s{background:var(--surface);color:var(--or);border:1px solid var(--or-bd);}
.btn-s:hover{background:var(--or-lt);}
.btn-sm{padding:4px 10px;font-size:11px;}
.tbl{width:100%;font-size:12px;border-collapse:collapse;}
.tbl thead tr{background:var(--or-lt);}
.tbl th{text-align:left;padding:7px 10px;color:var(--tm);font-weight:600;font-size:11px;}
.tbl th.r,.tbl td.r{text-align:right;}
.tbl td{padding:8px 10px;border-top:1px solid var(--border-s);}
.tbl tbody tr:hover{background:#FAFAFA;cursor:pointer;}
.store-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#FAFAFA;border-radius:8px;border:1px solid var(--border-s);cursor:pointer;margin-bottom:5px;transition:border-color .12s;}
.store-row:hover{border-color:var(--or-bd);background:#FFFDF9;}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:8px;background:#FAFAFA;border:1px solid var(--border-s);margin-bottom:5px;cursor:pointer;transition:border-color .12s;}
.task-item:hover{border-color:var(--or-bd);}
.task-item.urgent{border-color:var(--rbd);background:#FFF5F5;}
.alert{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;border-radius:10px;margin-bottom:10px;}
.alert-danger{background:var(--rbg);border:1.5px solid var(--rbd);}
.alert-ok{background:var(--gbg);border:1.5px solid var(--gbd);}
.alert-info{background:var(--bbg);border:1.5px solid var(--bbd);}
.alert-warn{background:var(--abg);border:1.5px solid var(--abd);}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.page-in{animation:fadeIn .18s ease forwards;}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}.sb{width:56px;}.sb .nav-lbl,.sb .sec-lbl,.sb .sub-items,.sb .logo-txt,.sb .user-info,.sb .nav-bdg,.sb .sb-demo-bar{opacity:0;pointer-events:none;}.sb .nav-lbl,.sb .sec-lbl{width:0;}.store-pills{display:none;}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-flame" style="font-size:26px;color:#fff;"></i></div>
    <div class="login-title">Funergy Growth OS</div>
    <div class="login-sub">Demo v2.0 — 役割を選んでログイン</div>

    <div class="role-grid" id="role-grid">

      <div class="role-btn" onclick="selectRole('GM')" id="rb-GM">

        <div class="role-btn-sub">Moto（全店舗）</div>
      </div>
      <div class="role-btn" onclick="selectRole('ACC')" id="rb-ACC">
        <div class="role-btn-name">経理</div>
        <div class="role-btn-sub">Marcia（全店舗）</div>
      </div>
      <div class="role-btn" onclick="selectRole('AM')" id="rb-AM">
        <div class="role-btn-name">AM</div>
        <div class="role-btn-sub">Yuki（Totoya系+Waikiki）</div>
      </div>
      <div class="role-btn" onclick="selectRole('SL')" id="rb-SL">
        <div class="role-btn-name">Store Leader</div>
        <div class="role-btn-sub">配属店舗のみ</div>
      </div>
      <div class="role-btn" onclick="selectRole('CREW')" id="rb-CREW">
        <div class="role-btn-name">Crew</div>
        <div class="role-btn-sub">数字アクセス不可</div>
      </div>
    </div>

    <div id="store-sel-area" style="display:none;">
      <div class="store-sel-wrap">
        <div class="store-sel-label">店舗を選択</div>
        <div class="store-btns" id="store-btns"></div>
      </div>
      <div class="staff-sel">
        <div class="store-sel-label">スタッフを選択</div>
        <select id="staff-sel" onchange="selectStaff(this.value)">
          <option value="">選択してください</option>
        </select>
      </div>
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()" disabled>ログイン</button>
    <div class="demo-notice">デモ版 — 実データは未接続</div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="shell" id="app-shell" style="display:none;">

<!-- SIDEBAR -->
<nav class="sb" id="sb">
  <div class="sb-head">
    <div class="logo"><i class="ti ti-flame" style="font-size:14px;color:#fff;"></i></div>
    <div class="logo-txt">
      <div class="logo-name">Funergy</div>
      <div class="logo-sub">GROWTH OS</div>
    </div>
    <button class="sb-toggle" id="sb-toggle" onclick="toggleSB()">
      <i class="ti ti-layout-sidebar-left-collapse" style="font-size:17px;"></i>
    </button>
  </div>
  <div class="sb-scroll" id="sb-nav"></div>
  <div class="sb-foot">
    <div class="sb-demo-bar" id="sb-demo-bar">Demo v2.0</div>
    <div class="user-row" onclick="doLogout()">
      <div class="user-av" id="user-av">M</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Moto</div>
        <div class="user-role" id="user-role">GM · Funergy Group</div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="bc">
      <i class="ti ti-flame" style="font-size:13px;color:var(--or);flex-shrink:0;"></i>
      <span class="bc-sep"><i class="ti ti-chevron-right" style="font-size:10px;"></i></span>
      <span class="bc-cur" id="bc-cur">ダッシュボード</span>
    </div>
    <div class="store-pills" id="store-pills"></div>
    <div class="topbar-right">
      <span class="role-badge" id="role-badge">GM</span>
      <button class="notif-btn" onclick="go('notifications')">
        <i class="ti ti-bell" style="font-size:17px;"></i>
        <span class="notif-dot"></span>
      </button>
      <select class="period-sel" id="period-sel" onchange="go(curPage)">
        <option value="2026.6">2026年 6月</option>
        <option value="2026.5">2026年 5月</option>
        <option value="2026.4">2026年 4月</option>
        <option value="2026.3">2026年 3月</option>
        <option value="2026.1">2026年 1月</option>
        <option value="2025.12">2025年12月</option>
        <option value="2025.11">2025年11月</option>
      </select>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="page" id="page-area"></div>
</div>
</div>

function selectRole(r){
  curRole=r;
  document.querySelectorAll('.role-btn').forEach(function(b){b.classList.remove('sel');});

  var needStore=r==='SL'||r==='CREW';
  document.getElementById('store-sel-area').style.display=needStore?'block':'none';
  if(!needStore){
    curStore='all';curStaff='';
    document.getElementById('login-btn').disabled=false;
  } else {
    document.getElementById('login-btn').disabled=true;
    buildStoreBtns(r);
  }
}
function buildStoreBtns(r){
  var wrap=document.getElementById('store-btns');
  wrap.innerHTML=STORES_DEF.map(function(s){
    return '<button class="store-sel-btn" onclick="selectLoginStore(\''+s.id+'\')" id="lsb-'+s.id+'" style="border-color:'+s.color+'20;">'
      +'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+s.color+';margin-right:3px;"></span>'+s.name+'</button>';
  }).join('');
}
function selectLoginStore(sid){
  curStore=sid;
  document.querySelectorAll('.store-sel-btn').forEach(function(b){b.classList.remove('sel');b.style.background='';});
  var btn=document.getElementById('lsb-'+sid);
  if(btn){btn.classList.add('sel');btn.style.background=SC[sid]+'15';btn.style.borderColor=SC[sid];}
  var sel=document.getElementById('staff-sel');
  sel.innerHTML='<option value="">選択してください</option>';
  var list=STAFF_BY_STORE[sid]||[];
  list.forEach(function(s){sel.innerHTML+='<option value="'+s+'">'+s+'</option>';});
  curStaff='';
  document.getElementById('login-btn').disabled=true;
}
function selectStaff(v){curStaff=v;document.getElementById('login-btn').disabled=!v;}
function doLogin(){
  if(!curRole) return;
  var rc=ROLE_CONFIG[curRole];
  var name=rc.name||curStaff||'Staff';
  var initials=(curRole==='SL'||curRole==='CREW')?curStaff.charAt(0).toUpperCase():rc.initials;
  document.getElementById('user-av').textContent=initials;
  document.getElementById('user-av').style.background=rc.color;
  document.getElementById('user-name').textContent=name;
  document.getElementById('user-role').textContent=rc.label+(curStore!=='all'?' · '+curStore:' · Funergy Group');

}

  document.getElementById('store-sel-area').style.display='none';

}

  var parentMap={foodcost:'cost',inventory:'cost',order:'cost',menuabc:'cost',shift_admin:'shift',shift_staff:'shift',vacation:'shift'};
  var pk=parentMap[page];
  if(pk){
    document.querySelectorAll('[data-parent]').forEach(function(el){el.classList.toggle('act',el.getAttribute('data-parent')===pk);});
    var sub=document.getElementById('sub-'+pk);
    var chev=document.getElementById('chev-'+pk);
    if(sub&&!sub.classList.contains('open')){sub.classList.add('open');if(chev)chev.classList.add('open');}
  }
  var meta={dashboard:'ダッシュボード',budget:'予実管理',foodcost:'原価管理',inventory:'在庫管理',order:'発注送信',menuabc:'メニューABC',labor:'レイバー管理',shift_admin:'シフト作成',shift_staff:'希望シフト入力',vacation:'バケーション申請',hiring:'採用管理',onboarding:'OB・マニュアル',staff_master:'従業員マスター',evaluation:'評価管理',mypage:'マイページ',integrations:'データ連携',settings:'設定',notifications:'通知'};
  document.getElementById('bc-cur').textContent=meta[page]||page;
  var el=document.getElementById('page-area');
  el.className='page page-in';el.innerHTML=renderPage(page);void el.offsetWidth;
}

/* ============================================================
   HELPERS
============================================================ */
function getPeriod(){return document.getElementById('period-sel').value;}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function fmtK(v){return v>=1000?'$'+Math.round(v/1000)+'K':'$'+v;}
function stTag(s){
  var m={good:['#D1FAE5','#166534','好調'],ok:['#EBF4FC','#185FA5','目標内'],warn:['#FEF3C7','#B45309','要注意'],danger:['#FEE2E2','#C00','要対応']};
  var d=m[s]||m.warn;
  return '<span class="tag" style="background:'+d[0]+';color:'+d[1]+';">'+d[2]+'</span>';
}
function progBar(p,c,h){
  h=h||5;
  var fc=p>=100?'#166534':p>=90?c:p>=70?'#B45309':'#C00';
  return '<div class="prog" style="height:'+h+'px;"><div class="prog-f" style="background:'+fc+';width:'+Math.min(p,100)+'%;height:'+h+'px;"></div></div>';
}
function kpi(lbl,val,sub,color){
  return '<div class="kpi"><p class="kpi-lbl">'+lbl+'</p><p class="kpi-val" style="color:'+color+';">'+val+'</p>'+(sub?'<p class="kpi-sub">'+sub+'</p>':'')+'</div>';
}
function getStores(){
  var p=getPeriod();
  var d=BUDGET_DATA[p]||{};
  var rc=ROLE_CONFIG[curRole];
  var storeIds;
  if(curStore!=='all'){storeIds=[curStore];}
  else if(rc.stores==='all'){storeIds=STORES_DEF.map(function(s){return s.id;});}
  else if(Array.isArray(rc.stores)){storeIds=rc.stores;}
  else{storeIds=[curStore];}
  return storeIds.map(function(id){
    var def=STORES_DEF.find(function(s){return s.id===id;})||{id:id,name:id,color:'#888'};
    var sd=d[id]||{b:0,a:0,fc:0,labor:0};
    var sp=pct(sd.a,sd.b);
    var status=sp>=100?'good':sp>=90?'ok':sp>=70?'warn':'danger';
    return Object.assign({},def,sd,{sp:sp,status:status});
  }).filter(function(s){return s.b>0;});
}

/* ============================================================
   PAGE RENDERS
============================================================ */
function renderPage(p){
  var rc=ROLE_CONFIG[curRole];
  if(p!=='mypage'&&p!=='shift_staff'&&p!=='vacation'&&!rc.financial&&p!=='dashboard'){
    return renderMypage();
  }
  switch(p){
    case 'dashboard':   return renderDashboard();
    case 'budget':      return renderBudget();
    case 'foodcost':    return renderFoodcost();
    case 'inventory':   return renderInventory();
    case 'order':       return renderOrder();
    case 'menuabc':     return renderMenuABC();
    case 'labor':       return renderLabor();
    case 'shift_admin': return renderShiftAdmin();
    case 'shift_staff': return renderShiftStaff();
    case 'vacation':    return renderVacation();
    case 'hiring':      return renderHiring();
    case 'onboarding':  return renderOnboarding();
    case 'staff_master':return renderStaffMaster();
    case 'evaluation':  return renderEvaluation();
    case 'mypage':      return renderMypage();
    case 'integrations':return renderIntegrations();
    case 'settings':    return renderSettings();
    case 'notifications':return renderNotifications();
    default: return '<div class="card"><p style="color:var(--tm);">準備中</p></div>';
  }
}

/* --- DASHBOARD --- */
function renderDashboard(){
  var rc=ROLE_CONFIG[curRole];
  var stores=getStores();
  if(!rc.financial) return renderMypage();
  var tB=stores.reduce(function(a,s){return a+s.b;},0);
  var tA=stores.reduce(function(a,s){return a+s.a;},0);
  var tp=pct(tA,tB);
  var avgFC=stores.length?Math.round(stores.reduce(function(a,s){return a+s.fc;},0)/stores.length*10)/10:0;
  var avgL=stores.length?Math.round(stores.reduce(function(a,s){return a+s.labor;},0)/stores.length*10)/10:0;
  var danger=stores.filter(function(s){return s.status==='danger';});
  var html='';
  if(danger.length){
    html+='<div class="alert alert-danger"><i class="ti ti-alert-triangle" style="color:var(--red);font-size:15px;flex-shrink:0;margin-top:1px;"></i>'
      +'<div><p style="font-size:12px;font-weight:600;color:var(--red);margin:0 0 4px;">要対応 '+danger.length+'店舗</p>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px;">'
      +danger.map(function(s){return '<span class="tag" style="background:var(--surface);color:var(--red);border:1px solid var(--rbd);cursor:pointer;" onclick="setStore(\''+s.id+'\');go(\'budget\')">'+s.name+' '+s.sp+'%</span>';}).join('')
      +'</div></div></div>';
  }
  html+='<div class="kpi-grid">'
    +kpi('売上合計',fmtK(tA),'予算比 '+tp+'% / '+getPeriod().replace('.','/'),tp>=100?'#166534':tp>=90?'#B45309':'#C00')
    +kpi('予算達成率',tp+'%','予算 '+fmtK(tB),tp>=100?'#166534':tp>=90?'#B45309':'#C00')
    +kpi('平均原価率',avgFC+'%','目標 29〜31%',avgFC>0&&avgFC<=31?'#166534':'#C00')
    +kpi('平均人件費率',avgL+'%','目標 28%以内',avgL>0&&avgL<=28?'#166534':avgL<=30?'#B45309':'#C00')
    +'</div>';
  html+='<div class="two-col">';
  html+='<div class="card"><div class="row-between" style="margin-bottom:10px;"><p class="card-title" style="margin:0;">店舗別 予実</p><button class="btn btn-s btn-sm" onclick="go(\'budget\')">詳細 →</button></div>';
  stores.forEach(function(s){
    html+='<div class="store-row" onclick="setStore(\''+s.id+'\');go(\'budget\')">'
      +'<div style="display:flex;align-items:center;gap:7px;flex:1;min-width:0;">'
      +'<span style="width:8px;height:8px;border-radius:50%;background:'+s.color+';flex-shrink:0;"></span>'
      +'<span style="font-size:12px;font-weight:600;">'+s.name+'</span></div>'
