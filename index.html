/* ---- 根拠エディタ ---- */
var basisTmp = null;
function openBasisModal(storeId, basisId) {
  var b = getBudgets().find(x=>x.storeId===storeId);
  var existing = basisId ? b.bases.find(x=>x.id===basisId) : null;
  basisTmp = existing ? JSON.parse(JSON.stringify(existing))
    : {id:'bs'+Date.now(), type:'base', name:'', days:DOW.map(()=>({guests:0, spend:0})), guests:0, spend:0, days_count:1};
  renderBasisBody(storeId);
}
function renderBasisBody(storeId) {
  var t = basisTmp;
  var amount = basisAmount(t);
  var html = `<div class="modal-title">予算根拠 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">根拠名</label><input class="form-input" id="bs-name" value="${t.name}" placeholder="例: 既存店ベース / テイクアウト施策"></div>
    <div class="form-group"><label class="form-label">タイプ</label>
      <select class="form-select" id="bs-type" onchange="changeBasisType('${storeId}',this.value)">
        ${BASIS_TYPES.map(x=>`<option value="${x.id}"${t.type===x.id?' selected':''}>${x.label}</option>`).join('')}
      </select>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${(BASIS_TYPES.find(x=>x.id===t.type)||{}).desc||''}</div>
    </div>`;

  if (t.type === 'base') {
    html += `<div class="form-group"><label class="form-label">曜日別 客数 × 客単価</label>
      <table class="inv-table"><thead><tr><th>曜日</th><th>客数</th><th>客単価$</th><th>日商</th></tr></thead><tbody>
      ${DOW.map((d,i)=>{
        var day=t.days[i]||{guests:0,spend:0};
        var sub=(parseFloat(day.guests)||0)*(parseFloat(day.spend)||0);
        return `<tr><td>${d}</td>
          <td><input class="inv-input" type="number" value="${day.guests}" onchange="updateBasisDay(${i},'guests',this.value,'${storeId}')" style="width:55px"></td>
          <td><input class="inv-input" type="number" value="${day.spend}" onchange="updateBasisDay(${i},'spend',this.value,'${storeId}')" style="width:55px"></td>
          <td style="color:var(--muted)">$${sub.toFixed(0)}</td></tr>`;
      }).join('')}
      </tbody></table>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">週商 × ${weeksInMonth()}週 = 月間</div>
    </div>`;
  } else {
    html += `<div class="form-row">
      <div class="form-group"><label class="form-label">予想客数</label><input class="form-input" id="bs-guests" type="number" value="${t.guests||0}" onchange="updateBasisField('guests',this.value,'${storeId}')"></div>
      <div class="form-group"><label class="form-label">予想客単価 $</label><input class="form-input" id="bs-spend" type="number" value="${t.spend||0}" onchange="updateBasisField('spend',this.value,'${storeId}')"></div>
    </div>
    <div class="form-group"><label class="form-label">実施日数（月内）</label><input class="form-input" id="bs-days" type="number" value="${t.days_count||1}" onchange="updateBasisField('days_count',this.value,'${storeId}')"></div>`;
  }

  html += `<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;border-top:1px solid var(--border);margin-top:8px">
      <span>この根拠の予算</span><span style="color:var(--accent)">${fmtK(Math.round(amount))}</span></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="openBudgetEditor('${storeId}')">戻る</button>
      <button class="btn btn-primary" onclick="saveBasis('${storeId}')">保存</button>
    </div>`;
  openModal(html);
}
function changeBasisType(storeId, type) {
  basisTmp.name = document.getElementById('bs-name').value;
  basisTmp.type = type;
  if (type==='base' && !basisTmp.days) basisTmp.days = DOW.map(()=>({guests:0,spend:0}));
  renderBasisBody(storeId);
}
function updateBasisDay(i, field, val, storeId) {
  basisTmp.name = document.getElementById('bs-name').value;
  basisTmp.days[i][field] = parseFloat(val)||0;
  renderBasisBody(storeId);
}
function updateBasisField(field, val, storeId) {
  basisTmp.name = document.getElementById('bs-name').value;
  basisTmp[field] = parseFloat(val)||0;
  renderBasisBody(storeId);
}
function saveBasis(storeId) {
  basisTmp.name = document.getElementById('bs-name').value.trim() || '無題の根拠';
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  var idx = b.bases.findIndex(x=>x.id===basisTmp.id);
  if (idx>=0) b.bases[idx] = basisTmp; else b.bases.push(basisTmp);
  saveBudgets(budgets);
  showToast('根拠を保存しました', 'success');
  openBudgetEditor(storeId);
}
function deleteBasis(storeId, basisId) {
  if (!confirm('この根拠を削除しますか？')) return;
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  b.bases = b.bases.filter(x=>x.id!==basisId);
  saveBudgets(budgets);
  openBudgetEditor(storeId);
}
function submitBudget(storeId) {
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.status='承認待ち'; saveBudgets(budgets); }
  closeModalDirect();
  showToast('予算を承認申請しました', 'success');
  renderPage('budget');
}
function approveBudget(storeId) {
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.status = '承認済'; saveBudgets(budgets); showToast('予算を承認しました', 'success'); renderPage('budget'); }
}
function openActualModal(storeId) {
  var b = getBudgets().find(x=>x.storeId===storeId);
  openModal(`<div class="modal-title">実績入力 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">実績売上 ($)（Toast連携前は手入力）</label><input class="form-input" id="ba-actual" type="number" value="${b.actual}"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveActual('${storeId}')">保存</button></div>`);
}
function saveActual(storeId) {
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = parseFloat(document.getElementById('ba-actual').value)||0; saveBudgets(budgets); }
  closeModalDirect();
  showToast('実績を保存しました', 'success');
  renderPage('budget');
}

/* ============================================================
   FOOD COST (レシピ原価と連動)
============================================================ */
/* ============================================================
   Food Cost 精度向上 (日次=発注ベース / 月次=棚卸ベース) + 買い出し
============================================================ */
var fcTab = 'daily';
function getPurchases(storeId) { return ls('purchases_'+storeId, []); }   // 買い出し
function monthOrderTotal(storeId) {
  // 今月の発注確定〜送信済の合計（仕入れ）
  var orders = ls('orders_'+storeId, []);
  return orders.filter(o=>['発注確定','送信済','電話確認済','納品完了'].includes(o.status))
    .reduce((a,o)=>a+(o.amount||0),0);
}
function monthPurchaseTotal(storeId) {
  return getPurchases(storeId).reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
}
function dailyOrderTotal(storeId, dateStr) {
  var orders = ls('orders_'+storeId, []);
  var d = dateStr || new Date().toLocaleDateString('ja');
  return orders.filter(o=>o.date===d).reduce((a,o)=>a+(o.amount||0),0);
}

function renderFoodcost() {
  if (!ROLE_CONFIG[curRole].financial && curRole !== 'sl') return financialBlocked();
  var storeId = curStore==='ALL'?STORES[0].id:curStore;
  var store = STORES.find(s=>s.id===storeId)||STORES[0];

  var html = `<div class="section-header"><div><div class="section-title">${store.name} · Food Cost</div><div class="section-sub">目標 29〜31%</div></div></div>
  <div class="phase-tabs">
    <div class="phase-tab${fcTab==='daily'?' active':''}" onclick="setFcTab('daily')">日次（簡易）</div>
    <div class="phase-tab${fcTab==='monthly'?' active':''}" onclick="setFcTab('monthly')">月次（実績）</div>
    <div class="phase-tab${fcTab==='shopping'?' active':''}" onclick="setFcTab('shopping')">買い出し</div>
    <div class="phase-tab${fcTab==='menu'?' active':''}" onclick="setFcTab('menu')">メニュー別</div>
  </div>`;

  if (fcTab==='daily') html += renderFcDaily(storeId, store);
  else if (fcTab==='monthly') html += renderFcMonthly(storeId, store);
  else if (fcTab==='shopping') html += renderFcShopping(storeId, store);
  else html += renderFcMenu();
  return html;
}
function setFcTab(t) { fcTab = t; renderPage('foodcost'); }

/* 日次: 実績原価率 = 発注金額合計 ÷ 売上 */
function renderFcDaily(storeId, store) {
  var data = storeData(storeId);
  var dailySales = Math.round(data.a/30); // 仮: 月商÷30
  var todayOrder = dailyOrderTotal(storeId);
  var todayShopping = getPurchases(storeId).filter(p=>p.date===new Date().toLocaleDateString('ja')).reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
  var totalCost = todayOrder + todayShopping;
  var rate = dailySales ? Math.round(totalCost/dailySales*1000)/10 : 0;
  var color = rate<=31?'var(--green)':rate<=33?'var(--yellow)':'var(--red)';

  var html = `<div class="alert alert-success" style="padding:8px 12px"><i class="ti ti-info-circle"></i><div style="font-size:12px">日次は<strong>発注金額合計 ÷ 売上</strong>の簡易原価率です（速報値）</div></div>
  <div class="card"><div class="card-title"><i class="ti ti-calendar-stats"></i>本日の簡易原価率</div>
    <div class="kpi-grid">
      ${kpi('発注金額', '$'+todayOrder.toLocaleString(), '本日発注', 'var(--tm)')}
      ${kpi('買い出し', '$'+todayShopping.toLocaleString(), '本日購入', 'var(--tm)')}
      ${kpi('売上(仮)', '$'+dailySales.toLocaleString(), 'Toast連携前', 'var(--muted)')}
      ${kpi('簡易原価率', rate+'%', '目標≤31%', color)}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">※ 売上はToast連携後に実数反映。現在は月商÷30の仮値</p>
  </div>`;
  return html;
}

/* 月次: 使用原価 = 期首棚卸 + 仕入(発注+買い出し) - 期末棚卸 / 原価率 = 使用原価 ÷ 売上 */
function renderFcMonthly(storeId, store) {
  var data = storeData(storeId);
  var fc = ls('fc_monthly_'+storeId, {beginInv:0, endInv:0, sales:data.a});
  var orderTotal = monthOrderTotal(storeId);
  var purchaseTotal = monthPurchaseTotal(storeId);
  var purchases = orderTotal + purchaseTotal;
  var usedCost = (parseFloat(fc.beginInv)||0) + purchases - (parseFloat(fc.endInv)||0);
  var sales = parseFloat(fc.sales)||data.a;
  var rate = sales ? Math.round(usedCost/sales*1000)/10 : 0;
  var target = 30;
  var color = rate<=31?'var(--green)':rate<=33?'var(--yellow)':'var(--red)';

  var html = `<div class="alert alert-warning" style="padding:8px 12px"><i class="ti ti-info-circle"></i><div style="font-size:12px">月次は<strong>期首棚卸 + 仕入 − 期末棚卸 = 使用原価</strong>で精度の高い実績原価率を算出</div></div>
  <div class="card"><div class="card-title"><i class="ti ti-calculator"></i>月次実績原価率
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="openFcMonthlyModal('${storeId}')"><i class="ti ti-edit"></i> 棚卸額入力</button></div>
    <table class="inv-table"><tbody>
      <tr><td>期首棚卸額 ${fc.beginAuto?'<span class="tag tag-blue" style="font-size:8px">前月末から自動</span>':''}</td><td style="text-align:right">$${(parseFloat(fc.beginInv)||0).toLocaleString()}</td></tr>
      <tr><td>月間仕入れ（発注確定分）</td><td style="text-align:right">$${orderTotal.toLocaleString()}</td></tr>
      <tr><td>買い出し合計</td><td style="text-align:right">$${purchaseTotal.toLocaleString()}</td></tr>
      <tr><td>期末棚卸額</td><td style="text-align:right">− $${(parseFloat(fc.endInv)||0).toLocaleString()}</td></tr>
      <tr style="font-weight:700"><td>使用原価</td><td style="text-align:right;color:var(--accent)">$${usedCost.toLocaleString()}</td></tr>
      <tr><td>売上</td><td style="text-align:right">$${sales.toLocaleString()}</td></tr>
    </tbody></table>
    <div class="kpi-grid" style="margin-top:10px">
      ${kpi('実績原価率', rate+'%', '使用原価÷売上', color)}
      ${kpi('目標原価率', target+'%', '基準', 'var(--muted)')}
      ${kpi('差異', (rate-target>0?'+':'')+(Math.round((rate-target)*10)/10)+'%', rate<=target?'良好':'超過', rate<=target?'var(--green)':'var(--red)')}
    </div>
  </div>`;
  return html;
}
function openFcMonthlyModal(storeId) {
  var data = storeData(storeId);
  var fc = ls('fc_monthly_'+storeId, {beginInv:0, endInv:0, sales:data.a});
  openModal(`<div class="modal-title">月次原価 入力 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">期首棚卸額 ($) ${fc.beginAuto?'※前月末から自動反映済。修正すると履歴に残ります':''}</label><input class="form-input" id="fc-begin" type="number" value="${fc.beginInv||0}"></div>
    <div class="form-group"><label class="form-label">期末棚卸額 ($)（月次棚卸確定で自動更新）</label><input class="form-input" id="fc-end" type="number" value="${fc.endInv||0}"></div>
    <div class="form-group"><label class="form-label">売上 ($)（Toast連携前は手入力）</label><input class="form-input" id="fc-sales" type="number" value="${fc.sales||data.a}"></div>
    <p style="font-size:11px;color:var(--muted)">仕入れ・買い出しは発注/買い出しデータから自動集計されます。期首棚卸額は前月末の期末棚卸を自動反映します。</p>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveFcMonthly('${storeId}')">保存</button></div>`);
}
function saveFcMonthly(storeId) {
  var prev = ls('fc_monthly_'+storeId, {});
  var newBegin = parseFloat(document.getElementById('fc-begin').value)||0;
  var history = prev.history || [];
  if (prev.beginInv!==undefined && prev.beginInv!==newBegin) {
    history = history.concat([{date:new Date().toLocaleDateString('ja'), edit:'期首修正', from:prev.beginInv, to:newBegin, by:ROLE_CONFIG[curRole].name}]);
  }
  lsSet('fc_monthly_'+storeId, {
    beginInv: newBegin,
    endInv: parseFloat(document.getElementById('fc-end').value)||0,
    sales: parseFloat(document.getElementById('fc-sales').value)||0,
    beginAuto: false, history,
  });
  closeModalDirect();
  showToast('月次原価データを保存しました', 'success');
  renderPage('foodcost');
}

function openPurchaseModal(storeId) {

/* ============================================================
   ⑧ Inventory (Daily日次 / Monthly月間 で作業分離)
   - Daily : 主要食材のみ・数量チェック中心（簡易）
   - Monthly : 全品目フル・理論在庫比較・差異・ロス算出
   理論在庫 = 前回棚卸 + 入荷 - 理論消費
============================================================ */
function getInvItems(storeId) {
  var ings = getIngredients();
  // daily: 主要食材フラグ(既定で食材区分の上位/お酒)。dailyフラグは設定で変更可
  var def = ings.map((i,idx) => ({code:i.code, name:i.name, unit:i.unit, cls:catClass(i.cat),
    par: 20, last: 0, received: 0, consumed: 0, count:'',
    daily: (catClass(i.cat)==='food' || catClass(i.cat)==='liquor') ? (idx%2===0) : false }));
  return ls('inv_'+storeId, def);
}
function setInvItems(storeId, items) { lsSet('inv_'+storeId, items); }

var invMode = 'daily';   // 'daily' | 'monthly'
var invClassFilter = 'all';
function renderInventory() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var allItems = getInvItems(storeId);
  // モードで対象を絞る
  var items = invMode==='daily' ? allItems.filter(i=>i.daily) : allItems;
  var filtered = invClassFilter==='all' ? items : items.filter(i=>i.cls===invClassFilter);
  var classCounts = {}; CLASSES.forEach(c=>classCounts[c.id]=items.filter(i=>i.cls===c.id).length);
  var canConfig = ROLE_CONFIG[curRole].canCreate;

  var html = `<div class="section-header">
    <div><div class="section-title">${store.name} · 棚卸</div><div class="section-sub">${new Date().toLocaleDateString('ja')}</div></div>
    <div style="display:flex;gap:6px">
      ${invMode==='daily'&&canConfig?`<button class="btn btn-secondary btn-sm" onclick="openDailySetModal('${storeId}')"><i class="ti ti-settings"></i> Daily項目</button>`:''}
      <button class="btn btn-secondary btn-sm" onclick="showInvHistory('${storeId}')"><i class="ti ti-history"></i> 履歴</button>
      <button class="btn btn-success btn-sm" onclick="saveInventory('${storeId}')"><i class="ti ti-device-floppy"></i> 確定</button>
    </div>
  </div>`;

  // モード切替（Daily / Monthly）
  html += `<div class="phase-tabs">
    <div class="phase-tab${invMode==='daily'?' active':''}" onclick="setInvMode('daily')"><i class="ti ti-sun" style="font-size:12px"></i> Daily日次</div>
    <div class="phase-tab${invMode==='monthly'?' active':''}" onclick="setInvMode('monthly')"><i class="ti ti-calendar-month" style="font-size:12px"></i> Monthly月間</div>
  </div>`;

  html += `<div class="alert ${invMode==='daily'?'alert-success':'alert-warning'}" style="padding:8px 12px">
    <i class="ti ti-info-circle"></i><div style="font-size:12px">${invMode==='daily'
      ? 'Daily：主要食材のみ。日次の数量チェック用。' 
      : 'Monthly：全品目フル棚卸。理論在庫との差異・ロスを算出します。'}</div></div>`;

  // 区分フィルタ（Monthlyのみ細かく）
  if (invMode==='monthly') {
    html += `<div class="phase-tabs">
      <div class="phase-tab${invClassFilter==='all'?' active':''}" onclick="setInvFilter('all')">全区分 (${items.length})</div>
      ${CLASSES.map(c=>`<div class="phase-tab${invClassFilter===c.id?' active':''}" style="${invClassFilter===c.id?`background:${c.color};border-color:${c.color}`:''}" onclick="setInvFilter('${c.id}')">${c.name} (${classCounts[c.id]})</div>`).join('')}
    </div>`;
  }

  html += `<div class="card"><table class="inv-table">`;
  if (invMode==='daily') {
    html += `<thead><tr><th>アイテム</th><th>PAR</th><th>現在庫</th><th>状態</th></tr></thead><tbody>`;
    filtered.forEach(it => {
      var cnt = it.count===''?null:parseFloat(it.count);
      var statusHtml;
      if (cnt===null) statusHtml='<span class="tag tag-gray">未</span>';
      else { var ratio=it.par>0?cnt/it.par:1; statusHtml= ratio>=0.7?'<span class="tag tag-green">OK</span>':ratio>=0.3?'<span class="tag tag-yellow">要注意</span>':'<span class="tag tag-red">要発注</span>'; }
      html += `<tr>
        <td style="font-weight:600">${it.name}<div style="font-size:11px;color:var(--muted);font-weight:400">${className(it.cls)} · ${it.unit}</div></td>
        <td style="color:var(--muted)">${it.par}</td>
        <td><input class="inv-input" type="number" step="0.1" min="0" value="${it.count}" onchange="updateInv('${storeId}','${it.code}',this.value)" placeholder="0"></td>
        <td>${statusHtml}</td>
      </tr>`;
    });
  } else {
    html += `<thead><tr><th>アイテム</th><th>理論</th><th>実棚</th><th>差異</th></tr></thead><tbody>`;
    filtered.forEach(it => {
      var theory = (parseFloat(it.last)||0)+(parseFloat(it.received)||0)-(parseFloat(it.consumed)||0);
      var actual = it.count===''?null:parseFloat(it.count);
      var diff = actual===null?null:actual-theory;
      var diffHtml = diff===null?'<span class="tag tag-gray">未入力</span>':Math.abs(diff)<0.01?'<span class="tag tag-green">±0</span>':`<span class="tag ${diff<0?'tag-red':'tag-yellow'}">${diff>0?'+':''}${diff.toFixed(1)}</span>`;
      html += `<tr>
        <td style="font-weight:600">${it.name}<div style="font-size:11px;color:var(--muted);font-weight:400">${className(it.cls)} · ${it.unit}</div></td>
        <td style="color:var(--muted)">${theory.toFixed(1)}</td>
        <td><input class="inv-input" type="number" step="0.1" min="0" value="${it.count}" onchange="updateInv('${storeId}','${it.code}',this.value)" placeholder="0"></td>
        <td>${diffHtml}</td>
      </tr>`;
    });
  }
  if (!filtered.length) html += `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">${invMode==='daily'?'Daily項目が未設定です（右上「Daily項目」で選択）':'項目なし'}</td></tr>`;
  html += `</tbody></table></div>`;

  // Monthly差異サマリー
  if (invMode==='monthly') {
    var counted = items.filter(i=>i.count!=='');
    if (counted.length) {
      var shortages = counted.filter(i=>{var t=(parseFloat(i.last)||0)+(parseFloat(i.received)||0)-(parseFloat(i.consumed)||0);return (parseFloat(i.count)-t)<-0.01;});
      html += `<div class="card"><div class="card-title"><i class="ti ti-alert-triangle" style="color:${shortages.length?'var(--red)':'var(--green)'}"></i>差異サマリー</div>
        <div class="kpi-grid">
          ${kpi('カウント済', counted.length+'/'+items.length, '進捗', 'var(--tm)')}
          ${kpi('差異あり', counted.filter(i=>{var t=(parseFloat(i.last)||0)+(parseFloat(i.received)||0)-(parseFloat(i.consumed)||0);return Math.abs(parseFloat(i.count)-t)>=0.01;}).length, '要確認', 'var(--yellow)')}
          ${kpi('棚卸ロス', shortages.length, 'マイナス差異', shortages.length?'var(--red)':'var(--green)')}
        </div></div>`;
    }
  }
  return html;
}

function updateInv(storeId, code, val) {

  if (it) { it.count = val; setInvItems(storeId, items); renderPage('inventory'); }

function saveInventory(storeId) {
  var allItems = getInvItems(storeId);
  var scope = invMode==='daily' ? allItems.filter(i=>i.daily) : allItems;
  var counted = scope.filter(i=>i.count!=='');
  if (!counted.length) { alert('棚卸数を入力してください'); return; }
  var histKey = invMode==='daily' ? 'inv_hist_daily_'+storeId : 'inv_hist_'+storeId;
  var hist = ls(histKey, []);
  var snapshot = {date:new Date().toLocaleString('ja'), by:ROLE_CONFIG[curRole].name, mode:invMode,
    lines: counted.map(i=>{
      var t=(parseFloat(i.last)||0)+(parseFloat(i.received)||0)-(parseFloat(i.consumed)||0);
      return {name:i.name, cls:i.cls, theory:t, actual:parseFloat(i.count), diff:parseFloat(i.count)-t};
    })};
  hist.push(snapshot);
  lsSet(histKey, hist);
  // Monthly のみ繰越（Dailyは数量チェックなので繰越しない）
  if (invMode==='monthly') {
    // 棚卸総額を算出（実棚×単価）して期末在庫額として記録
    var ings = getIngredients();
    var invValue = counted.reduce((a,i)=>{ var ing=ings.find(x=>x.code===i.code); return a + (ing?ing.price:0)*(parseFloat(i.count)||0); }, 0);
    invValue = Math.round(invValue);
    // 当月のFood Cost: 今回をendInv、前回のendInvをbeginInvに自動反映
    var fc = ls('fc_monthly_'+storeId, {beginInv:0, endInv:0, sales:0});
    var prevEnd = fc.endInv || 0;
    var newFc = {beginInv:prevEnd, endInv:invValue, sales:fc.sales||storeData(storeId).a,
      beginAuto:true, history:(fc.history||[]).concat([{date:new Date().toLocaleDateString('ja'), endInv:invValue, by:ROLE_CONFIG[curRole].name}])};
    lsSet('fc_monthly_'+storeId, newFc);
    allItems.forEach(i=>{ if(i.count!==''){ i.last = parseFloat(i.count); i.received=0; i.consumed=0; i.count=''; } });
  } else {
    scope.forEach(i=>{ var it=allItems.find(x=>x.code===i.code); if(it) it.count=''; });
  }
  setInvItems(storeId, allItems);
  // 自動発注算出（基準在庫比較→必要数→発注単位丸め→業者別）
  var drafts = computeAutoOrders(storeId, counted);
  if (drafts.length) {
    var totalItems = drafts.reduce((a,d)=>a+d.lines.length,0);
    showToast(`棚卸を記録。${drafts.length}業者・${totalItems}品目の発注ドラフトを自動作成しました`, 'success');
    // Orderingタスク自動生成
    var tasks = getTasks();
    tasks.push({id:'tk'+Date.now(), title:`[自動] ${(STORES.find(s=>s.id===storeId)||{name:storeId}).name} 発注確認 (${drafts.length}業者)`,
      assignee:'', store:storeId, priority:'高', due:new Date().toISOString().slice(0,10), progress:0, status:'進行中', created:new Date().toLocaleDateString('ja')});
    lsSet('tasks_all', tasks);
  } else {
    showToast(invMode==='daily'?'Daily棚卸を記録しました（発注不要）':'月間棚卸を確定しました', 'success');
  }
  renderPage('inventory');
}

/* 自動発注算出: 必要数 = 基準在庫 − 現在庫 + 予測使用量 − 発注済 → 発注ロットへ丸め → 業者別 */
function computeAutoOrders(storeId, countedItems) {
  var ings = getIngredients();
  var vendorGroups = {};
  countedItems.forEach(ci => {
    var ing = ings.find(x=>x.code===ci.code);
    if (!ing) return;
    var current = parseFloat(ci.count)||0;
    var forecast = Math.round((ing.par||20)*0.4); // 予測使用量（仮: PARの40%）
    var ordered = 0; // 発注済（簡易: 0）
    var need = (ing.par||20) - current + forecast - ordered;
    if (need <= (ing.minStock||0)) return; // 最低在庫以下にならなければスキップ... ここは need<=0でスキップ
    if (need <= 0) return;
    var lot = ing.lot||1;
    var orderQty = Math.ceil(need/lot)*lot; // 発注単位丸め
    var vendor = ing.vendor;
    if (!vendor || vendor==='自家製') return;
    if (!vendorGroups[vendor]) vendorGroups[vendor] = [];
    vendorGroups[vendor].push({code:ing.code, name:ing.name, unit:ing.unit, need:Math.round(need*10)/10, qty:orderQty, price:ing.price});
  });
  var drafts = [];
  Object.keys(vendorGroups).forEach(vname => {
    var lines = vendorGroups[vname];
    var amount = lines.reduce((a,l)=>a+l.price*l.qty,0);
    drafts.push({id:'ao'+Date.now()+Math.random().toString(36).slice(2,5), storeId, vendor:vname, lines, amount,
      status:'自動作成', date:new Date().toLocaleDateString('ja'), deliveryDate:'', auto:true});
  });
  if (drafts.length) {
    var all = ls('orders_'+storeId, []);
    all = all.concat(drafts);
    lsSet('orders_'+storeId, all);
  }
  return drafts;
}

/* ============================================================
   ⑨ 発注管理 (作成→承認→送信→履歴・業者連動)
============================================================ */
function renderOrder() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var orders = ls('orders_'+storeId, []);

  </div>`;

  // 自動作成ドラフト
  var autoDrafts = orders.filter(o=>o.status==='自動作成');
  if (autoDrafts.length) {
    html += `<div class="alert alert-warning"><i class="ti ti-robot"></i><div><p style="font-size:12px;font-weight:600">自動算出された発注ドラフト ${autoDrafts.length}件</p><div style="font-size:11px">棚卸から自動作成。確認・修正して確定してください</div></div></div>`;
    autoDrafts.slice().reverse().forEach(o => {
      var vendor = getVendors().find(v=>v.name===o.vendor)||{};
      var method = vendorMethod(vendor, storeId);
      html += `<div class="card">
        <div class="approval-header"><div><div class="approval-title">${o.vendor} <span class="tag tag-blue" style="font-size:9px">${method}</span></div>
        <div class="approval-meta">${o.lines.length}品目 · $${o.amount.toFixed(2)}</div></div>
        <span class="tag tag-gray">自動作成</span></div>
        <table class="inv-table" style="margin-top:6px"><tbody>
        ${o.lines.map((l,i)=>`<tr><td style="font-size:12px">${l.name}</td><td><input class="inv-input" type="number" value="${l.qty}" onchange="updateDraftQty('${storeId}','${o.id}',${i},this.value)" style="width:50px"> ${l.unit}</td><td style="color:var(--muted);font-size:11px">$${(l.price*l.qty).toFixed(2)}</td><td><button class="btn btn-danger btn-sm" onclick="removeDraftLine('${storeId}','${o.id}',${i})"><i class="ti ti-x"></i></button></td></tr>`).join('')}
        </tbody></table>
        <div class="approval-actions">
          <button class="btn btn-success btn-sm" onclick="confirmOrder('${storeId}','${o.id}')"><i class="ti ti-check"></i> 発注確定</button>
          <button class="btn btn-danger btn-sm" onclick="cancelOrder('${storeId}','${o.id}')"><i class="ti ti-trash"></i> 削除</button>
        </div>
      </div>`;
    });
  }

  // 確定済（送信準備）
  var confirmed = orders.filter(o=>o.status==='発注確定'||o.status==='申請中'||o.status==='承認済');
  if (confirmed.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clipboard-check"></i>発注確定（送信準備）</div>`;
    confirmed.slice().reverse().forEach(o => {
      var vendor = getVendors().find(v=>v.name===o.vendor)||{};
      var method = vendorMethod(vendor, storeId);
      html += `<div class="approval-item">
        <div class="approval-header"><div><div class="approval-title">${o.vendor} <span class="tag tag-blue" style="font-size:9px">${method}</span></div>
        <div class="approval-meta">${o.date} · ${o.lines.length}品目 · $${o.amount.toFixed(2)}</div></div>
        <span class="tag tag-yellow">${o.status}</span></div>
        <div class="approval-actions">
          <button class="btn btn-primary btn-sm" onclick="openSendModal('${storeId}','${o.id}')"><i class="ti ti-send"></i> ${method}で発注</button>
        </div></div>`;
    });
    html += '</div>';
  }

  // 送信/連絡済み履歴
  var done = orders.filter(o=>['送信済','電話確認済','納品完了'].includes(o.status));
  if (done.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-check"></i>送信済み履歴</div>`;
    done.slice().reverse().slice(0,8).forEach(o => {
      html += `<div class="approval-item"><div class="approval-header"><div><div class="approval-title">${o.vendor}</div><div class="approval-meta">${o.sentDate||o.date} · $${o.amount.toFixed(2)} · ${o.sentMethod||''}</div></div>
        <span class="tag tag-green">${o.status}</span></div></div>`;
    });
    html += '</div>';
  }
  if (!orders.length) html += `<div class="card" style="text-align:center;color:var(--muted);padding:40px"><i class="ti ti-clipboard-list" style="font-size:32px;margin-bottom:8px;display:block"></i>発注なし<div style="font-size:12px;margin-top:6px">Inventory棚卸を確定すると自動でドラフトが作成されます</div></div>`;
  return html;
}

function updateDraftQty(storeId, orderId, idx, val) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.lines[idx].qty = parseFloat(val)||0; o.amount = o.lines.reduce((a,l)=>a+l.price*l.qty,0); lsSet('orders_'+storeId, orders); }
}
function removeDraftLine(storeId, orderId, idx) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.lines.splice(idx,1); o.amount = o.lines.reduce((a,l)=>a+l.price*l.qty,0); if(!o.lines.length){orders=orders.filter(x=>x.id!==orderId);} lsSet('orders_'+storeId, orders); renderPage('order'); }
}
function confirmOrder(storeId, orderId) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.status='発注確定'; lsSet('orders_'+storeId, orders); showToast('発注を確定しました', 'success'); renderPage('order'); }
}
function cancelOrder(storeId, orderId) {
  if (!confirm('この発注を削除しますか？')) return;
  lsSet('orders_'+storeId, ls('orders_'+storeId,[]).filter(x=>x.id!==orderId));
  showToast('削除しました', 'danger');
  renderPage('order');
}

/* 発注方法別テキスト生成 */
function buildOrderText(o, vendor, storeId, method) {
  var store = STORES.find(s=>s.id===storeId)||{name:storeId};
  var delivery = o.deliveryDate || '次回納品日';
  var lines = o.lines.map(l=>`・${l.name} ${l.qty}${l.unit}`).join('\n');
  if (method==='LINE') {
    return `${o.vendor} Order / ${store.name} / ${delivery}納品希望\n\n${lines}\n\nよろしくお願いします。`;
  } else if (method==='Text') {
    return `${store.name} Order\nDelivery: ${delivery}\n\n${o.lines.map(l=>`${l.name} x${l.qty}`).join('\n')}\n\nThank you.`;
  } else if (method==='Email') {
    return `To: ${vendor.email}\nSubject: ${store.name} Order for ${delivery} Delivery\n\nHi,\n\nPlease see our order below for ${store.name}.\n\nDelivery Date: ${delivery}\n\nItems:\n${lines}\n\nThank you,\n${store.name}`;
  } else if (method==='電話') {
    return `【電話発注リスト】${o.vendor}\nTEL: ${vendor.phone}\n納品: ${delivery}\n\n${lines}`;
  } else { // Web/FAX/その他
    return `${o.vendor} 発注 / ${store.name} / ${delivery}\n${vendor.webform?'Webフォーム: '+vendor.webform+'\n':''}\n${lines}`;
  }
}

function openSendModal(storeId, orderId) {
  var o = ls('orders_'+storeId, []).find(x=>x.id===orderId);
  if (!o) return;
  var vendor = getVendors().find(v=>v.name===o.vendor)||{};
  var method = vendorMethod(vendor, storeId);
  var text = buildOrderText(o, vendor, storeId, method);
  var phoneFields = method==='電話' ? `
    <div class="form-row">
      <div class="form-group"><label class="form-label">担当者名</label><input class="form-input" id="snd-contact" placeholder="話した相手"></div>
      <div class="form-group"><label class="form-label">確認番号</label><input class="form-input" id="snd-confirm" placeholder="任意"></div>
    </div>` : '';
  openModal(`<div class="modal-title">${o.vendor} へ${method}発注 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">納品希望日</label><input class="form-input" id="snd-delivery" type="date" onchange="updateDraftDelivery('${storeId}','${orderId}',this.value)" value="${o.deliveryDate||''}"></div>
    <div class="form-group"><label class="form-label">${method}用テキスト（コピーして使用）</label>
      <textarea class="form-textarea" id="snd-text" style="min-height:160px;font-size:12px" readonly>${text}</textarea>
      <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="copyOrderText()"><i class="ti ti-copy"></i> コピー</button>
      ${vendor.webform&&method==='Webフォーム'?`<a href="${vendor.webform}" target="_blank" class="btn btn-secondary btn-sm" style="margin-top:6px;margin-left:6px;text-decoration:none"><i class="ti ti-external-link"></i> Webフォームを開く</a>`:''}
    </div>
    ${phoneFields}
    <div class="form-group"><label class="form-label">メモ</label><input class="form-input" id="snd-memo" placeholder="任意"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">閉じる</button>
      <button class="btn btn-success" onclick="markOrderSent('${storeId}','${orderId}','${method}')"><i class="ti ti-check"></i> ${method==='電話'?'電話済みに':'送信済みに'}</button>
    </div>`);
}
function updateDraftDelivery(storeId, orderId, val) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.deliveryDate=val; lsSet('orders_'+storeId, orders);
    var vendor=getVendors().find(v=>v.name===o.vendor)||{}; var method=vendorMethod(vendor,storeId);
    var ta=document.getElementById('snd-text'); if(ta) ta.value=buildOrderText(o,vendor,storeId,method);
  }
}
function copyOrderText() {
  var ta = document.getElementById('snd-text');
  ta.select();
  try { document.execCommand('copy'); showToast('コピーしました', 'success'); } catch(e){ showToast('手動でコピーしてください', 'info'); }
}
function markOrderSent(storeId, orderId, method) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (!o) return;
  o.status = method==='電話'?'電話確認済':'送信済';
  o.sentDate = new Date().toLocaleDateString('ja');
  o.sentMethod = method;
  o.sentBy = ROLE_CONFIG[curRole].name;
  if (method==='電話') { var c=document.getElementById('snd-contact'); o.phoneContact=c?c.value:''; }
  var m=document.getElementById('snd-memo'); o.memo = m?m.value:'';
  lsSet('orders_'+storeId, orders);
  closeModalDirect();
  showToast(`${o.vendor}へ${method}で発注しました`, 'success');
  renderPage('order');
}

var orderTmpLines = [];
function openOrderModal(storeId) {
  orderTmpLines = [];
  var vendors = getVendors();
  renderOrderModalBody(storeId, vendors[0].name);
}

function renderOrderModalBody(storeId, vendorName) {
  var vendors = getVendors();
  var vendor = vendors.find(v=>v.name===vendorName) || vendors[0];
  var ings = getIngredients().filter(i=>i.vendor===vendor.name);
  var total = orderTmpLines.reduce((a,l)=>a+l.price*l.qty,0);
  var linesHtml = orderTmpLines.map((l,idx)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
    <div style="flex:1;font-size:13px">${l.name}</div>
    <input class="inv-input" type="number" value="${l.qty}" onchange="updateOrderQty(${idx},this.value)" style="width:55px">
    <span style="font-size:11px;color:var(--muted)">$${(l.price*l.qty).toFixed(2)}</span>
    <button class="btn btn-danger btn-sm" onclick="removeOrderLine('${storeId}','${vendorName}',${idx})"><i class="ti ti-x"></i></button>
  </div>`).join('');
  var minWarn = total < vendor.minOrder ? `<div class="alert alert-warning" style="margin-top:8px"><i class="ti ti-alert-triangle"></i>最低発注額 $${vendor.minOrder} 未満です（現在 $${total.toFixed(2)}）</div>` : '';

  openModal(`<div class="modal-title">発注作成 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">業者（マスター連動）</label>
      <select class="form-select" id="o-vendor" onchange="changeOrderVendor('${storeId}',this.value)">${vendors.map(v=>`<option${v.name===vendorName?' selected':''}>${v.name}</option>`).join('')}</select>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">発注方法 ${vendorMethod(vendor,storeId)} · 最低 $${vendor.minOrder} · ${vendor.delivery}</div>
    </div>
    <div class="form-group"><label class="form-label">発注品目（この業者の食材）</label>
      <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:8px">
        ${linesHtml || '<div style="color:var(--muted);font-size:12px;text-align:center;padding:6px">品目を追加してください</div>'}
        <div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:600;font-size:13px"><span>合計</span><span style="color:var(--accent)">$${total.toFixed(2)}</span></div>
      </div>
      <div style="display:flex;gap:6px">
        <select class="form-select" id="o-add-ing" style="flex:1">${ings.length?ings.map(i=>`<option value="${i.code}">${i.name} ($${i.price}/${i.unit})</option>`).join(''):'<option value="">この業者の食材なし</option>'}</select>
        <button class="btn btn-secondary btn-sm" onclick="addOrderLine('${storeId}','${vendorName}')">追加</button>
      </div>
      ${minWarn}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveOrder('${storeId}')">発注確定へ</button>
    </div>`);
}

function changeOrderVendor(storeId, vendorName) { orderTmpLines = []; renderOrderModalBody(storeId, vendorName); }
function addOrderLine(storeId, vendorName) {
  var code = parseInt(document.getElementById('o-add-ing').value);
  if (!code) return;
  var ing = getIngredients().find(i=>i.code===code);
  if (ing && !orderTmpLines.find(l=>l.code===code)) orderTmpLines.push({code, name:ing.name, unit:ing.unit, price:ing.price, qty:1});
  renderOrderModalBody(storeId, vendorName);
}
function updateOrderQty(idx, val) { orderTmpLines[idx].qty = parseFloat(val)||0; }
function removeOrderLine(storeId, vendorName, idx) { orderTmpLines.splice(idx,1); renderOrderModalBody(storeId, vendorName); }

function saveOrder(storeId) {
  if (!orderTmpLines.length) { alert('品目を追加してください'); return; }
  var vendor = document.getElementById('o-vendor').value;
  var amount = orderTmpLines.reduce((a,l)=>a+l.price*l.qty,0);
  var orders = ls('orders_'+storeId, []);
  orders.push({id:'o'+Date.now(), vendor, lines:JSON.parse(JSON.stringify(orderTmpLines)), amount, status:'発注確定', date:new Date().toLocaleDateString('ja'), deliveryDate:''});
  lsSet('orders_'+storeId, orders);
  closeModalDirect();
  showToast('発注を確定しました', 'success');
  renderPage('order');
}

var laborTab = 'overview';
var tipMgmtDate = null;
var tipMgmtView = 'daily';
function renderTipMgmt() {
  if (!ROLE_CONFIG[curRole].financial && curRole!=='sl') return financialBlocked();
  var storeId = curStore==='ALL'?STORES[0].id:curStore;
  var store = STORES.find(s=>s.id===storeId)||STORES[0];
  var date = tipMgmtDate || new Date(Date.now()-86400000).toISOString().slice(0,10);
  var html = `<div class="section-header"><div><div class="section-title">チップ管理</div><div class="section-sub">${store.name}</div></div>
    <input type="date" value="${date}" onchange="setTipMgmtDate(this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:13px"></div>
  <div class="phase-tabs">
    <div class="phase-tab${tipMgmtView==='daily'?' active':''}" onclick="setTipView('daily')">日次配分</div>
    <div class="phase-tab${tipMgmtView==='half'?' active':''}" onclick="setTipView('half')">半月精算（SL再分配）</div>
  </div>`;
  if (tipMgmtView==='half') return html + renderTipHalfMonth(storeId, store, date);
  return html + renderTipDaily(storeId, store, date);
}
function setTipView(v){ tipMgmtView=v; renderPage('tip'); }

function renderTipDaily(storeId, store, date) {
  var dist = calcTipDistribution(storeId, date);
  var tip = dist.tip;
  var hasGuid = !!store.toastGuid;
  var html = '';

  // キャッシュチップ未入力エラー
  if (cashTipMissing(storeId, date)) {
    html += `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div>
      <p style="font-size:12px;font-weight:600">キャッシュチップが未入力です</p>
      <div style="font-size:11px;margin-top:2px">この日のチップ総額・配分が正しく計算できません。現金チップが無い場合も「0」を入力して確定してください。</div>
      <button class="btn btn-danger btn-sm" style="margin-top:6px" onclick="openCashTipModal('${storeId}','${date}')"><i class="ti ti-edit"></i> キャッシュチップを入力</button>
    </div></div>`;
  }

  // チップ総額サマリー
  html += `<div class="card"><div class="card-title"><i class="ti ti-coin" style="color:var(--green)"></i>${date} チップ総額</div>
    <table style="width:100%;font-size:12px"><tr style="color:var(--muted)"><td></td><td style="text-align:right">Lunch</td><td style="text-align:right">Dinner</td><td style="text-align:right">計</td></tr>
    <tr><td>クレジット(控除前)</td><td style="text-align:right">$${tip.lunchCredit.toFixed(2)}</td><td style="text-align:right">$${tip.dinnerCredit.toFixed(2)}</td><td style="text-align:right">$${(tip.lunchCredit+tip.dinnerCredit).toFixed(2)}</td></tr>
    <tr><td>キャッシュ</td><td style="text-align:right">$${tip.lunchCash.toFixed(2)}</td><td style="text-align:right">$${tip.dinnerCash.toFixed(2)}</td><td style="text-align:right">$${(tip.lunchCash+tip.dinnerCash).toFixed(2)}</td></tr>
    <tr style="font-weight:700;border-top:1px solid var(--border)"><td>総額(控除後+現金)</td><td style="text-align:right">$${tip.lunchTotal.toFixed(2)}</td><td style="text-align:right">$${tip.dinnerTotal.toFixed(2)}</td><td style="text-align:right;color:var(--green)">$${tip.total.toFixed(2)}</td></tr>
    </table></div>`;

  // データ連携
  if (hasGuid) {
    var basis = getTipHoursBasis(storeId);
    html += `<div class="card"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-primary btn-sm" onclick="doTipLaborDB('${storeId}','${store.toastGuid}')"><i class="ti ti-cloud-check"></i> 同期データを反映</button>
      <button class="btn btn-secondary btn-sm" onclick="doTipLaborFetch('${storeId}','${store.toastGuid}','${date}')"><i class="ti ti-cloud-download"></i> この日を取得</button>
      <button class="btn btn-secondary btn-sm" onclick="openTipTimeModal('${storeId}')"><i class="ti ti-clock-cog"></i> 時間設定</button>
      <span class="tag ${basis==='window'?'tag-blue':'tag-gray'}" style="font-size:10px">${basis==='window'?'営業時間帯のみ':'全勤務時間'}</span>
    </div><div id="tip-status" style="font-size:11px;color:var(--muted);margin-top:6px">毎朝5時に自動同期されたデータを「同期データを反映」で取り込めます。</div></div>`;
  }

  // 配分一覧
  if (!dist.hasLabor) {
    html += `<div class="card" style="text-align:center;padding:24px;color:var(--muted)"><i class="ti ti-clock-question" style="font-size:32px"></i><div style="margin-top:8px">この日の勤怠データがありません。<br>「同期データを反映」または「この日を取得」を押してください。</div></div>`;
  } else {
    html += `<div class="card"><div class="card-title"><i class="ti ti-users"></i>スタッフ別チップ配分</div>
      <table class="inv-table" style="width:100%;font-size:12px"><thead><tr>
        <th>従業員</th><th>係数</th><th>L時間</th><th>D時間</th><th>L配分</th><th>D配分</th><th>合計</th></tr></thead><tbody>`;
    dist.list.forEach(r=>{
      html += `<tr>
        <td>${r.name}<div style="font-size:9px;color:var(--muted)">${r.role==='sl'?'Leader':'Crew'}</div></td>
        <td style="text-align:center">${r.coef}</td>
        <td style="text-align:right;color:var(--muted)">${r.lunchHours?r.lunchHours.toFixed(2):'—'}</td>
        <td style="text-align:right;color:var(--muted)">${r.dinnerHours?r.dinnerHours.toFixed(2):'—'}</td>
        <td style="text-align:right">$${r.lunch.toFixed(2)}</td>
        <td style="text-align:right">$${r.dinner.toFixed(2)}</td>
        <td style="text-align:right;font-weight:700;color:var(--green)">$${r.total.toFixed(2)}</td>
      </tr>`;
    });
    html += `</tbody><tfoot><tr style="border-top:2px solid var(--border);font-weight:700">
      <td colspan="6">配分合計</td><td style="text-align:right">$${dist.distSum.toFixed(2)}</td></tr>
      <tr style="color:${Math.abs(dist.distSum-tip.total)<0.5?'var(--green)':'var(--red)'}"><td colspan="6">チップ総額との差額（チェック）</td><td style="text-align:right">$${(dist.distSum-tip.total).toFixed(2)}</td></tr>
      </tfoot></table>`;
    if (Math.abs(dist.distSum-tip.total)<0.5) html += `<div class="alert alert-success" style="padding:7px 10px;margin-top:8px;font-size:12px"><i class="ti ti-circle-check"></i>配分合計とチップ総額が一致しています（ミスなし）</div>`;
    else html += `<div class="alert alert-warning" style="padding:7px 10px;margin-top:8px;font-size:12px"><i class="ti ti-alert-triangle"></i>差額があります。勤怠やキャッシュチップを確認してください。</div>`;
    html += `<div style="font-size:11px;color:var(--muted);margin-top:8px">※ チップ総額を pt（時間×評価係数）で全員按分。Store Manager以上は対象外。Lunch/Dinner別に計算。</div>`;
    html += '</div>';
  }
  return html;
}

function saveTipTime(storeId) {
  var basis = document.getElementById('tt-basis').value;
  setTipHoursBasis(storeId, basis);
  if (basis==='window') {

/* 勤怠明細: 従業員ごとの週実働時間×時給。OTは週40h超を1.5倍 */
/* 勤怠明細: 日曜起算の週。Toastからregular/overtime別取得、または手入力 */
function laborWeekStr() {
  // 日曜起算の週の日曜日を返す（YYYY-MM-DD）
  var d = new Date();
  var sun = new Date(d); sun.setDate(d.getDate() - d.getDay()); // 日曜
  return sun.toISOString().slice(0,10);
}
function laborWeekRange(weekSunISO) {
  var sun = new Date(weekSunISO+'T00:00:00');
  var sat = new Date(sun); sat.setDate(sun.getDate()+6);
  return { from: weekSunISO, to: sat.toISOString().slice(0,10),
    label: `${sun.getMonth()+1}/${sun.getDate()}〜${sat.getMonth()+1}/${sat.getDate()}` };
}
function getLaborHours(storeId, week) { return ls('labor_hours_'+storeId+'_'+week, {}); } // {empName:{regular,ot,wage,source}}
function setLaborHours(storeId, week, data) { lsSet('labor_hours_'+storeId+'_'+week, data); }

function laborForEmployee(name, entry) {
  // entry: {regular, ot} があればそれを使う（Toast/手入力）。無ければ0
  var wage = empWage(name);
  var reg = (entry && entry.regular!=null) ? entry.regular : 0;
  var ot = (entry && entry.ot!=null) ? entry.ot : 0;
  var regPay = reg*wage;
  var otPay = ot*wage*1.5;
  return { wage, reg, ot, regPay, otPay, total: regPay+otPay };
}

    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">対象週: ${range.label}（OTは日曜起算・週40h超をToastが自動計算）</div>`;

  // Toast勤怠取得（GUIDあれば）
  if (hasGuid) {
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">

  }

  // 表示対象 = マスター在籍スタッフ ＋ Toastで取れたがマスターに無い従業員
  var staffNames = staff.map(s=>s.name);
  var toastOnly = Object.keys(hoursData).filter(n=>!staffNames.includes(n) && hoursData[n] && hoursData[n].source==='toast');

  var totalCost = 0, totalReg = 0, totalOt = 0;
  html += `<table class="inv-table" style="width:100%;font-size:12px"><thead><tr>
    <th>従業員</th><th>通常h</th><th>OT h</th>${canWage?'<th>人件費</th>':''}<th></th></tr></thead><tbody>`;
  // マスター在籍スタッフ
  staff.forEach(e => {

    var src = entry && entry.source==='toast' ? ' <i class="ti ti-plug-connected" style="font-size:10px;color:var(--accent2)" title="Toast勤怠"></i>' : '';
    html += `<tr>
      <td>${e.name}${src}<div style="font-size:9px;color:var(--muted)">${ROLE_CONFIG[e.role].label}</div></td>
      <td>${calc.reg>0?calc.reg+'h':'—'}</td>
      <td>${calc.ot>0?`<span class="tag tag-yellow" style="font-size:9px">${calc.ot}h</span>`:'—'}</td>
      ${canWage?`<td style="font-weight:600">$${Math.round(calc.total)}<div style="font-size:8px;color:var(--muted)">通$${Math.round(calc.regPay)}+OT$${Math.round(calc.otPay)}</div></td>`:''}
      <td><button class="btn btn-secondary btn-sm" style="padding:2px 6px" onclick="openLaborHourModal('${storeId}','${e.name.replace(/'/g,'')}')"><i class="ti ti-edit" style="font-size:11px"></i></button></td>
    </tr>`;
  });
  // Toastのみ（マスター未登録）→ 時間は表示、人件費は時給未設定で$0
  toastOnly.forEach(name => {
    var entry = hoursData[name];
    var reg = entry.regular||0, ot = entry.ot||0;
    totalReg += reg; totalOt += ot;
    html += `<tr style="opacity:0.85">
      <td>${name} <i class="ti ti-plug-connected" style="font-size:10px;color:var(--accent2)"></i><div style="font-size:9px;color:var(--yellow)">マスター未登録</div></td>
      <td>${reg>0?reg+'h':'—'}</td>
      <td>${ot>0?`<span class="tag tag-yellow" style="font-size:9px">${ot}h</span>`:'—'}</td>
      ${canWage?`<td style="color:var(--muted)">$0<div style="font-size:8px;color:var(--muted)">時給未設定</div></td>`:''}
      <td></td>

  if (toastOnly.length) {
    html += `<div class="alert alert-warning" style="padding:8px 10px;margin-top:8px;font-size:11px"><i class="ti ti-info-circle"></i><div>Toastで${toastOnly.length}名の勤怠を取得しましたが、従業員マスターに未登録のため人件費が$0です。設定系→従業員マスターで登録し、所属をこの店舗・時給を設定すると人件費まで自動計算されます。</div></div>`;
  }

  // サマリー
  var data = storeData(storeId);
  var laborRate = data.a ? Math.round(totalCost/(data.a/4.3)*1000)/10 : 0;
  html += `<div class="kpi-grid" style="margin-top:12px">
    ${kpi('通常時間', Math.round(totalReg*10)/10+'h', (staff.length+toastOnly.length)+'名', 'var(--tm)')}
    ${kpi('OT時間', Math.round(totalOt*10)/10+'h', '週40h超', totalOt>0?'var(--yellow)':'var(--muted)')}
    ${canWage?kpi('週人件費', '$'+Math.round(totalCost).toLocaleString(), 'OT1.5倍込み', 'var(--tm)'):''}
    ${canWage?kpi('Labor率', laborRate+'%', '対週売上', laborRate<=29?'var(--green)':'var(--red)'):''}
  </div>`;
  html += `<p style="font-size:11px;color:var(--muted);margin-top:8px">※ Toast勤怠は通常時間・OT時間が別出力（日曜起算でToast計算済み）。時給は従業員マスター（GM限定）。</p>`;
  html += '</div>';
  return html;
}

/* Toast勤怠取得: Edge Functionのlaborモードで regularHours/overtimeHours を取得 */
var laborLastFetch = null;
async function doToastLaborFetch(storeId, guid, week) {
  var el = document.getElementById('labor-status');
  if (el) el.textContent = 'Toast勤怠を取得中...';
  var range = laborWeekRange(week);
  try {
    var res = await fetch(TOAST_SYNC_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({ restaurantGuid: guid, mode: 'labor', startDate: range.from.replace(/-/g,''), endDate: range.to.replace(/-/g,'') }),
    });
    var j = await res.json();
    if (j && Array.isArray(j.employees)) {
      var hoursData = getLaborHours(storeId, week);
      var matched = 0;
      j.employees.forEach(emp => {
        // 時間が0でない従業員のみ反映（打刻なしを除外）
        if ((emp.regularHours||0)===0 && (emp.overtimeHours||0)===0) return;
        var staff = staffForStore(storeId).find(s => s.name===emp.name || (emp.name && s.name.includes(emp.name)) || (emp.name && emp.name.includes(s.name)));
        var key = staff ? staff.name : emp.name;
        hoursData[key] = { regular: emp.regularHours||0, ot: emp.overtimeHours||0, source:'toast', toastName: emp.name };
        if (staff) matched++;
      });
      setLaborHours(storeId, week, hoursData);
      var withHours = j.employees.filter(e=>(e.regularHours||0)>0||(e.overtimeHours||0)>0).length;
      laborLastFetch = `勤怠取得成功: ${withHours}名分（マスター一致${matched}名）`;
      renderPage('labor');
    } else {
      laborLastFetch = null;
      if (el) el.innerHTML = `<span style="color:var(--yellow)">勤怠データを取得できませんでした。詳細: ${(JSON.stringify(j)||'').slice(0,120)}</span>`;
    }
  } catch(e) { laborLastFetch=null; if (el) el.textContent = 'エラー: ' + String(e); }
}

function renderShiftStatus(storeId, week) {
  var staff = staffForStore(storeId);
  var avail = getAvailability(storeId, week);
  var submitted = avail.map(a=>a.name);
  var pending = staff.filter(e=>!submitted.includes(e.name));
  var rate = staff.length ? Math.round(submitted.length/staff.length*100) : 0;
  var reminded = ls('reminded_'+storeId+'_'+week, []);

  var html = `<div class="kpi-grid" style="margin-bottom:12px">
    ${kpi('提出済', submitted.length, '名', 'var(--green)')}
    ${kpi('未提出', pending.length, '名', pending.length?'var(--red)':'var(--green)')}
    ${kpi('提出率', rate+'%', week+'週', rate>=80?'var(--green)':'var(--yellow)')}
    ${kpi('対象', staff.length, '名', 'var(--tm)')}
  </div>`;

  html += `<div class="card"><div class="card-title"><i class="ti ti-check"></i>提出済み (${submitted.length})</div>`;
  if (submitted.length) {
    avail.forEach(a => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${a.name}</div><span class="tag tag-green">${a.slots.length}枠</span></div>
        <div class="approval-meta">${a.slots.map(s=>s.day+s.period).join(', ')}${a.notes?' · '+a.notes:''}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">提出なし</p>`; }
  html += '</div>';

  if (pending.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clock" style="color:var(--red)"></i>未提出 (${pending.length})
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="remindAll('${storeId}','${week}')"><i class="ti ti-bell"></i> 全員Remind</button></div>`;
    pending.forEach(e => {
      var done = reminded.includes(e.name);
      html += `<div class="staff-item"><div class="staff-avatar">${e.name[0]}</div>
        <div style="flex:1"><div class="staff-name">${e.name}</div><div class="staff-role">${ROLE_CONFIG[e.role].label}</div></div>
        ${done?'<span class="tag tag-yellow">Remind済</span>':`<button class="btn btn-secondary btn-sm" onclick="remindOne('${storeId}','${week}','${e.name}')">Remind</button>`}
      </div>`;
    });
    html += '</div>';
  }
  return html;
}
function remindOne(storeId, week, name) {
  var r = ls('reminded_'+storeId+'_'+week, []); if(!r.includes(name)) r.push(name); lsSet('reminded_'+storeId+'_'+week, r);
  showToast(`${name}にRemindを送信しました`, 'success'); renderPage('shift_admin');
}
function remindAll(storeId, week) {
  var staff = staffForStore(storeId); var avail = getAvailability(storeId, week).map(a=>a.name);
  var pending = staff.filter(e=>!avail.includes(e.name)).map(e=>e.name);
  lsSet('reminded_'+storeId+'_'+week, pending);
  showToast(`${pending.length}名にRemindを送信しました`, 'success'); renderPage('shift_admin');
}

/* シフト作成（Grid + Auto-Generate + 警告） */
function renderShiftBuild(storeId, week) {
  var positions = assignablePositions(storeId);
  var plan = getShiftPlan(storeId, week) || {status:'下書き', cells:{}};
  var warnings = checkShiftWarnings(storeId, week, plan);

  var html = `<div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn btn-primary btn-sm" onclick="autoGenShift('${storeId}','${week}')"><i class="ti ti-wand"></i> Auto-Generate</button>
    <button class="btn btn-secondary btn-sm" onclick="setShiftView('${shiftView==='grid'?'list':'grid'}')"><i class="ti ti-layout-grid"></i> ${shiftView==='grid'?'List':'Grid'}</button>
    ${plan.status==='下書き'?`<button class="btn btn-success btn-sm" onclick="publishShiftPlan('${storeId}','${week}')"><i class="ti ti-send"></i> 公開</button>`:`<span class="tag tag-green" style="align-self:center">公開済</span>`}
  </div>`;

  if (warnings.length) {
    html += `<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i><div><p style="font-size:12px;font-weight:600">警告 ${warnings.length}件</p>
      <div style="font-size:11px">${warnings.map(w=>'・'+w).join('<br>')}</div></div></div>`;
  } else {
    html += `<div class="alert alert-success" style="padding:8px 10px"><i class="ti ti-circle-check"></i>警告なし</div>`;
  }

  // オーバーワーク状況（週40h超）
  var otApprovals = getOTApprovals(storeId, week);
  var hoursMap = {};
  Object.keys(plan.cells||{}).forEach(k=>{
    var nm = plan.cells[k]; if(!nm) return;
    var period = k.split('_')[1];
    hoursMap[nm] = (hoursMap[nm]||0) + (SHIFT_HOURS[period]||4);
  });
  var overList = Object.keys(hoursMap).filter(nm=>hoursMap[nm]>40);
  if (overList.length) {
    html += `<div class="alert ${overList.every(nm=>otApprovals[nm])?'alert-success':'alert-warning'}" style="padding:8px 10px"><i class="ti ti-clock-exclamation"></i><div style="font-size:11px">
      <b>オーバーワーク（40h超）${overList.length}名</b><br>
      ${overList.map(nm=>`${nm}: ${hoursMap[nm]}h ${otApprovals[nm]?'<span style="color:var(--green)">✓承認済('+otApprovals[nm].by+')</span>':'<span style="color:var(--red)">未承認</span>'+(canApproveOT()?` <button class="btn btn-success btn-sm" style="padding:0 6px;font-size:10px" onclick="approveOTOnly('${storeId}','${week}','${nm.replace(/'/g,"")}')">承認</button>`:'')}`).join('<br>')}
    </div></div>`;
  }

  if (shiftView==='grid') {
    html += `<div class="card" style="overflow-x:auto"><table class="inv-table" style="min-width:560px"><thead><tr><th>枠</th>${DOW_SHIFT.map(d=>`<th style="text-align:center">${d}</th>`).join('')}</tr></thead><tbody>`;
    SHIFT_PERIODS.forEach(period => {
      positions.forEach(pos => {
        html += `<tr><td style="font-size:11px;white-space:nowrap">${period.slice(0,1)}·${pos.slice(0,4)}</td>`;
        DOW_SHIFT.forEach(day => {
          var key = day+'_'+period+'_'+pos;
          var assigned = plan.cells[key] || '';
          html += `<td style="text-align:center;padding:2px"><div class="shift-slot${assigned?' sel':''}" style="font-size:10px;padding:3px;min-height:24px" onclick="openCellAssign('${storeId}','${week}','${key}','${day}','${period}','${pos}')">${assigned?assigned.split(' ')[0].slice(0,5):'+'}</div></td>`;
        });
        html += '</tr>';
      });
    });
    html += '</tbody></table></div>';
  } else {
    // List view by day
    DOW_SHIFT.forEach(day => {
      var dayKeys = Object.keys(plan.cells).filter(k=>k.startsWith(day+'_') && plan.cells[k]);
      if (!dayKeys.length) return;
      html += `<div class="card"><div class="card-title">${day}曜日</div>`;
      dayKeys.forEach(k => {

      });
      html += '</div>';
    });
  }
  return html;

function openCellAssign(storeId, week, key, day, period, pos) {
  var avail = getAvailability(storeId, week);
  var staff = staffForStore(storeId);
  // この枠に出せる人: Availabilityでday/period提出 かつ pos承認済（Leader等）
  var candidates = staff.filter(e => {
    var av = avail.find(a=>a.name===e.name);
    var available = av && av.slots.some(s=>s.day===day && s.period===period);
    var posOk = pos==='Server'||pos==='Prep'||pos==='Host'||pos==='Cashier'||pos==='Kitchen' ? true : approvedPositions(e.name).includes(pos) || e.role==='sl' || e.role==='am';
    return available || !av; // availabilityある人優先だが、未提出者も選べる
  });
  var plan = getShiftPlan(storeId, week) || {status:'下書き', cells:{}};
  var html = `<div class="modal-title">${day} ${period} · ${pos} <button class="modal-close" onclick="closeModalDirect()">×</button></div>

    <div style="max-height:50vh;overflow-y:auto">`;
  candidates.forEach(e => {
    var av = avail.find(a=>a.name===e.name);
    var available = av && av.slots.some(s=>s.day===day && s.period===period);
    var tip = ls('tip_requests',[]).filter(r=>r.name===e.name&&r.status==='承認').slice(-1)[0];
    var ap = approvedPositions(e.name);
    var posOk = ap.includes(pos);
    var isLeader = leaderSkillApproved(e.name);
    html += `<div class="staff-item" style="cursor:pointer" onclick="assignCell('${storeId}','${week}','${key}','${e.name}')">
      <div class="staff-avatar">${e.name[0]}</div>
      <div style="flex:1"><div class="staff-name">${e.name} ${isLeader?'<span class="tag tag-blue" style="font-size:8px">Leader</span>':''}</div>
        <div class="staff-role">STEP ${e.step} · Tip ${tip?tip.rate+'%':'未'} ${posOk?'<span style="color:var(--green)">'+pos+'可</span>':'<span style="color:var(--muted)">'+pos+'未承認</span>'}</div>
        <div style="font-size:10px;color:${available?'var(--green)':'var(--red)'}">${available?'Availability OK':av?'この枠は希望外':'未提出'}</div>
      </div>
    </div>`;
  });
  html += `</div>
    <div class="btn-row">
      ${plan.cells[key]?`<button class="btn btn-danger" style="margin-right:auto" onclick="assignCell('${storeId}','${week}','${key}','')">クリア</button>`:''}
      <button class="btn btn-secondary" onclick="closeModalDirect()">閉じる</button>
    </div>`;
  openModal(html);
}
function assignCell(storeId, week, key, name) {
  var plan = getShiftPlan(storeId, week) || {status:'下書き', cells:{}};
  if (name) {
    // オーバーワーク(週40h超)チェック
    var period = key.split('_')[1];
    var addH = SHIFT_HOURS[period] || 4;
    var curH = shiftHoursForPerson(plan, name);
    var newH = curH + addH;
    var approvedOT = getOTApprovals(storeId, week);
    if (newH > 40 && !approvedOT[name]) {
      closeModalDirect();
      openOvertimeApproval(storeId, week, key, name, curH, newH);
      return;
    }
    plan.cells[key] = name;
  } else {
    delete plan.cells[key];
  }
  plan.status = '下書き';
  setShiftPlan(storeId, week, plan);
  closeModalDirect();
  renderPage('shift_admin');
}

/* 週内の本人の合計シフト時間（このplan内） */
function shiftHoursForPerson(plan, name) {
  var h = 0;
  Object.keys(plan.cells||{}).forEach(k=>{
    var who = (plan.cells[k]||'').split(' ')[0];
    if (plan.cells[k]===name || who===name.split(' ')[0]) {
      var period = k.split('_')[1];
      h += SHIFT_HOURS[period] || 4;
    }
  });
  return h;
}
/* OT承認の保存（週・店舗ごと、名前単位） */
function getOTApprovals(storeId, week) { return ls('ot_approvals_'+storeId+'_'+week, {}); }

/* Auto-Generate: Availability+Skill+Min/Maxを考慮 */
/* ============ 特別ルール（人間関係設定） ============
   { storeId: { pairs:[{a,b,type:'forbid'|'recommend'}], trainerRequired:[names], lv3Pair:[names] } }
   Crewには非表示・Store Manager以上のみ編集 */
function getSpecialRules(storeId) {
  var all = ls('special_rules', {});
  return all[storeId] || { pairs:[], trainerRequired:[], lv3Pair:[] };
}
function setSpecialRules(storeId, rules) {
  var all = ls('special_rules', {});
  all[storeId] = rules; lsSet('special_rules', all);
}
/* 勤務条件（スタッフ個別）: { name: {opening:'any'|'only'|'no', closing:'any'|'only'|'no', days:'any'|'weekday'|'weekend', minH, maxH} } */
function getWorkConditions(storeId) { var all=ls('work_conditions', {}); return all[storeId] || {}; }
function setWorkCondition(storeId, name, cond) {
  var all = ls('work_conditions', {}); if(!all[storeId]) all[storeId]={};
  all[storeId][name] = cond; lsSet('work_conditions', all);
}
function getWorkCondition(storeId, name) { return getWorkConditions(storeId)[name] || {opening:'any',closing:'any',days:'any',minH:0,maxH:40}; }
/* この枠(day/period)にこの人を配置できるか（勤務条件チェック）。Lunch=Opening寄り, Dinner=Closing寄りとみなす */
function workCondOk(storeId, name, day, period) {
  var c = getWorkCondition(storeId, name);
  var isWeekend = (day==='土'||day==='日');
  if (c.days==='weekday' && isWeekend) return false;
  if (c.days==='weekend' && !isWeekend) return false;
  // Opening≒Lunch, Closing≒Dinner として近似
  if (c.opening==='only' && period!=='Lunch') return false;   // Openingのみ→Lunch枠のみ
  if (c.opening==='no' && period==='Lunch') return false;     // Opening不可→Lunch不可
  if (c.closing==='only' && period!=='Dinner') return false;  // Closingのみ→Dinner枠のみ
  if (c.closing==='no' && period==='Dinner') return false;    // Closing不可→Dinner不可
  return true;
}
/* 2人が同時間帯に入れるか（禁止ペアでない） */
function pairAllowed(storeId, name1, name2) {
  var r = getSpecialRules(storeId);
  return !r.pairs.some(p=>p.type==='forbid' && ((p.a===name1&&p.b===name2)||(p.a===name2&&p.b===name1)));
}
/* その人がTrainer必須/Lv3とセット必須か */
function needsTrainer(storeId, name) { return getSpecialRules(storeId).trainerRequired.includes(name); }
function needsLv3Pair(storeId, name) { return getSpecialRules(storeId).lv3Pair.includes(name); }
function isLv3Anywhere(name) { var sk=getEmpSkills(name); return Object.values(sk).some(x=>x.status==='承認'&&x.level>=3); }

/* シフト生成優先度（仕様書 Priority 3-10） */
function shiftPriority(emp) {
  if (emp.role==='am') return 10;            // Store Manager相当
  if (emp.isSL) return 9;                     // Store Leader
  if (emp.role==='sl') return 9;
  var title = (emp.title||'').toLowerCase();
  if (emp.emp==='正社員' || title.includes('f-crew') || title.includes('full')) return 8; // F-Crew
  // 主力Part Time = スキル承認3つ以上 / 通常 / Training(step<=0)
  if ((emp.step||1) <= 0) return 3;          // Training Crew
  var ap = approvedPositions(emp.name).length;
  if (ap >= 3) return 7;                       // 主力Part Time
  return 5;                                    // 通常Part Time
}
/* そのスタッフが Lv1以上で対応できるポジションか（Energy/Leadershipは評価軸なので除外） */
function canDoPosition(name, pos) {
  if (pos==='Energy' || pos==='Leadership') return true; // 評価軸（必須枠ではない）
  var sk = getEmpSkills(name);
  var s = sk[pos];
  return !!(s && s.status==='承認' && s.level>=1);
}
/* 実際にアサインが必要なポジション（Energy/Leadershipは評価軸なので枠から除外） */
function assignablePositions(storeId) {
  return getStorePositions(storeId).filter(p=>p!=='Energy' && p!=='Leadership');
}
/* Training中スタッフ（初回勤務基準。step<=0 を訓練中とみなす） */
function isTraining(emp) { return (emp.step||1) <= 0; }

function autoGenShift(storeId, week) {
  if (!confirm('Availability・スキル・優先度を元にシフトを自動生成しますか？（既存の配置は上書きされます）')) return;
  var positions = assignablePositions(storeId);
  var avail = getAvailability(storeId, week);
  var staff = staffForStore(storeId);
  var plan = {status:'下書き', cells:{}};
  var hours = {}; staff.forEach(e=>hours[e.name]=0);   // 週の合計時間
  var assignedSlot = {};                                // day_period -> [names] 同時間帯の重複防止
  var otApprovals = getOTApprovals(storeId, week);

  // Step5: 優先度順にアサイン。各枠で「対応可能なスキル保持者」を優先度→時間少ない順で選ぶ
  DOW_SHIFT.forEach(day => {
    SHIFT_PERIODS.forEach(period => {
      var slotKey = day+'_'+period;
      assignedSlot[slotKey] = assignedSlot[slotKey] || [];
      var addH = SHIFT_HOURS[period] || 4;

      // この時間帯に出せる人（Step1: Availability）
      function availOk(e){ var av=avail.find(a=>a.name===e.name); return av ? av.slots.some(s=>s.day===day&&s.period===period) : false; }

      positions.forEach(pos => {
        // 既に同時間帯に入っている人は除外（1人1枠/時間帯）
        var used = assignedSlot[slotKey];
        var cands = staff.filter(e => {
          if (used.includes(e.name)) return false;
          if (!availOk(e)) return false;
          if (!canDoPosition(e.name, pos)) return false;
          if (!workCondOk(storeId, e.name, day, period)) return false;  // 勤務条件
          var maxH = getWorkCondition(storeId, e.name).maxH || 40;
          var cap = Math.min(maxH, otApprovals[e.name]?999:40);
          if (hours[e.name] + addH > cap) return false;                 // 最大勤務時間/40h
          if (used.some(n=>!pairAllowed(storeId, e.name, n))) return false;
          return true;
        });
        if (!cands.length) return;
        // Step5: 優先度高→時間少ない→スキルレベル高い順
        cands.sort((a,b)=>{
          var pa=shiftPriority(a), pb=shiftPriority(b);
          if (pb!==pa) return pb-pa;
          if (hours[a.name]!==hours[b.name]) return hours[a.name]-hours[b.name];
          var la=(getEmpSkills(a.name)[pos]||{}).level||0, lb=(getEmpSkills(b.name)[pos]||{}).level||0;
          return lb-la;
        });
        // Step6: Trainingルール + Lv3とセット必須 + Trainer必須 → 同枠にLv3が必要
        var hasLv3InSlot = used.some(n=>isLv3Anywhere(n));
        var pick = cands.find(e=>{
          var requireLv3 = isTraining(e) || needsLv3Pair(storeId, e.name) || needsTrainer(storeId, e.name);
          return requireLv3 ? hasLv3InSlot : true;
        }) || cands.find(e=>!isTraining(e) && !needsLv3Pair(storeId,e.name) && !needsTrainer(storeId,e.name));
        if (pick) {
          plan.cells[day+'_'+period+'_'+pos] = pick.name;
          hours[pick.name] += addH;
          assignedSlot[slotKey].push(pick.name);
        }
      });
    });
  });
  setShiftPlan(storeId, week, plan);
  var totalAssigned = Object.keys(plan.cells).length;
  showToast(`シフトを自動生成しました（${totalAssigned}枠・要確認）`, 'success');
  renderPage('shift_admin');
}

/* 自動チェック・警告（Lv不足/人員不足/Training違反/Leader不在） */
function checkShiftWarnings(storeId, week, plan) {
  var warnings = [];
  var positions = assignablePositions(storeId);
  var avail = getAvailability(storeId, week);
  DOW_SHIFT.forEach(day => {
    SHIFT_PERIODS.forEach(period => {
      var slotKeys = Object.keys(plan.cells).filter(k=>k.startsWith(day+'_'+period+'_') && plan.cells[k]);
      if (!slotKeys.length) return;
      var names = slotKeys.map(k=>plan.cells[k]);
      // Leader（Lv2以上のLeadership保持者）不在
      var hasLeader = names.some(n=>leaderSkillApproved(n));
      if (!hasLeader) warnings.push(`${day} ${period}: リーダー不在（Lv2以上のLeadershipなし）`);
      // Training違反: 訓練中が単独 or Lv3不在
      var trainees = names.filter(n=>{var e=getEmployees().find(x=>x.name===n);return e&&isTraining(e);});
      if (trainees.length) {
        var hasLv3 = names.some(n=>{var sk=getEmpSkills(n);return Object.values(sk).some(x=>x.status==='承認'&&x.level>=3);});
        if (!hasLv3) warnings.push(`${day} ${period}: 訓練中(${trainees.join(',')})がいるがLv3不在`);
        if (names.length===trainees.length) warnings.push(`${day} ${period}: 訓練中のみの配置`);
      }
      // Availability外
      slotKeys.forEach(k=>{
        var n=plan.cells[k]; var av=avail.find(a=>a.name===n);
        if (av && !av.slots.some(s=>s.day===day && s.period===period)) warnings.push(`${day} ${period}: ${n}はAvailability外`);
      });
      // Lv不足: そのポジションを承認Lv1以上で持たない人が入っている
      slotKeys.forEach(k=>{
        var pos=k.split('_')[2]; var n=plan.cells[k];
        if (!canDoPosition(n,pos)) warnings.push(`${day} ${period}: ${n}は${pos}未承認`);
      });
      // 特別ルール: 禁止ペアが同時間帯
      var sr = getSpecialRules(storeId);
      sr.pairs.filter(p=>p.type==='forbid').forEach(p=>{
        if (names.includes(p.a) && names.includes(p.b)) warnings.push(`${day} ${period}: 禁止ペア（${p.a}×${p.b}）が同時勤務`);
      });
      // Lv3とセット/Trainer必須なのにLv3不在
      names.forEach(n=>{
        if ((needsLv3Pair(storeId,n)||needsTrainer(storeId,n)) && !names.some(m=>m!==n&&isLv3Anywhere(m)))
          warnings.push(`${day} ${period}: ${n}はLv3との同時勤務が必要`);
      });
    });
  });
  // Overtime（週40h超）
  var hrs={}; Object.keys(plan.cells).forEach(k=>{var n=plan.cells[k];if(!n)return;var p=k.split('_')[1];hrs[n]=(hrs[n]||0)+(SHIFT_HOURS[p]||4);});
  var otApprovals = getOTApprovals(storeId, week);
  Object.keys(hrs).forEach(n=>{ if(hrs[n]>40 && !otApprovals[n]) warnings.push(`${n}: 週${hrs[n]}h（40h超・未承認）`); });
  return warnings.slice(0,10);
}

/* ============ カバー候補（管理者専用） ============ */
function coverCandidates(storeId, week, day, period, pos) {
  var avail = getAvailability(storeId, week);
  var plan = getShiftPlan(storeId, week) || {cells:{}};
  var staff = staffForStore(storeId);
  var slotKey = day+'_'+period;
  var alreadyIn = Object.keys(plan.cells).filter(k=>k.startsWith(slotKey+'_')).map(k=>plan.cells[k]);
  var hours = {};
  Object.keys(plan.cells).forEach(k=>{var n=plan.cells[k];if(!n)return;var p=k.split('_')[1];hours[n]=(hours[n]||0)+(SHIFT_HOURS[p]||4);});
  var otApprovals = getOTApprovals(storeId, week);
  var addH = SHIFT_HOURS[period]||4;

  var cands = staff.filter(e=>{
    if (alreadyIn.includes(e.name)) return false;
    var av = avail.find(a=>a.name===e.name);
    if (!av || !av.slots.some(s=>s.day===day&&s.period===period)) return false; // Availability内
    if (pos && !canDoPosition(e.name, pos)) return false;                        // 必要ポジション対応可能
    if ((hours[e.name]||0)+addH>40 && !otApprovals[e.name]) return false;         // 勤務時間超過なし
    if (alreadyIn.some(n=>!pairAllowed(storeId, e.name, n))) return false;        // 特別ルール違反なし
    return true;
  });
  // 優先順位: Priority1=Store Leader/F-Crew/Lv3, Priority2=Lv2, Priority3=Lv1/Training
  function coverPri(e){
    var lv = pos ? ((getEmpSkills(e.name)[pos]||{}).level||0) : 0;
    if (e.isSL || shiftPriority(e)>=8 || isLv3Anywhere(e.name)) return 1;
    if (lv>=2) return 2;
    return 3;
  }
  cands.sort((a,b)=> coverPri(a)-coverPri(b) || (hours[a.name]||0)-(hours[b.name]||0));
  return cands.map(e=>({name:e.name, pri:coverPri(e), hours:hours[e.name]||0, lv: pos?((getEmpSkills(e.name)[pos]||{}).level||0):null}));
}

function assignCover(storeId, week, key, name) {
  var plan = getShiftPlan(storeId, week);
  // OTチェック
  var period = key.split('_')[1];
  var addH = SHIFT_HOURS[period]||4;
  var curH = shiftHoursForPerson(plan, name);
  if (curH+addH>40 && !getOTApprovals(storeId,week)[name]) {
    if (!canApproveOT()) { alert(name+'は40時間を超えるため、管理者承認が必要です'); return; }
    if (!confirm(name+'は週'+(curH+addH)+'h（40h超）になります。承認して配置しますか？')) return;
    setOTApproval(storeId, week, name, ROLE_CONFIG[curRole].name||curRole);
  }
  plan.cells[key] = name;
  plan.status = '下書き';
  setShiftPlan(storeId, week, plan);
  showToast(`${name}をカバー配置しました`, 'success');
  renderPage('shift_admin');
}

function publishShiftPlan(storeId, week) {
  var plan = getShiftPlan(storeId, week);
  if (!plan || !Object.keys(plan.cells).length) { alert('シフトが空です'); return; }
  // 未承認のオーバーワークがあれば公開不可
  var otApprovals = getOTApprovals(storeId, week);
  var hoursMap = {};
  Object.keys(plan.cells).forEach(k=>{ var nm=plan.cells[k]; if(!nm) return; var period=k.split('_')[1]; hoursMap[nm]=(hoursMap[nm]||0)+(SHIFT_HOURS[period]||4); });
  var unapproved = Object.keys(hoursMap).filter(nm=>hoursMap[nm]>40 && !otApprovals[nm]);
  if (unapproved.length) {
    alert('未承認のオーバーワーク（40h超）があります:\n'+unapproved.map(nm=>`${nm}: ${hoursMap[nm]}h`).join('\n')+'\n\n管理者が承認してから公開してください。');
    return;
  }
  var warnings = checkShiftWarnings(storeId, week, plan);
  if (warnings.length && !confirm(`警告が${warnings.length}件あります。公開しますか？`)) return;
  plan.status = '公開済'; plan.publishedDate = new Date().toLocaleDateString('ja');
  setShiftPlan(storeId, week, plan);
  showToast('シフトを公開しました', 'success');
  renderPage('shift_admin');
}
