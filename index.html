<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Funergy Growth OS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #faf6f1;
  --surface: #ffffff;
  --surface2: #f6efe7;
  --border: #ece2d6;
  --tm: #2a2017;
  --muted: #8a7f72;
  --accent: #e8551e;
  --accent2: #3b82f6;
  --green: #0f9d6b;
  --red: #e23b3b;
  --yellow: #e08a0b;
  --purple: #8b5cf6;
  --rbd: #f3c0c0;
  --radius: 12px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--tm); min-height: 100vh; }

/* ====== LOGIN ====== */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(ellipse at 20% 30%, #fdeee4 0%, #faf6f1 60%);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 420px;
}
.login-logo {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.role-section { margin-bottom: 20px; }
.role-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.role-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all .15s;
  text-align: left;
}
.role-btn:hover { border-color: var(--accent); background: #fdeee4; }
.role-btn-label { font-size: 10px; color: var(--muted); }
.role-btn-name { font-size: 14px; font-weight: 600; margin-top: 2px; }
.store-picker { display: none; margin-top: 12px; }
.store-picker.active { display: block; }
.store-picker-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.store-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  border-left: 3px solid transparent;
}
.store-btn.sel { background: #eaf1fb; border-color: var(--accent2); border-left-color: var(--accent2); }
.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .9; }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

/* ====== APP SHELL ====== */
#app-shell { display: none; min-height: 100vh; }
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  position: sticky; top: 0; z-index: 100;
  gap: 12px;
}
.topbar-logo { font-weight: 800; font-size: 15px; letter-spacing: -.3px; }
.topbar-logo span { color: var(--accent); }
.topbar-store {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.topbar-role-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
}
.logout-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
}
.logout-btn:hover { color: var(--tm); border-color: var(--muted); }

/* ====== NAV ====== */
.nav-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  display: flex;
  overflow-x: auto;
  gap: 2px;
  scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }
.nav-btn {
  white-space: nowrap;
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
  background: none;
  border-left: none; border-right: none; border-top: none;
}
.nav-btn:hover { color: var(--tm); }
.nav-btn.active { color: var(--tm); border-bottom-color: var(--accent); }
.nav-btn i { font-size: 14px; }
.subnav-bar {
  background: var(--bg);
  padding: 8px;
  display: flex;
  overflow-x: auto;
  gap: 6px;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.subnav-bar:empty { display: none; }
.subnav-bar::-webkit-scrollbar { display: none; }
.subnav-chip {
  white-space: nowrap;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}
.subnav-chip.active { color: #fff; background: var(--accent); border-color: var(--accent); }
.subnav-chip i { font-size: 13px; }


/* ====== MAIN ====== */
.main { padding: 16px; max-width: 900px; margin: 0 auto; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 3px rgba(120,80,40,0.04);
}
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media(min-width:600px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
.kpi {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}
.kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.kpi-value { font-size: 20px; font-weight: 700; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.tag-green { background: #e7f6ef; color: var(--green); }
.tag-red { background: #fdecec; color: var(--red); }
.tag-yellow { background: #fdf3e0; color: var(--yellow); }
.tag-blue { background: #eaf1fb; color: var(--accent2); }
.tag-gray { background: var(--surface2); color: var(--muted); }
.tag-orange { background: #fdeee4; color: var(--accent); }

/* store rows */
.store-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color .15s;
}
.store-row:hover { border-color: var(--accent2); }
.store-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.store-name { font-weight: 600; font-size: 13px; flex: 1; }
.store-meta { font-size: 12px; color: var(--muted); }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* task list */
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.task-item:last-child { border-bottom: none; }
.task-check {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
  transition: all .15s;
}
.task-check.done { background: var(--green); border-color: var(--green); }
.task-text { flex: 1; font-size: 13px; }
.task-text.done { text-decoration: line-through; color: var(--muted); }
.task-phase { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--tm);
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font);
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent2);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn {
  padding: 10px 18px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface2); color: var(--tm); border: 1px solid var(--border); }
.btn-success { background: var(--green); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* section header */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.section-title { font-size: 16px; font-weight: 700; }
.section-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* alert */
.alert {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 13px;
}
.alert-warning { background: #fdf3e0; border: 1px solid #b5710e; color: var(--yellow); }
.alert-danger { background: #fdecec; border: 1px solid var(--rbd); color: var(--red); }
.alert-success { background: #e7f6ef; border: 1px solid #0a7a45; color: var(--green); }

/* phase filter */
.phase-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.phase-tab {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .15s;
}
.phase-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* shift grid */
.shift-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.shift-day { text-align: center; }
.shift-day-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.shift-slot {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 4px;
  font-size: 11px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 3px;
  transition: all .15s;
}
.shift-slot.sel { background: #eaf1fb; border-color: var(--accent2); color: var(--accent2); }
.shift-slot:hover { border-color: var(--muted); }

/* inventory table */
.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.inv-table th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border); }
.inv-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.inv-table tr:last-child td { border-bottom: none; }
.inv-input {
  width: 70px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--tm);
  padding: 4px 8px;
  font-size: 12px;
  text-align: right;
}
.inv-input:focus { outline: none; border-color: var(--accent2); }

/* staff list */
.staff-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
}
.staff-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.staff-name { font-size: 13px; font-weight: 600; }
.staff-role { font-size: 11px; color: var(--muted); }

/* eval */
.eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.eval-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.eval-name { font-size: 12px; font-weight: 600; }
.eval-step { font-size: 11px; color: var(--muted); }
.step-dots { display: flex; gap: 4px; margin-top: 6px; }
.step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.step-dot.filled { background: var(--accent); border-color: var(--accent); }

/* approval */
.approval-item {
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
}
.approval-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.approval-title { font-size: 13px; font-weight: 600; }
.approval-meta { font-size: 11px; color: var(--muted); }
.approval-actions { display: flex; gap: 6px; margin-top: 10px; }

/* notification dot */
.notif-dot {
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  display: inline-block;
}

/* access denied */
.access-denied {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.access-denied i { font-size: 40px; margin-bottom: 12px; display: block; }

/* goal */
.goal-item {
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
}
.goal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.goal-title { font-size: 13px; font-weight: 600; }
.goal-progress { font-size: 12px; color: var(--muted); }

/* mypage */
.mypage-header {
  background: linear-gradient(135deg, #fff4ec, #fdeee4);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  display: flex; gap: 16px; align-items: center;
}
.mypage-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-flame" style="font-size:24px;color:#fff;"></i></div>
    <div class="login-title">Funergy Growth OS</div>
    <div class="login-sub">役割を選んでログイン</div>

    <div class="role-section">
      <div class="role-section-label">マネジメント</div>
      <div class="role-grid">
        <div class="role-btn" onclick="selectRole('ceo')">
          <div class="role-btn-label">経営</div>
          <div class="role-btn-name">CEO / Tac</div>
        </div>
        <div class="role-btn" onclick="selectRole('gm')">
          <div class="role-btn-label">GM</div>
          <div class="role-btn-name">GM / Moto</div>
        </div>
        <div class="role-btn" onclick="selectRole('office')">
          <div class="role-btn-label">経理</div>
          <div class="role-btn-name">Office / Marcia</div>
        </div>
        <div class="role-btn" onclick="selectRole('am')">
          <div class="role-btn-label">エリアMG</div>
          <div class="role-btn-name">AM / Yuki</div>
        </div>
      </div>
    </div>

    <div class="role-section">
      <div class="role-section-label">店舗スタッフ</div>
      <div class="role-grid">
        <div class="role-btn" onclick="selectRole('sl')">
          <div class="role-btn-label">Store Leader</div>
          <div class="role-btn-name">SL / 店長</div>
        </div>
        <div class="role-btn" onclick="selectRole('crew')">
          <div class="role-btn-label">スタッフ</div>
          <div class="role-btn-name">Crew</div>
        </div>
      </div>
    </div>

    <div id="store-picker" class="store-picker">
      <div class="store-picker-label">担当店舗を選択</div>
      <div class="store-grid" id="store-grid"></div>
    </div>

    <p class="login-err" id="login-err">店舗を選択してください</p>
    <button class="login-btn" id="login-btn" onclick="doLogin()" disabled>ログイン</button>

    <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--border)">
      <button class="login-btn" id="store-login-toggle" onclick="toggleStoreLogin()" style="background:var(--surface2);color:var(--accent);border:1px solid var(--accent)">
        <i class="ti ti-building-store"></i> 店舗ログイン（Daily管理）
      </button>
      <div id="store-login-panel" style="display:none;margin-top:12px">
        <div class="store-picker-label">店舗を選択してPIN入力</div>
        <div class="store-grid" id="store-login-grid"></div>
        <div id="store-pin-row" style="display:none;margin-top:10px">
          <input id="store-pin-input" type="tel" inputmode="numeric" maxlength="6" placeholder="店舗PIN" style="width:100%;padding:12px;text-align:center;letter-spacing:6px;font-size:18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--tm)">
          <p class="login-err" id="store-pin-err">PINが違います</p>
          <button class="login-btn" id="store-login-btn" onclick="doStoreLogin()" style="margin-top:8px">この店舗でログイン</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ====== APP SHELL ====== -->
<div id="app-shell">
  <div class="topbar">
    <div class="topbar-logo">Fun<span>OS</span></div>
    <div class="topbar-store" id="topbar-store" onclick="openStoreSwitcher()">
      <i class="ti ti-chevron-down" style="font-size:12px;"></i>
    </div>
    <div class="topbar-right">
      <div class="topbar-role-badge" id="topbar-role"></div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="nav-bar" id="nav-bar"></div>
  <div class="subnav-bar" id="subnav-bar"></div>
  <div class="main" id="main-content"></div>
</div>

<!-- ====== MODALS ====== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
/* ============================================================
   SUPABASE / TOAST 連携設定
============================================================ */

const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnYmhneHplaHplb3VvcGtsaGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTIzODAsImV4cCI6MjA5NjY4ODM4MH0.A0cdXLDONy_HPvQhaHbfP-flsNYImg0ZFJd5AIQihdM';
const TOAST_SYNC_FN = SUPABASE_URL + '/functions/v1/hyper-worker';

async function fetchToastSales(guid, dateFrom, dateTo) {
  try {
    var url = SUPABASE_URL + '/rest/v1/toast_sales?restaurant_guid=eq.' + encodeURIComponent(guid)
      + '&business_date=gte.' + dateFrom + '&business_date=lte.' + dateTo + '&order=business_date.asc';
    var res = await fetch(url, { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) { console.error('fetchToastSales', e); return []; }
}
async function syncToastDay(guid, businessDateYmd) {
  var res = await fetch(TOAST_SYNC_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + SUPABASE_ANON },
    body: JSON.stringify({ restaurantGuid: guid, businessDate: businessDateYmd }),
  });
  return await res.json();
}
async function syncStoreActualsFromToast(storeId, guid, days) {
  if (!guid) return { error: 'GUID未設定' };
  var rows = await fetchToastSales(guid, days[0].date, days[days.length-1].date);
  var byDate = {}; rows.forEach(r=>{ byDate[r.business_date] = r; });
  var actuals = getDailyActuals(storeId);
  var updated = 0;
  days.forEach(d => {
    var r = byDate[d.date];
    if (r) {
      var prev = actuals[d.date] || {};
      actuals[d.date] = Object.assign({}, prev, {
        actual: Number(r.net_sales)||0,
        guests: r.guest_count!=null ? Number(r.guest_count) : prev.guests,
        lunchSales: r.lunch_sales!=null?Number(r.lunch_sales):undefined,
        dinnerSales: r.dinner_sales!=null?Number(r.dinner_sales):undefined,
        lunchGuests: r.lunch_guests!=null?Number(r.lunch_guests):undefined,
        dinnerGuests: r.dinner_guests!=null?Number(r.dinner_guests):undefined,
        bowls: r.bowls_count!=null?Number(r.bowls_count):undefined,
        lunchBowls: r.lunch_bowls!=null?Number(r.lunch_bowls):undefined,
        dinnerBowls: r.dinner_bowls!=null?Number(r.dinner_bowls):undefined,
        takeout: r.takeout_count!=null?Number(r.takeout_count):undefined,
        takeoutBowls: r.takeout_bowls!=null?Number(r.takeout_bowls):undefined,
        creditTip: r.credit_tip!=null?Number(r.credit_tip):undefined,
        lunchCreditTip: r.lunch_credit_tip!=null?Number(r.lunch_credit_tip):undefined,
        dinnerCreditTip: r.dinner_credit_tip!=null?Number(r.dinner_credit_tip):undefined,
        toastSrc: true,
      });
      updated++;
    }
  });
  setDailyActuals(storeId, actuals);
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = Object.values(actuals).reduce((a,v)=>a+(v.actual||0),0); saveBudgets(budgets); }
  return { updated, fetched: rows.length };
}

/* DBから勤怠(tip_labor)を読み、店舗の時間設定で計算してローカル保存（毎朝の自動同期分を取り込む） */
async function fetchTipLaborFromDB(guid, dateFrom, dateTo) {
  try {
    var url = SUPABASE_URL + '/rest/v1/tip_labor?restaurant_guid=eq.' + encodeURIComponent(guid)
      + '&business_date=gte.' + dateFrom + '&business_date=lte.' + dateTo + '&order=business_date.asc';
    var res = await fetch(url, { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) { return []; }
}
async function syncTipLaborFromDB(storeId, guid, days) {
  if (!guid) return { updated: 0 };
  var rows = await fetchTipLaborFromDB(guid, days[0].date, days[days.length-1].date);
  var staff = getEmployees();
  var updated = 0;
  rows.forEach(row=>{
    var list = row.data || [];
    if (!Array.isArray(list) || !list.length) return;
    var labor = {};
    list.forEach(emp=>{
      var m = staff.find(s=>s.name===emp.name || (emp.name&&s.name.toLowerCase()===emp.name.toLowerCase()) || (emp.name&&s.name.includes(emp.name)) || (emp.name&&emp.name.includes(s.name)));
      var key = m ? m.name : emp.name;
      var shifts = emp.shifts||[];
      var hrs = shifts.length ? tipHoursFromShifts(storeId, shifts) : { lunch: emp.lunchHours||0, dinner: emp.dinnerHours||0 };
      labor[key] = { lunch: hrs.lunch, dinner: hrs.dinner, rawLunch: emp.lunchHours||0, rawDinner: emp.dinnerHours||0, shifts: shifts, toastName: emp.name };
    });
    setTipLabor(storeId, row.business_date, labor);
    updated++;
  });
  return { updated };
}

/* 期間一括: dateFrom〜dateTo の各日をEdge Function経由でToastから取得→DB保存。
   進捗をonProgress(コールバック)で通知。月をまたいで daily_actuals_ にも反映。 */
async function fetchToastRange(storeId, guid, dateFromISO, dateToISO, onProgress) {
  if (!guid) return { error: 'GUID未設定' };
  var start = new Date(dateFromISO+'T00:00:00');
  var end = new Date(dateToISO+'T00:00:00');
  var ok=0, fail=0, total=0, sumSales=0;
  // 日付リスト生成
  var dates = [];
  for (var d=new Date(start); d<=end; d.setDate(d.getDate()+1)) dates.push(new Date(d));
  total = dates.length;
  for (var i=0; i<dates.length; i++) {
    var dt = dates[i];
    var ymd = dt.toISOString().slice(0,10).replace(/-/g,'');
    var iso = dt.toISOString().slice(0,10);
    try {
      var r = await syncToastDay(guid, ymd);
      if (r && r.ok) {
        ok++; sumSales += Number(r.net_sales)||0;
        var actuals = getDailyActuals(storeId);
        var prev = actuals[iso] || {};
        actuals[iso] = Object.assign({}, prev, {
          actual: Number(r.net_sales)||0,
          guests: r.guests!=null?Number(r.guests):prev.guests,
          lunchSales: r.lunchSales!=null?Number(r.lunchSales):undefined,
          dinnerSales: r.dinnerSales!=null?Number(r.dinnerSales):undefined,
          lunchGuests: r.lunchGuests!=null?Number(r.lunchGuests):undefined,
          dinnerGuests: r.dinnerGuests!=null?Number(r.dinnerGuests):undefined,
          bowls: r.bowls!=null?Number(r.bowls):undefined,
          lunchBowls: r.lunchBowls!=null?Number(r.lunchBowls):undefined,
          dinnerBowls: r.dinnerBowls!=null?Number(r.dinnerBowls):undefined,
          takeout: r.takeoutCount!=null?Number(r.takeoutCount):undefined,
          takeoutBowls: r.takeoutBowls!=null?Number(r.takeoutBowls):undefined,
          creditTip: r.creditTip!=null?Number(r.creditTip):undefined,
          lunchCreditTip: r.lunchCreditTip!=null?Number(r.lunchCreditTip):undefined,
          dinnerCreditTip: r.dinnerCreditTip!=null?Number(r.dinnerCreditTip):undefined,
          toastSrc:true,
        });
        setDailyActuals(storeId, actuals);
      } else { fail++; }
    } catch(e) { fail++; }
    if (onProgress) onProgress(i+1, total, ok, fail);
    // レート制限対策: 少し待つ
    await new Promise(res=>setTimeout(res, 250));
  }
  // 月次実績も更新
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = Object.values(getDailyActuals(storeId)).reduce((a,v)=>a+(v.actual||0),0); saveBudgets(budgets); }
  return { ok, fail, total, sumSales };
}

function getIngredients() {

function getEmployees() {
  var emps = ls('m_employees', DEFAULT_EMPLOYEES);
  emps.forEach(e=>{
    if(e.wage===undefined) e.wage = (typeof WAGE!=='undefined' ? (WAGE[e.role]||16) : 16);
    if(e.coef===undefined) e.coef = 1.0;
  });
  return emps;
}
/* 従業員の評価係数（Tip Rate: 0.8/0.9/1.0） */
function empCoef(name) {
  // Tip Rate Policy（No Tip / 80 / 90 / 100% + 3ヶ月自動100%）を係数に反映
  if (typeof effectiveTipRate === 'function') {
    var rate = effectiveTipRate(name);
    if (rate != null) return rate / 100; // 0(NoTip)/0.8/0.9/1.0
  }
  var e = getEmployees().find(x=>x.name===name);
  return e ? (e.coef!=null?e.coef:1.0) : 1.0;
}
/* Store Leader判定（チップ拠出側。Server Leaderは含まない） */
function isStoreLeader(name) {
  var e = getEmployees().find(x=>x.name===name);
  return !!(e && e.isSL);
}
/* 半月(payroll)期間: 1〜15 / 16〜月末 */
function halfMonthRange(dateISO) {
  var d = new Date(dateISO+'T00:00:00');
  var y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  var from, to;
  if (day<=15) { from=new Date(y,m,1); to=new Date(y,m,15); }
  else { from=new Date(y,m,16); to=new Date(y,m+1,0); }
  var iso = x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return { from:iso(from), to:iso(to), label:`${from.getMonth()+1}/${from.getDate()}〜${to.getMonth()+1}/${to.getDate()}` };
}
function halfMonthDates(dateISO) {
  var r = halfMonthRange(dateISO);
  var dates=[]; var d=new Date(r.from+'T00:00:00'); var end=new Date(r.to+'T00:00:00');
  for (; d<=end; d.setDate(d.getDate()+1)) dates.push(d.toISOString().slice(0,10));
  return dates;
}

/* ============================================================
   TIP（チップ）データ
   クレジット = Toast自動 / キャッシュ = Store CMD手入力
   チップ総額 = (クレジット×0.965) + キャッシュ
============================================================ */
var TIP_CC_FEE = 0.035;
function getCashTips(storeId) { return ls('cash_tips_'+storeId, {}); }
function setCashTips(storeId, data) { lsSet('cash_tips_'+storeId, data); }
function getCashTip(storeId, date) { return getCashTips(storeId)[date] || {lunch:0, dinner:0, entered:false}; }
function saveCashTip(storeId, date, lunch, dinner) {
  var d = getCashTips(storeId); d[date] = {lunch:lunch||0, dinner:dinner||0, entered:true}; setCashTips(storeId, d);
}
/* キャッシュチップが未入力か（クレジットはあるのにキャッシュ未確定＝要入力） */
function cashTipMissing(storeId, date) {
  var av = getDailyActuals(storeId)[date] || {};
  var hasCredit = (av.lunchCreditTip!=null) || (av.dinnerCreditTip!=null) || (av.actual>0);
  var cash = getCashTips(storeId)[date];
  return hasCredit && !(cash && cash.entered);
}
function tipForDay(storeId, date) {
  var av = getDailyActuals(storeId)[date] || {};
  var cash = getCashTip(storeId, date);
  var lCredit = av.lunchCreditTip||0, dCredit = av.dinnerCreditTip||0;
  var lTotal = lCredit*(1-TIP_CC_FEE) + (cash.lunch||0);
  var dTotal = dCredit*(1-TIP_CC_FEE) + (cash.dinner||0);
  return {
    lunchCredit:lCredit, dinnerCredit:dCredit,
    lunchCash:cash.lunch||0, dinnerCash:cash.dinner||0,
    lunchTotal:lTotal, dinnerTotal:dTotal, total:lTotal+dTotal,
  };
}

function getTipLabor(storeId, date) { return ls('tip_labor_'+storeId+'_'+date, null); }
function setTipLabor(storeId, date, data) { lsSet('tip_labor_'+storeId+'_'+date, data); }

/* Store Leader 50%別枠配分のON/OFF（将来OFFにできる） */
function getTipLeaderSplit() { return ls('tip_leader_split', true); }
function setTipLeaderSplit(v) { lsSet('tip_leader_split', !!v); }

/* チップ配分計算（Tip Sheetロジック）
   - Store Manager以上(ceo/gm/office/am)は対象外
   - Store Leader(sl)は50%別枠を時間按分で受取＋一般配分にも参加
   - 残りを全スタッフ(sl含む)で「hours × 評価係数」按分
   - Lunch/Dinner別 */
function calcTipDistribution(storeId, date) {
  var tip = tipForDay(storeId, date);
  var labor = getTipLabor(storeId, date); // {empName:{lunch,dinner}} or null
  var leaderSplit = getTipLeaderSplit();
  var emps = getEmployees();
  // 対象スタッフ: その店のsl/crew（manager以上除外）
  function inStore(e){ return e.store===storeId || (e.support||[]).includes(storeId); }
  var staff = emps.filter(e=>inStore(e) && (e.role==='sl'||e.role==='crew') && e.status!=='退職');

  function distSlot(slot, tipTotal) { // slot='lunch'|'dinner'
    var rows = staff.map(e=>{
      var h = labor && labor[e.name] ? (labor[e.name][slot]||0) : 0;
      return { name:e.name, role:e.role, coef:(e.coef!=null?e.coef:1), hours:h, pt:h*(e.coef!=null?e.coef:1), total:0 };
    }).filter(r=>r.hours>0);
    if (!rows.length || tipTotal<=0) return rows;
    // Tip Sheetロジック: チップ総額を pt(=hours×係数) で全員按分（SL含む）
    var ptSum = rows.reduce((a,r)=>a+r.pt,0);
    if (ptSum>0) rows.forEach(r=>{ r.total = tipTotal * (r.pt/ptSum); });
    return rows;
  }
  var lunchRows = distSlot('lunch', tip.lunchTotal);
  var dinnerRows = distSlot('dinner', tip.dinnerTotal);
  // 統合（名前単位でlunch+dinner合算）
  var byName = {};
  function merge(rows, slot){ rows.forEach(r=>{ if(!byName[r.name]) byName[r.name]={name:r.name,role:r.role,coef:r.coef,lunch:0,dinner:0,lunchHours:0,dinnerHours:0,total:0}; byName[r.name][slot]=r.total; byName[r.name][slot+'Hours']=r.hours; byName[r.name].total+=r.total; }); }
  merge(lunchRows,'lunch'); merge(dinnerRows,'dinner');
  var list = Object.values(byName).sort((a,b)=>b.total-a.total);
  var distSum = list.reduce((a,r)=>a+r.total,0);
  return { tip, list, distSum, hasLabor: !!labor, leaderSplit };
}

/* 半月精算: Store Leaderの日次取り分合計の50%をプール→SL以外の半月総労働時間で再分配 */
function calcHalfMonthSettlement(storeId, anyDateInPeriod) {
  var range = halfMonthRange(anyDateInPeriod);
  var dates = halfMonthDates(anyDateInPeriod);
  // 各日の日次配分を集計（名前→日次取り分合計 / 名前→労働時間合計）
  var dailyTotal = {}, hoursTotal = {};
  var anyLabor = false;
  dates.forEach(date=>{
    var labor = getTipLabor(storeId, date);
    if (labor) anyLabor = true;
    var dist = calcTipDistribution(storeId, date);
    dist.list.forEach(r=>{
      dailyTotal[r.name] = (dailyTotal[r.name]||0) + r.total;
      hoursTotal[r.name] = (hoursTotal[r.name]||0) + (r.lunchHours||0) + (r.dinnerHours||0);
    });
  });
  // Store Leaderの拠出（日次取り分合計の50%）
  var slPool = 0;
  Object.keys(dailyTotal).forEach(name=>{
    if (isStoreLeader(name)) slPool += dailyTotal[name]*0.5;
  });
  // SL以外の総労働時間
  var nonSLHours = 0;
  Object.keys(hoursTotal).forEach(name=>{
    if (!isStoreLeader(name)) nonSLHours += hoursTotal[name];
  });
  var perHour = nonSLHours>0 ? slPool/nonSLHours : 0;
  // 最終
  var rows = Object.keys(dailyTotal).map(name=>{
    var sl = isStoreLeader(name);
    var base = dailyTotal[name];
    var h = hoursTotal[name]||0;
    var contribution = sl ? base*0.5 : 0;       // 拠出
    var redistrib = sl ? 0 : h*perHour;          // 受取（SL以外）
    var final = base - contribution + redistrib;
    return { name, isSL:sl, hours:h, base, contribution, redistrib, final };
  }).sort((a,b)=>b.final-a.final);
  return { range, rows, slPool, nonSLHours, perHour, anyLabor };
}

async function fetchTipLabor(storeId, guid, date) {

    body: JSON.stringify({ restaurantGuid:guid, mode:'tipLabor', businessDate:ymd }),
  });
  var j = await res.json();
  if (!j || !Array.isArray(j.employees)) return { error: JSON.stringify(j).slice(0,100) };
  var labor = {};
  var staff = getEmployees();
  j.employees.forEach(emp=>{
    if ((emp.lunchHours||0)===0 && (emp.dinnerHours||0)===0) return;
    var m = staff.find(s=>s.name===emp.name || (emp.name&&s.name.toLowerCase()===emp.name.toLowerCase()) || (emp.name&&s.name.includes(emp.name)) || (emp.name&&emp.name.includes(s.name)));
    var key = m ? m.name : emp.name;
    var shifts = emp.shifts||[];
    // 店舗のbasis/時間窓に応じて対象時間を計算（shiftsがあれば窓計算、無ければToastの素の値）
    var hrs = shifts.length ? tipHoursFromShifts(storeId, shifts) : { lunch: emp.lunchHours||0, dinner: emp.dinnerHours||0 };
    labor[key] = { lunch: hrs.lunch, dinner: hrs.dinner, rawLunch: emp.lunchHours||0, rawDinner: emp.dinnerHours||0, shifts: shifts, toastName: emp.name };
  });
  setTipLabor(storeId, date, labor);
  return { count: Object.keys(labor).length };
}

/* 店舗別チップ対象時間帯（HST時刻、0-24h）
   basis='all' なら全勤務時間、basis='window' なら下記の時間帯に重なった分のみ */
var DEFAULT_TIP_WINDOW = { lunchStart:10.5, lunchEnd:16, dinnerStart:16, dinnerEnd:23 };
function getTipWindow(storeId) {
  var cfg = ls('tip_window', {});
  return Object.assign({}, DEFAULT_TIP_WINDOW, cfg[storeId]||{});
}
function setTipWindow(storeId, win) {
  var cfg = ls('tip_window', {});
  cfg[storeId] = win;
  lsSet('tip_window', cfg);
}
/* 打刻(in/out ISO)と時間窓[startH,endH]の重なり時間(h)をHST基準で計算 */
function overlapHours(inIso, outIso, startH, endH) {
  if (!inIso || !outIso) return 0;
  var inMs = new Date(inIso).getTime(), outMs = new Date(outIso).getTime();
  if (outMs<=inMs) return 0;
  // HSTローカルのその日の0:00を求める
  var inLocal = new Date(inMs - 10*3600*1000);
  var y=inLocal.getUTCFullYear(), mo=inLocal.getUTCMonth(), d=inLocal.getUTCDate();
  var midnightUTC = Date.UTC(y,mo,d,10,0,0); // HST 0:00 = UTC 10:00
  var winStart = midnightUTC + startH*3600*1000;
  var winEnd = midnightUTC + endH*3600*1000;
  var lo = Math.max(inMs, winStart), hi = Math.min(outMs, winEnd);
  return hi>lo ? (hi-lo)/3600000 : 0;
}
/* 店舗のbasisに応じてシフトからLunch/Dinner対象時間を計算 */
function tipHoursFromShifts(storeId, shifts) {
  var basis = getTipHoursBasis(storeId);
  var win = getTipWindow(storeId);
  var lunch=0, dinner=0;
  (shifts||[]).forEach(s=>{
    if (basis==='window') {
      lunch += overlapHours(s.inDate, s.outDate, win.lunchStart, win.lunchEnd);
      dinner += overlapHours(s.inDate, s.outDate, win.dinnerStart, win.dinnerEnd);
    } else {
      lunch += overlapHours(s.inDate, s.outDate, 0, 16);
      dinner += overlapHours(s.inDate, s.outDate, 16, 24);
    }
  });
  return { lunch, dinner };
}
/* 設定変更時、保存済みの全日のtip_laborをshiftsから再計算 */
function recomputeTipLabor(storeId) {
  var prefix = 'tip_labor_'+storeId+'_';
  var changed = 0;
  for (var i=0;i<localStorage.length;i++) {
    var k = localStorage.key(i);
    if (!k || k.indexOf(prefix)!==0) continue;
    var labor = null;
    try { labor = JSON.parse(localStorage.getItem(k)); } catch(e){}
    if (!labor) continue;
    Object.keys(labor).forEach(name=>{
      var e = labor[name];
      if (e && e.shifts && e.shifts.length) {
        var hrs = tipHoursFromShifts(storeId, e.shifts);
        e.lunch = hrs.lunch; e.dinner = hrs.dinner;
      }
    });
    localStorage.setItem(k, JSON.stringify(labor));
    changed++;
  }
  return changed;
}

/* レシピ原価計算: Σ(単価 ÷ 歩留% × 使用量) */
function calcRecipeCost(recipe) {
  var ings = getIngredients();
  var total = 0;
  (recipe.items||[]).forEach(it => {
    var ing = ings.find(x=>x.code===it.code);
    if (ing) {
      var yld = ing.yield > 0 ? ing.yield/100 : 1;
      total += (ing.price / yld) * it.qty;
    }
  });
  return total;
}
function recipeCostRate(recipe) {
  var cost = calcRecipeCost(recipe);
  return recipe.price > 0 ? (cost/recipe.price*100) : 0;
}

    case 'growth_mgr':   el.innerHTML = renderGrowthManager(); break;
    case 'approval':     el.innerHTML = renderApproval(); break;
    case 'mypage':       el.innerHTML = renderMypage(); break;
    case 'store_master': el.innerHTML = renderStoreMaster(); break;
    case 'settings':     el.innerHTML = renderSettings(); break;
    default:             el.innerHTML = '<div class="card"><p style="color:var(--muted)">準備中</p></div>';
  }
  attachPageEvents();
}

function attachPageEvents() {
  // task checkboxes
  document.querySelectorAll('[data-task]').forEach(el => {
    el.addEventListener('click', function() { toggleTask(this.dataset.task, this.dataset.store); });
  });
  // phase tabs
  document.querySelectorAll('[data-phase]').forEach(el => {
    el.addEventListener('click', function() { filterPhase(this.dataset.phase); });
  });
}

/* ============================================================
   HELPERS
============================================================ */
function pct(a,b) { return b ? Math.round(a/b*100) : 0; }
function fmtK(v) { return v >= 1000 ? '$' + Math.round(v/1000) + 'k' : '$' + v; }
function getPeriod() { var d = new Date(); return d.getFullYear() + '.' + (d.getMonth()+1); }
function kpi(label, value, sub, color) {
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value" style="color:${color||'var(--tm)'}">${value}</div><div class="kpi-sub">${sub}</div></div>`;
}
/* ===== 色のルール統一: 🟢正常 🟡注意 🔴対応必須 ⚪未着手 🔵進行中 ===== */
const STATUS = {
  good:   {col:'var(--green)',  tag:'tag-green',  dot:'🟢', label:'正常'},
  warn:   {col:'var(--yellow)', tag:'tag-yellow', dot:'🟡', label:'注意'},
  danger: {col:'var(--red)',    tag:'tag-red',    dot:'🔴', label:'対応必須'},
  idle:   {col:'var(--muted)',  tag:'tag-gray',   dot:'⚪', label:'未着手'},
  active: {col:'var(--accent2)',tag:'tag-blue',   dot:'🔵', label:'進行中'},
};
function statusColor(s){ return (STATUS[s]||STATUS.idle).col; }
function statusTag(s){ return (STATUS[s]||STATUS.idle).tag; }
/* 数値→ステータス（高い方が良い指標: 達成率など） */
function statusFromPct(p, goodAt, warnAt){ goodAt=goodAt||100; warnAt=warnAt||90; return p>=goodAt?'good':p>=warnAt?'warn':'danger'; }
/* 数値→ステータス（低い方が良い指標: 原価率・Labor%） */
function statusFromCeil(v, goodMax, warnMax){ return v<=goodMax?'good':v<=warnMax?'warn':'danger'; }
/* 店舗ヘルススコア(100点満点) */
function storeHealthScore(d){
  // 売上達成(40) + 原価率(30) + Labor(30)
  var salesPct = pct(d.a, d.b);
  var salesScore = Math.max(0, Math.min(40, Math.round(salesPct/100*40)));
  var fcScore = d.fc<=29?30:d.fc<=31?22:d.fc<=34?12:4;
  var laborScore = d.labor<=27?30:d.labor<=29?22:d.labor<=32?12:4;
  return Math.min(100, salesScore+fcScore+laborScore);
}
function healthLabel(score){
  if (score>=85) return {label:'Excellent', status:'good'};
  if (score>=70) return {label:'Good', status:'good'};
  if (score>=60) return {label:'Need Attention', status:'warn'};
  return {label:'Action Required', status:'danger'};
}
function getVisibleStores() {
  if (curStore === 'ALL') return activeStores();
  if (curRole === 'am') return activeStores().filter(s => AM_STORES.includes(s.id));
  return activeStores().filter(s => s.id === curStore);
}
function storeData(id) {
  var d = DEMO_BUDGET[id] || {b:200000,a:190000,fc:30,labor:28};
  var sp = pct(d.a, d.b);
  var status = sp >= 100 ? 'good' : sp >= 90 ? 'warn' : 'danger';
  return Object.assign({}, d, {id, name:(STORES.find(s=>s.id===id)||{name:id}).name,
    color:(STORES.find(s=>s.id===id)||{color:'#888'}).color, sp, status});
}

============================================================ */
function renderDashboard() {
  var rc = ROLE_CONFIG[curRole];
  if (!rc.financial) return renderMypage();
  var stores = getVisibleStores().map(s => storeData(s.id));
  var tB = stores.reduce((a,s)=>a+s.b,0);
  var tA = stores.reduce((a,s)=>a+s.a,0);
  var tp = pct(tA,tB);
  var avgFC = stores.length ? Math.round(stores.reduce((a,s)=>a+s.fc,0)/stores.length*10)/10 : 0;
  var avgL = stores.length ? Math.round(stores.reduce((a,s)=>a+s.labor,0)/stores.length*10)/10 : 0;

  // ---- データ収集（アラート用） ----
  var me = rc.name;
  var allTasks = getTasks();
  var today = new Date().toISOString().slice(0,10);
  var myTasks = allTasks.filter(t=>t.status!=='完了' && (t.assignee===me || t.assignee===''));
  var overdue = myTasks.filter(t=>t.due && t.due < today);
  var todayTasks = myTasks.filter(t=>t.due===today);
  var approvalsAll = ls('approvals', []).filter(a=>a.status==='pending');
  var reqAlerts = [];
  getVisibleStores().forEach(s=>{ var ops=getDailyOps(s.id); var inc=ops.filter(t=>t.required&&!t.done); if(inc.length) reqAlerts.push({store:s.name, count:inc.length, id:s.id}); });
  var danger = stores.filter(s=>s.status==='danger');
  var laborOver = stores.filter(s=>s.labor>32);
  var fcOver = stores.filter(s=>s.fc>34);

  var html = '';

  // ====== ① 優先アラート（最重要を最上部） ======
  var alerts = [];
  danger.forEach(s=>alerts.push({lv:'danger', icon:'ti-alert-triangle', text:`${s.name} 売上未達 ${s.sp}%`, act:`switchStore('${s.id}');go('budget')`}));
  laborOver.forEach(s=>alerts.push({lv:'danger', icon:'ti-clock-dollar', text:`${s.name} Labor超過 ${s.labor}%`, act:`switchStore('${s.id}');go('labor')`}));
  fcOver.forEach(s=>alerts.push({lv:'danger', icon:'ti-receipt', text:`${s.name} Food Cost超過 ${s.fc}%`, act:`switchStore('${s.id}');go('foodcost')`}));
  reqAlerts.forEach(r=>alerts.push({lv:'danger', icon:'ti-checklist', text:`${r.store} 必須チェック未完 ${r.count}件`, act:`switchStore('${r.id}');openStoreCmd()`}));
  if (overdue.length) alerts.push({lv:'warn', icon:'ti-alarm', text:`期限切れタスク ${overdue.length}件`, act:`go('tasks')`});
  if (approvalsAll.length) alerts.push({lv:'warn', icon:'ti-checkbox', text:`承認待ち ${approvalsAll.length}件`, act:`go('approval')`});
  if (todayTasks.length) alerts.push({lv:'warn', icon:'ti-clock', text:`本日期限タスク ${todayTasks.length}件`, act:`go('tasks')`});

  html += `<div class="card" style="border-left:4px solid ${alerts.length?statusColor(alerts[0].lv):'var(--green)'}">
    <div class="card-title"><i class="ti ti-bell" style="color:var(--accent)"></i>優先アラート</div>`;
  if (!alerts.length) {
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;color:var(--green)"><span style="font-size:18px">🟢</span><span style="font-size:14px;font-weight:600">全項目正常</span></div>`;
  } else {
    alerts.slice(0,6).forEach(a=>{
      var dot = a.lv==='danger'?'🔴':a.lv==='warn'?'🟡':'🔵';
      html += `<div onclick="${a.act}" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <span style="font-size:14px">${dot}</span>
        <i class="ti ${a.icon}" style="color:${statusColor(a.lv)};font-size:16px"></i>
        <span style="flex:1;font-size:13px">${a.text}</span>
        <i class="ti ti-chevron-right" style="font-size:13px;color:var(--muted)"></i></div>`;
    });
  }
  html += `</div>`;

  // ====== ② 店舗ヘルススコア ======
  if (stores.length === 1) {
    var s = stores[0];
    var score = storeHealthScore(s); var hl = healthLabel(score);
    html += `<div class="card" style="text-align:center">
      <div class="card-title" style="justify-content:center"><i class="ti ti-heart-rate-monitor" style="color:var(--accent)"></i>店舗ヘルススコア</div>
      <div style="font-size:48px;font-weight:800;color:${statusColor(hl.status)};line-height:1.1">${score}<span style="font-size:18px;color:var(--muted)">/100</span></div>
      <div style="font-size:15px;font-weight:600;color:${statusColor(hl.status)}">${hl.label}</div>
      <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="background:${statusColor(hl.status)};width:${score}%"></div></div>
    </div>`;
  } else if (stores.length > 1) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-heart-rate-monitor" style="color:var(--accent)"></i>店舗ヘルススコア</div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">`;
    stores.forEach(s=>{
      var score=storeHealthScore(s); var hl=healthLabel(score);
      html += `<div onclick="switchStore('${s.id}');go('dashboard')" style="min-width:90px;flex:1;text-align:center;background:var(--surface2);border-radius:10px;padding:10px;cursor:pointer;border-top:3px solid ${s.color}">
        <div style="font-size:11px;color:var(--muted);white-space:nowrap">${s.name}</div>
        <div style="font-size:26px;font-weight:800;color:${statusColor(hl.status)}">${score}</div>
        <div style="font-size:9px;color:${statusColor(hl.status)}">${hl.label}</div></div>`;
    });
    html += `</div></div>`;
  }

  // ====== ③ 今日の状況（KPI） ======
  html += `<div class="card"><div class="card-title"><i class="ti ti-chart-bar" style="color:var(--accent)"></i>今日の状況 <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">${getPeriod()}</span></div>
    <div class="kpi-grid">
    <div class="kpi" style="cursor:pointer" onclick="go('budget')"><div class="kpi-label">売上</div><div class="kpi-value" style="color:${statusColor(statusFromPct(tp))}">${fmtK(tA)}</div><div class="kpi-sub">予算比 ${tp}%</div></div>
    <div class="kpi" style="cursor:pointer" onclick="go('budget')"><div class="kpi-label">達成率</div><div class="kpi-value" style="color:${statusColor(statusFromPct(tp))}">${tp}%</div><div class="kpi-sub">/ ${fmtK(tB)}</div></div>
    <div class="kpi" style="cursor:pointer" onclick="go('foodcost')"><div class="kpi-label">原価率</div><div class="kpi-value" style="color:${statusColor(statusFromCeil(avgFC,31,34))}">${avgFC}%</div><div class="kpi-sub">目標 ≤31%</div></div>
    <div class="kpi" style="cursor:pointer" onclick="go('labor')"><div class="kpi-label">Labor</div><div class="kpi-value" style="color:${statusColor(statusFromCeil(avgL,29,32))}">${avgL}%</div><div class="kpi-sub">目標 ≤29%</div></div>
    </div></div>`;

  // ====== ④ 本日のタスク（隠さない） ======
  html += `<div class="card"><div class="card-title"><i class="ti ti-checklist" style="color:var(--accent)"></i>本日のタスク`;
  var openCount = myTasks.length + approvalsAll.length + reqAlerts.reduce((a,r)=>a+r.count,0);
  html += ` <span class="tag ${openCount?'tag-yellow':'tag-green'}" style="margin-left:auto">${openCount}件</span></div>`;
  var taskRows = [];
  overdue.slice(0,5).forEach(t=>taskRows.push({s:'danger', t:t.title, sub:'期限切れ', act:`go('tasks')`}));
  todayTasks.slice(0,5).forEach(t=>taskRows.push({s:'warn', t:t.title, sub:'本日期限', act:`go('tasks')`}));
  if (approvalsAll.length) taskRows.push({s:'active', t:`承認待ち ${approvalsAll.length}件`, sub:'承認センター', act:`go('approval')`});
  reqAlerts.forEach(r=>taskRows.push({s:'danger', t:`${r.store} 必須チェック`, sub:`${r.count}件未完`, act:`switchStore('${r.id}');openStoreCmd()`}));
  var otherTasks = myTasks.filter(t=>!overdue.includes(t)&&!todayTasks.includes(t));
  otherTasks.slice(0,4).forEach(t=>taskRows.push({s:'idle', t:t.title, sub:t.due||'期限なし', act:`go('tasks')`}));
  if (!taskRows.length) {
    html += `<div style="text-align:center;color:var(--green);padding:14px"><span style="font-size:20px">🎉</span><div style="font-size:13px;margin-top:4px">本日のタスクは完了です</div></div>`;
  } else {
    taskRows.forEach(r=>{
      var dot = r.s==='danger'?'🔴':r.s==='warn'?'🟡':r.s==='active'?'🔵':'⚪';
      html += `<div onclick="${r.act}" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <span style="font-size:13px">${dot}</span>
        <div style="flex:1"><div style="font-size:13px">${r.t}</div><div style="font-size:10px;color:var(--muted)">${r.sub}</div></div>
        <i class="ti ti-chevron-right" style="font-size:13px;color:var(--muted)"></i></div>`;
    });
  }
  html += `</div>`;

  // ====== ⑤ 店舗別状況 ======
  if (stores.length > 1) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-building-store"></i>店舗別状況</div>`;
    stores.forEach(s => {
      var color = statusColor(s.status);
      html += `<div class="store-row">
        <div class="store-dot" style="background:${s.color}"></div>
        <div style="flex:1" onclick="switchStore('${s.id}');go('budget')">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div class="store-name">${s.name}</div>
            <span class="tag ${statusTag(s.status)}">${s.sp}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="background:${color};width:${Math.min(s.sp,100)}%"></div></div>
          <div class="store-meta">${fmtK(s.a)} / ${fmtK(s.b)} | FC ${s.fc}% | Labor ${s.labor}%</div>
        </div>
        <button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="event.stopPropagation();switchStore('${s.id}');openStoreCmd()"><i class="ti ti-building-store"></i></button>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

/* ============================================================
   STORE COMMAND CENTER
============================================================ */
var activePhase = 'All';
function renderStoreCmd() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var ops = getDailyOps(storeId);
  var opsDone = ops.filter(t=>t.done).length;
  var reqItems = ops.filter(t=>t.required);
  var reqIncomplete = reqItems.filter(t=>!t.done);
  var goals = ls('goals_v2', []).filter(g=>g.scope==='store' && (g.storeId===storeId || g.storeId==='ALL'));
  var tasks = getTasks().filter(t=>(t.store===storeId||t.store==='ALL') && t.status!=='完了');
  var canEdit = ROLE_CONFIG[curRole].canCreate;
  var dailyComplete = ops.length>0 && opsDone===ops.length;

  var html = `<div class="section-header">
    <div><div class="section-title"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${store.color};margin-right:8px;"></span>${store.name}</div>
    <div class="section-sub">Store Command Center · ${new Date().toLocaleDateString('ja')}</div></div>
    ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="go('required')"><i class="ti ti-settings"></i> Ops設定</button>`:''}
  </div>`;

  // Required未完了アラート
  if (reqIncomplete.length) {
    html += `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div>
      <p style="font-size:12px;font-weight:600">Required未完了 ${reqIncomplete.length}件 — Daily完了できません</p>
      <div style="font-size:11px;margin-top:2px">${reqIncomplete.map(t=>t.phase+': '+t.text).join(' / ')}</div></div></div>`;
  } else if (dailyComplete) {
    html += `<div class="alert alert-success"><i class="ti ti-circle-check"></i>本日のDaily Operationsは全て完了しています 🎉</div>`;
  }

  // 本日/今週のGoal
  html += `<div class="card"><div class="card-title"><i class="ti ti-target" style="color:var(--accent)"></i>本日・今週のGoal
    ${canEdit?`<button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('goals')">管理</button>`:''}</div>`;
  if (goals.length) {
    goals.slice(0,4).forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100), 100);
      var color = prog>=100?'var(--green)':prog>=70?'var(--yellow)':'var(--accent2)';
      html += `<div class="goal-item">
        <div class="goal-header"><div class="goal-title">${g.title}</div><span class="tag tag-blue">${g.period}</span></div>
        <div style="display:flex;align-items:center;gap:8px;"><div class="progress-bar" style="flex:1"><div class="progress-fill" style="background:${color};width:${prog}%"></div></div><div class="goal-progress">${prog}%</div></div>
        <div class="store-meta">${g.current||0} / ${g.target} ${g.unit||''}</div>
      </div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">本日のGoalは未設定です</p>`; }
  html += '</div>';

  // ===== Daily Operations（フェーズ順の司令塔） =====
  html += `<div class="card"><div class="card-title"><i class="ti ti-checklist"></i>Daily Operations
    <span style="margin-left:auto;font-size:12px;color:var(--muted)">${opsDone}/${ops.length} 完了</span></div>
    <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="background:${dailyComplete?'var(--green)':'var(--accent2)'};width:${ops.length?Math.round(opsDone/ops.length*100):0}%"></div></div>`;

  // フェーズごとに順番表示（次にやるべきフェーズを強調）
  var nextPhaseFound = false;
  DAILY_PHASES.forEach((phase, pi) => {
    var pItems = ops.filter(t=>t.phase===phase);
    if (!pItems.length) return;
    var pDone = pItems.filter(t=>t.done).length;
    var allDone = pDone===pItems.length;
    var isNext = !allDone && !nextPhaseFound;
    if (isNext) nextPhaseFound = true;
    var icon = allDone?'ti-circle-check':isNext?'ti-player-play':'ti-circle';
    var iconColor = allDone?'var(--green)':isNext?'var(--accent)':'var(--muted)';
    html += `<div style="margin-bottom:10px;${isNext?'background:#fdeee4;border:1px solid #f5d9b8;border-radius:8px;padding:8px':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <i class="ti ${icon}" style="color:${iconColor};font-size:16px"></i>
        <span style="font-weight:600;font-size:13px">${pi+1}. ${phase}</span>
        ${isNext?'<span class="tag tag-yellow" style="font-size:9px">次にやる</span>':''}
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${pDone}/${pItems.length}</span>
      </div>`;
    pItems.forEach(t => {
      html += `<div class="task-item" style="padding:5px 0 5px 24px">
        <div class="task-check${t.done?' done':''}" onclick="toggleDailyOp('${storeId}','${t.id}')">${t.done?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}</div>
        <div style="flex:1"><div class="task-text${t.done?' done':''}" style="font-size:13px">${t.text} ${t.required?'<span class="tag tag-red" style="font-size:9px;padding:1px 5px">必須</span>':''}${t.photo?'<i class="ti ti-camera" style="font-size:11px;color:var(--muted)"></i>':''}</div>
        ${t.done&&t.by?`<div class="task-phase">完了: ${t.by}</div>`:''}</div>
      </div>`;
    });
    if (canEdit) html += `<button class="btn btn-secondary btn-sm" style="margin-left:24px;margin-top:4px" onclick="openDailyOpsAdd('${storeId}','${phase}')"><i class="ti ti-plus"></i> 追加</button>`;
    html += '</div>';
  });

  // Daily完了ボタン
  html += `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:12px">`;
  if (dailyComplete) {
    html += `<button class="btn btn-success" style="width:100%" onclick="completeDailyOps('${storeId}')"><i class="ti ti-flag-check"></i> Daily完了を記録</button>`;
  } else {
    html += `<button class="btn btn-secondary" style="width:100%;opacity:.6" disabled>Daily完了（${ops.length-opsDone}件 残っています）</button>`;
  }
  html += '</div></div>';

  // ===== チップ管理（クレジット=Toast自動 / キャッシュ=手入力）+ 日報 =====
  html += renderStoreCmdTip(storeId, store, canEdit);

  // クイックアクション（店舗運用）
  html += `<div class="card"><div class="card-title"><i class="ti ti-bolt"></i>店舗運用</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="go('inventory')"><i class="ti ti-box"></i> 棚卸</button>
      <button class="btn btn-secondary btn-sm" onclick="go('order')"><i class="ti ti-clipboard-list"></i> 発注</button>
      ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="go('tasks')"><i class="ti ti-list-check"></i> タスク (${tasks.length})</button>`:''}
      ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="go('required')"><i class="ti ti-alert-circle"></i> Required</button>`:''}
    </div>
  </div>`;
  return html;
}

function completeDailyOps(storeId) {
  var ops = getDailyOps(storeId);
  var reqIncomplete = ops.filter(t=>t.required && !t.done);
  if (reqIncomplete.length) { alert('Required未完了があります'); return; }
  var hist = ls('dailyops_complete_'+storeId, []);
  hist.push({date:new Date().toLocaleString('ja'), by:ROLE_CONFIG[curRole].name, count:ops.length});
  lsSet('dailyops_complete_'+storeId, hist);
  showToast('Daily Operations完了を記録しました 🎉', 'success');
  renderPage('store_cmd');
}

/* Store CMD チップ管理セクション */
function renderStoreCmdTip(storeId, store, canEdit) {
  var today = new Date().toISOString().slice(0,10);
  var sel = window._cmdTipDate || today;
  var tip = tipForDay(storeId, sel);

/* ============================================================
   ① 予実管理 (曜日別 客数×客単価, 複数根拠の積み上げ)
   予算 = Σ 各根拠
     基礎型:   Σ(曜日 客数×客単価) × 月の週数
     施策/イベント型: 予想客数 × 予想客単価 (× 日数)
============================================================ */
const DOW = ['月','火','水','木','金','土','日'];
const BASIS_TYPES = [
  {id:'base',  label:'基礎（曜日別）', desc:'通常営業。曜日ごとの客数×客単価×週数'},
  {id:'plan',  label:'施策',          desc:'新規施策。予想客数×予想客単価×日数（例:テイクアウト）'},
  {id:'event', label:'イベント',      desc:'単発イベント。予想客数×予想客単価×日数'},
];
function weeksInMonth() { return 4.3; }

function getBudgets() {
  var def = STORES.map(s => {
    var d = DEMO_BUDGET[s.id] || {b:200000, a:190000};
    // 基礎根拠を逆算（均等割の仮データ）
    var perDay = Math.round(d.b/30);
    var base = {id:'bs1', type:'base', name:'既存店ベース', days:DOW.map(()=>({guests:Math.round(perDay/25), spend:25}))};
    return {storeId:s.id, period:getPeriod(), bases:[base], actual:d.a, status:'承認済'};
  });
  return ls('budgets_v2', def);
}
function saveBudgets(b) { lsSet('budgets_v2', b); }

function basisAmount(basis) {
  if (basis.type === 'base') {
    var week = (basis.days||[]).reduce((a,d)=>a + (parseFloat(d.guests)||0)*(parseFloat(d.spend)||0), 0);
    return week * weeksInMonth();
  } else {
    return (parseFloat(basis.guests)||0) * (parseFloat(basis.spend)||0) * (parseFloat(basis.days)||1);
  }
}
function budgetTotal(b) { return (b.bases||[]).reduce((a,bs)=>a+basisAmount(bs),0); }

var budgetTab = 'summary';
function renderBudget() {
  var html = `<div class="section-header">
    <div><div class="section-title">予実管理</div><div class="section-sub">${getPeriod()}</div></div>
  </div>
  <div class="phase-tabs">
    <div class="phase-tab${budgetTab==='summary'?' active':''}" onclick="setBudgetTab('summary')">サマリー</div>
    <div class="phase-tab${budgetTab==='daily'?' active':''}" onclick="setBudgetTab('daily')">日次進捗</div>
  </div>`;
  if (budgetTab==='daily') return html + renderBudgetDaily();
  return html + renderBudgetSummary();
}
function setBudgetTab(t) { budgetTab = t; renderPage('budget'); }

function renderBudgetSummary() {
  var budgets = getBudgets();
  var stores = getVisibleStores();
  var visible = budgets.filter(b => stores.find(s=>s.id===b.storeId));

  var tB = visible.reduce((a,b)=>a+budgetTotal(b),0);

  var canEdit = ROLE_CONFIG[curRole].canCreate;

  var html = `<div class="kpi-grid" style="margin-bottom:12px;">

    ${kpi('差異', fmtK(Math.abs(tA-Math.round(tB))), tA>=tB?'▲超過':'▼不足', tA>=tB?'var(--green)':'var(--red)')}

        <span class="tag ${statusTag}">${b.status}</span>
      </div>
      <div class="kpi-grid" style="margin:8px 0;">
        ${kpi('予算', fmtK(Math.round(total)), b.bases.length+'根拠', 'var(--muted)')}
        ${kpi('実績', fmtK(b.actual), '今月', color)}
        ${kpi('達成率', sp+'%', sp>=100?'達成':'未達', color)}
        ${kpi('差異', fmtK(Math.abs(b.actual-Math.round(total))), b.actual>=total?'▲':'▼', b.actual>=total?'var(--green)':'var(--red)')}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="background:${color};width:${Math.min(sp,100)}%"></div></div>
      <div style="margin-top:8px">${b.bases.map(bs=>{
        var t=BASIS_TYPES.find(x=>x.id===bs.type)||{label:bs.type};
        return `<div style="font-size:11px;color:var(--muted);display:flex;justify-content:space-between;padding:2px 0">
          <span><span class="tag ${bs.type==='base'?'tag-blue':bs.type==='plan'?'tag-green':'tag-yellow'}" style="font-size:9px;padding:1px 5px">${t.label}</span> ${bs.name}</span>
          <span>${fmtK(Math.round(basisAmount(bs)))}</span></div>`;
      }).join('')}</div>
      ${canEdit?`<div class="approval-actions">
        <button class="btn btn-secondary btn-sm" onclick="openBudgetEditor('${b.storeId}')"><i class="ti ti-edit"></i> 予算編集</button>
        <button class="btn btn-secondary btn-sm" onclick="openActualModal('${b.storeId}')"><i class="ti ti-coin"></i> 月次実績</button>
        ${b.status==='承認待ち'&&ROLE_CONFIG[curRole].canApprove?`<button class="btn btn-success btn-sm" onclick="approveBudget('${b.storeId}')"><i class="ti ti-check"></i> 承認</button>`:''}
      </div>`:''}
    </div>`;

  return html;

/* ============================================================
   日次進捗ビュー (予算自動展開 + 実績/天気/イベント入力 + 累計達成率)
   管轄店舗に応じて単店→複数→全店集計を切替
============================================================ */
var dailyStoreScope = 'current'; // 'current'=当該店, or storeId, or 'ALL'
var dailyMonthOffset = 0; // 0=今月, -1=先月...
function monthDays() {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth() + dailyMonthOffset;
  var ref = new Date(y, m, 1);
  y = ref.getFullYear(); m = ref.getMonth();
  var days = new Date(y, m+1, 0).getDate();
  var arr = [];
  for (var d=1; d<=days; d++) {
    var dt = new Date(y, m, d);
    arr.push({day:d, date:`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, dow:DOW[(dt.getDay()+6)%7]});
  }
  return arr;
}
function dailyMonthLabel() {
  var now = new Date();
  var ref = new Date(now.getFullYear(), now.getMonth()+dailyMonthOffset, 1);
  return `${ref.getFullYear()}年${ref.getMonth()+1}月`;
}
function shiftDailyMonth(delta) { dailyMonthOffset += delta; renderPage('budget'); }
/* 基礎根拠から曜日別の日次予算を取得 */
function dayBudgetFromBases(b, dow) {
  var base = (b.bases||[]).find(x=>x.type==='base');
  if (!base || !base.days) return 0;
  var idx = DOW.indexOf(dow);
  if (idx<0) return 0;
  var d = base.days[idx]||{guests:0,spend:0};
  var lunchD = base.days[idx];
  // base.days は1日分の客数×単価。L/D合算済の想定で日商を返す
  return (parseFloat(d.guests)||0)*(parseFloat(d.spend)||0);
}
function getDailyActuals(storeId) { return ls('daily_actuals_'+storeId, {}); }
function setDailyActuals(storeId, data) { lsSet('daily_actuals_'+storeId, data); }

function dailyScopeStores() {
  // 管轄店舗（getVisibleStores）に応じて対象店舗を返す
  var vis = getVisibleStores();
  if (dailyStoreScope==='ALL') return vis;
  if (dailyStoreScope==='current') return [vis[0]];
  var s = vis.find(x=>x.id===dailyStoreScope);
  return s ? [s] : [vis[0]];
}

function renderBudgetDaily() {
  var vis = getVisibleStores();
  var multiStore = vis.length > 1;
  var scopeStores = dailyScopeStores();
  var days = monthDays();
  var budgets = getBudgets();

  var html = '';
  // 店舗スコープ切替（管轄が複数店ある場合）
  if (multiStore) {
    html += `<div class="phase-tabs" style="margin-bottom:8px">
      <div class="phase-tab${dailyStoreScope==='ALL'?' active':''}" onclick="setDailyScope('ALL')">全${vis.length}店集計</div>
      ${vis.map(s=>`<div class="phase-tab${dailyStoreScope===s.id?' active':''}" onclick="setDailyScope('${s.id}')">${s.name}</div>`).join('')}
    </div>`;
  } else {
    dailyStoreScope = 'current';
  }

  var isAgg = dailyStoreScope==='ALL' && multiStore;
  var title = isAgg ? `全${vis.length}店集計` : (scopeStores[0]||{name:'—'}).name;

  // 月間累計サマリー
  var todayStr = new Date().toISOString().slice(0,10);
  var sumBudget=0, sumActual=0, sumBudgetToToday=0;
  days.forEach(d => {
    scopeStores.forEach(s => {
      var b = budgets.find(x=>x.storeId===s.id);
      var override = (getDailyActuals(s.id)[d.date]||{});
      var dayBud = override.budget!=null ? override.budget : (b?dayBudgetFromBases(b,d.dow):0);
      sumBudget += dayBud;
      if (d.date<=todayStr) sumBudgetToToday += dayBud;
      sumActual += (override.actual!=null?override.actual:0);
    });
  });
  var paceRate = sumBudgetToToday ? Math.round(sumActual/sumBudgetToToday*1000)/10 : 0;
  var monthRate = sumBudget ? Math.round(sumActual/sumBudget*1000)/10 : 0;

  html += `<div class="card"><div class="card-title"><i class="ti ti-chart-line"></i>${title} 月間進捗</div>
    <div class="kpi-grid">
      ${kpi('月間予算', fmtK(Math.round(sumBudget)), getPeriod(), 'var(--muted)')}
      ${kpi('実績累計', fmtK(Math.round(sumActual)), '本日まで', 'var(--tm)')}
      ${kpi('対予算ペース', paceRate+'%', '本日時点', paceRate>=100?'var(--green)':paceRate>=90?'var(--yellow)':'var(--red)')}
      ${kpi('月間達成率', monthRate+'%', '対月予算', monthRate>=100?'var(--green)':'var(--muted)')}
    </div>

  });
  html += '</tbody></table>';
  if (isAgg) html += `<p style="font-size:11px;color:var(--muted);margin-top:6px">集計ビューでは天気・イベントは各店ビューで確認・入力できます</p>`;

function weatherIcon(w) {
  var map = {'快晴':'☀️','晴':'🌤️','曇':'☁️','小雨':'🌦️','雨':'🌧️','嵐':'⛈️','雪':'❄️','霧':'🌫️'};
  return map[w] || (w?w:'-');
}

/* WMO天気コード → 内部天気区分（細分化）
   0=快晴, 1-2=晴, 3=曇, 45/48=霧, 51-55=小雨(霧雨), 56-67=雨,
   71-77=雪, 80-82=雨(にわか), 85-86=雪, 95-99=嵐 */
function wmoToWeather(code) {
  if (code===0) return '快晴';
  if (code>=1 && code<=2) return '晴';
  if (code===3) return '曇';
  if (code>=45 && code<=48) return '霧';
  if (code>=51 && code<=57) return '小雨';   // 霧雨レベル
  if (code>=61 && code<=67) return '雨';     // 本降り
  if (code>=71 && code<=77) return '雪';
  if (code>=80 && code<=82) return '雨';     // にわか雨
  if (code>=85 && code<=86) return '雪';
  if (code>=95) return '嵐';
  return '曇';
}

/* 店舗座標（緯度経度）。未設定はHonolulu既定 */
/* 店舗の客数定義: 'bowls'(Totoya=丼数), 'plate'(Waikiki=Plate数), 'guest'(通常客数) */
function guestCountType(storeId) {
  var s = (typeof STORES!=='undefined'?STORES:[]).find(x=>x.id===storeId) || {};
  if (storeId==='F03') return 'plate';            // Waikiki
  if (s.brand==='Totoya') return 'bowls';         // Totoya全店
  return 'guest';                                  // ToriTon/Tenkichi/Marujuu等
}
function guestCountLabel(storeId) {
  var t = guestCountType(storeId);
  return t==='bowls' ? '丼数' : t==='plate' ? 'Plate' : '客数';
}
/* その日の客数（業態別）。L/D個別も返す */
function dayGuestValue(storeId, av) {
  if (!av) return { total:null, lunch:null, dinner:null };
  var t = guestCountType(storeId);
  if (t==='bowls') return { total: av.bowls, lunch: av.lunchBowls, dinner: av.dinnerBowls };
  // plate は将来Waikiki接続時に専用フィールド。暫定でguest扱い
  return { total: av.guests, lunch: av.lunchGuests, dinner: av.dinnerGuests };
}

/* Open-Meteoで期間の日別天気を取得（過去/未来両対応） */
async function fetchWeatherRange(storeId, dateFrom, dateTo) {
  var ll = storeLatLng(storeId);
  var today = new Date().toISOString().slice(0,10);
  var out = {};
  // 過去分（〜昨日）は archive、当日以降は forecast。両方取って統合。
  async function pull(url) {
    try {
      var res = await fetch(url);
      if (!res.ok) return;
      var j = await res.json();
      if (j.daily && j.daily.time && j.daily.weathercode) {
        j.daily.time.forEach((t,i)=>{ out[t] = wmoToWeather(j.daily.weathercode[i]); });
      } else if (j.daily && j.daily.time && j.daily.weather_code) {
        j.daily.time.forEach((t,i)=>{ out[t] = wmoToWeather(j.daily.weather_code[i]); });
      }
    } catch(e) { console.error('weather pull', e); }
  }
  // archive: dateFrom 〜 min(dateTo, 昨日)
  var yest = new Date(); yest.setDate(yest.getDate()-1);
  var yestISO = yest.toISOString().slice(0,10);
  if (dateFrom <= yestISO) {
    var archEnd = dateTo < yestISO ? dateTo : yestISO;
    await pull(`https://archive-api.open-meteo.com/v1/archive?latitude=${ll[0]}&longitude=${ll[1]}&start_date=${dateFrom}&end_date=${archEnd}&daily=weathercode&timezone=Pacific%2FHonolulu`);
  }
  // forecast: 今日以降（dateToが今日以降の場合）
  if (dateTo >= today) {
    await pull(`https://api.open-meteo.com/v1/forecast?latitude=${ll[0]}&longitude=${ll[1]}&daily=weathercode&forecast_days=16&timezone=Pacific%2FHonolulu`);
  }
  return out;
}

/* ハワイ州の祝日（連邦＋州独自）。年で計算 */
function usHolidays(year) {
  function nthWeekday(month, weekday, n) { // month 0-based, weekday 0=Sun
    var d = new Date(year, month, 1);
    var add = (weekday - d.getDay() + 7) % 7 + (n-1)*7;
    return new Date(year, month, 1+add);
  }
  function lastWeekday(month, weekday) {
    var d = new Date(year, month+1, 0);
    var sub = (d.getDay() - weekday + 7) % 7;
    return new Date(year, month+1, 0-sub);
  }
  function iso(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  var h = {};
  // 連邦祝日
  h[`${year}-01-01`] = '🎍元日';
  h[iso(nthWeekday(0,1,3))] = 'MLK Day';
  h[iso(nthWeekday(1,1,3))] = "Presidents' Day";
  h[iso(lastWeekday(4,1))] = 'Memorial Day';
  h[`${year}-06-19`] = 'Juneteenth';
  h[`${year}-07-04`] = '🎆Independence Day';
  h[iso(nthWeekday(8,1,1))] = 'Labor Day';
  h[`${year}-11-11`] = 'Veterans Day';
  h[iso(nthWeekday(10,4,4))] = '🦃Thanksgiving';
  h[`${year}-12-25`] = '🎄Christmas';
  // ハワイ州独自の祝日
  h[`${year}-03-26`] = 'Prince Kūhiō Day(HI)';                 // 3/26固定
  h[iso(nthWeekday(2,5,1))] = h[iso(nthWeekday(2,5,1))] || ''; // placeholder防止
  h[`${year}-06-11`] = 'King Kamehameha Day(HI)';              // 6/11固定
  h[iso(nthWeekday(7,5,3))] = 'Statehood Day(HI)';             // 8月第3金曜
  // 選挙日(偶数年・11月第1月曜の翌火曜)
  if (year % 2 === 0) {
    var firstMon = nthWeekday(10,1,1);
    var electionDay = new Date(year,10,firstMon.getDate()+1);
    h[iso(electionDay)] = 'Election Day(HI)';
  }
  // 空文字は除去
  Object.keys(h).forEach(k=>{ if(!h[k]) delete h[k]; });
  return h;
}
function holidayFor(dateISO) {
  var y = parseInt(dateISO.slice(0,4));
  var h = usHolidays(y);
  return h[dateISO] || '';
}

async function fetchWeatherForView(storeId, days) {
  var from = days[0].date, to = days[days.length-1].date;
  var wmap = await fetchWeatherRange(storeId, from, to);
  if (!Object.keys(wmap).length) return { error: '天気取得に失敗しました（本番URLで再試行してください）' };
  var actuals = getDailyActuals(storeId);
  var updated = 0;
  days.forEach(d => {
    if (wmap[d.date]) {
      var prev = actuals[d.date] || {};
      // 手入力天気がなければ自動反映
      if (!prev.weather || prev.weatherAuto) {
        actuals[d.date] = Object.assign({}, prev, { weather: wmap[d.date], weatherAuto: true });
        updated++;
      }
    }
    // 祝日をイベント欄へ（手入力イベントがなければ）
    var hol = holidayFor(d.date);
    if (hol) {
      var p = actuals[d.date] || {};
      if (!p.event || p.eventAuto) {
        actuals[d.date] = Object.assign({}, p, { event: hol, eventAuto: true });
      }
    }
  });
  setDailyActuals(storeId, actuals);
  return { updated };
}

      <div class="form-group"><label class="form-label">天気</label>
        <select class="form-select" id="da-weather">${['','快晴','晴','曇','霧','小雨','雨','嵐','雪'].map(w=>`<option value="${w}"${ov.weather===w?' selected':''}>${w?weatherIcon(w)+' '+w:'—'}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">イベント・メモ</label><input class="form-input" id="da-event" value="${ov.event||''}" placeholder="例: 近隣で祭り / 雨で客足減"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveDailyActual('${storeId}','${date}')">保存</button></div>`);
}
function saveDailyActual(storeId, date) {
  var actuals = getDailyActuals(storeId);
  var budget = parseFloat(document.getElementById('da-budget').value);
  var actual = document.getElementById('da-actual').value;
  var guests = document.getElementById('da-guests').value;
  actuals[date] = {
    budget: isNaN(budget)?null:budget,
    actual: actual===''?null:parseFloat(actual),
    guests: guests===''?null:parseFloat(guests),
    weather: document.getElementById('da-weather').value,
    event: document.getElementById('da-event').value.trim(),
  };
  setDailyActuals(storeId, actuals);
  // 月次実績にも累計反映
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = Object.values(actuals).reduce((a,v)=>a+(v.actual||0),0); saveBudgets(budgets); }
  closeModalDirect();
  showToast('日次実績を保存しました', 'success');
  renderPage('budget');
}

/* ---- 予算エディタ（根拠リスト） ---- */

  var b = getBudgets().find(x=>x.storeId===storeId);

  var s = STORES.find(x=>x.id===storeId) || {name:storeId};

  var html = `<div class="modal-title">${s.name} 予算編集 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">予算根拠を複数積み上げて月間予算を構成します</p>

      <div class="approval-header"><div><div class="approval-title">${bs.name}</div>
      <div class="approval-meta"><span class="tag ${bs.type==='base'?'tag-blue':bs.type==='plan'?'tag-green':'tag-yellow'}" style="font-size:9px">${t.label}</span> ${fmtK(Math.round(basisAmount(bs)))}</div></div>
