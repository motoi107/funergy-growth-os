function simulateOCR() {
  // 仮OCR: 既存食材からランダムに3-4品目、価格を±10%変動させて読み取ったことにする
  var ings = getIngredients();
  var picked = ings.slice().sort(()=>Math.random()-0.5).slice(0, 4);
  invoiceTmpLines = picked.map(ing => {
    var newPrice = Math.round(ing.price * (1 + (Math.random()*0.2-0.1)) * 100)/100;
    return {code:ing.code, name:ing.name, oldPrice:ing.price, newPrice, qty:Math.ceil(Math.random()*10)};
  });
  renderOCRResult();
}

function renderOCRResult() {
  var el = document.getElementById('ocr-result');
  if (!el) return;
  var total = invoiceTmpLines.reduce((a,l)=>a+l.newPrice*l.qty,0);
  el.innerHTML = `<div class="alert alert-success" style="margin-bottom:8px"><i class="ti ti-check"></i>${invoiceTmpLines.length}品目を読み取り、食材マスターと照合しました</div>
    <table class="inv-table"><thead><tr><th>食材</th><th>数量</th><th>旧価格</th><th>新価格</th></tr></thead><tbody>
    ${invoiceTmpLines.map(l=>{
      var diff = l.newPrice - l.oldPrice;
      var col = diff>0?'var(--red)':diff<0?'var(--green)':'var(--muted)';
      return `<tr><td>${l.name}</td><td>${l.qty}</td><td style="color:var(--muted)">$${l.oldPrice.toFixed(2)}</td><td style="color:${col}">$${l.newPrice.toFixed(2)} ${diff!==0?(diff>0?'▲':'▼'):''}</td></tr>`;
    }).join('')}
    </tbody></table>
    <div style="text-align:right;font-weight:600;margin-top:8px">合計: $${total.toFixed(2)}</div>`;
}

function saveInvoice() {
  if (!invoiceTmpLines.length) { alert('先にOCR読取を実行してください'); return; }
  var vendor = document.getElementById('inv-vendor').value.trim();
  if (!vendor) { alert('業者・購入先を入力してください'); return; }
  var total = invoiceTmpLines.reduce((a,l)=>a+l.newPrice*l.qty,0);
  // 食材マスターの価格を更新
  var ings = getIngredients();
  invoiceTmpLines.forEach(l => {
    var ing = ings.find(x=>x.code===l.code);
    if (ing) {
      var hist = ing.priceHistory || [];
      hist.push({date:new Date().toLocaleDateString('ja'), price:ing.price});
      ing.priceHistory = hist;
      ing.price = l.newPrice;
    }
  });
  lsSet('m_ingredients', ings);
  // Invoice保存
  var invoices = ls('invoices', []);
  invoices.push({id:'inv'+Date.now(), vendor, docType:invoiceDocType, date:new Date().toLocaleDateString('ja'),
    lines:invoiceTmpLines, total, applied:true});
  lsSet('invoices', invoices);
  // Receiptの場合は買い出しにも反映
  if (invoiceDocType==='Receipt') {
    var storeId = curStore==='ALL'?STORES[0].id:curStore;
    var purchases = getPurchases(storeId);
    purchases.push({id:'pc'+Date.now(), date:new Date().toLocaleDateString('ja'), vendor, item:invoiceTmpLines.map(l=>l.name).join(', '),
      amount:total, kind:'Food', category:'買い出し', memo:'Receiptから登録', receipt:true, by:ROLE_CONFIG[curRole].name});
    lsSet('purchases_'+storeId, purchases);
  }
  closeModalDirect();
  showToast(invoiceDocType==='Receipt'?'Receiptを保存し、買い出し＋価格を更新しました':'Invoiceを保存し、食材価格を更新しました', 'success');
  renderPage('invoice');
}

/* ============================================================
   ⑮ Daily Operations (Opening/Prep/Inventory/Ordering/Cleanliness/Closing)
============================================================ */
const DAILY_PHASES = ['Opening','Prep','Inventory','Ordering','Cleanliness','Closing'];
const DEFAULT_DAILYOPS = [
  {id:'d1', phase:'Opening',     text:'レジ開け・釣銭確認', required:true},
  {id:'d2', phase:'Opening',     text:'照明・BGM・空調セット', required:false},
  {id:'d3', phase:'Opening',     text:'店内・トイレ清掃確認', required:true},
  {id:'d4', phase:'Prep',        text:'スープ・タレ仕込み確認', required:true},
  {id:'d5', phase:'Prep',        text:'食材温度チェック', required:true},
  {id:'d6', phase:'Inventory',   text:'棚卸入力（主要食材）', required:true},
  {id:'d7', phase:'Inventory',   text:'欠品リスト作成', required:false},
  {id:'d8', phase:'Ordering',    text:'発注必要品の確認', required:false},
  {id:'d9', phase:'Cleanliness', text:'客席・カウンター清掃', required:true},
  {id:'d10',phase:'Cleanliness', text:'厨房床・グリストラップ', required:false},
  {id:'d11',phase:'Closing',     text:'レジ締め・売上報告', required:true},
  {id:'d12',phase:'Closing',     text:'火元・施錠・警備セット', required:true},
];
function getDailyOps(storeId) {
  var today = new Date().toLocaleDateString('ja');
  var key = 'dailyops_'+storeId+'_'+today;
  return ls(key, DEFAULT_DAILYOPS.map(t=>Object.assign({},t,{done:false, by:''})));
}
function setDailyOps(storeId, items) {
  var today = new Date().toLocaleDateString('ja');
  lsSet('dailyops_'+storeId+'_'+today, items);
}

var dailyPhase = 'Opening';
function renderDailyOps() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var items = getDailyOps(storeId);
  var phaseItems = items.filter(t=>t.phase===dailyPhase);
  var done = items.filter(t=>t.done).length;
  var reqIncomplete = items.filter(t=>t.required && !t.done);

  var html = `<div class="section-header">
    <div><div class="section-title">${store.name} · Daily Ops</div><div class="section-sub">${new Date().toLocaleDateString('ja')} · ${done}/${items.length}完了</div></div>
  </div>`;

  if (reqIncomplete.length) {
    html += `<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i><div>
      <p style="font-size:12px;font-weight:600">必須タスク未完了 ${reqIncomplete.length}件</p>
      <div style="font-size:11px;margin-top:2px">${reqIncomplete.map(t=>t.text).join(' / ')}</div></div></div>`;
  }

  // phase progress chips
  html += `<div class="phase-tabs">`;
  DAILY_PHASES.forEach(p => {
    var pItems = items.filter(t=>t.phase===p);
    var pDone = pItems.filter(t=>t.done).length;
    var allDone = pItems.length && pDone===pItems.length;
    html += `<div class="phase-tab${dailyPhase===p?' active':''}" onclick="setDailyPhase('${p}')">${p} ${allDone?'<i class="ti ti-check" style="font-size:11px"></i>':`(${pDone}/${pItems.length})`}</div>`;
  });
  html += `</div>`;

  html += `<div class="card"><div class="card-title"><i class="ti ti-checklist"></i>${dailyPhase}
    ${ROLE_CONFIG[curRole].canCreate?`<button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="openDailyOpsAdd('${storeId}')"><i class="ti ti-plus"></i></button>`:''}
  </div>`;
  phaseItems.forEach(t => {
    html += `<div class="task-item">
      <div class="task-check${t.done?' done':''}" onclick="toggleDailyOp('${storeId}','${t.id}')">${t.done?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}</div>
      <div style="flex:1">
        <div class="task-text${t.done?' done':''}">${t.text} ${t.required?'<span class="tag tag-red" style="font-size:9px;padding:1px 5px">必須</span>':''}</div>
        ${t.done&&t.by?`<div class="task-phase">完了: ${t.by}</div>`:''}
      </div>
    </div>`;
  });
  if (!phaseItems.length) html += `<p style="color:var(--muted);font-size:13px;text-align:center;padding:12px">このフェーズのタスクなし</p>`;
  html += '</div>';
  return html;
}

function setDailyPhase(p) { dailyPhase = p; renderPage('store_cmd'); }
function toggleDailyOp(storeId, tId) {
  var items = getDailyOps(storeId);
  var t = items.find(x=>x.id===tId);
  if (t) { t.done = !t.done; t.by = t.done ? ROLE_CONFIG[curRole].name : ''; setDailyOps(storeId, items); renderPage('store_cmd'); }
}
function openDailyOpsAdd(storeId, phase) {
  var ph = phase || dailyPhase;
  openModal(`<div class="modal-title">タスク追加 (${ph}) <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">タスク内容</label><input class="form-input" id="do-text" placeholder="タスク"></div>
    <div class="form-group"><label class="form-label">フェーズ</label>
      <select class="form-select" id="do-phase">${DAILY_PHASES.map(p=>`<option${p===ph?' selected':''}>${p}</option>`).join('')}</select></div>
    <div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" id="do-req"> 必須タスクにする（未完了だとDaily完了不可）</label></div>
    <div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" id="do-photo"> 写真必須</label></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveDailyOp('${storeId}')">追加</button></div>`);
}
function saveDailyOp(storeId) {
  var text = document.getElementById('do-text').value.trim();
  if (!text) return;
  var req = document.getElementById('do-req').checked;
  var photo = document.getElementById('do-photo').checked;
  var phase = document.getElementById('do-phase').value;
  var items = getDailyOps(storeId);
  items.push({id:'do'+Date.now(), phase, text, required:req, photo, done:false, by:''});
  setDailyOps(storeId, items);
  closeModalDirect();
  renderPage('store_cmd');
}

/* ============================================================
   ⑭ タスク管理 (担当/期限/進捗/完了/履歴)
============================================================ */
function getTasks() { return ls('tasks_all', []); }
function renderTasks() {
  var tasks = getTasks();
  var storeFilter = curStore;
  var visible = curRole==='crew' ? tasks.filter(t=>t.assignee===ROLE_CONFIG[curRole].name || t.store===curStore)
              : curStore==='ALL' ? tasks : tasks.filter(t=>t.store===curStore || t.store==='ALL');

  var active = visible.filter(t=>t.status!=='完了');
  var done = visible.filter(t=>t.status==='完了');

  var html = `<div class="section-header">
    <div><div class="section-title">タスク管理</div><div class="section-sub">進行中 ${active.length} / 完了 ${done.length}</div></div>
    ${ROLE_CONFIG[curRole].canCreate?`<button class="btn btn-primary btn-sm" onclick="openTaskModal()"><i class="ti ti-plus"></i> タスク作成</button>`:''}
  </div>`;

  if (active.length) {
    active.forEach(t => {
      var overdue = t.due && new Date(t.due) < new Date() && t.status!=='完了';
      var pColor = t.priority==='高'?'tag-red':t.priority==='中'?'tag-yellow':'tag-gray';
      html += `<div class="card">
        <div class="approval-header">
          <div><div class="approval-title">${t.title}</div>
          <div class="approval-meta">担当: ${t.assignee||'未割当'} ${t.store!=='ALL'?'· '+(STORES.find(s=>s.id===t.store)||{name:''}).name:''} ${t.due?'· 期限 '+t.due:''}</div></div>
          <span class="tag ${pColor}">${t.priority||'低'}</span>
        </div>
        ${overdue?'<div class="alert alert-danger" style="margin:8px 0;padding:6px 10px"><i class="ti ti-clock"></i>期限超過</div>':''}
        <div class="progress-bar" style="margin:8px 0"><div class="progress-fill" style="background:var(--accent2);width:${t.progress||0}%"></div></div>
        <div class="approval-actions">
          <button class="btn btn-secondary btn-sm" onclick="updateTaskProgress('${t.id}',25)">25%</button>
          <button class="btn btn-secondary btn-sm" onclick="updateTaskProgress('${t.id}',50)">50%</button>
          <button class="btn btn-secondary btn-sm" onclick="updateTaskProgress('${t.id}',75)">75%</button>
          <button class="btn btn-success btn-sm" onclick="completeTask('${t.id}')"><i class="ti ti-check"></i> 完了</button>
        </div>
      </div>`;
    });
  } else {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:30px"><i class="ti ti-checks" style="font-size:28px;display:block;margin-bottom:8px"></i>進行中タスクなし</div>`;
  }

  if (done.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>完了履歴</div>`;
    done.slice().reverse().slice(0,6).forEach(t => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title" style="text-decoration:line-through;color:var(--muted)">${t.title}</div><span class="tag tag-green">完了</span></div>
        <div class="approval-meta">${t.assignee||''} · ${t.completedDate||''}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function openTaskModal() {
  var emps = getEmployees().filter(e=>e.status!=='退職');
  var storeOpts = [{id:'ALL',name:'全店'},...STORES];
  openModal(`<div class="modal-title">タスク作成 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">タスク名</label><input class="form-input" id="t-title" placeholder="タスク内容"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">担当者</label>
        <select class="form-select" id="t-assignee"><option value="">未割当</option>${emps.map(e=>`<option>${e.name}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">店舗</label>
        <select class="form-select" id="t-store">${storeOpts.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">優先度</label><select class="form-select" id="t-priority"><option>低</option><option selected>中</option><option>高</option></select></div>
      <div class="form-group"><label class="form-label">期限</label><input class="form-input" id="t-due" type="date"></div>
    </div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>

function saveTask() {
  var title = document.getElementById('t-title').value.trim();
  if (!title) { alert('タスク名を入力してください'); return; }
  var tasks = getTasks();
  tasks.push({id:'tk'+Date.now(), title,
    assignee:document.getElementById('t-assignee').value,
    store:document.getElementById('t-store').value,
    priority:document.getElementById('t-priority').value,
    due:document.getElementById('t-due').value,
    progress:0, status:'進行中', created:new Date().toLocaleDateString('ja')});
  lsSet('tasks_all', tasks);
  closeModalDirect();
  showToast('タスクを作成しました', 'success');
  renderPage('tasks');
}
function updateTaskProgress(id, p) {
  var tasks = getTasks();
  var t = tasks.find(x=>x.id===id);
  if (t) { t.progress = p; lsSet('tasks_all', tasks); renderPage('tasks'); }
}
function completeTask(id) {
  var tasks = getTasks();
  var t = tasks.find(x=>x.id===id);
  if (t) { t.status='完了'; t.progress=100; t.completedDate=new Date().toLocaleDateString('ja'); lsSet('tasks_all', tasks); showToast('タスク完了', 'success'); renderPage('tasks'); }
}

/* ============================================================
   ⑯ Required管理 (必須設定/未完了検知/注意ログ/警告カウント)
============================================================ */
function renderRequired() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var items = getDailyOps(storeId);
  var required = items.filter(t=>t.required);
  var incomplete = required.filter(t=>!t.done);
  var warnings = ls('warnings_'+storeId, []);

  var html = `<div class="section-header">
    <div><div class="section-title">${store.name} · Required管理</div><div class="section-sub">必須タスクの遵守状況</div></div>
  </div>
  <div class="kpi-grid" style="margin-bottom:12px">
    ${kpi('必須タスク', required.length, '本日', 'var(--tm)')}
    ${kpi('完了', required.length-incomplete.length, '達成', 'var(--green)')}
    ${kpi('未完了', incomplete.length, '要対応', incomplete.length?'var(--red)':'var(--green)')}
    ${kpi('警告累計', warnings.length, '今月', warnings.length>=3?'var(--red)':'var(--yellow)')}
  </div>`;

  if (incomplete.length) {
    html += `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div>
      <p style="font-size:12px;font-weight:600">未完了の必須タスク</p>
      <div style="font-size:11px;margin-top:2px">${incomplete.map(t=>`${t.phase}: ${t.text}`).join(' / ')}</div></div></div>
      ${ROLE_CONFIG[curRole].canApprove?`<button class="btn btn-danger btn-sm" style="margin-bottom:12px" onclick="logWarning('${storeId}')"><i class="ti ti-flag"></i> 注意ログを記録（警告+1）</button>`:''}`;
  } else {
    html += `<div class="alert alert-success"><i class="ti ti-circle-check"></i>本日の必須タスクは全て完了しています</div>`;
  }

  // 必須タスク一覧と設定
  html += `<div class="card"><div class="card-title"><i class="ti ti-settings"></i>必須タスク設定</div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">Daily Opsの各タスクの必須/任意を切り替えられます（ハードコードではなく設定式）</p>`;
  items.forEach(t => {
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:13px">${t.text}<span style="color:var(--muted);font-size:11px"> · ${t.phase}</span></div>
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer">
        <input type="checkbox" ${t.required?'checked':''} onchange="toggleRequired('${storeId}','${t.id}')"> 必須
      </label>
    </div>`;
  });
  html += '</div>';

  // 警告履歴
  if (warnings.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-flag" style="color:var(--red)"></i>注意ログ履歴</div>`;
    warnings.slice().reverse().forEach(w => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${w.reason}</div><span class="tag tag-red">警告</span></div>
        <div class="approval-meta">${w.date} · 記録: ${w.by}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function toggleRequired(storeId, tId) {
  var items = getDailyOps(storeId);
  var t = items.find(x=>x.id===tId);
  if (t) { t.required = !t.required; setDailyOps(storeId, items); renderPage('required'); }
}
function logWarning(storeId) {
  var items = getDailyOps(storeId);
  var incomplete = items.filter(t=>t.required && !t.done);
  if (!confirm('未完了の必須タスクについて注意ログを記録しますか？（警告カウント+1）')) return;
  var warnings = ls('warnings_'+storeId, []);
  warnings.push({date:new Date().toLocaleString('ja'), by:ROLE_CONFIG[curRole].name,
    reason:`必須タスク未完了 ${incomplete.length}件 (${incomplete.map(t=>t.text).join(', ')})`});
  lsSet('warnings_'+storeId, warnings);
  showToast('注意ログを記録しました', 'danger');
  renderPage('required');
}

/* ============================================================
   ⑬ Goal管理 (店舗/個人 × Daily/Weekly/Monthly)
============================================================ */
var goalScope = 'store';
function renderGoals() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var allGoals = ls('goals_v2', []);
  var storeGoals = allGoals.filter(g=>g.scope==='store' && (g.storeId===storeId || g.storeId==='ALL'));
  var myGoals = allGoals.filter(g=>g.scope==='personal' && g.owner===ROLE_CONFIG[curRole].name);
  var list = goalScope==='store' ? storeGoals : myGoals;

  var html = `<div class="section-header">
    <div><div class="section-title">Goal管理</div><div class="section-sub">${store.name}</div></div>
    <button class="btn btn-primary btn-sm" onclick="openGoalV2Modal('${storeId}')"><i class="ti ti-plus"></i> Goal設定</button>
  </div>
  <div class="phase-tabs">
    <div class="phase-tab${goalScope==='store'?' active':''}" onclick="setGoalScope('store')">店舗Goal (${storeGoals.length})</div>
    <div class="phase-tab${goalScope==='personal'?' active':''}" onclick="setGoalScope('personal')">個人Goal (${myGoals.length})</div>
  </div>`;

  ['Daily','Weekly','Monthly'].forEach(period => {
    var pGoals = list.filter(g=>g.period===period);
    if (!pGoals.length) return;
    html += `<div class="card"><div class="card-title"><i class="ti ti-target"></i>${period}</div>`;
    pGoals.forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100),100);

/* ============================================================
   ⑱ Tip Rate (自己申請 80/90/100 → 上長承認 → 履歴)
============================================================ */
const TIP_OPTIONS = [80, 90, 100];
const DEFAULT_TIP_POLICY = '【Tip Rate Policy】\n・初回勤務後、店舗ごとのNo Tip期間（ToriTon/Tenkichi=3シフト、Totoya/Marujuu/Waikiki=2シフト）。\n・No Tip期間終了後は80%スタート。\n・90%/100%は条件を満たし承認されると昇格。\n・【初回勤務日から3ヶ月経過すると、承認を待たず自動的に100%になります】\n・90%：Responsibility/Skill/Quality/Teamwork/Passion の条件＋Store Manager承認。\n・100%：主要Lv3＋教育力等＋Store Manager＋Area Manager承認。';
function getTipPolicy() { return ls('tip_policy', DEFAULT_TIP_POLICY); }

/* 店舗別No Tip期間（初回勤務からのシフト数） */
function noTipShifts(storeId) {
  // ToriTon(F01)/Tenkichi(F02)=3, Totoya(F03,F04*)/Marujuu(F05)=2
  return (storeId==='F01'||storeId==='F02') ? 3 : 2;
}
/* 初回勤務日（firstWork優先, なければhireDate） */
function firstWorkDate(emp) {
  if (!emp) return null;
  var d = emp.firstWork || emp.hireDate;
  return d ? new Date(d+'T00:00:00') : null;
}
/* 初回勤務から3ヶ月以上経過したか */
function isThreeMonths(emp) {
  var d = firstWorkDate(emp);
  if (!d) return false;
  var threeMo = new Date(d); threeMo.setMonth(threeMo.getMonth()+3);
  return new Date() >= threeMo;
}
/* そのスタッフの確定Tip Rate（%）を算出
   - 3ヶ月経過 → 自動100%
   - 承認済みの最新Tip Rate申請 → その%
   - No Tip期間中 → 0（No Tip）
   - それ以降 → 80% */
function effectiveTipRate(name) {
  var emp = getEmployees().find(e=>e.name===name);
  if (!emp) return 100;
  if (emp.role!=='crew' && emp.role!=='sl') return 100;
  // 3ヶ月自動100%
  if (isThreeMonths(emp)) return 100;
  // 承認済み最新
  var approved = ls('tip_requests',[]).filter(r=>r.name===name && r.status==='承認').slice(-1)[0];
  if (approved) return approved.rate;
  // 初回勤務日が未設定なら、既存の評価係数（coef）を尊重（インポートデータ保護）
  var fw = firstWorkDate(emp);
  if (!fw) return (emp.coef!=null ? Math.round(emp.coef*100) : 100);
  // No Tip期間判定（日数近似）
  var daysSince = Math.floor((new Date() - fw) / 86400000);
  if (daysSince < noTipShifts(emp.store)) return 0;
  return 80;
}
/* 表示用ラベル */
function tipRateLabel(name) {
  var r = effectiveTipRate(name);
  return r===0 ? 'No Tip' : r+'%';
}

function renderTipRate() {
  var requests = ls('tip_requests', []);
  var canApprove = ROLE_CONFIG[curRole].canApprove;
  var canEditPolicy = curRole==='gm' || curRole==='ceo';

  var html = `<div class="section-header">
    <div><div class="section-title">Tip Rate</div><div class="section-sub">自己申請 → 上長承認</div></div>
    ${canEditPolicy?`<button class="btn btn-secondary btn-sm" onclick="openTipPolicyModal()"><i class="ti ti-edit"></i> Policy編集</button>`:''}
  </div>`;

  // Policy表示
  html += `<div class="card"><div class="card-title"><i class="ti ti-file-text"></i>Tip Rate Policy</div>
    <div style="font-size:12px;color:var(--muted);white-space:pre-line;line-height:1.7">${getTipPolicy()}</div>
  </div>`;

  // 3段階の説明カード
  html += `<div class="card"><div class="card-title"><i class="ti ti-coin"></i>Tip Rate 区分</div>
    <div style="display:flex;gap:8px">${TIP_OPTIONS.map(o=>`<div class="kpi" style="flex:1;text-align:center"><div class="kpi-value" style="color:var(--accent)">${o}%</div></div>`).join('')}</div>
  </div>`;

  // 現在のTip Rate一覧（管理者向け: スタッフ全員のeffective rate）
  if (canApprove || canEditPolicy) {
    var storeId2 = curStore==='ALL'?null:curStore;
    var staffList = getEmployees().filter(e=>(e.role==='crew'||e.role==='sl') && e.status!=='退職' && (!storeId2 || e.store===storeId2 || (e.support||[]).includes(storeId2)));
    html += `<div class="card"><div class="card-title"><i class="ti ti-list-check"></i>スタッフ別 現在のTip Rate</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">初回勤務から3ヶ月経過で自動100%。それ以前は承認・No Tip期間で決定。</div>
      <div style="overflow-x:auto"><table class="inv-table" style="min-width:400px;font-size:12px"><thead><tr><th>スタッフ</th><th>店舗</th><th>初回勤務</th><th>Tip Rate</th></tr></thead><tbody>`;
    staffList.slice(0,60).forEach(e=>{
      var rate = effectiveTipRate(e.name);
      var auto = isThreeMonths(e);
      var col = rate===100?'var(--green)':rate===0?'var(--red)':'var(--accent)';
      html += `<tr><td>${e.name}</td><td style="color:var(--muted)">${(STORES.find(s=>s.id===e.store)||{name:e.store}).name}</td>
        <td style="color:var(--muted);font-size:11px">${firstWorkDate(e)?firstWorkDate(e).toLocaleDateString('ja'):'—'}</td>
        <td style="font-weight:700;color:${col}">${rate===0?'No Tip':rate+'%'}${auto?' <span class="tag tag-green" style="font-size:8px">自動</span>':''}</td></tr>`;
    });
    html += `</tbody></table></div></div>`;
  }

  // Crew/SL: 自己申請
  if (curRole === 'crew' || curRole === 'sl') {
    var myReq = requests.filter(r=>r.name===ROLE_CONFIG[curRole].name).slice(-1)[0];
    html += `<div class="card"><div class="card-title"><i class="ti ti-user"></i>自己申請</div>
      ${myReq?`<p style="font-size:13px;margin-bottom:8px">現在の申請: <span class="tag ${myReq.status==='承認'?'tag-green':myReq.status==='却下'?'tag-red':'tag-yellow'}">${myReq.rate}% · ${myReq.status}</span></p>`:''}
      <button class="btn btn-primary btn-sm" onclick="openTipRequestModal()"><i class="ti ti-send"></i> Tip Rate申請</button>
    </div>`;
  }

  // 承認待ち
  var pending = requests.filter(r=>r.status==='申請中');
  if (pending.length && canApprove) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clock" style="color:var(--yellow)"></i>承認待ち</div>`;
    pending.forEach(r => {
      html += `<div class="approval-item"><div class="approval-header"><div><div class="approval-title">${r.name}</div>
        <div class="approval-meta">申請 ${r.rate}%${r.reason?' · '+r.reason:''}</div></div><span class="tag tag-yellow">${r.rate}%</span></div>
        <div class="approval-actions">
          <button class="btn btn-success btn-sm" onclick="approveTip('${r.id}','承認')"><i class="ti ti-check"></i> 承認</button>
          <button class="btn btn-danger btn-sm" onclick="approveTip('${r.id}','却下')"><i class="ti ti-x"></i> 却下</button>
        </div></div>`;
    });
    html += '</div>';
  }

  // 履歴
  var history = requests.filter(r=>r.status!=='申請中');
  if (history.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>履歴</div>`;
    history.slice().reverse().slice(0,8).forEach(r => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${r.name} · ${r.rate}%</div>
        <span class="tag ${r.status==='承認'?'tag-green':'tag-red'}">${r.status}</span></div>
        <div class="approval-meta">${r.date}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function getDevStart(emp) {

  return emp.firstWork || emp.hireDate || '';
}
function setDevStart(name, date){ var d=ls('dev_start',{}); d[name]=date; lsSet('dev_start',d); }
function dev90Progress(emp) {
  var start = getDevStart(emp);
  if (!start) return {days:0, pct:0, endDate:'', start:''};
  var s = new Date(start+'T00:00:00');
  var end = new Date(s); end.setDate(end.getDate()+90);
  var now = new Date();
  var elapsed = Math.floor((now - s)/86400000);
  var pct = Math.max(0, Math.min(100, Math.round(elapsed/90*100)));
  return {days:elapsed, pct, endDate:end.toISOString().slice(0,10), start};
}

/* ===== D: キャリア育成・OJT・テスト・再教育 ===== */
/* ⑧ キャリア別スキル基準 / ⑨ OJT開始条件 */
const CAREER_CONFIG = {
  'Server Leader': {
    skills: ['Host','Server','Drink','Table Management','Customer Service','Opening / Closing','Training Support'],
    minTotal: 18,
    required: [{skill:'Server', lv:3},{skill:'Host', lv:2},{skill:'Drink', lv:2}],
    curriculum: ['接客基準','テーブル管理','新人Server教育','クレーム一次対応','Tip Rate向上','フロアコントロール'],
  },
  'Kitchen Leader': {
    skills: ['Prep','Main Kitchen Position','Quality Control','Food Safety','Order Management','Inventory Support','Closing Kitchen'],
    minTotal: 18,
    required: [{skill:'Main Kitchen Position', lv:3},{skill:'Prep', lv:2},{skill:'Quality Control', lv:2}],
    curriculum: ['品質管理','仕込み管理','衛生管理','オーダーコントロール','在庫管理','新人Kitchen教育'],
  },
  'Store Leader': {
    skills: ['Floor Control','Kitchen Understanding','Shift Control','Task Management','Customer Recovery','Opening / Closing Management','Team Direction','Daily Report'],
    minTotal: 24,
    required: [{skill:'Server', lv:3},{skill:'Kitchen Understanding', lv:2},{skill:'Closing', lv:3},{skill:'Team Direction', lv:2}],
    curriculum: ['店舗全体の指示出し','Daily Meeting','Opening / Closing管理','Task管理','売上・Labor・Food Costの基礎','チームビルディング','トラブル対応'],
  },
};
const OJT_STATUSES = ['Not Ready','Skill Level In Progress','OJT Ready','OJT Started','OJT Completed'];
/* キャリア育成データ: {career, skillLevels:{skill:lv}, ojtStatus, curriculum:{item:done}, tests:[{course,date,score,pass,understanding,retrain,comment}], retrain:[{item,reason,done}]} */
function getDevData(name){ var all=ls('dev_data',{}); return all[name]||{skillLevels:{},curriculum:{},tests:[],retrain:[]}; }
function setDevData(name, d){ var all=ls('dev_data',{}); all[name]=d; lsSet('dev_data',all); }
/* キャリアスキルのレベル取得（育成用に手動設定 or 既存スキルから流用） */
function careerSkillLv(name, skill) {
  var d = getDevData(name);
  if (d.skillLevels && d.skillLevels[skill]!=null) return d.skillLevels[skill];
  // 既存のポジションスキルから流用（同名）
  var sk = getEmpSkills(name);
  if (sk[skill] && sk[skill].status==='承認') return sk[skill].level||0;
  return 0;
}
function setCareerSkillLv(name, skill, lv) {
  var d = getDevData(name); if(!d.skillLevels)d.skillLevels={};
  d.skillLevels[skill]=lv; setDevData(name,d);
}
/* スキル合計点 */
function careerSkillTotal(name, career) {
  var cfg = CAREER_CONFIG[career]; if(!cfg) return 0;
  return cfg.skills.reduce((a,s)=>a+careerSkillLv(name,s),0);
}
/* OJT開始判定 */
function ojtReadiness(name, career) {
  var cfg = CAREER_CONFIG[career];
  if (!cfg) return {ready:false, total:0, minTotal:0, reqMet:[], reqMiss:[]};
  var total = careerSkillTotal(name, career);
  var reqMet=[], reqMiss=[];
  cfg.required.forEach(r=>{
    var lv = careerSkillLv(name, r.skill);
    if (lv>=r.lv) reqMet.push(r); else reqMiss.push(Object.assign({cur:lv},r));
  });
  var ready = total>=cfg.minTotal && reqMiss.length===0;
  return {ready, total, minTotal:cfg.minTotal, reqMet, reqMiss};
}
function getOjtStatus(name, career) {
  var d = getDevData(name);
  if (d.ojtStatus) return d.ojtStatus;
  var r = ojtReadiness(name, career);
  if (r.ready) return 'OJT Ready';
  if (r.total>0) return 'Skill Level In Progress';
  return 'Not Ready';
}
function startOjt(name) {
  var d=getDevData(name); d.ojtStatus='OJT Started'; setDevData(name,d);
  showToast('OJTプログラムを開始しました','success'); renderPage('growth_mgr');
}
function completeOjt(name) {
  var d=getDevData(name); d.ojtStatus='OJT Completed'; setDevData(name,d);
  showToast('OJT完了！','success'); renderPage('growth_mgr');
}
/* ⑩ カリキュラム進捗 */
function toggleCurriculum(name, item) {
  var d=getDevData(name); if(!d.curriculum)d.curriculum={};
  d.curriculum[item]=!d.curriculum[item]; setDevData(name,d);
  renderPage('growth_mgr');
}
function curriculumProgress(name, career) {
  var cfg=CAREER_CONFIG[career]; if(!cfg)return {done:0,total:0,pct:0};
  var d=getDevData(name); var done=cfg.curriculum.filter(c=>d.curriculum&&d.curriculum[c]).length;
  return {done, total:cfg.curriculum.length, pct:cfg.curriculum.length?Math.round(done/cfg.curriculum.length*100):0};
}
/* ⑪ テスト */
function openTestModal(name, course) {
  openModal(`<div class="modal-title">テスト記録 — ${course} <button class="modal-close" onclick="closeModalDirect()">×</button></div>

      <div class="form-group"><label class="form-label">点数 (%)</label><input class="form-input" id="ts-score" type="number" min="0" max="100" placeholder="80"></div>
    </div>
    <div class="form-group"><label class="form-label">理解度</label>
      <select class="form-select" id="ts-understanding"><option>高い</option><option>普通</option><option>低い</option></select></div>
    <div class="form-group"><label class="form-label">担当者コメント</label><textarea class="form-textarea" id="ts-comment"></textarea></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">合格基準80%。不合格または理解度が低い場合は再教育タスクが自動作成されます。</div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveTest('${name}','${course}')">記録</button></div>`);
}
function saveTest(name, course) {
  var score=parseInt(document.getElementById('ts-score').value)||0;
  var understanding=document.getElementById('ts-understanding').value;
  var pass=score>=80;
  var retrain=!pass || understanding==='低い';
  var rec={course, date:document.getElementById('ts-date').value, score, pass, understanding,
    retrain, comment:document.getElementById('ts-comment').value.trim()};
  var d=getDevData(name); if(!d.tests)d.tests=[]; d.tests.push(rec);
  // ⑫ 再教育タスク自動作成
  if (retrain) {
    if(!d.retrain)d.retrain=[];
    d.retrain.push({item:course, reason:!pass?`テスト不合格(${score}%)`:'理解度が低い', done:false, date:rec.date});
  }
  setDevData(name,d);
  closeModalDirect();
  showToast(pass?(retrain?'合格だが理解度不足→再教育作成':'合格しました'):'不合格→再教育タスク作成','info');
  renderPage('growth_mgr');
}
/* ⑫ 再教育 */
function completeRetrain(name, idx) {
  var d=getDevData(name); if(d.retrain&&d.retrain[idx]){d.retrain[idx].done=true; setDevData(name,d);}
  showToast('再教育を完了にしました。再テストを実施してください','success');
  renderPage('growth_mgr');
}

function setCareerTrack(name, track){ var d=ls('career_track',{}); d[name]=track; lsSet('career_track',d); renderPage('growth_mgr'); }
const CAREER_TRACKS = ['Server Leader','Kitchen Leader','Store Leader'];

  if (!prog.start) {
    html += `<p style="font-size:12px;color:var(--muted);margin-bottom:8px">育成開始日が未設定です。初回勤務日または登用日を設定してください。</p>
      <button class="btn btn-primary btn-sm" onclick="promptDevStart('${name}')"><i class="ti ti-calendar-plus"></i> 育成開始日を設定</button>`;
  } else {
    var col = prog.pct>=100?'var(--green)':'var(--accent)';
    html += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px">
      <span>開始 ${prog.start}</span><span>終了予定 ${prog.endDate}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="background:${col};width:${prog.pct}%"></div></div>
      <div style="text-align:center;font-size:20px;font-weight:800;color:${col};margin-top:6px">${prog.pct}%<span style="font-size:12px;color:var(--muted)"> · ${prog.days}日経過</span></div>
      <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="promptDevStart('${name}')"><i class="ti ti-edit"></i> 開始日変更</button>`;
  }
  html += `</div>`;

  // キャリアトラック選択
  html += `<div class="card"><div class="card-title"><i class="ti ti-route"></i>キャリアトラック</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${CAREER_TRACKS.map(t=>`<button class="btn ${career===t?'btn-primary':'btn-secondary'} btn-sm" onclick="setCareerTrack('${name}','${t}')">${t}</button>`).join('')}
    </div>
    ${career?`<div style="font-size:11px;color:var(--muted);margin-top:6px">必要スキル基準・OJT判定・カリキュラム・テストが下に表示されます。</div>`:'<div style="font-size:11px;color:var(--muted);margin-top:6px">トラックを選択してください。</div>'}
  </div>`;

  // 現状スキルサマリー
  var ap = approvedPositions(name);
  var sk = getEmpSkills(name);
  var skillPoints = Object.values(sk).filter(x=>x.status==='承認').reduce((a,x)=>a+(x.level||0),0);
  html += `<div class="card"><div class="card-title"><i class="ti ti-stairs-up"></i>現場スキル状況</div>
    <div class="kpi-grid">
      ${kpi('対応ポジション', ap.length, '承認済み', 'var(--accent2)')}
      ${kpi('スキル合計点', skillPoints, 'Lv合計', 'var(--tm)')}
      ${kpi('Tip Rate', (typeof effectiveTipRate==='function'?effectiveTipRate(name):0)+'%', '', 'var(--green)')}
    </div>
  </div>`;

  if (!career) {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:20px"><i class="ti ti-route" style="font-size:28px"></i><div style="margin-top:6px;font-size:13px">キャリアトラックを選択すると、必要スキル基準・OJT判定・カリキュラム・テストが表示されます。</div></div>`;
    return html;
  }

  var cfg = CAREER_CONFIG[career];
  var read = ojtReadiness(name, career);
  var ojtStatus = getOjtStatus(name, career);
  var statusColors = {'Not Ready':'tag-gray','Skill Level In Progress':'tag-yellow','OJT Ready':'tag-blue','OJT Started':'tag-orange','OJT Completed':'tag-green'};

  // ⑧⑨ 必要スキル基準 + OJT判定
  html += `<div class="card"><div class="card-title"><i class="ti ti-target"></i>必要スキル基準（${career}）
    <span class="tag ${statusColors[ojtStatus]||'tag-gray'}" style="margin-left:auto">${ojtStatus}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
      <span>スキル合計</span><span style="font-weight:700;color:${read.total>=read.minTotal?'var(--green)':'var(--yellow)'}">${read.total} / ${read.minTotal}点</span>
    </div>
    <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="background:${read.total>=read.minTotal?'var(--green)':'var(--yellow)'};width:${Math.min(read.total/read.minTotal*100,100)}%"></div></div>`;

  // 必須項目
  html += `<div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px">必須項目</div>`;
  cfg.required.forEach(r=>{
    var lv=careerSkillLv(name, r.skill); var ok=lv>=r.lv;
    html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0">
      <span>${ok?'✅':'⬜'} ${r.skill} Lv${r.lv}以上</span><span style="color:${ok?'var(--green)':'var(--muted)'}">現在 Lv${lv}</span></div>`;
  });

  // 各スキルのレベル設定
  html += `<div style="font-size:11px;font-weight:600;color:var(--muted);margin:8px 0 4px">スキルレベル設定</div>`;
  cfg.skills.forEach(s=>{
    var lv=careerSkillLv(name,s);
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0">
      <span style="font-size:12px">${s}</span>
      <div style="display:flex;gap:3px">${[0,1,2,3].map(n=>`<button onclick="setCareerSkillLv('${name}','${s.replace(/'/g,"")}',${n});renderPage('growth_mgr')" style="width:24px;height:24px;border-radius:5px;border:1px solid var(--border);font-size:10px;cursor:pointer;background:${lv===n?'var(--accent)':'var(--surface)'};color:${lv===n?'#fff':'var(--muted)'}">${n}</button>`).join('')}</div>
    </div>`;
  });

  // OJT開始ボタン
  if (ojtStatus==='OJT Ready') {
    html += `<button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="startOjt('${name}')"><i class="ti ti-player-play"></i> OJTプログラム開始</button>`;
  } else if (ojtStatus==='Skill Level In Progress' || ojtStatus==='Not Ready') {
    html += `<div class="alert alert-warning" style="margin-top:10px;padding:8px 10px;font-size:12px"><i class="ti ti-lock"></i> スキル基準未達のためOJT開始不可（${read.reqMiss.length?'必須未達: '+read.reqMiss.map(r=>r.skill).join(', '):'合計点不足'}）</div>`;
  }
  html += `</div>`;

  // ⑩ カリキュラム（OJT開始後）
  if (ojtStatus==='OJT Started' || ojtStatus==='OJT Completed') {
    var cp = curriculumProgress(name, career);
    html += `<div class="card"><div class="card-title"><i class="ti ti-list-check"></i>${career} カリキュラム <span class="tag ${cp.pct>=100?'tag-green':'tag-yellow'}" style="margin-left:auto">${cp.done}/${cp.total}</span></div>`;
    var d=getDevData(name);
    cfg.curriculum.forEach(item=>{
      var done=d.curriculum&&d.curriculum[item];
      var test=(d.tests||[]).filter(t=>t.course===item).slice(-1)[0];
      html += `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px">
          <div onclick="toggleCurriculum('${name}','${item.replace(/'/g,"")}')" style="width:20px;height:20px;border-radius:5px;border:2px solid ${done?'var(--green)':'var(--border)'};background:${done?'var(--green)':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center">${done?'<i class="ti ti-check" style="color:#fff;font-size:12px"></i>':''}</div>
          <span style="flex:1;font-size:13px;${done?'text-decoration:line-through;color:var(--muted)':''}">${item}</span>
          ${test?`<span class="tag ${test.pass?'tag-green':'tag-red'}" style="font-size:9px">${test.score}%</span>`:''}
          <button class="btn btn-secondary btn-sm" style="padding:1px 8px;font-size:10px" onclick="openTestModal('${name}','${item.replace(/'/g,"")}')">テスト</button>
        </div>
      </div>`;
    });
    if (ojtStatus==='OJT Started' && cp.pct>=100) {
      html += `<button class="btn btn-success" style="width:100%;margin-top:10px" onclick="completeOjt('${name}')"><i class="ti ti-circle-check"></i> OJT完了にする</button>`;
    }
    html += `</div>`;
  }

  // ⑪ テスト履歴
  var d2=getDevData(name);
  if (d2.tests && d2.tests.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clipboard-check"></i>テスト結果</div>`;
    d2.tests.slice().reverse().forEach(t=>{
      html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
        <span>${t.date} · ${t.course}</span>
        <span><span class="tag ${t.pass?'tag-green':'tag-red'}" style="font-size:9px">${t.pass?'合格':'不合格'} ${t.score}%</span> 理解度:${t.understanding}</span></div>`;
    });
    html += `</div>`;
  }

  // ⑫ 再教育タスク
  if (d2.retrain && d2.retrain.filter(r=>!r.done).length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-refresh-alert" style="color:var(--red)"></i>再教育タスク</div>`;
    d2.retrain.forEach((r,i)=>{
      if (r.done) return;
      html += `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:13px;font-weight:600">${r.item}</div><div style="font-size:11px;color:var(--red)">${r.reason}</div></div>
          <button class="btn btn-success btn-sm" onclick="completeRetrain('${name}',${i})">再教育完了</button>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">現場で再教育 → 再評価 → 再テストで合格すれば次へ</div>
      </div>`;
    });
    html += `</div>`;
  }

  // ⑬ 次にやるべきこと
  var nextAction = '';
  if (ojtStatus==='Not Ready'||ojtStatus==='Skill Level In Progress') nextAction = 'スキルレベルを上げてOJT基準を満たす';
  else if (ojtStatus==='OJT Ready') nextAction = 'OJTプログラムを開始する';
  else if (ojtStatus==='OJT Started') {
    var rt=(d2.retrain||[]).filter(r=>!r.done);
    if (rt.length) nextAction = '再教育: '+rt.map(r=>r.item).join(', ');
    else { var cp2=curriculumProgress(name,career); nextAction = cp2.pct>=100?'OJT完了にする':'カリキュラムを進める（残'+(cp2.total-cp2.done)+'項目）'; }
  } else if (ojtStatus==='OJT Completed') nextAction = 'Leader登用を検討（GM承認）';
  html += `<div class="card" style="border-left:3px solid var(--accent)"><div style="font-size:11px;color:var(--muted)">次にやるべきこと</div><div style="font-size:14px;font-weight:600;margin-top:2px">${nextAction}</div></div>`;

  return html;
}
function promptDevStart(name) {
  var cur = getCareerTrack(name);
  var emp = getEmployees().find(e=>e.name===name)||{};
  var def = getDevStart(emp) || new Date().toISOString().slice(0,10);
  var d = prompt('育成開始日（YYYY-MM-DD）を入力', def);
  if (!d) return;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) { alert('YYYY-MM-DD形式で入力してください'); return; }
  setDevStart(name, d);
  showToast('育成開始日を設定しました','success');
  renderPage('growth_mgr');
}
function growthMgrOpen(name) { growthMgrSel = name; renderPage('growth_mgr'); }
function growthMgrBack() { growthMgrSel = null; renderPage('growth_mgr'); }


/* ============================================================
   Skill Level (Crew自己申請 → 管理者承認/差戻し → フィードバック)
   ステータス: 申請中/確認中/承認/差戻し/再評価待ち/完了
============================================================ */
function getSkillRequests() { return ls('skill_requests', []); }
function setSkillRequests(r) { lsSet('skill_requests', r); }

function renderSkill() {
  if (curRole==='crew' || (curRole==='sl' && curStore!=='ALL')) {
    // 本人ビュー（SLも自分のスキルを申請できる）
    return renderSkillSelf();
  }
  return renderSkillManager();
}

/* ---- Crew本人ビュー ---- */
function renderSkillSelf() {
  var me = ROLE_CONFIG[curRole].name;
  var emp = getEmployees().find(e=>e.name===me);
  var storeId = emp ? emp.store : (curStore==='ALL'?STORES[0].id:curStore);
  if (storeId==='ALL') storeId = STORES[0].id;
  var positions = getStorePositions(storeId);
  var sk = getEmpSkills(me);
  var reqs = getSkillRequests().filter(r=>r.name===me);

  var html = `<div class="section-header"><div><div class="section-title">Skill Level</div><div class="section-sub">自己評価申請 → 管理者承認</div></div></div>`;

  // 現在のスキル状況
  html += `<div class="card"><div class="card-title"><i class="ti ti-stairs-up"></i>現在のSkill Level</div>`;
  positions.forEach(p => {
    var s = sk[p] || {level:0, status:'未取得'};
    var crit = skillCriteria(p);
    var lvLabel = 'Lv'+(s.level||0);
    var col = s.status==='承認'?'tag-green':s.status==='申請中'||s.status==='確認中'?'tag-yellow':s.status==='差戻し'?'tag-red':'tag-gray';
    html += `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><span style="font-size:13px;font-weight:600">${p}</span>
          ${s.status==='承認'?`<span style="font-size:11px;color:var(--green)"> · ${lvLabel}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="tag ${col}">${s.status}</span>
          <button class="btn btn-secondary btn-sm" style="padding:1px 7px;font-size:10px" onclick="showCriteria('${p.replace(/'/g,'')}')">基準</button>
          ${(s.status==='未取得'||s.status==='差戻し'||s.status==='承認')?`<button class="btn btn-secondary btn-sm" onclick="openSkillRequestModal('${p.replace(/'/g,'')}')">申請</button>`:''}
        </div>
      </div>
      ${s.status==='承認'&&s.level>=0?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${crit[s.level]||''}</div>`:''}
      ${s.mgrComment&&s.status!=='承認'?`<div style="font-size:11px;color:var(--muted);margin-top:3px">管理者: ${s.mgrComment}</div>`:''}
      ${s.nextTask?`<div style="font-size:11px;color:var(--accent2);margin-top:2px">次の課題: ${s.nextTask}</div>`:''}
    </div>`;
  });
  html += '</div>';

  // 対応可能ポジション
  var ap = approvedPositions(me);
  html += `<div class="card"><div class="card-title"><i class="ti ti-checkbox"></i>対応可能ポジション (${ap.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${ap.length?ap.map(p=>`<span class="tag tag-green">${p}</span>`).join(''):'<span style="color:var(--muted);font-size:13px">承認済みポジションなし</span>'}</div>
    ${ap.length<positions.length?`<div style="font-size:11px;color:var(--accent2);margin-top:8px">次に覚えるべき: ${positions.filter(p=>!ap.includes(p)).slice(0,3).join(', ')}</div>`:''}
  </div>`;

  // 申請履歴
  if (reqs.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>申請履歴</div>`;
    reqs.slice().reverse().forEach(r => {
      var col = r.status==='承認'?'tag-green':r.status==='差戻し'?'tag-red':'tag-yellow';
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${r.position} 申請</div><span class="tag ${col}">${r.status}</span></div>
        <div class="approval-meta">${r.date} · ${r.selfComment||''}</div>
        ${r.mgrComment?`<div style="font-size:11px;color:var(--muted);margin-top:4px">管理者コメント: ${r.mgrComment}</div>`:''}</div>`;
    });
    html += '</div>';
  }
  return html;
}

function showCriteria(position) {
  var crit = skillCriteria(position);
  var html = `<div class="modal-title">${position} スキル基準 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div style="font-size:13px">`;
  [0,1,2,3].forEach(lv=>{
    var col = lv===0?'var(--muted)':lv===3?'var(--accent)':'var(--tm)';
    html += `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <span class="tag ${lv===3?'tag-orange':'tag-gray'}" style="font-size:10px">Lv${lv}</span>
      <span style="color:${col};margin-left:6px">${crit[lv]||'—'}</span></div>`;
  });
  html += `</div><div class="btn-row"><button class="btn btn-primary" onclick="closeModalDirect()">閉じる</button></div>`;
  openModal(html);
}
function openSkillRequestModal(position) {
  var crit = skillCriteria(position);
  openModal(`<div class="modal-title">${position} スキル申請 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">「できるようになったこと」を申請してください。管理者が実務確認して承認します。</p>
    <div class="form-group"><label class="form-label">希望レベル</label>
      <select class="form-select" id="sk-level" onchange="document.getElementById('sk-crit').textContent=this.options[this.selectedIndex].dataset.crit">
        <option value="1" data-crit="${(crit[1]||'').replace(/"/g,'')}">Lv1 — サポートがあればできる</option>
        <option value="2" data-crit="${(crit[2]||'').replace(/"/g,'')}">Lv2 — 一人でできる</option>
        <option value="3" data-crit="${(crit[3]||'').replace(/"/g,'')}">Lv3 — 教えられる・リーダー</option>
      </select>
      <div id="sk-crit" style="font-size:11px;color:var(--accent2);margin-top:6px">${(crit[1]||'').replace(/"/g,'')}</div>
    </div>
    <div class="form-group"><label class="form-label">自己評価コメント</label><textarea class="form-textarea" id="sk-comment" placeholder="例: Closing作業を一人で完了できるようになりました"></textarea></div>
    <div class="form-group"><label class="form-label">メモ・証拠（任意）</label><input class="form-input" id="sk-evidence" placeholder="例: 5/20 Closing単独実施"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="submitSkillRequest('${position}')">申請提出</button></div>`);
}
function submitSkillRequest(position) {
  var me = ROLE_CONFIG[curRole].name;
  var emp = getEmployees().find(e=>e.name===me);
  var level = parseInt(document.getElementById('sk-level').value);
  var comment = document.getElementById('sk-comment').value.trim();
  if (!comment) { alert('自己評価コメントを入力してください'); return; }
  var reqs = getSkillRequests();
  reqs.push({id:'sr'+Date.now(), name:me, store:emp?emp.store:'', position, level,
    selfComment:comment, evidence:document.getElementById('sk-evidence').value.trim(),
    status:'申請中', mgrComment:'', nextTask:'', date:new Date().toLocaleDateString('ja')});
  setSkillRequests(reqs);
  // スキル状態を申請中に
  var all = getSkills(); if(!all[me]) all[me]={};
  all[me][position] = Object.assign(all[me][position]||{level:0}, {status:'申請中', selfComment:comment});
  setSkills(all);
  addApproval({title:`${me} スキル申請 (${position})`, type:'スキル', from:me, store:(STORES.find(s=>s.id===(emp?emp.store:''))||{name:''}).name});
  closeModalDirect();
  showToast('スキルを申請しました', 'success');
  renderPage('skill');
}

/* ---- 管理者ビュー ---- */
function renderSkillManager() {
  var reqs = getSkillRequests();
  var scope = visibleStaffForManager().map(e=>e.name);
  var pending = reqs.filter(r=>['申請中','確認中','再評価待ち'].includes(r.status) && scope.includes(r.name));
  var done = reqs.filter(r=>['承認','差戻し','完了'].includes(r.status) && scope.includes(r.name));

  var html = `<div class="section-header"><div><div class="section-title">Skill Level 承認</div><div class="section-sub">スタッフのスキル申請を評価</div></div>
    ${curRole==='gm'||curRole==='ceo'?`<button class="btn btn-secondary btn-sm" onclick="openPositionConfigModal()"><i class="ti ti-settings"></i> ポジション設定</button>`:''}
  </div>`;

  if (pending.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clock" style="color:var(--yellow)"></i>承認待ち (${pending.length})</div>`;
    pending.forEach(r => {
      var crit = skillCriteria(r.position);
      html += `<div class="approval-item">
        <div class="approval-header"><div><div class="approval-title">${r.name} · ${r.position} Lv${r.level}</div>
        <div class="approval-meta">${r.date} · ${(STORES.find(s=>s.id===r.store)||{name:''}).name}</div></div><span class="tag tag-yellow">${r.status}</span></div>
        <div style="font-size:11px;color:var(--accent2);margin-top:4px">Lv${r.level}基準: ${crit[r.level]||''}</div>
        <div style="font-size:12px;margin-top:6px">自己評価: ${r.selfComment}</div>
        ${r.evidence?`<div style="font-size:11px;color:var(--muted)">証拠: ${r.evidence}</div>`:''}
        <div class="approval-actions">
          <button class="btn btn-success btn-sm" onclick="openSkillReviewModal('${r.id}','承認')"><i class="ti ti-check"></i> 承認</button>
          <button class="btn btn-danger btn-sm" onclick="openSkillReviewModal('${r.id}','差戻し')"><i class="ti ti-arrow-back"></i> 差戻し</button>
        </div></div>`;
    });
    html += '</div>';
  } else {
    html += `<div class="alert alert-success"><i class="ti ti-circle-check"></i>承認待ちのスキル申請はありません</div>`;
  }

  // スタッフ別スキルマトリクス（店舗ポジション基準）
  var mgrStoreId = curStore==='ALL'?null:curStore;
  var matrixPos = mgrStoreId ? getStorePositions(mgrStoreId) : ALL_POSITIONS;
  html += `<div class="card"><div class="card-title"><i class="ti ti-table"></i>スキルマトリクス</div>
    <div style="overflow-x:auto"><table class="inv-table" style="min-width:500px"><thead><tr><th>スタッフ</th>${matrixPos.map(p=>`<th style="font-size:10px">${p.slice(0,5)}</th>`).join('')}</tr></thead><tbody>`;
  visibleStaffForManager().filter(e=>['sl','crew'].includes(e.role)).forEach(e => {
    var sk = getEmpSkills(e.name);
    html += `<tr><td style="font-weight:600;font-size:12px">${e.name}</td>${matrixPos.map(p=>{
      var s=sk[p]; var v=s&&s.status==='承認'?s.level:0;
      var bg=v>=3?'var(--accent)':v===2?'var(--green)':v===1?'var(--yellow)':'transparent';
      return `<td style="text-align:center;color:${v?'#fff':'var(--muted)'};background:${bg};border-radius:4px">${v||'-'}</td>`;
    }).join('')}</tr>`;
  });
  html += '</tbody></table></div><div style="font-size:11px;color:var(--muted);margin-top:6px">Lv1:サポート有 / Lv2:独力 / Lv3:指導可（オレンジ）</div></div>';

  if (done.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>評価履歴</div>`;
    done.slice().reverse().slice(0,8).forEach(r => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${r.name} · ${r.position}</div>
        <span class="tag ${r.status==='承認'?'tag-green':'tag-red'}">${r.status}</span></div>
        <div class="approval-meta">${r.date}${r.mgrComment?' · '+r.mgrComment:''}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function openSkillReviewModal(reqId, action) {
  var r = getSkillRequests().find(x=>x.id===reqId);
  if (!r) return;
  openModal(`<div class="modal-title">${r.name} · ${r.position} を${action} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">自己評価: ${r.selfComment}</div>
    ${action==='承認'?`<div class="form-group"><label class="form-label">承認レベル</label>
      <select class="form-select" id="rv-level"><option value="1"${r.level===1?' selected':''}>Lv1（サポート有）</option><option value="2"${r.level===2?' selected':''}>Lv2（独力）</option><option value="3"${r.level===3?' selected':''}>Lv3（指導可・リーダー）</option></select></div>`:''}
    <div class="form-group"><label class="form-label">フィードバック（成長を促すコメント）</label>
      <textarea class="form-textarea" id="rv-comment" placeholder="${action==='承認'?'例: 接客が安定。次はUpsellを意識しましょう':'例: もう少し練習が必要です。再申請してください'}"></textarea></div>
    <div class="form-group"><label class="form-label">次の課題</label><input class="form-input" id="rv-task" placeholder="例: Closingを安定してできるように"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn ${action==='承認'?'btn-success':'btn-danger'}" onclick="submitSkillReview('${reqId}','${action}')">${action}確定</button></div>`);
}
function submitSkillReview(reqId, action) {
  var reqs = getSkillRequests();
  var r = reqs.find(x=>x.id===reqId);
  if (!r) return;
  var comment = document.getElementById('rv-comment').value.trim();
  var task = document.getElementById('rv-task').value.trim();
  r.status = action; r.mgrComment = comment; r.nextTask = task; r.reviewer = ROLE_CONFIG[curRole].name;
  setSkillRequests(reqs);
  // スキル状態反映
  var all = getSkills(); if(!all[r.name]) all[r.name]={};
  if (action==='承認') {
    var lv = parseInt(document.getElementById('rv-level').value);
    all[r.name][r.position] = {level:lv, status:'承認', selfComment:r.selfComment, mgrComment:comment, nextTask:task, date:r.date};
  } else {
    all[r.name][r.position] = Object.assign(all[r.name][r.position]||{level:0}, {status:'差戻し', mgrComment:comment, nextTask:task});
  }
  setSkills(all);
  closeModalDirect();
  showToast(`${r.position}を${action}しました`, action==='承認'?'success':'danger');
  renderPage('skill');
}

function openPositionConfigModal() {
  var sid = curStore==='ALL'?STORES[0].id:curStore;
  var current = getStorePositions(sid);
  var s = STORES.find(x=>x.id===sid)||{name:sid};
  openModal(`<div class="modal-title">${s.name} ポジション設定 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">この店舗で使用するポジションを選択</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${ALL_POSITIONS.map(p=>`<label style="display:flex;align-items:center;gap:5px;font-size:13px;background:var(--surface2);padding:6px 10px;border-radius:6px;cursor:pointer">
        <input type="checkbox" class="pos-chk" value="${p}" ${current.includes(p)?'checked':''}> ${p}</label>`).join('')}
    </div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="savePositionConfig('${sid}')">保存</button></div>`);
}
function savePositionConfig(storeId) {
  var checked = Array.from(document.querySelectorAll('.pos-chk:checked')).map(c=>c.value);
  setStorePositions(storeId, checked);
  closeModalDirect();
  showToast('ポジション設定を保存しました', 'success');
  renderPage('skill');
}

/* ============================================================
   店舗マスター (active切替・新店追加・Toast GUID等)
============================================================ */
function renderStoreMaster() {
  var stores = getStoresAll();
  var activeCount = stores.filter(s=>s.active).length;
  var html = `<div class="section-header">
    <div><div class="section-title">店舗マスター</div><div class="section-sub">稼働中 ${activeCount} / 全 ${stores.length}店舗</div></div>
    <button class="btn btn-primary btn-sm" onclick="openStoreModal()"><i class="ti ti-plus"></i> 店舗追加</button>
  </div>
  <div class="alert ${activeCount<=2?'alert-success':'alert-warning'}" style="padding:8px 12px">
    <i class="ti ti-info-circle"></i><div style="font-size:12px">プロトタイプは稼働中店舗のみ操作対象になります。activeを切り替えて段階展開できます。</div></div>`;

  stores.forEach(s => {
    html += `<div class="card">
      <div class="approval-header">
        <div class="card-title" style="color:${s.color};margin:0"><span class="store-dot" style="background:${s.color}"></span>${s.name}
          <span class="tag tag-gray" style="font-size:9px">${s.brand}</span></div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
          <input type="checkbox" ${s.active?'checked':''} onchange="toggleStoreActive('${s.id}')"> ${s.active?'<span style="color:var(--green)">稼働中</span>':'<span style="color:var(--muted)">準備中</span>'}
        </label>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">
        ${s.hours} · ${s.days} ${s.toastGuid?'· Toast: '+s.toastGuid.slice(0,8)+'...':'· Toast未設定'}
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px">
        <i class="ti ti-lock" style="font-size:13px"></i>店舗ログインPIN: <span style="font-family:monospace;letter-spacing:2px;color:var(--tm)">${getStorePin(s.id)}</span>
        <button class="btn btn-secondary btn-sm" style="padding:1px 8px;font-size:10px" onclick="editStorePin('${s.id}','${s.name}')">変更</button>
      </div>
      <div class="approval-actions">
        <button class="btn btn-secondary btn-sm" onclick="openStoreModal('${s.id}')"><i class="ti ti-edit"></i> 編集</button>
      </div>
    </div>`;
  });
  return html;
}

function editStorePin(storeId, name) {
  var cur = getStorePin(storeId);
  var pin = prompt(name + ' の店舗ログインPIN（4〜6桁）を入力', cur);
  if (pin == null) return;
  pin = pin.trim();
  if (!/^\d{4,6}$/.test(pin)) { alert('PINは4〜6桁の数字で入力してください'); return; }
  setStorePin(storeId, pin);
  showToast(name + ' のPINを更新しました', 'success');
  renderPage('store_master');
}

function toggleStoreActive(storeId) {
  var stores = getStoresAll();
  var s = stores.find(x=>x.id===storeId);
  if (s) {
    var activeCount = stores.filter(x=>x.active).length;
    if (s.active && activeCount<=1) { alert('最低1店舗は稼働中にしてください'); renderPage('store_master'); return; }
    s.active = !s.active;
    setStoresAll(stores);
    showToast(`${s.name}を${s.active?'稼働中':'準備中'}にしました`, s.active?'success':'info');
    renderPage('store_master');
  }
}

function openStoreModal(storeId) {
  var stores = getStoresAll();
  var s = storeId ? stores.find(x=>x.id===storeId) : {id:'', name:'', brand:'', color:'#888', toastGuid:'', hours:'11:00-22:00', days:'毎日', active:false};
  var isNew = !storeId;
  openModal(`<div class="modal-title">${isNew?'店舗追加':'店舗編集'} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">店舗名</label><input class="form-input" id="st-name" value="${s.name}" placeholder="店舗名"></div>
      <div class="form-group"><label class="form-label">ブランド</label><input class="form-input" id="st-brand" value="${s.brand||''}" placeholder="Totoya等"></div>
    </div>
    ${isNew?`<div class="form-group"><label class="form-label">店舗ID</label><input class="form-input" id="st-id" placeholder="例: F06"></div>`:''}
    <div class="form-group"><label class="form-label">Toast Restaurant GUID</label><input class="form-input" id="st-toast" value="${s.toastGuid||''}" placeholder="Toast連携用ID（任意）"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">営業時間</label><input class="form-input" id="st-hours" value="${s.hours||''}" placeholder="11:00-22:00"></div>
      <div class="form-group"><label class="form-label">営業日</label><input class="form-input" id="st-days" value="${s.days||''}" placeholder="毎日 / 火-日"></div>
    </div>
    <div class="form-group"><label class="form-label">カラー</label><input class="form-input" id="st-color" type="color" value="${s.color}" style="height:40px"></div>
    <div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" id="st-active" ${s.active?'checked':''}> 稼働中（プロトタイプ対象にする）</label></div>
    ${!isNew?`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">※ 追加後の設定（スタッフ紐付け・業者・Daily Ops・Required・ポジション・Skill）は各マスター画面で行えます</div>`:''}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveStore('${storeId||''}')">${isNew?'追加':'保存'}</button>
    </div>`);
}

function saveStore(storeId) {
  var name = document.getElementById('st-name').value.trim();
  if (!name) { alert('店舗名を入力してください'); return; }
  var data = {
    name, brand: document.getElementById('st-brand').value.trim()||name,
    toastGuid: document.getElementById('st-toast').value.trim(),
    hours: document.getElementById('st-hours').value.trim(),
    days: document.getElementById('st-days').value.trim(),
    color: document.getElementById('st-color').value,
    active: document.getElementById('st-active').checked,
  };
  var stores = getStoresAll();
  if (storeId) {
    var s = stores.find(x=>x.id===storeId);
    if (s) Object.assign(s, data);
  } else {
    var id = document.getElementById('st-id').value.trim() || ('F'+Date.now().toString().slice(-4));
    if (stores.find(x=>x.id===id)) { alert('そのIDは既に存在します'); return; }
    data.id = id; data.am = '';
    stores.push(data);
    // 新店舗のポジション初期化
    setStorePositions(id, ALL_POSITIONS);
  }
  setStoresAll(stores);
  closeModalDirect();
  showToast(storeId?'店舗を更新しました':'店舗を追加しました', 'success');
  renderPage('store_master');
}

/* ============================================================
   MODAL
============================================================ */
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

/* ============================================================
   TOAST
============================================================ */
function showToast(msg, type) {
  var el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:opacity .3s;color:#fff;background:${type==='success'?'#10b981':type==='danger'?'#ef4444':'#3b82f6'}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2200);
}
</script>
