/* Step10: リスク分析 */
function renderRiskAnalysis(storeId, week, plan, hoursByName) {
  var cells = plan.cells || {};
  var assigned = Object.keys(cells).filter(k=>cells[k]);
  if (!assigned.length) return '';
  var emps = getEmployees();
  var names = [...new Set(assigned.map(k=>cells[k]))];

  // 1. Lv3不足リスク（Lv3保持者の人数）
  var lv3Count = names.filter(n=>isLv3Anywhere(n)).length;
  // 2. 新人比率
  var trainees = names.filter(n=>{var e=emps.find(x=>x.name===n);return e&&isTraining(e);});
  var newRatio = names.length ? Math.round(trainees.length/names.length*100) : 0;
  // 3. Closingリスク（各日のDinner枠にLeaderがいるか）
  var closingRisk = 0;
  DOW_SHIFT.forEach(day=>{
    var dinnerKeys = assigned.filter(k=>k.startsWith(day+'_Dinner_'));
    if (dinnerKeys.length) {
      var hasLeader = dinnerKeys.some(k=>leaderSkillApproved(cells[k]));
      if (!hasLeader) closingRisk++;
    }
  });
  // 4. 当欠リスク（1人に依存している枠数。同枠に代替候補がいない）
  var singlePointDays = 0;
  DOW_SHIFT.forEach(day=>{
    SHIFT_PERIODS.forEach(period=>{
      var slotNames = assigned.filter(k=>k.startsWith(day+'_'+period+'_')).map(k=>cells[k]);
      if (slotNames.length===1) singlePointDays++;
    });
  });
  // 5. 過重労働リスク（40h超）
  var overWork = Object.keys(hoursByName).filter(n=>hoursByName[n]>40).length;

  function riskRow(label, value, level, detail) {
    var col = level==='high'?'var(--red)':level==='mid'?'var(--yellow)':'var(--green)';
    var icon = level==='high'?'ti-alert-octagon':level==='mid'?'ti-alert-triangle':'ti-circle-check';
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <i class="ti ${icon}" style="color:${col};font-size:18px"></i>
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${label}</div><div style="font-size:11px;color:var(--muted)">${detail}</div></div>
      <div style="font-weight:700;color:${col}">${value}</div></div>`;
  }
  var html = `<div class="card"><div class="card-title"><i class="ti ti-shield-half" style="color:var(--accent)"></i>リスク分析</div>`;
  html += riskRow('Lv3スタッフ', lv3Count+'名', lv3Count>=3?'low':lv3Count>=1?'mid':'high', lv3Count>=3?'十分':lv3Count>=1?'やや不足':'Lv3不在は高リスク');
  html += riskRow('新人比率', newRatio+'%', newRatio<=20?'low':newRatio<=40?'mid':'high', `訓練中 ${trainees.length}/${names.length}名`);
  html += riskRow('Closingリスク', closingRisk+'日', closingRisk===0?'low':closingRisk<=2?'mid':'high', closingRisk?'Dinner枠にリーダー不在の日あり':'全日リーダー配置済み');
  html += riskRow('当欠リスク', singlePointDays+'枠', singlePointDays<=3?'low':singlePointDays<=6?'mid':'high', '1人のみ配置で代替が薄い枠数');
  html += riskRow('過重労働', overWork+'名', overWork===0?'low':'high', overWork?'40h超のスタッフあり':'40h超なし');
  html += `<div style="font-size:11px;color:var(--muted);margin-top:8px">※ リスクが高い項目は、カバー候補の事前確保や配置見直しを推奨します。</div></div>`;
  return html;
}

/* ============================================================
   My Shift (Crew側: Availability提出 + シフト確認 + 変更申請)
============================================================ */
var availTmp = {};
function renderShiftStaff() {
  var me = ROLE_CONFIG[curRole].name;
  var emp = getEmployees().find(e=>e.name===me);
  var storeId = emp ? (emp.store==='ALL'?STORES[0].id:emp.store) : (curStore==='ALL'?STORES[0].id:curStore);
  var week = getWeekStr();
  var myAvail = getAvailability(storeId, week).find(a=>a.name===me);
  var plan = getShiftPlan(storeId, week);

  var html = `<div class="section-header"><div><div class="section-title">My Shift</div><div class="section-sub">${week}週</div></div></div>`;

  // 勤務条件ルール表示
  html += `<div class="card"><div class="card-title"><i class="ti ti-info-circle"></i>勤務条件</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <span class="tag tag-gray">Min 6 shifts</span><span class="tag tag-gray">Max 8 shifts</span>
      <span class="tag tag-gray">Consecutive OK</span>
      ${emp&&emp.support&&emp.support.length?`<span class="tag tag-blue">応援可: ${emp.support.map(id=>(STORES.find(s=>s.id===id)||{name:id}).name).join(',')}</span>`:''}
    </div>
  </div>`;

  // Availability提出/編集
  if (myAvail) {
    html += `<div class="card"><div class="alert alert-success" style="margin:0"><i class="ti ti-circle-check"></i><div>
      <p style="font-size:13px;font-weight:600">Availability Submitted</p>
      <p style="font-size:12px;margin-top:2px">提出枠: ${myAvail.slots.length} · ありがとうございます！</p></div></div>
      <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="openAvailModal('${storeId}','${week}')"><i class="ti ti-edit"></i> Edit Submission</button>
    </div>`;
  } else {
    html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-plus"></i>Availability提出</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">${week}週の勤務可能枠を提出してください</p>
      <button class="btn btn-primary" style="width:100%" onclick="openAvailModal('${storeId}','${week}')"><i class="ti ti-send"></i> Submit Availability</button>
    </div>`;
  }

  // 公開シフト確認
  if (plan && plan.status==='公開済') {
    var myCells = Object.keys(plan.cells).filter(k=>plan.cells[k]===me);
    html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-check"></i>公開シフト</div>`;
    if (myCells.length) {
      myCells.forEach(k => {
        var parts = k.split('_');
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-size:13px;font-weight:600">${parts[0]}曜 ${parts[1]}</div><div style="font-size:11px;color:var(--muted)">${parts[2]}</div></div>
          <button class="btn btn-secondary btn-sm" onclick="openShiftChangeModal('${storeId}','${week}','${k}')">変更申請</button>
        </div>`;
      });
    } else { html += `<p style="color:var(--muted);font-size:13px">この週のシフトはありません</p>`; }
    html += '</div>';
  } else {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:24px"><i class="ti ti-calendar" style="font-size:28px;display:block;margin-bottom:6px"></i>シフト未公開</div>`;
  }

  // 変更申請履歴
  var changes = ls('shift_changes', []).filter(c=>c.name===me);
  if (changes.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>変更申請</div>`;
    changes.slice().reverse().forEach(c => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${c.slot}</div><span class="tag ${c.status==='承認'?'tag-green':c.status==='却下'?'tag-red':'tag-yellow'}">${c.status}</span></div>
        <div class="approval-meta">${c.reason}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function openAvailModal(storeId, week) {
  var me = ROLE_CONFIG[curRole].name;
  var existing = getAvailability(storeId, week).find(a=>a.name===me);
  availTmp = {};
  if (existing) existing.slots.forEach(s=>{ availTmp[s.day+'_'+s.period]=true; });
  renderAvailBody(storeId, week);
}
function renderAvailBody(storeId, week) {
  var html = `<div class="modal-title">Availability (${week}週) <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">勤務可能な枠をタップ</p>
    <table class="inv-table"><thead><tr><th></th>${SHIFT_PERIODS.map(p=>`<th style="text-align:center">${p}</th>`).join('')}</tr></thead><tbody>`;
  DOW_SHIFT.forEach(day => {
    html += `<tr><td style="font-weight:600">${day}</td>${SHIFT_PERIODS.map(p=>{
      var key=day+'_'+p; var sel=availTmp[key];
      return `<td style="text-align:center"><div class="shift-slot${sel?' sel':''}" onclick="toggleAvail('${storeId}','${week}','${key}')">${sel?'✓':'-'}</div></td>`;
    }).join('')}</tr>`;
  });
  html += `</tbody></table>
    <div class="form-group" style="margin-top:10px"><label class="form-label">Special Requests / Notes</label><textarea class="form-textarea" id="avail-notes" placeholder="希望休・特記事項">${(getAvailability(storeId,week).find(a=>a.name===ROLE_CONFIG[curRole].name)||{}).notes||''}</textarea></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="submitAvail('${storeId}','${week}')">Submit</button></div>`;
  openModal(html);
}
function toggleAvail(storeId, week, key) { availTmp[key]=!availTmp[key]; renderAvailBody(storeId, week); }
function submitAvail(storeId, week) {
  var slots = Object.keys(availTmp).filter(k=>availTmp[k]).map(k=>{var p=k.split('_');return {day:p[0],period:p[1]};});
  if (!slots.length) { alert('勤務可能枠を選択してください'); return; }
  var me = ROLE_CONFIG[curRole].name;
  var notes = document.getElementById('avail-notes').value.trim();
  var avail = getAvailability(storeId, week).filter(a=>a.name!==me);
  avail.push({name:me, slots, notes, date:new Date().toLocaleDateString('ja')});
  lsSet('avail_'+storeId+'_'+week, avail);
  closeModalDirect();
  showToast('Availabilityを提出しました', 'success');
  renderPage('shift_staff');
}

function openShiftChangeModal(storeId, week, key) {
  var parts = key.split('_');
  openModal(`<div class="modal-title">シフト変更申請 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:13px;margin-bottom:10px">${parts[0]}曜 ${parts[1]} ${parts[2]}</p>
    <div class="form-group"><label class="form-label">理由</label><textarea class="form-textarea" id="chg-reason" placeholder="変更理由"></textarea></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="submitShiftChange('${storeId}','${week}','${parts[0]}曜 ${parts[1]} ${parts[2]}')">申請</button></div>`);
}
function submitShiftChange(storeId, week, slot) {
  var reason = document.getElementById('chg-reason').value.trim();
  if (!reason) { alert('理由を入力してください'); return; }
  var changes = ls('shift_changes', []);
  changes.push({id:'sc'+Date.now(), name:ROLE_CONFIG[curRole].name, storeId, week, slot, reason, status:'申請中', date:new Date().toLocaleDateString('ja')});
  lsSet('shift_changes', changes);
  addApproval({title:`${ROLE_CONFIG[curRole].name} シフト変更 (${slot})`, type:'シフト変更', from:ROLE_CONFIG[curRole].name, store:(STORES.find(s=>s.id===storeId)||{name:storeId}).name});
  closeModalDirect();
  showToast('変更申請しました', 'success');
  renderPage('shift_staff');
}

function getWeekStr() {
  var d = new Date(); var day = d.getDay();
  var diff = d.getDate() - day + (day===0?-6:1);
  var mon = new Date(d.setDate(diff));
  return (mon.getMonth()+1)+'/'+(mon.getDate());
}

   VACATION
============================================================ */

  var myVac = ls('my_vacations', []);

  </div>`;

    html += `<div class="card" style="text-align:center;color:var(--muted);padding:40px">
      <i class="ti ti-beach" style="font-size:32px;margin-bottom:8px;display:block"></i>申請履歴なし</div>`;
  } else {
    myVac.slice().reverse().forEach(v => {
      var statusClass = v.status==='承認'?'tag-green':v.status==='却下'?'tag-red':'tag-yellow';
      html += `<div class="card">
        <div class="approval-header">
          <div><div class="approval-title">${v.startDate} 〜 ${v.endDate}</div>
          <div class="approval-meta">${v.type} · ${v.reason}</div></div>
          <span class="tag ${statusClass}">${v.status}</span>

function openVacationModal() {
  openModal(`<div class="modal-title">休暇申請 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">休暇種別</label>
      <select class="form-select" id="v-type">
        <option>有給休暇</option><option>傷病休暇</option><option>無給休暇</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">開始日</label><input class="form-input" id="v-start" type="date"></div>
      <div class="form-group"><label class="form-label">終了日</label><input class="form-input" id="v-end" type="date"></div>
    </div>

function submitVacation() {
  var type = document.getElementById('v-type').value;
  var start = document.getElementById('v-start').value;
  var end   = document.getElementById('v-end').value;
  var reason = document.getElementById('v-reason').value.trim();
  if (!start || !end) { alert('日程を入力してください'); return; }
  var vac = {id:'v'+Date.now(), type, startDate:start, endDate:end, reason:reason||'理由なし', status:'申請中', date:new Date().toLocaleDateString('ja')};
  var my = ls('my_vacations', []);
  my.push(vac);
  lsSet('my_vacations', my);
  addApproval({title:`休暇申請 ${start}〜${end}`, type:'休暇', from:ROLE_CONFIG[curRole].name, store:'---'});
  closeModalDirect();
  showToast('休暇申請しました', 'success');
  renderPage('vacation');
}

/* ============================================================
   HIRING
============================================================ */
/* ============================================================
   採用パイプライン: 応募者 → 面接候補 → 採用決定 → オンボーディング
   applicant: {id,name,store,pos,phone,email,date,resume,status,memo,
               interviewDate,interviewer,evalMemo,decision}
   応募ステータス: 新規応募/要確認/面接調整中/面接予定/面接完了/採用/不採用/辞退
============================================================ */
const APPLICANT_STORES = ['ToriTon','Tenkichi','Totoya','Marujuu','Waikiki','未分類'];
function getApplicants() {
  return ls('applicants', [
    {id:'a1', name:'Keiko Tanaka', store:'Waikiki', pos:'FSP Cashier', phone:'808-555-0101', email:'keiko@example.com', date:'2026-06-08', status:'新規応募', memo:''},
    {id:'a2', name:'Ryan Matsuda', store:'Totoya', pos:'Main Plater', phone:'808-555-0102', email:'ryan@example.com', date:'2026-06-07', status:'面接予定', interviewDate:'2026-06-12', interviewer:'Yuki', memo:''},
  ]);
}
function setApplicants(a) { lsSet('applicants', a); }
/* 応募者の閲覧範囲（権限） */
function visibleApplicants() {
  var all = getApplicants();
  if (['gm','ceo','office'].includes(curRole)) return all;
  if (curRole==='am') {
    var amStoreNames = STORES.filter(s=>AM_STORES.includes(s.id)).map(s=>s.brand);
    return all.filter(a=>amStoreNames.includes(a.store) || a.store==='未分類');
  }
  if (curRole==='sl') {
    var myStore = STORES.find(s=>s.id===curStore);
    return all.filter(a=>myStore && (a.store===myStore.brand || a.store===myStore.name));
  }
  return [];
}

function renderHiring() {
  if (curRole==='crew') return '<div class="card" style="text-align:center;padding:30px;color:var(--muted)">採用管理の閲覧権限がありません</div>';
  var apps = visibleApplicants();
  var byStore = {};
  APPLICANT_STORES.forEach(s=>byStore[s]=[]);
  apps.forEach(a=>{ (byStore[a.store]=byStore[a.store]||[]).push(a); });

  var html = `<div class="section-header">
    <div><div class="section-title">採用管理</div><div class="section-sub">応募者 → 面接 → 採用決定</div></div>
    <button class="btn btn-primary btn-sm" onclick="openApplicantModal()"><i class="ti ti-user-plus"></i> 応募者追加</button>
  </div>
  <div class="kpi-grid" style="margin-bottom:12px;">
    ${kpi('応募者', apps.length, '全ステータス', 'var(--tm)')}
    ${kpi('新規', apps.filter(c=>c.status==='新規応募').length, '未対応', 'var(--accent2)')}
    ${kpi('面接', apps.filter(c=>['面接調整中','面接予定','面接完了'].includes(c.status)).length, '進行中', 'var(--yellow)')}
    ${kpi('採用', apps.filter(c=>c.status==='採用').length, '今月', 'var(--green)')}
  </div>`;

  // ===== 採用〜成長パイプライン（視覚化） =====
  var obsP = ls('onboardings', []);
  var empsP = getEmployees().filter(e=>e.status!=='退職');
  var pipe = [
    {label:'応募', icon:'ti-inbox', n: apps.filter(a=>['新規応募','要確認'].includes(a.status)).length, col:'var(--muted)'},
    {label:'面接', icon:'ti-calendar', n: apps.filter(a=>['面接調整中','面接予定','面接完了'].includes(a.status)).length, col:'var(--accent2)'},
    {label:'採用', icon:'ti-user-check', n: apps.filter(a=>a.status==='採用').length, col:'var(--accent)'},
    {label:'OB', icon:'ti-school', n: obsP.filter(o=>o.obStatus!=='登録完了'&&o.obStatus!=='キャンセル').length, col:'var(--accent)'},
    {label:'Training', icon:'ti-run', n: empsP.filter(e=>(e.step||1)<=0).length, col:'var(--yellow)'},
    {label:'80%', icon:'ti-coin', n: empsP.filter(e=>effectiveTipRate(e.name)===80).length, col:'var(--green)'},
    {label:'90%', icon:'ti-coin', n: empsP.filter(e=>effectiveTipRate(e.name)===90).length, col:'var(--green)'},
    {label:'100%', icon:'ti-coin', n: empsP.filter(e=>(e.role==='crew'||e.role==='sl')&&effectiveTipRate(e.name)===100).length, col:'var(--green)'},
    {label:'Leader候補', icon:'ti-crown', n: empsP.filter(e=>leaderSkillApproved(e.name)).length, col:'var(--purple)'},
  ];
  html += `<div class="card"><div class="card-title"><i class="ti ti-arrow-guide" style="color:var(--accent)"></i>採用〜成長パイプライン</div>
    <div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:4px">`;
  pipe.forEach((p,i)=>{
    html += `<div style="min-width:58px;flex:1;text-align:center;background:var(--surface2);border-radius:8px;padding:8px 3px">
      <i class="ti ${p.icon}" style="font-size:15px;color:${p.col}"></i>
      <div style="font-size:17px;font-weight:700;color:${p.col};line-height:1.2">${p.n}</div>
      <div style="font-size:9px;color:var(--muted);white-space:nowrap">${p.label}</div></div>`;
    if (i<pipe.length-1) html += `<div style="display:flex;align-items:center;color:var(--border)"><i class="ti ti-chevron-right" style="font-size:11px"></i></div>`;
  });
  html += `</div></div>`;

  // 要確認（不足情報）
  var needCheck = apps.filter(a=>a.status==='要確認' || a.store==='未分類');
  if (needCheck.length) {
    html += `<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i><div style="font-size:12px"><b>要確認 ${needCheck.length}件</b>：店舗不明や情報不足の応募者があります。編集して補完してください。</div></div>`;
  }

  // 店舗別タブ表示
  APPLICANT_STORES.forEach(store => {
    var list = byStore[store] || [];
    if (!list.length) return;
    var color = (STORES.find(s=>s.brand===store||s.name===store)||{}).color || 'var(--muted)';
    html += `<div class="card"><div class="card-title" style="color:${color}"><span class="store-dot" style="background:${color}"></span>${store} 応募者一覧 (${list.length})</div>`;
    list.forEach(c => {
      var sc = c.status==='採用'?'tag-green':c.status==='不採用'||c.status==='辞退'?'tag-red':c.status.includes('面接')?'tag-blue':c.status==='要確認'?'tag-yellow':'tag-gray';
      html += `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-weight:600;font-size:13px">${c.name} <span class="tag ${sc}" style="font-size:9px">${c.status}</span></div>
            <div style="font-size:11px;color:var(--muted)">${c.pos||'ポジション未定'} · ${c.phone||'TEL無'} · ${c.email||'Email無'}</div>
            <div style="font-size:11px;color:var(--muted)">応募 ${c.date}${c.interviewDate?' · 面接 '+c.interviewDate+(c.interviewer?'('+c.interviewer+')':''):''}</div>
            ${c.memo?`<div style="font-size:11px;color:var(--accent2)">メモ: ${c.memo}</div>`:''}
          </div>
        </div>
        <div class="approval-actions" style="margin-top:6px">
          <button class="btn btn-secondary btn-sm" onclick="openApplicantModal('${c.id}')"><i class="ti ti-edit"></i> 編集</button>
          ${c.status==='新規応募'||c.status==='要確認'?`<button class="btn btn-primary btn-sm" onclick="moveToInterview('${c.id}')"><i class="ti ti-arrow-right"></i> 面接候補へ</button>`:''}
          ${['面接調整中','面接予定','面接完了'].includes(c.status)?`<button class="btn btn-secondary btn-sm" onclick="openInterviewModal('${c.id}')"><i class="ti ti-calendar"></i> 面接管理</button>`:''}
          ${['面接完了','面接予定'].includes(c.status)?`<button class="btn btn-success btn-sm" onclick="hireDecision('${c.id}')"><i class="ti ti-user-check"></i> 採用決定</button>`:''}
          ${c.status!=='不採用'&&c.status!=='採用'?`<button class="btn btn-danger btn-sm" onclick="updateApplicant('${c.id}','不採用')">不採用</button>`:''}
        </div>
      </div>`;
    });
    html += '</div>';
  });
  if (!apps.length) html += `<div class="card" style="text-align:center;color:var(--muted);padding:30px">応募者がいません。「応募者追加」から登録してください。</div>`;
  return html;
}

  openModal(`<div class="modal-title">${id?'応募者編集':'応募者追加'} <button class="modal-close" onclick="closeModalDirect()">×</button></div>

    <button class="btn btn-primary" onclick="saveApplicant('${id||''}')">保存</button></div>`);
}
function saveApplicant(id) {
  var name=document.getElementById('ap-name').value.trim();
  if (!name) { alert('応募者名を入力してください'); return; }
  var data = {
    name, store:document.getElementById('ap-store').value, pos:document.getElementById('ap-pos').value.trim(),
    phone:document.getElementById('ap-phone').value.trim(), email:document.getElementById('ap-email').value.trim(),
    date:document.getElementById('ap-date').value, memo:document.getElementById('ap-memo').value.trim(),
  };
  var apps = getApplicants();
  if (id) { var a=apps.find(x=>x.id===id); Object.assign(a,data); if(a.status==='要確認'&&a.store!=='未分類'&&a.phone&&a.email)a.status='新規応募'; }
  else {
    // 不足チェック
    var status = (!data.store||data.store==='未分類'||!data.phone||!data.email||!data.pos)?'要確認':'新規応募';
    apps.push(Object.assign({id:'a'+Date.now(), status}, data));
  }
  setApplicants(apps);
  closeModalDirect(); showToast('応募者を保存しました','success'); renderPage('hiring');
}
function updateApplicant(id, status) {
  var apps=getApplicants(); var a=apps.find(x=>x.id===id); if(!a)return;
  a.status=status; setApplicants(apps); renderPage('hiring');
}
function moveToInterview(id) {
  var apps=getApplicants(); var a=apps.find(x=>x.id===id); if(!a)return;
  a.status='面接調整中'; setApplicants(apps);
  showToast(`${a.name}を面接候補に追加しました`,'success'); renderPage('hiring');
}
function openInterviewModal(id) {
  var a = getApplicants().find(x=>x.id===id); if(!a)return;
  openModal(`<div class="modal-title">面接管理 — ${a.name} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">面接予定日</label><input class="form-input" id="iv-date" type="date" value="${a.interviewDate||''}"></div>
      <div class="form-group"><label class="form-label">面接担当者</label><input class="form-input" id="iv-er" value="${a.interviewer||''}"></div>
    </div>

      <select class="form-select" id="iv-status">
        ${['面接調整中','面接予定','面接完了','辞退'].map(s=>`<option ${a.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">評価メモ</label><textarea class="form-textarea" id="iv-eval">${a.evalMemo||''}</textarea></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveInterview('${id}')">保存</button></div>`);
}
function saveInterview(id) {
  var apps=getApplicants(); var a=apps.find(x=>x.id===id); if(!a)return;
  a.interviewDate=document.getElementById('iv-date').value;
  a.interviewer=document.getElementById('iv-er').value.trim();
  a.status=document.getElementById('iv-status').value;
  a.evalMemo=document.getElementById('iv-eval').value.trim();
  setApplicants(apps); closeModalDirect(); showToast('面接情報を保存しました','success'); renderPage('hiring');
}
/* 採用決定 → オンボーディング自動開始（本人入力待ち） */
function hireDecision(id) {
  var apps=getApplicants(); var a=apps.find(x=>x.id===id); if(!a)return;
  if (!confirm(`${a.name}さんを採用決定し、オンボーディングを開始しますか？`)) return;
  a.status='採用'; setApplicants(apps);
  // オンボーディング作成（本人入力待ち）
  var storeObj = STORES.find(s=>s.brand===a.store||s.name===a.store) || STORES[0];
  var obs = ls('onboardings', []);
  obs.push({
    id:'ob'+Date.now(), applicantId:a.id, name:a.name, store:storeObj.id, storeName:storeObj.name,
    pos:a.pos, email:a.email, phone:a.phone, startDate:new Date().toLocaleDateString('ja'),
    obStatus:'本人入力待ち', personal:null, docs:[], shift:null, payrollDone:false,
    template:JSON.parse(JSON.stringify(getOBTemplate())), done:[], rejectReason:''
  });
  lsSet('onboardings', obs);
  showToast(`${a.name}を採用決定。オンボーディングを開始しました`,'success');
  go('onboarding');
}

/* オンボーディングステータス: 本人入力待ち/提出完了/経理確認中/Payroll登録中/登録完了/差し戻し/キャンセル */
const VISA_OPTIONS = ['U.S. Citizen','Green Card','E-2','J-1','OPT','その他'];
function renderOnboarding() {
  var obs = ls('onboardings', []);
  var canEditTemplate = (curRole==='gm' || curRole==='ceo');
  var isOffice = (curRole==='office' || curRole==='gm' || curRole==='ceo');
  var html = `<div class="section-header">
    <div><div class="section-title">オンボーディング</div><div class="section-sub">採用→本人入力→書類→経理→Payroll→従業員登録</div></div>
    <div style="display:flex;gap:6px">
      ${canEditTemplate?`<button class="btn btn-secondary btn-sm" onclick="openOBTemplateModal()"><i class="ti ti-template"></i> 研修項目</button>`:''}
    </div>
  </div>`;

  if (!obs.length) {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:40px"><i class="ti ti-school" style="font-size:32px;display:block;margin-bottom:8px"></i>進行中のオンボーディングなし<div style="font-size:12px;margin-top:6px">採用管理で「採用決定」すると自動で開始されます</div></div>`;
    return html;
  }

  // ステータスサマリー
  var statusCounts = {};
  obs.forEach(o=>statusCounts[o.obStatus]=(statusCounts[o.obStatus]||0)+1);
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">`;
  ['本人入力待ち','提出完了','経理確認中','Payroll登録中','登録完了','差し戻し'].forEach(st=>{
    if (statusCounts[st]) html += `<span class="tag ${st==='登録完了'?'tag-green':st==='差し戻し'?'tag-red':'tag-yellow'}">${st} ${statusCounts[st]}</span>`;
  });
  html += `</div>`;

  obs.forEach(ob => {
    var st = ob.obStatus || '本人入力待ち';
    var stCol = st==='登録完了'?'var(--green)':st==='差し戻し'?'var(--red)':'var(--accent)';
    var storeName = ob.storeName || (STORES.find(s=>s.id===ob.store)||{}).name || ob.store;
    html += `<div class="card">
      <div class="approval-header">
        <div class="staff-item" style="padding:0;background:none;border:none;margin:0">
          <div class="staff-avatar" style="background:var(--surface2)">${ob.name[0]}</div>
          <div><div class="staff-name">${ob.name}</div><div class="staff-role">${storeName} · ${ob.pos||''} · 開始 ${ob.startDate}</div></div>
        </div>
        <span class="tag" style="background:${stCol};color:#fff">${st}</span>
      </div>`;

    // ステップ進捗バー
    var steps = ['本人入力待ち','提出完了','経理確認中','Payroll登録中','登録完了'];
    var curIdx = steps.indexOf(st); if (st==='差し戻し') curIdx=0;
    html += `<div style="display:flex;gap:3px;margin:10px 0">`;
    steps.forEach((s,i)=>{ html += `<div style="flex:1;height:5px;border-radius:3px;background:${i<=curIdx?stCol:'var(--border)'}"></div>`; });
    html += `</div>`;

    if (ob.rejectReason && st==='差し戻し') html += `<div class="alert alert-danger" style="padding:7px 10px;margin-bottom:8px"><i class="ti ti-arrow-back"></i><div style="font-size:12px">差し戻し理由: ${ob.rejectReason}</div></div>`;

    // 本人入力情報（権限により表示制御）
    if (ob.personal) {
      var p = ob.personal;
      var canSeePII = isOffice; // SSN/書類はOffice/GM/CEOのみ
      html += `<div style="font-size:12px;background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="font-weight:600;margin-bottom:4px">本人入力情報</div>
        住所: ${p.address||'—'}<br>
        VISA/就労: ${p.visa||'—'}${p.visaDetail?'（'+p.visaDetail+'）':''}<br>
        勤務開始予定: ${p.startDate||'—'} · 時給: ${canViewWages()?'$'+(p.wage||'—'):'***'}<br>
        SSN: ${canSeePII?(p.ssn||'—'):'<span style="color:var(--muted)">（経理のみ閲覧可）</span>'}<br>
        書類: ${ob.docs&&ob.docs.length?(canSeePII?ob.docs.map(d=>d.name).join(', '):ob.docs.length+'件（経理のみ）'):'未提出'}
      </div>`;
    }

    // アクションボタン（ステータス×権限）
    html += `<div class="approval-actions">`;
    // 本人入力（デモ: 誰でも代理入力可。実運用は本人リンク）
    if (st==='本人入力待ち' || st==='差し戻し') {
      html += `<button class="btn btn-primary btn-sm" onclick="openPersonalForm('${ob.id}')"><i class="ti ti-forms"></i> 本人情報を入力</button>`;
    }
    // 経理確認
    if (st==='提出完了' && isOffice) {
      html += `<button class="btn btn-success btn-sm" onclick="officeReview('${ob.id}','approve')"><i class="ti ti-check"></i> 経理確認OK</button>
        <button class="btn btn-danger btn-sm" onclick="officeReview('${ob.id}','reject')"><i class="ti ti-arrow-back"></i> 差し戻し</button>`;
    }
    // Payroll登録
    if (st==='経理確認中' && isOffice) {
      html += `<button class="btn btn-primary btn-sm" onclick="openPayrollRegister('${ob.id}')"><i class="ti ti-user-dollar"></i> Payroll登録＆シフト設定</button>`;
    }
    // 研修チェック（登録完了後はOJT進捗）
    if (st==='登録完了') {
      html += `<button class="btn btn-secondary btn-sm" onclick="openOBTrainingModal('${ob.id}')"><i class="ti ti-checklist"></i> 研修チェック</button>`;
    }
    if (st!=='登録完了' && st!=='キャンセル') {
      html += `<button class="btn btn-secondary btn-sm" onclick="cancelOB('${ob.id}')"><i class="ti ti-x"></i> 中止</button>`;
    }
    html += `</div>`;

    if (st==='登録完了') {
      html += `<div class="alert alert-success" style="margin-top:8px"><i class="ti ti-circle-check"></i><div style="font-size:12px"><b>従業員マスター登録完了</b> · ${ob.name}さんはシフト稼働可能です</div></div>`;
    }
    html += '</div>';
  });
  return html;
}

        <button class="btn btn-secondary btn-sm" onclick="addOBDoc('${obId}','Passport')">+ パスポート</button>

}
function addOBDoc(obId, name) {
  var obs=ls('onboardings',[]); var ob=obs.find(o=>o.id===obId); if(!ob)return;
  if(!ob.docs)ob.docs=[];
  ob.docs.push({name, uploadedAt:new Date().toISOString()});
  lsSet('onboardings',obs); openPersonalForm(obId);
}
function removeOBDoc(obId,i) {
  var obs=ls('onboardings',[]); var ob=obs.find(o=>o.id===obId); if(!ob)return;
  ob.docs.splice(i,1); lsSet('onboardings',obs); openPersonalForm(obId);
}
function submitPersonal(obId) {
  var obs=ls('onboardings',[]); var ob=obs.find(o=>o.id===obId); if(!ob)return;
  var visa=document.getElementById('pf-visa').value;
  var ssn=document.getElementById('pf-ssn').value.trim();
  var address=document.getElementById('pf-address').value.trim();
  // 必須チェック
  if (!address) { alert('住所を入力してください'); return; }
  if (!ssn) { alert('SSNを入力してください'); return; }
  // 書類チェック: パスポート or (Driver License + SSN Card)
  var docNames=(ob.docs||[]).map(d=>d.name);
  var hasPassport=docNames.includes('Passport');
  var hasDLandSSN=docNames.includes('Driver License')&&docNames.includes('SSN Card');
  if (!hasPassport && !hasDLandSSN) { alert('本人確認書類が不足しています。\nパスポート、または Driver License/ID＋SSN Card の両方が必要です。'); return; }
  ob.personal = {
    address, phone:document.getElementById('pf-phone').value.trim(), email:document.getElementById('pf-email').value.trim(),
    ssn, startDate:document.getElementById('pf-start').value, wage:parseFloat(document.getElementById('pf-wage').value)||0,
    visa, visaDetail: visa==='その他'?(document.getElementById('pf-visadetail-input').value.trim()):'',
    submittedAt:new Date().toISOString(),
  };
  ob.obStatus='提出完了'; ob.rejectReason='';
  lsSet('onboardings',obs);
  // 経理へ通知（承認待ちに追加）
  addApproval({title:`${ob.name} オンボーディング提出（経理確認）`, type:'採用', from:ob.name, store:ob.storeName||''});
  closeModalDirect();
  showToast('提出完了。経理確認に進みます','success');
  renderPage('onboarding');
}
/* 経理確認 */
function officeReview(obId, action) {
  var obs=ls('onboardings',[]); var ob=obs.find(o=>o.id===obId); if(!ob)return;
  if (action==='approve') {
    ob.obStatus='経理確認中'; lsSet('onboardings',obs);
    showToast('経理確認OK。Payroll登録に進めます','success');
  } else {
    var reason=prompt('差し戻し理由を入力（例: SSN入力不備 / 書類画像が不鮮明 / 必要書類不足）');
    if (reason==null) return;
    ob.obStatus='差し戻し'; ob.rejectReason=reason; lsSet('onboardings',obs);
    showToast('本人へ差し戻しました','info');
  }
  renderPage('onboarding');
}

function finalizePayroll(obId) {
  var obs=ls('onboardings',[]); var ob=obs.find(o=>o.id===obId); if(!ob)return;
  var p = ob.personal||{};
  var role=document.getElementById('pr-role').value;

  var firstWork=document.getElementById('pr-firstwork').value;
  var posList=[...document.querySelectorAll('.pr-pos:checked')].map(c=>c.value);
  var days=document.getElementById('pr-days').value;
  var maxH=parseInt(document.getElementById('pr-maxh').value)||40;

  // 従業員マスターに登録
  var emps=getEmployees();
  if (!emps.find(e=>e.name===ob.name)) {
    emps.push({id:'e'+Date.now(), name:ob.name, role, store:ob.store, support:[], emp,
      step:1, status:'在籍', perms:role==='sl'?'leader':'crew', wage, coef:1.0,
      title:ob.pos||'', isSL:false, email:p.email||ob.email||'', hireDate:new Date().toISOString().slice(0,10),
      firstWork: firstWork||new Date().toISOString().slice(0,10)});
    lsSet('m_employees', emps);
  }
  // スキル登録（選択ポジションをLv1承認済みに）
  if (posList.length) {
    var sk=getSkills(); if(!sk[ob.name])sk[ob.name]={};
    posList.forEach(pos=>{ sk[ob.name][pos]={level:1,status:'承認',date:new Date().toLocaleDateString('ja')}; });
    setSkills(sk);
  }
  // 勤務条件登録
  if (days!=='any' || maxH<40) {
    setWorkCondition(ob.store, ob.name, {opening:'any',closing:'any',days,minH:0,maxH});
  }
  ob.obStatus='登録完了'; ob.payrollDone=true;
  lsSet('onboardings',obs);
  closeModalDirect();
  showToast(`${ob.name}を従業員マスターに登録しました。シフト稼働可能です`,'success');
  renderPage('onboarding');
}
function cancelOB(obId) {
  if(!confirm('このオンボーディングを中止しますか？'))return;
  var obs=ls('onboardings',[]); var ob=obs.find(o=>o.id===obId); if(!ob)return;
  ob.obStatus='キャンセル'; lsSet('onboardings',obs);
  renderPage('onboarding');
}
/* 研修チェック（登録完了後のOJT進捗） */
function openOBTrainingModal(obId) {
  var ob=ls('onboardings',[]).find(o=>o.id===obId); if(!ob)return;
  var tmpl=ob.template||getOBTemplate(); var done=ob.done||[];
  var html=`<div class="modal-title">研修チェック — ${ob.name} <button class="modal-close" onclick="closeModalDirect()">×</button></div><div style="max-height:60vh;overflow-y:auto">`;
  tmpl.forEach(t=>{
    var isDone=done.includes(t.id);
    html+=`<div class="task-item" style="padding:6px 0"><div class="task-check${isDone?' done':''}" onclick="toggleOBTask('${ob.id}','${t.id}')">${isDone?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}</div>
      <div style="flex:1"><div class="task-text${isDone?' done':''}" style="font-size:13px">${t.label} <span class="tag tag-gray" style="font-size:8px">${t.who}</span></div></div></div>`;
  });
  html+=`</div><div class="btn-row"><button class="btn btn-primary" onclick="closeModalDirect()">閉じる</button></div>`;
  openModal(html);
}

function toggleOBTask(obId, taskId) {
  var obs = ls('onboardings', []);
  var ob = obs.find(o=>o.id===obId);
  if (!ob) return;
  if (!ob.done) ob.done = [];
  var tmpl = ob.template || getOBTemplate();
  if (ob.done.includes(taskId)) ob.done = ob.done.filter(t=>t!==taskId);
  else ob.done.push(taskId);
  ob.progress = Math.round(ob.done.length/tmpl.length*100);
  lsSet('onboardings', obs);

  // シフト解禁(Crew化)/完了条件タスク完了 → 従業員マスターを在籍/Crewへ昇格
  var task = tmpl.find(t=>t.id===taskId);
  if (task && (task.type==='完了条件' || task.label.includes('Crew化')) && ob.done.includes(taskId)) {
    var emps = getEmployees();
    var e = emps.find(x=>x.name===ob.name);
    if (e) { e.status='在籍'; e.step=Math.max(e.step,1); lsSet('m_employees', emps); showToast(`${ob.name}がCrew化しました（在籍・STEP1）`, 'success'); }
  }
  // モーダルが開いていれば研修チェックを再描画、なければページ更新
  if (document.getElementById('modal-overlay').classList.contains('open')) openOBTrainingModal(obId);
  else renderPage('onboarding');
}

function saveEmp(empId) {
  var name = document.getElementById('e-name').value.trim();
  if (!name) { alert('氏名を入力してください'); return; }
  var support = Array.from(document.querySelectorAll('.e-support:checked')).map(c=>c.value);
  var data = {
    name,
    role: document.getElementById('e-role').value,
    store: document.getElementById('e-store').value,
    support,
    emp: document.getElementById('e-emp').value,
    step: parseInt(document.getElementById('e-step').value),
    hireDate: document.getElementById('e-hire').value,
    firstWork: (document.getElementById('e-firstwork')||{}).value || '',
    status: document.getElementById('e-status').value,
    perms: document.getElementById('e-perms').value,
  };
  var wageEl = document.getElementById('e-wage');
  if (wageEl && canViewWages()) { data.wage = parseFloat(wageEl.value)||0; }
  var coefEl = document.getElementById('e-coef');
  if (coefEl) { data.coef = parseFloat(coefEl.value)||1; }
  var emps = getEmployees();
  if (empId) {
    var e = emps.find(x=>x.id===empId);
    if (e) Object.assign(e, data);
  } else {
    data.id = 'e' + Date.now();
    emps.push(data);
  }
  lsSet('m_employees', emps);
  closeModalDirect();
  showToast(empId?'従業員情報を更新しました':'従業員を登録しました', 'success');
  renderPage('staff_master');
}

function deleteEmp(empId) {
  if (!confirm('この従業員を退職処理しますか？')) return;
  var emps = getEmployees();
  var e = emps.find(x=>x.id===empId);
  if (e) { e.status = '退職'; lsSet('m_employees', emps); }
  closeModalDirect();
  showToast('退職処理しました', 'danger');
  renderPage('staff_master');
}

var ingClassFilter = 'all';

function renderIngredientMaster() {
  var cats = getCategories();

  // フィルタ
  var list = ings.slice();
  if (ingClassFilter !== 'all') list = list.filter(i => catClass(i.cat) === ingClassFilter);
  if (ingCatFilter !== 'all') list = list.filter(i => i.cat === parseInt(ingCatFilter));

  // 区分別カウント
  var classCounts = {};
  CLASSES.forEach(c => classCounts[c.id] = ings.filter(i=>catClass(i.cat)===c.id).length);

  var html = `<div class="section-header">
    <div><div class="section-title">食材マスター</div><div class="section-sub">${ings.length}品目 / ${cats.length}カテゴリ</div></div>

      <button class="btn btn-primary btn-sm" onclick="openIngModal()"><i class="ti ti-plus"></i> 追加</button>
    </div>
  </div>`;

  // 区分タブ
  html += `<div class="phase-tabs">
    <div class="phase-tab${ingClassFilter==='all'?' active':''}" onclick="setIngClassFilter('all')">全区分 (${ings.length})</div>
    ${CLASSES.map(c=>`<div class="phase-tab${ingClassFilter===c.id?' active':''}" style="${ingClassFilter===c.id?`background:${c.color};border-color:${c.color}`:''}" onclick="setIngClassFilter('${c.id}')">${c.name} (${classCounts[c.id]})</div>`).join('')}
  </div>`;

  // カテゴリタブ（区分選択時のみ表示）
  if (ingClassFilter !== 'all') {
    var clsCats = cats.filter(c=>c.cls===ingClassFilter);
    html += `<div class="phase-tabs" style="margin-top:-6px">
      <div class="phase-tab${ingCatFilter==='all'?' active':''}" onclick="setIngCatFilter('all')">全て</div>
      ${clsCats.map(c=>`<div class="phase-tab${ingCatFilter==String(c.code)?' active':''}" onclick="setIngCatFilter('${c.code}')">${c.code} ${c.name}</div>`).join('')}
    </div>`;
  }

  html += `<div class="card">
    <table class="inv-table">
      <thead><tr><th>コード</th><th>食材名</th><th>区分/カテゴリ</th><th>単位</th><th>単価</th><th>歩留</th></tr></thead>
      <tbody>`;
  list.sort((a,b)=>a.code-b.code).forEach(i => {
    var clsId = catClass(i.cat);
    html += `<tr style="cursor:pointer" onclick="openIngModal('${i.code}')">
      <td style="color:var(--muted)">${i.code}</td>
      <td style="font-weight:600">${i.name}<div style="font-size:11px;color:var(--muted);font-weight:400">${i.vendor}</div></td>
      <td><span class="tag" style="background:var(--surface2);color:${classColor(clsId)}">${className(clsId)}</span><div style="font-size:11px;color:var(--muted);margin-top:2px">${catName(i.cat)}</div></td>
      <td>${i.unit}</td>
      <td>$${i.price.toFixed(2)}</td>
      <td><span class="tag ${i.yield>=90?'tag-green':i.yield>=75?'tag-yellow':'tag-red'}">${i.yield}%</span></td>
    </tr>`;
  });
  if (!list.length) html += `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">食材なし</td></tr>`;
  html += `</tbody></table></div>`;

  // 区分別サマリー（出力プレビュー）
  html += `<div class="card"><div class="card-title"><i class="ti ti-report"></i>区分別サマリー（出力プレビュー）
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="exportByClass()"><i class="ti ti-download"></i> CSV出力</button>

function exportByClass() {
  var ings = getIngredients();
  var rows = [['区分','カテゴリコード','カテゴリ','食材コード','食材名','単位','仕入先','単価','歩留']];
  CLASSES.forEach(cl => {

      rows.push([cl.name, i.cat, catName(i.cat), i.code, i.name, i.unit, i.vendor, i.price, i.yield+'%']);
    });
  });
  var csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  var blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'food_master_by_class.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('区分別CSVを出力しました', 'success');
}

function saveIng(code) {
  var name = document.getElementById('i-name').value.trim();
  if (!name) { alert('食材名を入力してください'); return; }
  var ings = getIngredients();
  var price = parseFloat(document.getElementById('i-price').value) || 0;
  var yld = parseFloat(document.getElementById('i-yield').value) || 100;
  var unit = document.getElementById('i-unit').value.trim() || 'kg';
  var vendor = document.getElementById('i-vendor').value;
  if (code) {
    var i = ings.find(x=>x.code===parseInt(code));
    if (i) Object.assign(i, {name, unit, vendor, price, yield:yld});
  } else {
    var cat = parseInt(document.getElementById('i-cat').value);
    // カテゴリ番号台で自動採番
    var inCat = ings.filter(x=>x.code>=cat && x.code<cat+1000);
    var maxCode = inCat.length ? Math.max(...inCat.map(x=>x.code)) : cat;
    var newCode = maxCode + 1;
    ings.push({code:newCode, name, cat, unit, vendor, price, yield:yld});
  }
  lsSet('m_ingredients', ings);
  closeModalDirect();
  showToast(code?'食材を更新しました':'食材を追加しました', 'success');
  renderPage('ingredient_master');
}

  evals.forEach(e => {
    var total = Object.values(e.scores).reduce((a,b)=>a+b,0);
    var max = Object.keys(e.scores).length * 2;
    var pct2 = Math.round(total/max*100);
    var statusTag = e.status==='承認済'?'tag-green':e.status==='承認待ち'?'tag-yellow':'tag-gray';
    html += `<div class="eval-item">
      <div style="display:flex;justify-content:space-between;align-items:center"><div class="eval-name">${e.name}</div><span class="tag ${statusTag}" style="font-size:9px">${e.status||'下書き'}</span></div>
      <div class="eval-step">${e.store} · STEP ${e.step}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--muted)">スコア ${total}/${max} (${pct2}%)</div>
      <div class="progress-bar" style="margin-top:4px"><div class="progress-fill" style="background:${pct2>=80?'var(--green)':pct2>=60?'var(--yellow)':'var(--red)'};width:${pct2}%"></div></div>
      <div style="display:flex;gap:4px;margin-top:8px">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="openEvalModal('${e.id}')">入力</button>
        ${canApprove&&e.status==='承認待ち'?`<button class="btn btn-success btn-sm" onclick="approveEval('${e.id}')"><i class="ti ti-check"></i></button>`:''}
      </div>
    </div>`;
  });
  html += '</div>';

  // 査定履歴
  var history = ls('eval_history', []);
  if (history.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>査定履歴</div>`;
    history.slice().reverse().slice(0,8).forEach(h => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${h.name} · ${h.pct}%</div><span class="tag tag-green">承認済</span></div>
        <div class="approval-meta">${h.date} · STEP ${h.step}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function openEvalModal(staffId) {
  var evals = ls('evaluations', evalSeed());
  var e = evals.find(e=>e.id===staffId) || {id:staffId, name:staffId, scores:emptyScores()};
  var groups = ['スキル','行動評価'];
  openModal(`<div class="modal-title">${e.name} 評価シート <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">0=未習得 / 1=要改善 / 2=良好</p>
    <div style="max-height:55vh;overflow-y:auto">
    ${groups.map(g=>`
      <div class="role-section-label">${g}</div>
      ${EVAL_CRITERIA.filter(c=>c.group===g).map(c=>`
        <div class="form-group" style="margin-bottom:10px">
          <label class="form-label">${c.label}</label>
          <div style="display:flex;gap:8px">
            ${[0,1,2].map(v=>`<button class="btn ${(e.scores[c.key]||0)===v?'btn-primary':'btn-secondary'} btn-sm" style="flex:1" onclick="setEvalScore('${staffId}','${c.key}',${v},this)">${v}</button>`).join('')}
          </div>
        </div>`).join('')}
    `).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">閉じる</button>
      <button class="btn btn-primary" onclick="saveEval('${staffId}')">保存（承認待ちへ）</button>
    </div>`);
}

function setEvalScore(staffId, key, val, btn) {
  btn.closest('.form-group').querySelectorAll('.btn').forEach(b => b.className = b.className.replace('btn-primary','btn-secondary'));
  btn.className = btn.className.replace('btn-secondary','btn-primary');
  var tmp = window._evalTmp || {};
  if (!tmp[staffId]) tmp[staffId] = {};
  tmp[staffId][key] = val;
  window._evalTmp = tmp;
}

function saveEval(staffId) {
  var evals = ls('evaluations', evalSeed());
  var e = evals.find(e=>e.id===staffId);
  if (e) {
    if (window._evalTmp && window._evalTmp[staffId]) Object.assign(e.scores, window._evalTmp[staffId]);
    e.status = '承認待ち';
    e.date = new Date().toLocaleDateString('ja');
    lsSet('evaluations', evals);
  }
  closeModalDirect();
  showToast('評価を保存しました（承認待ち）', 'success');
  renderPage('evaluation');
}

function approveEval(staffId) {
  var evals = ls('evaluations', evalSeed());
  var e = evals.find(x=>x.id===staffId);
  if (!e) return;
  e.status = '承認済';
  lsSet('evaluations', evals);
  var total = Object.values(e.scores).reduce((a,b)=>a+b,0);
  var pct2 = Math.round(total/(Object.keys(e.scores).length*2)*100);
  var hist = ls('eval_history', []);
  hist.push({name:e.name, step:e.step, pct:pct2, date:new Date().toLocaleDateString('ja')});
  lsSet('eval_history', hist);
  showToast('評価を承認し査定履歴に記録しました', 'success');
  renderPage('evaluation');
}

function addApproval(obj) {
  var approvals = ls('approvals', []);
  approvals.push(Object.assign({id:'ap'+Date.now(), status:'pending', date:new Date().toLocaleDateString('ja')}, obj));
  lsSet('approvals', approvals);

function renderApproval() {
  var approvals = ls('approvals', []);
  var pending = approvals.filter(a=>a.status==='pending');
  var done = approvals.filter(a=>a.status!=='pending');

  // タイプ別アイコン
  var typeIcon = {'シフト変更':'ti-calendar','シフト':'ti-calendar','休暇':'ti-beach','採用':'ti-user-plus','TipRate':'ti-coin','スキル':'ti-stairs-up','発注':'ti-clipboard-list','評価':'ti-star'};
  // タイプ別件数
  var byType = {};
  pending.forEach(a=>byType[a.type]=(byType[a.type]||0)+1);

  var html = `<div class="section-header">
    <div><div class="section-title">承認センター</div><div class="section-sub">全ての承認を一箇所で</div></div>
    <span class="tag ${pending.length?'tag-yellow':'tag-green'}">${pending.length}件待ち</span>
  </div>`;

  // タイプ別サマリー（バッジ）
  if (pending.length) {
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">`;
    Object.keys(byType).forEach(t=>{
      html += `<span class="tag tag-yellow" style="font-size:11px"><i class="ti ${typeIcon[t]||'ti-circle'}"></i> ${t} ${byType[t]}</span>`;
    });
    html += `</div>`;
  }

  if (!pending.length) {
    html += `<div class="card" style="text-align:center;padding:20px"><span style="font-size:24px">🟢</span><div style="font-size:14px;color:var(--green);font-weight:600;margin-top:4px">承認待ちはありません</div></div>`;
  } else {
    // タイプごとにグループ表示
    Object.keys(byType).forEach(type=>{
      var items = pending.filter(a=>a.type===type);
      html += `<div class="card"><div class="card-title"><i class="ti ${typeIcon[type]||'ti-circle'}" style="color:var(--accent)"></i>${type} <span class="tag tag-yellow" style="margin-left:auto">${items.length}</span></div>`;
      items.forEach(a => {
        html += `<div class="approval-item">
          <div class="approval-header">
            <div><div class="approval-title">${a.title}</div>
            <div class="approval-meta">${a.from} · ${a.store} · ${a.date}</div></div>
          </div>
          <div class="approval-actions">
            <button class="btn btn-success btn-sm" onclick="approveItem('${a.id}','approved')"><i class="ti ti-check"></i> 承認</button>
            <button class="btn btn-danger btn-sm" onclick="approveItem('${a.id}','rejected')"><i class="ti ti-x"></i> 却下</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    });
  }

  if (done.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>処理済み</div>`;
    done.slice(-6).reverse().forEach(a => {
      html += `<div class="approval-item">
        <div class="approval-header">
          <div><div class="approval-title">${a.title}</div><div class="approval-meta">${a.from} · ${a.type}</div></div>
          <span class="tag ${a.status==='approved'?'tag-green':'tag-red'}">${a.status==='approved'?'承認':'却下'}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function approveItem(id, status) {
  var approvals = ls('approvals', []);
  var a = approvals.find(a=>a.id===id);
  if (a) { a.status = status; lsSet('approvals', approvals); renderPage('approval'); showToast(status==='approved'?'承認しました':'却下しました', status==='approved'?'success':'danger'); }
}

/* ゲーミフィケーション: 実績バッジ */
function earnedBadges(name, emp) {
  emp = emp || getEmployees().find(e=>e.name===name) || {};
  var sk = getEmpSkills(name);
  var lv3 = Object.values(sk).filter(x=>x.status==='承認'&&x.level>=3).length;
  var approvedPos = approvedPositions(name).length;
  var rate = (typeof effectiveTipRate==='function') ? effectiveTipRate(name) : 0;
  var goalsHit = ls('goals_v2', []).filter(g=>g.owner===name && (g.current||0)>=g.target).length;
  var badges = [];
  // Training修了（在籍かつstep>=1）
  if ((emp.step||0) >= 1 && emp.status==='在籍') badges.push({icon:'🏆', label:'Training修了', got:true});
  else badges.push({icon:'🏆', label:'Training修了', got:false});
  // Lv3取得
  badges.push({icon:'⭐', label:'Lv3取得', got:lv3>=1, sub:lv3?lv3+'個':''});
  // マルチポジション（3つ以上承認）
  badges.push({icon:'🎯', label:'マルチ習得', got:approvedPos>=3, sub:approvedPos?approvedPos+'ポジ':''});
  // Tip 100%
  badges.push({icon:'🚀', label:'Tip 100%', got:rate>=100});
  // Goal達成
  badges.push({icon:'🔥', label:'Goal達成', got:goalsHit>=1, sub:goalsHit?goalsHit+'回':''});
  // Leader候補
  badges.push({icon:'👑', label:'Leader候補', got:leaderSkillApproved(name)});
  return badges;
}
function renderBadges(name, emp) {
  var badges = earnedBadges(name, emp);
  var gotCount = badges.filter(b=>b.got).length;
  var html = `<div class="card"><div class="card-title"><i class="ti ti-award" style="color:var(--accent)"></i>実績バッジ <span class="tag ${gotCount?'tag-green':'tag-gray'}" style="margin-left:auto">${gotCount}/${badges.length}</span></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">`;
  badges.forEach(b=>{
    html += `<div style="text-align:center;padding:10px 4px;border-radius:10px;background:${b.got?'var(--surface2)':'transparent'};border:1px solid ${b.got?'var(--accent)':'var(--border)'};opacity:${b.got?1:0.45}">
      <div style="font-size:24px;filter:${b.got?'none':'grayscale(1)'}">${b.icon}</div>
      <div style="font-size:10px;font-weight:600;margin-top:2px">${b.label}</div>
      ${b.got&&b.sub?`<div style="font-size:9px;color:var(--green)">${b.sub}</div>`:b.got?'<div style="font-size:9px;color:var(--green)">獲得！</div>':'<div style="font-size:9px;color:var(--muted)">未獲得</div>'}
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

  var isCrewView = (curRole==='crew' || curRole==='sl');
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var me = rc.name;

  var html = `<div class="mypage-header">
    <div class="mypage-avatar">${me[0]}</div>
    <div><div style="font-size:16px;font-weight:700">${isCrewView?'おはようございます、'+me+'さん':me}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">${rc.label} · ${curStore==='ALL'?'全店舗':store.name}</div>
    <span class="tag tag-blue" style="margin-top:6px;">${new Date().toLocaleDateString('ja')} · My Dashboard</span>
    </div>
  </div>`;

  if (!isCrewView) {
    // 管理者は従来のPGD中心
    html += `<div class="section-header" style="margin-bottom:8px"><div class="section-title" style="font-size:15px"><i class="ti ti-rocket" style="color:var(--accent)"></i> Personal Growth Dashboard</div></div>`;
    html += renderPGD(me, false);
    return html;
  }

  /* ===== Crew My Dashboard（優先順位順） ===== */
  var emp = getEmployees().find(e=>e.name===me);
  var week = getWeekStr();

  // ===== ゲーミフィケーション（実績バッジ） =====
  html += renderBadges(me, emp);

  var allGoals = ls('goals_v2', []);
  var storeGoals = allGoals.filter(g=>g.scope==='store' && (g.storeId===storeId||g.storeId==='ALL'));
  var personalGoals = allGoals.filter(g=>g.scope==='personal' && g.owner===me);

  // 1. 店舗Goal / 週間Goal
  html += `<div class="card"><div class="card-title"><i class="ti ti-target" style="color:var(--accent)"></i>今週のGoal</div>`;
  if (storeGoals.length) {
    storeGoals.forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100),100);
      html += `<div class="goal-item"><div class="goal-header"><div class="goal-title">${g.title}</div><span class="tag tag-blue">${g.period}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background:var(--accent2);width:${prog}%"></div></div>
        <div class="store-meta">${prog}% · ${g.current||0}/${g.target} ${g.unit||''}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">店舗Goalは未設定です</p>`; }
  if (personalGoals.length) {
    personalGoals.forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100),100);
      html += `<div class="goal-item"><div class="goal-header"><div class="goal-title"><i class="ti ti-user-star" style="font-size:12px;color:var(--green)"></i> ${g.title}</div><span class="tag tag-blue">${g.period}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background:var(--green);width:${prog}%"></div></div>
        <div class="store-meta">${prog}% · 個人Goal</div></div>`;
    });
  }
  html += '</div>';

  // 2. 今日・今週の自分のシフト
  var plan = getShiftPlan(storeId, week);
  html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-check"></i>今週のシフト
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('shift_staff')">詳細</button></div>`;
  var myShifts = [];
  if (plan && plan.status==='公開済') {
    myShifts = Object.keys(plan.cells).filter(k=>plan.cells[k]===me);
  }
  if (myShifts.length) {
    myShifts.forEach(k=>{ var p=k.split('_'); html += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)"><span>${p[0]}曜 ${p[1]}</span><span style="color:var(--muted)">${p[2]}</span></div>`; });
  } else { html += `<p style="color:var(--muted);font-size:13px">公開シフトはまだありません。Availabilityを提出しましょう</p>`; }
  html += '</div>';

  // 3. 個人タスク
  var myTasks = getTasks().filter(t=>t.assignee===me && t.status!=='完了');
  html += `<div class="card"><div class="card-title"><i class="ti ti-list-check"></i>今日のタスク</div>`;
  if (myTasks.length) {
    myTasks.forEach(t => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${t.title}</div><span class="tag ${t.priority==='高'?'tag-red':'tag-yellow'}">${t.priority||'低'}</span></div>
        <div class="approval-meta">${t.due?'期限 '+t.due:''} · 進捗 ${t.progress||0}%</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">担当タスクはありません</p>`; }
  html += '</div>';

  // 4-5. スキルレベル現在地 + 次に強化すべきスキル
  var positions = getStorePositions(storeId);
  var psk = getEmpSkills(me);
  var apPos = positions.filter(p=>psk[p]&&psk[p].status==='承認'&&psk[p].level>=1);
  var missing = positions.filter(p=>!apPos.includes(p));
  html += `<div class="card"><div class="card-title"><i class="ti ti-stairs-up"></i>スキルレベル現在地
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('skill')">スキル申請</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">できるポジション (${apPos.length}/${positions.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${apPos.length?apPos.map(p=>`<span class="tag tag-green">${p} Lv${psk[p].level}</span>`).join(''):'<span style="color:var(--muted);font-size:12px">承認済みなし</span>'}</div>`;
  if (missing.length) {
    html += `<div class="alert alert-warning" style="padding:8px 10px"><i class="ti ti-arrow-up-right"></i>次に強化すべき: <strong>${missing[0]}</strong> <span style="font-size:11px">（推奨教育: ${SKILL_TRAINING[missing[0]]||missing[0]}）</span></div>`;
  } else {
    html += `<div class="alert alert-success" style="padding:8px 10px"><i class="ti ti-trophy"></i>全ポジション習得済み！</div>`;
  }
  html += '</div>';

  // 6. Tip Rate申請状況
  var tipReqs = ls('tip_requests', []).filter(r=>r.name===me);
  var curTip = tipReqs.filter(r=>r.status==='承認').slice(-1)[0];
  var pendingTip = tipReqs.filter(r=>r.status==='申請中').slice(-1)[0];
  html += `<div class="card"><div class="card-title"><i class="ti ti-coin"></i>Tip Rate
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('tiprate')">申請</button></div>
    <div style="display:flex;gap:8px">
      ${kpi('現在', curTip?curTip.rate+'%':'未設定', curTip?'承認済':'—', curTip?'var(--green)':'var(--muted)')}
      ${kpi('申請中', pendingTip?pendingTip.rate+'%':'なし', pendingTip?'承認待ち':'—', pendingTip?'var(--yellow)':'var(--muted)')}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">※ Tip RateはSkill Level自己評価から申請できます</p>
  </div>`;

  // 7. 給与予定（Estimated Pay）
  var wage = WAGE[curRole]||16;
  var weekHours = 0;
  if (plan && plan.status==='公開済') {
    myShifts.forEach(k=>{ var period=k.split('_')[1]; weekHours += (SHIFT_HOURS[period]||4); });
  }
  var regularH = Math.min(weekHours, 40);
  var otH = Math.max(weekHours-40, 0);
  var estPay = regularH*wage + otH*wage*1.5;
  // チップ見込み（今の半月の自分の配分合計＋半月精算後）
  var myTipName = curUserName || me;
  var tipEst = estimateMyTip(storeId, myTipName);
  html += `<div class="card"><div class="card-title"><i class="ti ti-cash"></i>給与予定 (Estimated Pay)</div>
    <div class="kpi-grid">
      ${kpi('今週勤務', weekHours+'h', '公開シフト', 'var(--tm)')}
      ${kpi('Regular', regularH+'h', '通常', 'var(--tm)')}
      ${kpi('Overtime', otH+'h', '残業', otH?'var(--yellow)':'var(--muted)')}
      ${kpi('見込給与', '$'+Math.round(estPay), '今週', 'var(--green)')}
    </div>
    <div class="kpi-grid" style="margin-top:8px">
      ${kpi('チップ見込', '$'+tipEst.total.toFixed(0), tipEst.range, 'var(--accent2)')}
      ${kpi('給与+チップ', '$'+Math.round(estPay+tipEst.total), '今週+半月チップ', 'var(--green)')}
    </div>
    ${tipEst.total>0?`<button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="showMyTipDetail('${storeId}','${myTipName.replace(/'/g,"")}')"><i class="ti ti-list-details"></i> チップ内訳（シフト毎）を見る</button>`:''}
    <p style="font-size:11px;color:var(--muted);margin-top:8px">※ 見込み（確定給与ではありません）。チップは現在の半月の配分です。次回支払予定: 隔週金曜</p>
  </div>`;

  // 8. 休暇申請
  var myVac = ls('my_vacations', []);
  html += `<div class="card"><div class="card-title"><i class="ti ti-beach"></i>休暇申請
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('vacation')">申請</button></div>`;
  if (myVac.length) {
    myVac.slice(-2).reverse().forEach(v => {
      var sc = v.status==='承認'?'tag-green':v.status==='却下'?'tag-red':'tag-yellow';
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${v.startDate}〜${v.endDate}</div><span class="tag ${sc}">${v.status}</span></div><div class="approval-meta">${v.type}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">申請履歴なし</p>`; }
  html += '</div>';

  // 9. Growth Hub（My Page内に埋め込み）
  var posts = ls('growthhub', []);
  html += `<div class="card"><div class="card-title"><i class="ti ti-message-circle"></i>Growth Hub
    <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openGHModal()"><i class="ti ti-plus"></i> 相談・質問</button></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">相談・質問・改善提案を投稿できます</p>`;
  var myPosts = posts.filter(p=>p.author===me).slice(-3).reverse();
  if (myPosts.length) {
    myPosts.forEach(p => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${p.title}</div><span class="tag tag-blue">${p.type}</span></div>
        ${(p.replies||[]).length?`<div style="font-size:11px;color:var(--green);margin-top:4px"><i class="ti ti-message"></i> 管理者から${p.replies.length}件の返信</div>`:'<div style="font-size:11px;color:var(--muted);margin-top:4px">返信待ち</div>'}</div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">投稿はまだありません</p>`; }
  html += '</div>';

  return html;
}

function renderSettings() {
  var html = `<div class="section-header"><div class="section-title">設定</div></div>
  <div class="card"><div class="card-title"><i class="ti ti-database"></i>データ管理</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">すべてのデモデータはlocalStorageに保存されています。</p>
    <button class="btn btn-danger btn-sm" onclick="clearAllData()"><i class="ti ti-trash"></i> 全データリセット</button>
  </div>
  <div class="card"><div class="card-title"><i class="ti ti-info-circle"></i>システム情報</div>
    <div style="font-size:13px;color:var(--muted)">
      <p>Version: 1.0.0-demo</p>
      <p style="margin-top:4px">Backend: localStorage (デモモード)</p>
      <p style="margin-top:4px">Stores: ${STORES.length}店舗</p>

  localStorage.clear();
  showToast('データをリセットしました', 'success');
  renderPage('settings');
}

/* ============================================================
   ⑤ レシピ管理 (原価自動計算)
============================================================ */
function renderRecipe() {
  var recipes = getRecipes();
  var canEdit = ROLE_CONFIG[curRole].canCreate || ROLE_CONFIG[curRole].financial;
  var html = `<div class="section-header">
    <div><div class="section-title">レシピ管理</div><div class="section-sub">${recipes.length}メニュー · 原価自動計算</div></div>
    ${canEdit?`<button class="btn btn-primary btn-sm" onclick="openRecipeModal()"><i class="ti ti-plus"></i> メニュー追加</button>`:''}
  </div>`;
  recipes.forEach(r => {
    var cost = calcRecipeCost(r);
    var rate = recipeCostRate(r);
    var profit = r.price - cost;
    var color = rate<=31?'var(--green)':rate<=35?'var(--yellow)':'var(--red)';
    html += `<div class="card">
      <div class="approval-header">
        <div><div class="approval-title">${r.name}</div><div class="approval-meta">${r.category||'未分類'} · ${(r.items||[]).length}食材</div></div>
        <span class="tag ${rate<=31?'tag-green':rate<=35?'tag-yellow':'tag-red'}">原価率 ${rate.toFixed(1)}%</span>
      </div>
      <div class="kpi-grid" style="margin:10px 0">
        ${kpi('売価', '$'+r.price.toFixed(2), '仮登録', 'var(--tm)')}
        ${kpi('原価', '$'+cost.toFixed(2), '理論値', color)}
        ${kpi('粗利', '$'+profit.toFixed(2), (100-rate).toFixed(0)+'%', 'var(--green)')}
        ${kpi('原価率', rate.toFixed(1)+'%', '目標≤31%', color)}
      </div>
      ${canEdit?`<div class="approval-actions">
        <button class="btn btn-secondary btn-sm" onclick="openRecipeModal('${r.id}')"><i class="ti ti-edit"></i> 編集</button>
        <button class="btn btn-secondary btn-sm" onclick="openPriceModal('${r.id}')"><i class="ti ti-tag"></i> 売価変更</button>
      </div>`:''}
    </div>`;
  });
  return html;
}

var recipeTmpItems = [];
function openRecipeModal(rId) {
  var recipes = getRecipes();
  var r = rId ? recipes.find(x=>x.id===rId) : {id:'', name:'', price:0, category:'', items:[]};
  recipeTmpItems = JSON.parse(JSON.stringify(r.items||[]));
  var isNew = !rId;
  renderRecipeModalBody(rId, r.name, r.price, r.category);
}

function renderRecipeModalBody(rId, name, price, category) {
  var ings = getIngredients();
  var isNew = !rId;
  var itemsHtml = recipeTmpItems.map((it,idx) => {
    var ing = ings.find(x=>x.code===it.code) || {name:'?', unit:'', price:0, yield:100};
    var lineCost = (ing.price/(ing.yield>0?ing.yield/100:1))*it.qty;
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;font-size:13px">${ing.name}<span style="color:var(--muted);font-size:11px"> ($${lineCost.toFixed(2)})</span></div>
      <input class="inv-input" type="number" step="0.01" value="${it.qty}" onchange="updateRecipeItemQty(${idx},this.value)" style="width:60px"> ${ing.unit}
      <button class="btn btn-danger btn-sm" onclick="removeRecipeItem(${idx})"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
  var totalCost = recipeTmpItems.reduce((a,it)=>{var ing=ings.find(x=>x.code===it.code);return a+(ing?(ing.price/(ing.yield>0?ing.yield/100:1))*it.qty:0);},0);

  openModal(`<div class="modal-title">${isNew?'メニュー追加':'レシピ編集'} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">メニュー名</label><input class="form-input" id="r-name" value="${name||''}" placeholder="メニュー名"></div>
      <div class="form-group"><label class="form-label">カテゴリ</label><input class="form-input" id="r-cat" value="${category||''}" placeholder="ラーメン等"></div>
    </div>
    <div class="form-group"><label class="form-label">売価 ($)（仮登録・後でToast連携）</label><input class="form-input" id="r-price" type="number" step="0.01" value="${price||0}"></div>
    <div class="form-group"><label class="form-label">使用食材</label>
      <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:8px">
        ${itemsHtml || '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">食材を追加してください</div>'}
        <div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:600;font-size:13px"><span>合計原価</span><span style="color:var(--accent)">$${totalCost.toFixed(2)}</span></div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <input class="form-input" id="r-search" placeholder="食材検索（名前・コード・カテゴリ・業者）" oninput="filterRecipeIngs('${rId||''}')" style="flex:1">
      </div>
      <div style="display:flex;gap:6px">
        <select class="form-select" id="r-add-ing" style="flex:1">${recipeIngOptions(ings, '')}</select>
        <button class="btn btn-secondary btn-sm" onclick="addRecipeItem('${rId||''}')">追加</button>
      </div>
    </div>
    <div class="btn-row">
      ${!isNew?`<button class="btn btn-danger" style="margin-right:auto" onclick="deleteRecipe('${rId}')">削除</button>`:''}
      <button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRecipe('${rId||''}')">${isNew?'作成':'保存'}</button>
    </div>`);
}

function recipeIngOptions(ings, q) {
  q = (q||'').toLowerCase();
  var filtered = !q ? ings : ings.filter(i =>
    (i.name||'').toLowerCase().includes(q) ||
    String(i.code).includes(q) ||
    (catName(i.cat)||'').toLowerCase().includes(q) ||
    (i.vendor||'').toLowerCase().includes(q) ||
    (i.location||'').toLowerCase().includes(q)
  );
  if (!filtered.length) return '<option value="">該当なし</option>';
  return CLASSES.map(cl=>{
    var cc=filtered.filter(i=>catClass(i.cat)===cl.id);
    return cc.length?`<optgroup label="${cl.name}">${cc.map(i=>`<option value="${i.code}">${i.name} (${i.code}) $${i.price}/${i.unit}</option>`).join('')}</optgroup>`:'';
  }).join('');
}
function filterRecipeIngs(rId) {
  var q = document.getElementById('r-search').value;
  var sel = document.getElementById('r-add-ing');
  sel.innerHTML = recipeIngOptions(getIngredients(), q);
}

function addRecipeItem(rId) {
  var code = parseInt(document.getElementById('r-add-ing').value);
  var name = document.getElementById('r-name').value;
  var price = document.getElementById('r-price').value;
  var cat = document.getElementById('r-cat').value;
  if (!recipeTmpItems.find(it=>it.code===code)) recipeTmpItems.push({code, qty:0.1});
  renderRecipeModalBody(rId, name, price, cat);
}
function updateRecipeItemQty(idx, val) { recipeTmpItems[idx].qty = parseFloat(val)||0; }
function removeRecipeItem(idx) {
  var name = document.getElementById('r-name').value;
  var price = document.getElementById('r-price').value;
  var cat = document.getElementById('r-cat').value;
  var rId = document.querySelector('[onclick^="saveRecipe"]').getAttribute('onclick').match(/'([^']*)'/)[1];
  recipeTmpItems.splice(idx,1);
  renderRecipeModalBody(rId, name, price, cat);
}

function saveRecipe(rId) {
  var name = document.getElementById('r-name').value.trim();
  if (!name) { alert('メニュー名を入力してください'); return; }
  var price = parseFloat(document.getElementById('r-price').value) || 0;
  var category = document.getElementById('r-cat').value.trim();
  var recipes = getRecipes();
  if (rId) {
    var r = recipes.find(x=>x.id===rId);
    if (r) Object.assign(r, {name, price, category, items:recipeTmpItems});
  } else {
    recipes.push({id:'r'+Date.now(), name, price, category, items:recipeTmpItems});
  }
  lsSet('m_recipes', recipes);
  closeModalDirect();
  showToast(rId?'レシピを更新しました':'メニューを作成しました', 'success');
  renderPage('recipe');
}

function deleteRecipe(rId) {
  if (!confirm('このメニューを削除しますか？')) return;
  lsSet('m_recipes', getRecipes().filter(x=>x.id!==rId));
  closeModalDirect();
  showToast('削除しました', 'danger');
  renderPage('recipe');
}

function openPriceModal(rId) {
  var r = getRecipes().find(x=>x.id===rId);
  if (!r) return;
  openModal(`<div class="modal-title">${r.name} 売価変更 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">売価 ($)</label><input class="form-input" id="p-price" type="number" step="0.01" value="${r.price}"></div>
    <p style="font-size:11px;color:var(--muted)">※ Toast API連携後はPOSと自動同期されます</p>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
      <button class="btn btn-primary" onclick="savePrice('${rId}')">保存</button>
    </div>`);
}
function savePrice(rId) {
  var recipes = getRecipes();
  var r = recipes.find(x=>x.id===rId);
  if (r) { r.price = parseFloat(document.getElementById('p-price').value)||0; lsSet('m_recipes', recipes); }
  closeModalDirect();
  showToast('売価を更新しました', 'success');
  renderPage('recipe');
}

/* ============================================================
   ⑥ 原価計算シート (新商品開発)
============================================================ */
var costSheetItems = [];
function renderCostSheet() {
  var ings = getIngredients();
  var totalCost = costSheetItems.reduce((a,it)=>{var ing=ings.find(x=>x.code===it.code);return a+(ing?(ing.price/(ing.yield>0?ing.yield/100:1))*it.qty:0);},0);
  var price = window._csPrice || 0;
  var rate = price>0 ? totalCost/price*100 : 0;
  var profit = price - totalCost;

  var html = `<div class="section-header"><div><div class="section-title">原価計算シート</div><div class="section-sub">新商品開発・試算用</div></div>
    <button class="btn btn-secondary btn-sm" onclick="resetCostSheet()"><i class="ti ti-refresh"></i> クリア</button></div>
  <div class="card">
    <div class="card-title"><i class="ti ti-flask"></i>試算</div>
    <div class="form-group"><label class="form-label">想定売価 ($)</label><input class="form-input" id="cs-price" type="number" step="0.01" value="${price}" onchange="setCSPrice(this.value)"></div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <select class="form-select" id="cs-add-ing" style="flex:1">${CLASSES.map(cl=>{var cc=ings.filter(i=>catClass(i.cat)===cl.id);return cc.length?`<optgroup label="${cl.name}">${cc.map(i=>`<option value="${i.code}">${i.name} ($${i.price}/${i.unit})</option>`).join('')}</optgroup>`:'';}).join('')}</select>
      <button class="btn btn-secondary btn-sm" onclick="addCSItem()">追加</button>
    </div>`;
  if (costSheetItems.length) {
    html += `<table class="inv-table"><thead><tr><th>食材</th><th>使用量</th><th>原価</th><th></th></tr></thead><tbody>`;
    costSheetItems.forEach((it,idx) => {
      var ing = ings.find(x=>x.code===it.code) || {name:'?',unit:'',price:0,yield:100};
      var lineCost = (ing.price/(ing.yield>0?ing.yield/100:1))*it.qty;
      html += `<tr>
        <td>${ing.name}</td>
        <td><input class="inv-input" type="number" step="0.01" value="${it.qty}" onchange="updateCSQty(${idx},this.value)" style="width:60px"> ${ing.unit}</td>
        <td>$${lineCost.toFixed(2)}</td>
        <td><button class="btn btn-danger btn-sm" onclick="removeCSItem(${idx})"><i class="ti ti-x"></i></button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else {
    html += `<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px">食材を追加して試算してください</div>`;
  }
  html += `</div>`;

  var color = rate<=31?'var(--green)':rate<=35?'var(--yellow)':'var(--red)';
  html += `<div class="card"><div class="card-title"><i class="ti ti-calculator"></i>計算結果</div>
    <div class="kpi-grid">
      ${kpi('合計原価', '$'+totalCost.toFixed(2), costSheetItems.length+'食材', 'var(--tm)')}
      ${kpi('売価', '$'+price.toFixed(2), '想定', 'var(--tm)')}
      ${kpi('原価率', rate.toFixed(1)+'%', rate<=31?'OK':'要調整', color)}
      ${kpi('粗利', '$'+profit.toFixed(2), price>0?(100-rate).toFixed(0)+'%':'-', profit>0?'var(--green)':'var(--red)')}
    </div>
    ${costSheetItems.length&&price>0?`<button class="btn btn-primary btn-sm" style="margin-top:12px;width:100%" onclick="saveCostSheetAsRecipe()"><i class="ti ti-device-floppy"></i> レシピとして保存</button>`:''}
  </div>`;
  return html;
}

function setCSPrice(v) { window._csPrice = parseFloat(v)||0; renderPage('costsheet'); }
function addCSItem() {
  var code = parseInt(document.getElementById('cs-add-ing').value);
  if (!costSheetItems.find(it=>it.code===code)) costSheetItems.push({code, qty:0.1});
  renderPage('costsheet');
}
function updateCSQty(idx, val) { costSheetItems[idx].qty = parseFloat(val)||0; renderPage('costsheet'); }
function removeCSItem(idx) { costSheetItems.splice(idx,1); renderPage('costsheet'); }
function resetCostSheet() { costSheetItems = []; window._csPrice = 0; renderPage('costsheet'); }
function saveCostSheetAsRecipe() {
  var name = prompt('メニュー名を入力してください');
  if (!name) return;
  var recipes = getRecipes();
  recipes.push({id:'r'+Date.now(), name, price:window._csPrice||0, category:'新商品', items:JSON.parse(JSON.stringify(costSheetItems))});
  lsSet('m_recipes', recipes);
  showToast('レシピとして保存しました', 'success');
  resetCostSheet();
  go('recipe');
}

/* ============================================================
   ⑦ Invoice管理 (仮OCR → 食材照合 → 価格更新)
============================================================ */
function renderInvoice() {
  var invoices = ls('invoices', []);
  var html = `<div class="section-header"><div><div class="section-title">Invoice管理</div><div class="section-sub">アップロード→照合→価格更新</div></div>
    <button class="btn btn-primary btn-sm" onclick="openInvoiceModal()"><i class="ti ti-upload"></i> Invoice登録</button></div>`;
  if (!invoices.length) {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:40px"><i class="ti ti-file-invoice" style="font-size:32px;margin-bottom:8px;display:block"></i>Invoice履歴なし</div>`;
  } else {
    invoices.slice().reverse().forEach(inv => {
      html += `<div class="card">
        <div class="approval-header">
          <div><div class="approval-title">${inv.vendor}</div><div class="approval-meta">${inv.date} · ${inv.lines.length}品目 · $${inv.total.toFixed(2)}</div></div>
          <span class="tag ${inv.applied?'tag-green':'tag-yellow'}">${inv.applied?'価格更新済':'未反映'}</span>
        </div>
      </div>`;
