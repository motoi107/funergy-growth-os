    <button class="btn btn-primary btn-sm" onclick="openOrderModal('${storeId}')"><i class="ti ti-plus"></i> 手動発注</button>
  </div>`;

  // 自動作成ドラフト
  var autoDrafts = orders.filter(o=>o.status==='自動作成');
  if (autoDrafts.length) {
    html += `<div class="alert alert-warning"><i class="ti ti-robot"></i><div><p style="font-size:12px;font-weight:600">自動算出された発注ドラフト ${autoDrafts.length}件</p><div style="font-size:11px">棚卸から自動作成。確認・修正して確定してください</div></div></div>`;
    autoDrafts.slice().reverse().forEach(o => {
      var vendor = getVendors().find(v=>v.name===o.vendor)||{};
      var method = vendorMethod(vendor, storeId);
      html += `<div class="card">
        <div class="approval-header"><div><div class="approval-title">${o.vendor} <span class="tag tag-blue" style="font-size:9px">${method}</span></div>
        <div class="approval-meta">${o.lines.length}品目 · $${o.amount.toFixed(2)}</div></div>
        <span class="tag tag-gray">自動作成</span></div>
        <table class="inv-table" style="margin-top:6px"><tbody>
        ${o.lines.map((l,i)=>`<tr><td style="font-size:12px">${l.name}</td><td><input class="inv-input" type="number" value="${l.qty}" onchange="updateDraftQty('${storeId}','${o.id}',${i},this.value)" style="width:50px"> ${l.unit}</td><td style="color:var(--muted);font-size:11px">$${(l.price*l.qty).toFixed(2)}</td><td><button class="btn btn-danger btn-sm" onclick="removeDraftLine('${storeId}','${o.id}',${i})"><i class="ti ti-x"></i></button></td></tr>`).join('')}
        </tbody></table>
        <div class="approval-actions">
          <button class="btn btn-success btn-sm" onclick="confirmOrder('${storeId}','${o.id}')"><i class="ti ti-check"></i> 発注確定</button>
          <button class="btn btn-danger btn-sm" onclick="cancelOrder('${storeId}','${o.id}')"><i class="ti ti-trash"></i> 削除</button>
        </div>
      </div>`;
    });
  }

  // 確定済（送信準備）
  var confirmed = orders.filter(o=>o.status==='発注確定'||o.status==='申請中'||o.status==='承認済');
  if (confirmed.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clipboard-check"></i>発注確定（送信準備）</div>`;
    confirmed.slice().reverse().forEach(o => {
      var vendor = getVendors().find(v=>v.name===o.vendor)||{};
      var method = vendorMethod(vendor, storeId);
      html += `<div class="approval-item">
        <div class="approval-header"><div><div class="approval-title">${o.vendor} <span class="tag tag-blue" style="font-size:9px">${method}</span></div>
        <div class="approval-meta">${o.date} · ${o.lines.length}品目 · $${o.amount.toFixed(2)}</div></div>
        <span class="tag tag-yellow">${o.status}</span></div>
        <div class="approval-actions">
          <button class="btn btn-primary btn-sm" onclick="openSendModal('${storeId}','${o.id}')"><i class="ti ti-send"></i> ${method}で発注</button>
        </div></div>`;
    });
    html += '</div>';
  }

  // 送信/連絡済み履歴
  var done = orders.filter(o=>['送信済','電話確認済','納品完了'].includes(o.status));
  if (done.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-check"></i>送信済み履歴</div>`;
    done.slice().reverse().slice(0,8).forEach(o => {
      html += `<div class="approval-item"><div class="approval-header"><div><div class="approval-title">${o.vendor}</div><div class="approval-meta">${o.sentDate||o.date} · $${o.amount.toFixed(2)} · ${o.sentMethod||''}</div></div>
        <span class="tag tag-green">${o.status}</span></div></div>`;
    });
    html += '</div>';
  }
  if (!orders.length) html += `<div class="card" style="text-align:center;color:var(--muted);padding:40px"><i class="ti ti-clipboard-list" style="font-size:32px;margin-bottom:8px;display:block"></i>発注なし<div style="font-size:12px;margin-top:6px">Inventory棚卸を確定すると自動でドラフトが作成されます</div></div>`;
  return html;
}

function updateDraftQty(storeId, orderId, idx, val) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.lines[idx].qty = parseFloat(val)||0; o.amount = o.lines.reduce((a,l)=>a+l.price*l.qty,0); lsSet('orders_'+storeId, orders); }
}
function removeDraftLine(storeId, orderId, idx) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.lines.splice(idx,1); o.amount = o.lines.reduce((a,l)=>a+l.price*l.qty,0); if(!o.lines.length){orders=orders.filter(x=>x.id!==orderId);} lsSet('orders_'+storeId, orders); renderPage('order'); }
}
function confirmOrder(storeId, orderId) {
  var orders = ls('orders_'+storeId, []);
  var o = orders.find(x=>x.id===orderId);
  if (o) { o.status='発注確定'; lsSet('orders_'+storeId, orders); showToast('発注を確定しました', 'success'); renderPage('order'); }
}
function cancelOrder(storeId, orderId) {
  if (!confirm('この発注を削除しますか？')) return;
  lsSet('orders_'+storeId, ls('orders_'+storeId,[]).filter(x=>x.id!==orderId));
  showToast('削除しました', 'danger');
  renderPage('order');
}

/* 発注方法別テキスト生成 */
function buildOrderText(o, vendor, storeId, method) {
  var store = STORES.find(s=>s.id===storeId)||{name:storeId};
  var delivery = o.deliveryDate || '次回納品日';
  var lines = o.lines.map(l=>`・${l.name} ${l.qty}${l.unit}`).join('\n');
  if (method==='LINE') {
    return `${o.vendor} Order / ${store.name} / ${delivery}納品希望\n\n${lines}\n\nよろしくお願いします。`;
  } else if (method==='Text') {
    return `${store.name} Order\nDelivery: ${delivery}\n\n${o.lines.map(l=>`${l.name} x${l.qty}`).join('\n')}\n\nThank you.`;
  } else if (method==='Email') {
    return `To: ${vendor.email}\nSubject: ${store.name} Order for ${delivery} Delivery\n\nHi,\n\nPlease see our order below for ${store.name}.\n\nDelivery Date: ${delivery}\n\nItems:\n${lines}\n\nThank you,\n${store.name}`;
  } else if (method==='電話') {
    return `【電話発注リスト】${o.vendor}\nTEL: ${vendor.phone}\n納品: ${delivery}\n\n${lines}`;
  } else { // Web/FAX/その他
    return `${o.vendor} 発注 / ${store.name} / ${delivery}\n${vendor.webform?'Webフォーム: '+vendor.webform+'\n':''}\n${lines}`;
  }
}

function openSendModal(storeId, orderId) {
  var o = ls('orders_'+storeId, []).find(x=>x.id===orderId);
  if (!o) return;
  var vendor = getVendors().find(v=>v.name===o.vendor)||{};
  var method = vendorMethod(vendor, storeId);
  var text = buildOrderText(o, vendor, storeId, method);
  var phoneFields = method==='電話' ? `
    <div class="form-row">
      <div class="form-group"><label class="form-label">担当者名</label><input class="form-input" id="snd-contact" placeholder="話した相手"></div>
      <div class="form-group"><label class="form-label">確認番号</label><input class="form-input" id="snd-confirm" placeholder="任意"></div>
    </div>` : '';
  openModal(`<div class="modal-title">${o.vendor} へ${method}発注 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">納品希望日</label><input class="form-input" id="snd-delivery" type="date" onchange="updateDraftDelivery('${storeId}','${orderId}',this.value)" value="${o.deliveryDate||''}"></div>
    <div class="form-group"><label class="form-label">${method}用テキスト（コピーして使用）</label>
      <textarea class="form-textarea" id="snd-text" style="min-height:160px;font-size:12px" readonly>${text}</textarea>
      <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="copyOrderText()"><i class="ti ti-copy"></i> コピー</button>
      ${vendor.webform&&method==='Webフォーム'?`<a href="${vendor.webform}" target="_blank" class="btn btn-secondary btn-sm" style="margin-top:6px;margin-left:6px;text-decoration:none"><i class="ti ti-external-link"></i> Webフォームを開く</a>`:''}
    </div>
    ${phoneFields}
    <div class="form-group"><label class="form-label">メモ</label><input class="form-input" id="snd-memo" placeholder="任意"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">閉じる</button>
      <button class="btn btn-success" onclick="markOrderSent('${storeId}','${orderId}','${method}')"><i class="ti ti-check"></i> ${method==='電話'?'電話済みに':'送信済みに'}</button>
    </div>`);
}
function updateDraftDelivery(storeId, orderId, val) {
  var orders = ls('orders_'+storeId, []);

function addOrderLine(storeId, vendorName) {

/* 勤怠明細: 従業員ごとの週実働時間×時給。OTは週40h超を1.5倍 */
/* 勤怠明細: 日曜起算の週。Toastからregular/overtime別取得、または手入力 */
function laborWeekStr() {
  // 日曜起算の週の日曜日を返す（YYYY-MM-DD）
  var d = new Date();
  var sun = new Date(d); sun.setDate(d.getDate() - d.getDay()); // 日曜
  return sun.toISOString().slice(0,10);
}
function laborWeekRange(weekSunISO) {
  var sun = new Date(weekSunISO+'T00:00:00');
  var sat = new Date(sun); sat.setDate(sun.getDate()+6);
  return { from: weekSunISO, to: sat.toISOString().slice(0,10),
    label: `${sun.getMonth()+1}/${sun.getDate()}〜${sat.getMonth()+1}/${sat.getDate()}` };
}
function getLaborHours(storeId, week) { return ls('labor_hours_'+storeId+'_'+week, {}); } // {empName:{regular,ot,wage,source}}
function setLaborHours(storeId, week, data) { lsSet('labor_hours_'+storeId+'_'+week, data); }

function laborForEmployee(name, entry) {
  // entry: {regular, ot} があればそれを使う（Toast/手入力）。無ければ0
  var wage = empWage(name);
  var reg = (entry && entry.regular!=null) ? entry.regular : 0;
  var ot = (entry && entry.ot!=null) ? entry.ot : 0;
  var regPay = reg*wage;
  var otPay = ot*wage*1.5;
  return { wage, reg, ot, regPay, otPay, total: regPay+otPay };
}

function renderLaborDetail(storeId, store) {
  var week = laborWeekStr();
  var range = laborWeekRange(week);
  var hoursData = getLaborHours(storeId, week);
  var staff = staffForStore(storeId);
  var canWage = canViewWages();
  var hasGuid = !!store.toastGuid;

  var html = `<div class="card"><div class="card-title"><i class="ti ti-clock-hour-8"></i>勤怠明細（日〜土）
    <span style="margin-left:auto;font-size:11px;color:var(--muted)">${canWage?'時給表示中(GM)':'時給は非開示'}</span></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">対象週: ${range.label}（OTは日曜起算・週40h超をToastが自動計算）</div>`;

  // Toast勤怠取得（GUIDあれば）
  if (hasGuid) {
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn btn-primary btn-sm" onclick="doToastLaborFetch('${storeId}','${store.toastGuid}','${week}')"><i class="ti ti-cloud-download"></i> Toast勤怠を自動取得</button>
    </div>
    <div id="labor-status" style="font-size:12px;margin-bottom:8px">${laborLastFetch?`<span style="color:var(--green)">✓ ${laborLastFetch}</span>`:''}</div>`;
  }

  // 表示対象 = マスター在籍スタッフ ＋ Toastで取れたがマスターに無い従業員
  var staffNames = staff.map(s=>s.name);
  var toastOnly = Object.keys(hoursData).filter(n=>!staffNames.includes(n) && hoursData[n] && hoursData[n].source==='toast');

  var totalCost = 0, totalReg = 0, totalOt = 0;
  html += `<table class="inv-table" style="width:100%;font-size:12px"><thead><tr>
    <th>従業員</th><th>通常h</th><th>OT h</th>${canWage?'<th>人件費</th>':''}<th></th></tr></thead><tbody>`;
  // マスター在籍スタッフ
  staff.forEach(e => {
    var entry = hoursData[e.name] || null;
    var calc = laborForEmployee(e.name, entry);
    totalCost += calc.total; totalReg += calc.reg; totalOt += calc.ot;
    var src = entry && entry.source==='toast' ? ' <i class="ti ti-plug-connected" style="font-size:10px;color:var(--accent2)" title="Toast勤怠"></i>' : '';
    html += `<tr>
      <td>${e.name}${src}<div style="font-size:9px;color:var(--muted)">${ROLE_CONFIG[e.role].label}</div></td>
      <td>${calc.reg>0?calc.reg+'h':'—'}</td>
      <td>${calc.ot>0?`<span class="tag tag-yellow" style="font-size:9px">${calc.ot}h</span>`:'—'}</td>
      ${canWage?`<td style="font-weight:600">$${Math.round(calc.total)}<div style="font-size:8px;color:var(--muted)">通$${Math.round(calc.regPay)}+OT$${Math.round(calc.otPay)}</div></td>`:''}
      <td><button class="btn btn-secondary btn-sm" style="padding:2px 6px" onclick="openLaborHourModal('${storeId}','${e.name.replace(/'/g,'')}')"><i class="ti ti-edit" style="font-size:11px"></i></button></td>
    </tr>`;
  });
  // Toastのみ（マスター未登録）→ 時間は表示、人件費は時給未設定で$0
  toastOnly.forEach(name => {
    var entry = hoursData[name];
    var reg = entry.regular||0, ot = entry.ot||0;
    totalReg += reg; totalOt += ot;
    html += `<tr style="opacity:0.85">
      <td>${name} <i class="ti ti-plug-connected" style="font-size:10px;color:var(--accent2)"></i><div style="font-size:9px;color:var(--yellow)">マスター未登録</div></td>
      <td>${reg>0?reg+'h':'—'}</td>
      <td>${ot>0?`<span class="tag tag-yellow" style="font-size:9px">${ot}h</span>`:'—'}</td>
      ${canWage?`<td style="color:var(--muted)">$0<div style="font-size:8px;color:var(--muted)">時給未設定</div></td>`:''}
      <td></td>
    </tr>`;
  });
  html += '</tbody></table>';
  if (toastOnly.length) {
    html += `<div class="alert alert-warning" style="padding:8px 10px;margin-top:8px;font-size:11px"><i class="ti ti-info-circle"></i><div>Toastで${toastOnly.length}名の勤怠を取得しましたが、従業員マスターに未登録のため人件費が$0です。設定系→従業員マスターで登録し、所属をこの店舗・時給を設定すると人件費まで自動計算されます。</div></div>`;
  }

  // サマリー
  var data = storeData(storeId);
  var laborRate = data.a ? Math.round(totalCost/(data.a/4.3)*1000)/10 : 0;
  html += `<div class="kpi-grid" style="margin-top:12px">
    ${kpi('通常時間', Math.round(totalReg*10)/10+'h', (staff.length+toastOnly.length)+'名', 'var(--tm)')}
    ${kpi('OT時間', Math.round(totalOt*10)/10+'h', '週40h超', totalOt>0?'var(--yellow)':'var(--muted)')}
    ${canWage?kpi('週人件費', '$'+Math.round(totalCost).toLocaleString(), 'OT1.5倍込み', 'var(--tm)'):''}
    ${canWage?kpi('Labor率', laborRate+'%', '対週売上', laborRate<=29?'var(--green)':'var(--red)'):''}
  </div>`;
  html += `<p style="font-size:11px;color:var(--muted);margin-top:8px">※ Toast勤怠は通常時間・OT時間が別出力（日曜起算でToast計算済み）。時給は従業員マスター（GM限定）。</p>`;
  html += '</div>';
  return html;
}

/* Toast勤怠取得: Edge Functionのlaborモードで regularHours/overtimeHours を取得 */
var laborLastFetch = null;
async function doToastLaborFetch(storeId, guid, week) {
  var el = document.getElementById('labor-status');
  if (el) el.textContent = 'Toast勤怠を取得中...';
  var range = laborWeekRange(week);
  try {
    var res = await fetch(TOAST_SYNC_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({ restaurantGuid: guid, mode: 'labor', startDate: range.from.replace(/-/g,''), endDate: range.to.replace(/-/g,'') }),
    });
    var j = await res.json();
    if (j && Array.isArray(j.employees)) {
      var hoursData = getLaborHours(storeId, week);
      var matched = 0;
      j.employees.forEach(emp => {
        // 時間が0でない従業員のみ反映（打刻なしを除外）
        if ((emp.regularHours||0)===0 && (emp.overtimeHours||0)===0) return;
        var staff = staffForStore(storeId).find(s => s.name===emp.name || (emp.name && s.name.includes(emp.name)) || (emp.name && emp.name.includes(s.name)));
        var key = staff ? staff.name : emp.name;
        hoursData[key] = { regular: emp.regularHours||0, ot: emp.overtimeHours||0, source:'toast', toastName: emp.name };
        if (staff) matched++;
      });
      setLaborHours(storeId, week, hoursData);
      var withHours = j.employees.filter(e=>(e.regularHours||0)>0||(e.overtimeHours||0)>0).length;
      laborLastFetch = `勤怠取得成功: ${withHours}名分（マスター一致${matched}名）`;
      renderPage('labor');
    } else {
      laborLastFetch = null;
      if (el) el.innerHTML = `<span style="color:var(--yellow)">勤怠データを取得できませんでした。詳細: ${(JSON.stringify(j)||'').slice(0,120)}</span>`;
    }
  } catch(e) { laborLastFetch=null; if (el) el.textContent = 'エラー: ' + String(e); }
}

var shiftAssignTmp = [];
var shiftStoreId = null;
function openShiftCreateModal(storeId) {
  shiftStoreId = storeId;
  var emps = getEmployees().filter(e=>e.status!=='退職' && (e.store===storeId || (e.support||[]).includes(storeId) || e.store==='ALL'));
  var shifts = ls('shifts_'+storeId, []);
  var existing = shifts.find(s=>s.week===getWeekStr());
  shiftAssignTmp = existing ? JSON.parse(JSON.stringify(existing.assignments)) : emps.map(e=>({name:e.name, days:[]}));
  renderShiftCreateBody(storeId);
}
function renderShiftCreateBody(storeId) {
  var days = ['月','火','水','木','金','土','日'];
  openModal(`<div class="modal-title">シフト作成 (${getWeekStr()}週) <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div style="max-height:50vh;overflow-y:auto">
    ${shiftAssignTmp.map((a,idx)=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">${a.name}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${days.map(d=>`<div class="shift-slot${a.days.includes(d)?' sel':''}" style="padding:4px 8px" onclick="toggleShiftAssign(${idx},'${d}')">${d}</div>`).join('')}
      </div>
    </div>`).join('')}
    </div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveShift('${storeId}')">下書き保存</button></div>`);
}
function toggleShiftAssign(idx, day) {
  var a = shiftAssignTmp[idx];
  if (a.days.includes(day)) a.days = a.days.filter(d=>d!==day);
  else a.days.push(day);
  renderShiftCreateBody(shiftStoreId);
}
function saveShift(storeId) {
  var shifts = ls('shifts_'+storeId, []);
  var week = getWeekStr();
  var existing = shifts.find(s=>s.week===week);
  if (existing) { existing.assignments = shiftAssignTmp; existing.status='下書き'; }
  else shifts.push({week, assignments:JSON.parse(JSON.stringify(shiftAssignTmp)), status:'下書き'});
  lsSet('shifts_'+storeId, shifts);
  closeModalDirect();
  showToast('シフトを下書き保存しました', 'success');
  renderPage('labor');
}
function publishShift(storeId) {
  var shifts = ls('shifts_'+storeId, []);
  var s = shifts.find(x=>x.week===getWeekStr());
  if (s) { s.status='公開済'; lsSet('shifts_'+storeId, shifts); showToast('シフトを公開しました', 'success'); renderPage('labor'); }
}

  if (shiftAdminTab==='status') html += renderShiftStatus(storeId, week);
  else if (shiftAdminTab==='build') html += renderShiftBuild(storeId, week);
  else html += renderShiftLabor(storeId, week);
  return html;
}
function setShiftAdminTab(t) { shiftAdminTab = t; renderPage('shift_admin'); }
function setShiftView(v) { shiftView = v; renderPage('shift_admin'); }

/* 提出状況 */
function renderShiftStatus(storeId, week) {
  var staff = staffForStore(storeId);
  var avail = getAvailability(storeId, week);
  var submitted = avail.map(a=>a.name);
  var pending = staff.filter(e=>!submitted.includes(e.name));
  var rate = staff.length ? Math.round(submitted.length/staff.length*100) : 0;
  var reminded = ls('reminded_'+storeId+'_'+week, []);

  var html = `<div class="kpi-grid" style="margin-bottom:12px">
    ${kpi('提出済', submitted.length, '名', 'var(--green)')}
    ${kpi('未提出', pending.length, '名', pending.length?'var(--red)':'var(--green)')}
    ${kpi('提出率', rate+'%', week+'週', rate>=80?'var(--green)':'var(--yellow)')}
    ${kpi('対象', staff.length, '名', 'var(--tm)')}
  </div>`;

  html += `<div class="card"><div class="card-title"><i class="ti ti-check"></i>提出済み (${submitted.length})</div>`;
  if (submitted.length) {
    avail.forEach(a => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${a.name}</div><span class="tag tag-green">${a.slots.length}枠</span></div>
        <div class="approval-meta">${a.slots.map(s=>s.day+s.period).join(', ')}${a.notes?' · '+a.notes:''}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">提出なし</p>`; }
  html += '</div>';

  if (pending.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clock" style="color:var(--red)"></i>未提出 (${pending.length})
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="remindAll('${storeId}','${week}')"><i class="ti ti-bell"></i> 全員Remind</button></div>`;
    pending.forEach(e => {
      var done = reminded.includes(e.name);
      html += `<div class="staff-item"><div class="staff-avatar">${e.name[0]}</div>
        <div style="flex:1"><div class="staff-name">${e.name}</div><div class="staff-role">${ROLE_CONFIG[e.role].label}</div></div>
        ${done?'<span class="tag tag-yellow">Remind済</span>':`<button class="btn btn-secondary btn-sm" onclick="remindOne('${storeId}','${week}','${e.name}')">Remind</button>`}
      </div>`;
    });
    html += '</div>';
  }
  return html;
}
function remindOne(storeId, week, name) {
  var r = ls('reminded_'+storeId+'_'+week, []); if(!r.includes(name)) r.push(name); lsSet('reminded_'+storeId+'_'+week, r);
  showToast(`${name}にRemindを送信しました`, 'success'); renderPage('shift_admin');
}
function remindAll(storeId, week) {
  var staff = staffForStore(storeId); var avail = getAvailability(storeId, week).map(a=>a.name);
  var pending = staff.filter(e=>!avail.includes(e.name)).map(e=>e.name);
  lsSet('reminded_'+storeId+'_'+week, pending);
  showToast(`${pending.length}名にRemindを送信しました`, 'success'); renderPage('shift_admin');
}

/* シフト作成（Grid + Auto-Generate + 警告） */
function renderShiftBuild(storeId, week) {
  var positions = getStorePositions(storeId);
  var plan = getShiftPlan(storeId, week) || {status:'下書き', cells:{}};
  var warnings = checkShiftWarnings(storeId, week, plan);

  var html = `<div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn btn-primary btn-sm" onclick="autoGenShift('${storeId}','${week}')"><i class="ti ti-wand"></i> Auto-Generate</button>
    <button class="btn btn-secondary btn-sm" onclick="setShiftView('${shiftView==='grid'?'list':'grid'}')"><i class="ti ti-layout-grid"></i> ${shiftView==='grid'?'List':'Grid'}</button>
    ${plan.status==='下書き'?`<button class="btn btn-success btn-sm" onclick="publishShiftPlan('${storeId}','${week}')"><i class="ti ti-send"></i> 公開</button>`:`<span class="tag tag-green" style="align-self:center">公開済</span>`}
  </div>`;

  if (warnings.length) {
    html += `<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i><div><p style="font-size:12px;font-weight:600">警告 ${warnings.length}件</p>
      <div style="font-size:11px">${warnings.map(w=>'・'+w).join('<br>')}</div></div></div>`;
  } else {
    html += `<div class="alert alert-success" style="padding:8px 10px"><i class="ti ti-circle-check"></i>警告なし</div>`;
  }

  if (shiftView==='grid') {
    html += `<div class="card" style="overflow-x:auto"><table class="inv-table" style="min-width:560px"><thead><tr><th>枠</th>${DOW_SHIFT.map(d=>`<th style="text-align:center">${d}</th>`).join('')}</tr></thead><tbody>`;
    SHIFT_PERIODS.forEach(period => {
      positions.forEach(pos => {
        html += `<tr><td style="font-size:11px;white-space:nowrap">${period.slice(0,1)}·${pos.slice(0,4)}</td>`;
        DOW_SHIFT.forEach(day => {
          var key = day+'_'+period+'_'+pos;
          var assigned = plan.cells[key] || '';
          html += `<td style="text-align:center;padding:2px"><div class="shift-slot${assigned?' sel':''}" style="font-size:10px;padding:3px;min-height:24px" onclick="openCellAssign('${storeId}','${week}','${key}','${day}','${period}','${pos}')">${assigned?assigned.split(' ')[0].slice(0,5):'+'}</div></td>`;
        });
        html += '</tr>';
      });
    });
    html += '</tbody></table></div>';
  } else {
    // List view by day
    DOW_SHIFT.forEach(day => {
      var dayKeys = Object.keys(plan.cells).filter(k=>k.startsWith(day+'_') && plan.cells[k]);
      if (!dayKeys.length) return;
      html += `<div class="card"><div class="card-title">${day}曜日</div>`;
      dayKeys.forEach(k => {
        var parts = k.split('_'); 
        html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)"><span>${parts[1]} ${parts[2]}</span><span style="font-weight:600">${plan.cells[k]}</span></div>`;
      });
      html += '</div>';
    });
  }
  return html;
}

function openCellAssign(storeId, week, key, day, period, pos) {
  var avail = getAvailability(storeId, week);
  var staff = staffForStore(storeId);
  // この枠に出せる人: Availabilityでday/period提出 かつ pos承認済（Leader等）
  var candidates = staff.filter(e => {
    var av = avail.find(a=>a.name===e.name);
    var available = av && av.slots.some(s=>s.day===day && s.period===period);
    var posOk = pos==='Server'||pos==='Prep'||pos==='Host'||pos==='Cashier'||pos==='Kitchen' ? true : approvedPositions(e.name).includes(pos) || e.role==='sl' || e.role==='am';
    return available || !av; // availabilityある人優先だが、未提出者も選べる
  });
  var plan = getShiftPlan(storeId, week) || {status:'下書き', cells:{}};
  var html = `<div class="modal-title">${day} ${period} · ${pos} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">スキル・Tip Rate・Availabilityを確認して配置</p>
    <div style="max-height:50vh;overflow-y:auto">`;
  candidates.forEach(e => {
    var av = avail.find(a=>a.name===e.name);
    var available = av && av.slots.some(s=>s.day===day && s.period===period);
    var tip = ls('tip_requests',[]).filter(r=>r.name===e.name&&r.status==='承認').slice(-1)[0];
    var ap = approvedPositions(e.name);
    var posOk = ap.includes(pos);
    var isLeader = leaderSkillApproved(e.name);
    html += `<div class="staff-item" style="cursor:pointer" onclick="assignCell('${storeId}','${week}','${key}','${e.name}')">
      <div class="staff-avatar">${e.name[0]}</div>
      <div style="flex:1"><div class="staff-name">${e.name} ${isLeader?'<span class="tag tag-blue" style="font-size:8px">Leader</span>':''}</div>
        <div class="staff-role">STEP ${e.step} · Tip ${tip?tip.rate+'%':'未'} ${posOk?'<span style="color:var(--green)">'+pos+'可</span>':'<span style="color:var(--muted)">'+pos+'未承認</span>'}</div>
        <div style="font-size:10px;color:${available?'var(--green)':'var(--red)'}">${available?'Availability OK':av?'この枠は希望外':'未提出'}</div>
      </div>
    </div>`;
  });
  html += `</div>
    <div class="btn-row">
      ${plan.cells[key]?`<button class="btn btn-danger" style="margin-right:auto" onclick="assignCell('${storeId}','${week}','${key}','')">クリア</button>`:''}
      <button class="btn btn-secondary" onclick="closeModalDirect()">閉じる</button>
    </div>`;
  openModal(html);
}
function assignCell(storeId, week, key, name) {
  var plan = getShiftPlan(storeId, week) || {status:'下書き', cells:{}};
  if (name) plan.cells[key] = name; else delete plan.cells[key];
  plan.status = '下書き';
  setShiftPlan(storeId, week, plan);
  closeModalDirect();
  renderPage('shift_admin');
}

/* Auto-Generate: Availability+Skill+Min/Maxを考慮 */
function autoGenShift(storeId, week) {
  if (!confirm('Availabilityとスキルを元にシフトを自動生成しますか？（既存の配置は上書きされます）')) return;
  var positions = getStorePositions(storeId);
  var avail = getAvailability(storeId, week);
  var staff = staffForStore(storeId);
  var plan = {status:'下書き', cells:{}};
  var shiftCount = {}; staff.forEach(e=>shiftCount[e.name]=0);
  var MAX = 8;

  DOW_SHIFT.forEach(day => {
    SHIFT_PERIODS.forEach(period => {
      positions.forEach(pos => {
        // この枠に出せる候補（Availability提出 + ポジション可 + Max未満）
        var cands = staff.filter(e => {
          var av = avail.find(a=>a.name===e.name);
          if (!av || !av.slots.some(s=>s.day===day && s.period===period)) return false;
          if (shiftCount[e.name] >= MAX) return false;
          if (pos==='Leader') return leaderSkillApproved(e.name);
          var ap = approvedPositions(e.name);
          if (['Opening','Closing','Training'].includes(pos)) return ap.includes(pos);
          return true; // 基礎ポジションは誰でも可
        });
        // スキル高い順・シフト少ない順
        cands.sort((a,b)=> (approvedPositions(b.name).length - approvedPositions(a.name).length) || (shiftCount[a.name]-shiftCount[b.name]));
        if (cands.length) {
          var pick = cands[0];
          plan.cells[day+'_'+period+'_'+pos] = pick.name;
          shiftCount[pick.name]++;
        }
      });
    });
  });
  setShiftPlan(storeId, week, plan);
  showToast('シフトを自動生成しました（要確認）', 'success');
  renderPage('shift_admin');
}

/* 自動チェック・警告 */
function checkShiftWarnings(storeId, week, plan) {
  var warnings = [];
  var positions = getStorePositions(storeId);
  var avail = getAvailability(storeId, week);
  DOW_SHIFT.forEach(day => {
    SHIFT_PERIODS.forEach(period => {
      var dayAssigned = Object.keys(plan.cells).filter(k=>k.startsWith(day+'_'+period+'_') && plan.cells[k]);
      if (!dayAssigned.length) return;
      // Leader不在チェック
      var hasLeader = dayAssigned.some(k=>{var n=plan.cells[k];return leaderSkillApproved(n)||k.includes('_Leader');});
      if (!hasLeader && positions.includes('Leader')) warnings.push(`${day} ${period}: Leaderがいません`);
      // 新人のみチェック
      var names = dayAssigned.map(k=>plan.cells[k]);
      var allNew = names.every(n=>{var e=getEmployees().find(x=>x.name===n);return e&&e.step<=0;});
      if (allNew && names.length) warnings.push(`${day} ${period}: 新人のみの配置です`);
      // Availability外チェック
      dayAssigned.forEach(k=>{
        var n=plan.cells[k]; var av=avail.find(a=>a.name===n);
        if (av && !av.slots.some(s=>s.day===day && s.period===period)) warnings.push(`${day} ${period}: ${n}はAvailability外`);
      });
    });
    // Opening/Closing担当チェック
    if (positions.includes('Opening')) { var hasOpen=Object.keys(plan.cells).some(k=>k.startsWith(day+'_')&&k.includes('_Opening')&&plan.cells[k]); if(!hasOpen && Object.keys(plan.cells).some(k=>k.startsWith(day+'_')&&plan.cells[k])) warnings.push(`${day}: Opening担当未設定`); }
  });
  // Overtime（週8枠超）
  var cnt={}; Object.values(plan.cells).forEach(n=>{if(n)cnt[n]=(cnt[n]||0)+1;});
  Object.keys(cnt).forEach(n=>{ if(cnt[n]>10) warnings.push(`${n}: Overtimeの可能性（${cnt[n]}枠）`); });
  return warnings.slice(0,8);
}

function publishShiftPlan(storeId, week) {
  var plan = getShiftPlan(storeId, week);
  if (!plan || !Object.keys(plan.cells).length) { alert('シフトが空です'); return; }
  var warnings = checkShiftWarnings(storeId, week, plan);
  if (warnings.length && !confirm(`警告が${warnings.length}件あります。公開しますか？`)) return;
  plan.status = '公開済'; plan.publishedDate = new Date().toLocaleDateString('ja');
  setShiftPlan(storeId, week, plan);
  showToast('シフトを公開しました', 'success');
  renderPage('shift_admin');
}

/* Labor Cost Simulation */
function renderShiftLabor(storeId, week) {
  var plan = getShiftPlan(storeId, week) || {cells:{}};
  var emps = getEmployees();
  var hoursByName = {};
  Object.keys(plan.cells).forEach(k => {
    var name = plan.cells[k]; if(!name) return;
    var period = k.split('_')[1];
    hoursByName[name] = (hoursByName[name]||0) + (SHIFT_HOURS[period]||4);
  });
  var crewCost=0, leaderCost=0, crewHours=0, leaderHours=0, crewShifts=0;
  Object.keys(hoursByName).forEach(name => {
    var e = emps.find(x=>x.name===name); if(!e) return;
    var wage = WAGE[e.role]||16;
    var cost = hoursByName[name]*wage;
    if (e.role==='sl'||e.role==='am') { leaderCost+=cost; leaderHours+=hoursByName[name]; }
    else { crewCost+=cost; crewHours+=hoursByName[name]; crewShifts += Object.keys(plan.cells).filter(k=>plan.cells[k]===name).length; }
  });
  var healthIns = Math.round((crewCost+leaderCost)*0.08);
  var payrollTax = Math.round((crewCost+leaderCost)*0.0765);
  var totalLabor = crewCost+leaderCost+healthIns+payrollTax;
  var budget = getBudgets ? (getBudgets().find(b=>b.storeId===storeId)) : null;
  var weeklySales = budget ? Math.round((budget.actual||0)/4.3) : 50000;
  var laborPct = weeklySales ? Math.round(totalLabor/weeklySales*1000)/10 : 0;

  var html = `<div class="kpi-grid" style="margin-bottom:12px">
    ${kpi('週Labor合計', '$'+totalLabor.toLocaleString(), week+'週', 'var(--tm)')}
    ${kpi('Labor %', laborPct+'%', '目標 ≤29%', laborPct<=29?'var(--green)':laborPct<=32?'var(--yellow)':'var(--red)')}
    ${kpi('Crew時間', crewHours+'h', crewShifts+'シフト', 'var(--tm)')}
    ${kpi('Leader時間', leaderHours+'h', '/週', 'var(--tm)')}
  </div>
  <div class="card"><div class="card-title"><i class="ti ti-calculator"></i>Labor Cost内訳</div>
    <table class="inv-table"><tbody>
      <tr><td>Store Leader cost</td><td style="text-align:right">$${leaderCost.toLocaleString()}</td></tr>
      <tr><td>Crew Wages</td><td style="text-align:right">$${crewCost.toLocaleString()}</td></tr>
      <tr><td>Health Insurance (8%)</td><td style="text-align:right">$${healthIns.toLocaleString()}</td></tr>
      <tr><td>Payroll Tax (7.65%)</td><td style="text-align:right">$${payrollTax.toLocaleString()}</td></tr>
      <tr style="font-weight:700"><td>Total Weekly Labor</td><td style="text-align:right;color:var(--accent)">$${totalLabor.toLocaleString()}</td></tr>
      <tr><td>Weekly Sales (予算)</td><td style="text-align:right">$${weeklySales.toLocaleString()}</td></tr>
      <tr style="font-weight:700"><td>Labor Cost %</td><td style="text-align:right;color:${laborPct<=29?'var(--green)':'var(--red)'}">${laborPct}%</td></tr>
    </tbody></table>
    <p style="font-size:11px;color:var(--muted);margin-top:6px">※ 時給・保険率は仮値。シフト配置を変えるとLabor Costが変動します</p>
  </div>`;
  return html;
}

/* ============================================================
   My Shift (Crew側: Availability提出 + シフト確認 + 変更申請)
============================================================ */
var availTmp = {};
function renderShiftStaff() {
  var me = ROLE_CONFIG[curRole].name;
  var emp = getEmployees().find(e=>e.name===me);

  var html = `<div class="section-header"><div><div class="section-title">My Shift</div><div class="section-sub">${week}週</div></div></div>`;

  // 勤務条件ルール表示
  html += `<div class="card"><div class="card-title"><i class="ti ti-info-circle"></i>勤務条件</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <span class="tag tag-gray">Min 6 shifts</span><span class="tag tag-gray">Max 8 shifts</span>
      <span class="tag tag-gray">Consecutive OK</span>

  // Availability提出/編集
  if (myAvail) {
    html += `<div class="card"><div class="alert alert-success" style="margin:0"><i class="ti ti-circle-check"></i><div>
      <p style="font-size:13px;font-weight:600">Availability Submitted</p>

    </div>`;
  } else {
    html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-plus"></i>Availability提出</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">${week}週の勤務可能枠を提出してください</p>
      <button class="btn btn-primary" style="width:100%" onclick="openAvailModal('${storeId}','${week}')"><i class="ti ti-send"></i> Submit Availability</button>
    </div>`;

  // 公開シフト確認
  if (plan && plan.status==='公開済') {

    html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-check"></i>公開シフト</div>`;
    if (myCells.length) {
      myCells.forEach(k => {

        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-size:13px;font-weight:600">${parts[0]}曜 ${parts[1]}</div><div style="font-size:11px;color:var(--muted)">${parts[2]}</div></div>
          <button class="btn btn-secondary btn-sm" onclick="openShiftChangeModal('${storeId}','${week}','${k}')">変更申請</button>
        </div>`;
      });
    } else { html += `<p style="color:var(--muted);font-size:13px">この週のシフトはありません</p>`; }

        <div class="approval-meta">${c.reason}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function getWeekStr() {
  var d = new Date(); var day = d.getDay();
  var diff = d.getDate() - day + (day===0?-6:1);
  var mon = new Date(d.setDate(diff));
  return (mon.getMonth()+1)+'/'+(mon.getDate());
}

  // 採用決定 → 従業員化 + OB自動生成

    if (confirm(`${c.name} さんを従業員化しますか？\n（従業員マスター登録＋Onboarding自動生成）`)) {

  var store = STORES.find(s=>s.name===c.store);
  var storeId = store ? store.id : STORES[0].id;
  // 従業員マスターに登録
  var emps = getEmployees();
  if (!emps.find(e=>e.name===c.name)) {
    emps.push({id:'e'+Date.now(), name:c.name, role:'crew', store:storeId, support:[],
      emp:'アルバイト', step:0, hireDate:new Date().toISOString().slice(0,10), status:'研修中', perms:'crew'});
    lsSet('m_employees', emps);

  // Onboarding生成（テンプレート適用）
  var obs = ls('onboardings', []);
  obs.push({id:'ob'+Date.now(), name:c.name, store:c.store, startDate:new Date().toLocaleDateString('ja'), progress:0,

const DEFAULT_OB_TEMPLATE = [
  {id:'t1', label:'会社説明・理念の確認', type:'説明', who:'本人', required:true},
  {id:'t2', label:'就業規則の確認', type:'説明', who:'本人', required:true},

  {id:'t12', label:'シフト解禁(Crew化)', type:'完了条件', who:'管理者', required:true},
];
function getOBTemplate() { return ls('ob_template', DEFAULT_OB_TEMPLATE); }
function setOBTemplate(t) { lsSet('ob_template', t); }

function renderOnboarding() {
  var obs = ls('onboardings', []);
  var canEditTemplate = (curRole==='gm' || curRole==='ceo');
  var html = `<div class="section-header">
    <div><div class="section-title">Onboarding</div><div class="section-sub">採用→従業員化→研修→Crew化</div></div>
    <div style="display:flex;gap:6px">
      ${canEditTemplate?`<button class="btn btn-secondary btn-sm" onclick="openOBTemplateModal()"><i class="ti ti-template"></i> テンプレート</button>`:''}
      <button class="btn btn-primary btn-sm" onclick="openOBModal()"><i class="ti ti-plus"></i> 追加</button>
    </div>
  </div>`;

  if (!obs.length) {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:40px"><i class="ti ti-school" style="font-size:32px;display:block;margin-bottom:8px"></i>進行中のOnboardingなし<div style="font-size:12px;margin-top:6px">採用決定→従業員化で自動生成されます</div></div>`;
    return html;
  }

  obs.forEach(ob => {
    var tmpl = ob.template || getOBTemplate();
    var done = ob.done || [];
    var total = tmpl.length;
    var doneCount = tmpl.filter(t=>done.includes(t.id)).length;
    var progress = total ? Math.round(doneCount/total*100) : 0;
    // 詳細集計
    var selfPending = tmpl.filter(t=>t.who==='本人' && !done.includes(t.id));
    var mgrPending = tmpl.filter(t=>t.who==='管理者' && !done.includes(t.id));
    var docPending = tmpl.filter(t=>t.type==='書類' && !done.includes(t.id));
    var eduPending = tmpl.filter(t=>t.type==='教育' && !done.includes(t.id));
    var nextItem = tmpl.find(t=>!done.includes(t.id));
    var complete = doneCount===total;

    html += `<div class="card">
      <div class="approval-header">
        <div class="staff-item" style="padding:0;background:none;border:none;margin:0">
          <div class="staff-avatar" style="background:var(--surface2)">${ob.name[0]}</div>
          <div><div class="staff-name">${ob.name}</div><div class="staff-role">${ob.store} · 開始 ${ob.startDate}</div></div>
        </div>
        <div style="font-size:20px;font-weight:700;color:${complete?'var(--green)':'var(--accent2)'}">${progress}%</div>
      </div>
      <div class="progress-bar" style="margin:10px 0"><div class="progress-fill" style="background:${complete?'var(--green)':'var(--accent2)'};width:${progress}%"></div></div>`;

    // 詳細進捗サマリー
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:11px">
      <span class="tag ${selfPending.length?'tag-yellow':'tag-green'}">本人確認待ち ${selfPending.length}</span>
      <span class="tag ${mgrPending.length?'tag-yellow':'tag-green'}">管理者確認待ち ${mgrPending.length}</span>
      <span class="tag ${docPending.length?'tag-red':'tag-green'}">書類 ${docPending.length}未</span>
      <span class="tag ${eduPending.length?'tag-red':'tag-green'}">教育 ${eduPending.length}未</span>
    </div>`;
    if (nextItem) html += `<div class="alert alert-warning" style="padding:7px 10px;margin-bottom:10px"><i class="ti ti-arrow-right"></i>次にやる: <strong>${nextItem.label}</strong> <span style="font-size:10px">(${nextItem.who})</span></div>`;

    // 項目リスト（本人/管理者で分離表示）
    ['本人','管理者'].forEach(who => {
      var items = tmpl.filter(t=>t.who===who);
      if (!items.length) return;
      html += `<div style="font-size:11px;font-weight:700;color:var(--muted);margin:6px 0 2px">${who}チェック項目</div>`;
      items.forEach(t => {
        var isDone = done.includes(t.id);
        // 本人項目はCrew本人または管理者が、管理者項目は管理者のみがチェック可
        var canCheck = who==='管理者' ? ROLE_CONFIG[curRole].canApprove : true;
        html += `<div class="task-item" style="padding:5px 0">
          <div class="task-check${isDone?' done':''}" ${canCheck?`onclick="toggleOBTask('${ob.id}','${t.id}')"`:'style="opacity:.4"'}>${isDone?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}</div>
          <div style="flex:1"><div class="task-text${isDone?' done':''}" style="font-size:13px">${t.label}
            <span class="tag tag-gray" style="font-size:8px">${t.type}</span>${t.required?'<span class="tag tag-red" style="font-size:8px">必須</span>':''}
            ${t.link?`<a href="${t.link}" target="_blank" style="font-size:10px;color:var(--accent2)"><i class="ti ti-external-link"></i></a>`:''}</div></div>
        </div>`;
      });
    });

    // 完了→シフト誘導
    if (complete) {
      html += `<div class="alert alert-success" style="margin-top:10px"><i class="ti ti-circle-check"></i><div>
        <p style="font-size:12px;font-weight:600">Onboarding完了！Crewアカウント有効化済み</p>
        <p style="font-size:11px">${ob.name}さんはシフト申請が可能になりました</p></div></div>`;
    }
    html += '</div>';
  });
  return html;
}

function toggleOBTask(obId, taskId) {
  var obs = ls('onboardings', []);
  var ob = obs.find(o=>o.id===obId);
  if (!ob) return;
  if (!ob.done) ob.done = [];
  var tmpl = ob.template || getOBTemplate();
  if (ob.done.includes(taskId)) ob.done = ob.done.filter(t=>t!==taskId);
  else ob.done.push(taskId);
  ob.progress = Math.round(ob.done.length/tmpl.length*100);
  lsSet('onboardings', obs);

  // シフト解禁(Crew化)/完了条件タスク完了 → 従業員マスターを在籍/Crewへ昇格
  var task = tmpl.find(t=>t.id===taskId);
  if (task && (task.type==='完了条件' || task.label.includes('Crew化')) && ob.done.includes(taskId)) {
    var emps = getEmployees();
    var e = emps.find(x=>x.name===ob.name);
    if (e) { e.status='在籍'; e.step=Math.max(e.step,1); lsSet('m_employees', emps); showToast(`${ob.name}がCrew化しました（在籍・STEP1）。シフト申請が可能です`, 'success'); }
  }
  renderPage('onboarding');
}

      <button class="btn btn-primary" onclick="saveOB()">追加</button>

function saveOB() {
  var name = document.getElementById('ob-name').value.trim();
  var storeId = document.getElementById('ob-store').value;
  var date = document.getElementById('ob-date').value;
  if (!name) return;
  var store = (STORES.find(s=>s.id===storeId)||{name:storeId}).name;

  obs.push({id:'ob'+Date.now(), name, store, startDate:date||new Date().toLocaleDateString('ja'), progress:0,
    template:JSON.parse(JSON.stringify(getOBTemplate())), done:[]});

function saveEmp(empId) {
  var name = document.getElementById('e-name').value.trim();
  if (!name) { alert('氏名を入力してください'); return; }
  var support = Array.from(document.querySelectorAll('.e-support:checked')).map(c=>c.value);
  var data = {
    name,
    role: document.getElementById('e-role').value,
    store: document.getElementById('e-store').value,
    support,
    emp: document.getElementById('e-emp').value,
    step: parseInt(document.getElementById('e-step').value),
    hireDate: document.getElementById('e-hire').value,
    status: document.getElementById('e-status').value,
    perms: document.getElementById('e-perms').value,
  };
  var wageEl = document.getElementById('e-wage');
  if (wageEl && canViewWages()) { data.wage = parseFloat(wageEl.value)||0; }
  var emps = getEmployees();
  if (empId) {
    var e = emps.find(x=>x.id===empId);
    if (e) Object.assign(e, data);
  } else {
    data.id = 'e' + Date.now();
    emps.push(data);
  }
  lsSet('m_employees', emps);
  closeModalDirect();
  showToast(empId?'従業員情報を更新しました':'従業員を登録しました', 'success');
  renderPage('staff_master');
}

function deleteEmp(empId) {
  if (!confirm('この従業員を退職処理しますか？')) return;
  var emps = getEmployees();
  var e = emps.find(x=>x.id===empId);
  if (e) { e.status = '退職'; lsSet('m_employees', emps); }
  closeModalDirect();
  showToast('退職処理しました', 'danger');
  renderPage('staff_master');
}

  </div>`;

  // カテゴリタブ（区分選択時のみ表示）

    var clsCats = cats.filter(c=>c.cls===ingClassFilter);
    html += `<div class="phase-tabs" style="margin-top:-6px">
      <div class="phase-tab${ingCatFilter==='all'?' active':''}" onclick="setIngCatFilter('all')">全て</div>
      ${clsCats.map(c=>`<div class="phase-tab${ingCatFilter==String(c.code)?' active':''}" onclick="setIngCatFilter('${c.code}')">${c.code} ${c.name}</div>`).join('')}
    </div>`;
  }

  html += `<div class="card">
    <table class="inv-table">
      <thead><tr><th>コード</th><th>食材名</th><th>区分/カテゴリ</th><th>単位</th><th>単価</th><th>歩留</th></tr></thead>
      <tbody>`;
  list.sort((a,b)=>a.code-b.code).forEach(i => {
    var clsId = catClass(i.cat);
    html += `<tr style="cursor:pointer" onclick="openIngModal('${i.code}')">

      <td>${i.unit}</td>
      <td>$${i.price.toFixed(2)}</td>
      <td><span class="tag ${i.yield>=90?'tag-green':i.yield>=75?'tag-yellow':'tag-red'}">${i.yield}%</span></td>
    </tr>`;
  });
  if (!list.length) html += `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">食材なし</td></tr>`;
  html += `</tbody></table></div>`;

  // 区分別サマリー（出力プレビュー）
  html += `<div class="card"><div class="card-title"><i class="ti ti-report"></i>区分別サマリー（出力プレビュー）
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="exportByClass()"><i class="ti ti-download"></i> CSV出力</button>
  </div>`;
  CLASSES.forEach(cl => {
    var clsIngs = ings.filter(i=>catClass(i.cat)===cl.id);
    if (!clsIngs.length) return;
    var totalVal = clsIngs.reduce((a,i)=>a+i.price,0);
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px"><span class="store-dot" style="background:${cl.color}"></span><span style="font-weight:600">${cl.name}</span></div>
      <div style="text-align:right"><span class="tag tag-gray">${clsIngs.length}品目</span></div>
    </div>`;
  });
  html += `<p style="font-size:11px;color:var(--muted);margin-top:8px">※ 在庫・発注・経理出力はこの4区分（食材／お酒／飲料／消耗品）で分離されます。お酒は申請・経理で別カウント。</p></div>`;
  return html;
}

function exportByClass() {
  var ings = getIngredients();
  var rows = [['区分','カテゴリコード','カテゴリ','食材コード','食材名','単位','仕入先','単価','歩留']];
  CLASSES.forEach(cl => {
    ings.filter(i=>catClass(i.cat)===cl.id).sort((a,b)=>a.code-b.code).forEach(i=>{
      rows.push([cl.name, i.cat, catName(i.cat), i.code, i.name, i.unit, i.vendor, i.price, i.yield+'%']);
    });
  });
  var csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  var blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'food_master_by_class.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('区分別CSVを出力しました', 'success');
}

function saveIng(code) {
  var name = document.getElementById('i-name').value.trim();
  if (!name) { alert('食材名を入力してください'); return; }
  var ings = getIngredients();
  var price = parseFloat(document.getElementById('i-price').value) || 0;
  var yld = parseFloat(document.getElementById('i-yield').value) || 100;
  var unit = document.getElementById('i-unit').value.trim() || 'kg';
  var vendor = document.getElementById('i-vendor').value;
  if (code) {
    var i = ings.find(x=>x.code===parseInt(code));
    if (i) Object.assign(i, {name, unit, vendor, price, yield:yld});
  } else {
    var cat = parseInt(document.getElementById('i-cat').value);
    // カテゴリ番号台で自動採番
    var inCat = ings.filter(x=>x.code>=cat && x.code<cat+1000);
    var maxCode = inCat.length ? Math.max(...inCat.map(x=>x.code)) : cat;
    var newCode = maxCode + 1;
    ings.push({code:newCode, name, cat, unit, vendor, price, yield:yld});
  }
  lsSet('m_ingredients', ings);
  closeModalDirect();
  showToast(code?'食材を更新しました':'食材を追加しました', 'success');
  renderPage('ingredient_master');
}

function deleteIng(code) {
  if (!confirm('この食材を削除しますか？')) return;
  var ings = getIngredients().filter(x=>x.code!==parseInt(code));
  lsSet('m_ingredients', ings);
  closeModalDirect();
  showToast('削除しました', 'danger');
  renderPage('ingredient_master');
}

        ${clsCats.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">

function saveCat() {
  var code = parseInt(document.getElementById('c-code').value);
  var name = document.getElementById('c-name').value.trim();
  var cls  = document.getElementById('c-class').value;
  if (!code || !name) { alert('コードとカテゴリ名を入力してください'); return; }
  var cats = getCategories();
  if (cats.find(c=>c.code===code)) { alert('そのコードは既に存在します'); return; }
  cats.push({code, name, cls});
  cats.sort((a,b)=>a.code-b.code);
  lsSet('m_categories', cats);
  showToast('カテゴリを追加しました', 'success');
  openCatModal();
}

function deleteCat(code) {
  var ings = getIngredients();
  if (ings.find(i=>i.cat===code)) { alert('このカテゴリには食材が登録されています'); return; }
  if (!confirm('このカテゴリを削除しますか？')) return;
  var cats = getCategories().filter(c=>c.code!==code);
  lsSet('m_categories', cats);
  openCatModal();
}

function setVendorRating(r, btn) {
  window._vendorRating = r;
  btn.parentElement.querySelectorAll('.btn').forEach((b,idx)=>{
    b.className = (idx < r) ? b.className.replace('btn-secondary','btn-primary') : b.className.replace('btn-primary','btn-secondary');
  });
}

function saveVendor(vId) {
  var name = document.getElementById('v-name').value.trim();
  if (!name) { alert('業者名を入力してください'); return; }
  var storeMethods = {};
  document.querySelectorAll('.sm-method').forEach(sel=>{ if(sel.value) storeMethods[sel.dataset.store]=sel.value; });
  var data = {
    name,
    contact: document.getElementById('v-contact').value.trim(),
    phone: document.getElementById('v-phone').value.trim(),
    sms: document.getElementById('v-sms').value.trim(),
    email: document.getElementById('v-email').value.trim(),
    line: document.getElementById('v-line').value.trim(),
    method: document.getElementById('v-method').value,
    webform: document.getElementById('v-webform').value.trim(),
    cutoff: document.getElementById('v-cutoff').value.trim(),
    leadtime: parseInt(document.getElementById('v-leadtime').value)||1,
    minOrder: parseInt(document.getElementById('v-min').value) || 0,
    terms: document.getElementById('v-terms').value,
    delivery: document.getElementById('v-delivery').value.trim(),
    rating: window._vendorRating || 3,
    storeMethods,
  };
  var vendors = getVendors();
  if (vId) {
    var v = vendors.find(x=>x.id===vId);
    if (v) Object.assign(v, data);
  } else {
    data.id = 'v' + Date.now();
    vendors.push(data);
  }
  lsSet('m_vendors', vendors);
  closeModalDirect();
  showToast(vId?'業者情報を更新しました':'業者を登録しました', 'success');
  renderPage('vendor_master');
}

function deleteVendor(vId) {
  if (!confirm('この業者を削除しますか？')) return;
  var vendors = getVendors().filter(x=>x.id!==vId);
  lsSet('m_vendors', vendors);
  closeModalDirect();
  showToast('削除しました', 'danger');
  renderPage('vendor_master');
}

const ALL_POSITIONS = ['Server','Kitchen','Cashier','Host','Prep','Leader','Opening','Closing','Training'];
const DEFAULT_STORE_POSITIONS = {
  'F01':['Server','Kitchen','Cashier','Host','Prep','Leader','Opening','Closing','Training'],
  'F02':['Server','Kitchen','Cashier','Host','Prep','Leader','Opening','Closing','Training'],
  'F03':['Server','Kitchen','Cashier','Host','Prep','Leader','Opening','Closing','Training'],
  'F04-K':['Server','Kitchen','Cashier','Prep','Leader','Opening','Closing','Training'],
  'F04-P':['Server','Kitchen','Cashier','Prep','Leader','Opening','Closing','Training'],
  'F04-A':['Server','Kitchen','Cashier','Prep','Leader','Opening','Closing','Training'],
  'F05':['Server','Kitchen','Cashier','Host','Prep','Leader','Opening','Closing','Training'],
};
function getStorePositions(storeId) { var all=ls('store_positions', DEFAULT_STORE_POSITIONS); return all[storeId]||ALL_POSITIONS; }
function setStorePositions(storeId, positions) { var all=ls('store_positions', DEFAULT_STORE_POSITIONS); all[storeId]=positions; lsSet('store_positions', all); }

/* スキル: { empName: { position: {level:0/1/2, status, selfComment, mgrComment, nextTask, date} } } */
function getSkills() { return ls('skills', {}); }
function setSkills(s) { lsSet('skills', s); }
function getEmpSkills(name) { return getSkills()[name] || {}; }
function approvedPositions(name) { var sk=getEmpSkills(name); return Object.keys(sk).filter(p=>sk[p].status==='承認'&&sk[p].level>=1); }
function leaderSkillApproved(name) { var sk=getEmpSkills(name); return !!(sk['Leader']&&sk['Leader'].status==='承認'&&sk['Leader'].level>=1); }
const SKILL_TRAINING = {
  'Server':'接客トレーニング','Host':'接客トレーニング','Cashier':'レジ・会計トレーニング',
  'Kitchen':'キッチン基礎トレーニング','Prep':'仕込みトレーニング','Leader':'Leader Training',
  'Opening':'Opening手順トレーニング','Closing':'Closing手順トレーニング','Training':'新人教育トレーナー研修'
};

const EVAL_CRITERIA = [
  {key:'skill_open',  label:'オープン業務', group:'スキル'},
  {key:'skill_prep',  label:'仕込み・調理', group:'スキル'},
  {key:'skill_service',label:'接客・サービス', group:'スキル'},
  {key:'skill_close', label:'クローズ業務', group:'スキル'},
  {key:'attitude',    label:'勤務態度・姿勢', group:'行動評価'},
  {key:'teamwork',    label:'チームワーク', group:'行動評価'},
  {key:'knowledge',   label:'商品知識', group:'行動評価'},
  {key:'leadership',  label:'リーダーシップ', group:'行動評価'},
];
function emptyScores() { var o={}; EVAL_CRITERIA.forEach(c=>o[c.key]=0); return o; }
function seedScores(step) { var o={}; EVAL_CRITERIA.forEach(c=>o[c.key]=Math.min(step,2)); return o; }

function evalSeed() {
  return getEmployees().filter(e=>e.status!=='退職' && ['sl','crew'].includes(e.role)).map(e=>({
    id:e.name, name:e.name, store:(STORES.find(s=>s.id===e.store)||{name:e.store}).name, step:e.step,
    scores:seedScores(e.step), status:'下書き', date:''
  }));
}
function renderEvaluation() {
  var evals = ls('evaluations', evalSeed());
  var canApprove = ROLE_CONFIG[curRole].canApprove;

  var html = `<div class="section-header">
    <div><div class="section-title">評価</div><div class="section-sub">0/1/2スコアリング · 承認制</div></div>
  </div>
  <div class="eval-grid">`;
  evals.forEach(e => {
    var total = Object.values(e.scores).reduce((a,b)=>a+b,0);
    var max = Object.keys(e.scores).length * 2;
    var pct2 = Math.round(total/max*100);
    var statusTag = e.status==='承認済'?'tag-green':e.status==='承認待ち'?'tag-yellow':'tag-gray';
    html += `<div class="eval-item">
      <div style="display:flex;justify-content:space-between;align-items:center"><div class="eval-name">${e.name}</div><span class="tag ${statusTag}" style="font-size:9px">${e.status||'下書き'}</span></div>
      <div class="eval-step">${e.store} · STEP ${e.step}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--muted)">スコア ${total}/${max} (${pct2}%)</div>
      <div class="progress-bar" style="margin-top:4px"><div class="progress-fill" style="background:${pct2>=80?'var(--green)':pct2>=60?'var(--yellow)':'var(--red)'};width:${pct2}%"></div></div>
      <div style="display:flex;gap:4px;margin-top:8px">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="openEvalModal('${e.id}')">入力</button>
        ${canApprove&&e.status==='承認待ち'?`<button class="btn btn-success btn-sm" onclick="approveEval('${e.id}')"><i class="ti ti-check"></i></button>`:''}
      </div>
    </div>`;
  });
  html += '</div>';

  // 査定履歴
  var history = ls('eval_history', []);
  if (history.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>査定履歴</div>`;
    history.slice().reverse().slice(0,8).forEach(h => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${h.name} · ${h.pct}%</div><span class="tag tag-green">承認済</span></div>
        <div class="approval-meta">${h.date} · STEP ${h.step}</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

function openEvalModal(staffId) {
  var evals = ls('evaluations', evalSeed());
  var e = evals.find(e=>e.id===staffId) || {id:staffId, name:staffId, scores:emptyScores()};
  var groups = ['スキル','行動評価'];
  openModal(`<div class="modal-title">${e.name} 評価シート <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">0=未習得 / 1=要改善 / 2=良好</p>
    <div style="max-height:55vh;overflow-y:auto">
    ${groups.map(g=>`
      <div class="role-section-label">${g}</div>
      ${EVAL_CRITERIA.filter(c=>c.group===g).map(c=>`
        <div class="form-group" style="margin-bottom:10px">
          <label class="form-label">${c.label}</label>
          <div style="display:flex;gap:8px">
            ${[0,1,2].map(v=>`<button class="btn ${(e.scores[c.key]||0)===v?'btn-primary':'btn-secondary'} btn-sm" style="flex:1" onclick="setEvalScore('${staffId}','${c.key}',${v},this)">${v}</button>`).join('')}
          </div>
        </div>`).join('')}
    `).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModalDirect()">閉じる</button>
      <button class="btn btn-primary" onclick="saveEval('${staffId}')">保存（承認待ちへ）</button>
    </div>`);
}

function setEvalScore(staffId, key, val, btn) {
  btn.closest('.form-group').querySelectorAll('.btn').forEach(b => b.className = b.className.replace('btn-primary','btn-secondary'));
  btn.className = btn.className.replace('btn-secondary','btn-primary');
  var tmp = window._evalTmp || {};
  if (!tmp[staffId]) tmp[staffId] = {};
  tmp[staffId][key] = val;
  window._evalTmp = tmp;
}

function saveEval(staffId) {
  var evals = ls('evaluations', evalSeed());
  var e = evals.find(e=>e.id===staffId);
  if (e) {
    if (window._evalTmp && window._evalTmp[staffId]) Object.assign(e.scores, window._evalTmp[staffId]);
    e.status = '承認待ち';
    e.date = new Date().toLocaleDateString('ja');
    lsSet('evaluations', evals);
  }
  closeModalDirect();
  showToast('評価を保存しました（承認待ち）', 'success');
  renderPage('evaluation');
}

function approveEval(staffId) {
  var evals = ls('evaluations', evalSeed());
  var e = evals.find(x=>x.id===staffId);
  if (!e) return;
  e.status = '承認済';
  lsSet('evaluations', evals);
  var total = Object.values(e.scores).reduce((a,b)=>a+b,0);
  var pct2 = Math.round(total/(Object.keys(e.scores).length*2)*100);
  var hist = ls('eval_history', []);
  hist.push({name:e.name, step:e.step, pct:pct2, date:new Date().toLocaleDateString('ja')});
  lsSet('eval_history', hist);
  showToast('評価を承認し査定履歴に記録しました', 'success');
  renderPage('evaluation');
}

function addApproval(obj) {
  var approvals = ls('approvals', []);
  approvals.push(Object.assign({id:'ap'+Date.now(), status:'pending', date:new Date().toLocaleDateString('ja')}, obj));
  lsSet('approvals', approvals);
}

function renderApproval() {
  var approvals = ls('approvals', []);
  var pending = approvals.filter(a=>a.status==='pending');
  var done = approvals.filter(a=>a.status!=='pending');
  var html = `<div class="section-header">
    <div class="section-title">承認</div>
    <span class="tag tag-yellow">${pending.length}件待ち</span>
  </div>`;
  if (!pending.length) {
    html += `<div class="alert alert-success"><i class="ti ti-circle-check"></i>承認待ちはありません</div>`;
  } else {
    pending.forEach(a => {
      html += `<div class="approval-item">
        <div class="approval-header">
          <div><div class="approval-title">${a.title}</div>
          <div class="approval-meta">${a.from} · ${a.store} · ${a.date}</div></div>
          <span class="tag tag-yellow">${a.type}</span>
        </div>
        <div class="approval-actions">
          <button class="btn btn-success btn-sm" onclick="approveItem('${a.id}','approved')"><i class="ti ti-check"></i> 承認</button>
          <button class="btn btn-danger btn-sm" onclick="approveItem('${a.id}','rejected')"><i class="ti ti-x"></i> 却下</button>
        </div>
      </div>`;
    });
  }
  if (done.length) {
    html += `<div class="card"><div class="card-title">処理済み</div>`;
    done.slice(-5).reverse().forEach(a => {
      html += `<div class="approval-item">
        <div class="approval-header">
          <div><div class="approval-title">${a.title}</div><div class="approval-meta">${a.from}</div></div>
          <span class="tag ${a.status==='approved'?'tag-green':'tag-red'}">${a.status==='approved'?'承認':'却下'}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function approveItem(id, status) {
  var approvals = ls('approvals', []);
  var a = approvals.find(a=>a.id===id);
  if (a) { a.status = status; lsSet('approvals', approvals); renderPage('approval'); showToast(status==='approved'?'承認しました':'却下しました', status==='approved'?'success':'danger'); }
}

const STEP_PROMO = {
  0:{next:1, role:'Crew', cond:['筆記テスト合格','OJT全完了','30日チェックイン']},
  1:{next:2, role:'Senior Crew', cond:['全スキル習得','Tip Rate 90%以上','勤怠良好3ヶ月']},
  2:{next:3, role:'Store Leader候補', cond:['リーダーシップ評価2','後輩指導実績','AM推薦']},
  3:{next:null, role:'最上位', cond:['—']},
};
function renderPGD(empName, isManagerView) {
  var emp = getEmployees().find(e=>e.name===empName);
  if (!emp) return '<div class="card"><p style="color:var(--muted)">従業員データが見つかりません</p></div>';
  var store = STORES.find(s=>s.id===emp.store) || {name:emp.store};
  var evals = ls('evaluations', evalSeed());
  var myEval = evals.find(e=>e.id===empName);
  var tipReqs = ls('tip_requests', []).filter(r=>r.name===empName);
  var curTip = tipReqs.filter(r=>r.status==='承認').slice(-1)[0];
  var evalHist = ls('eval_history', []).filter(h=>h.name===empName);
  var warnings = []; STORES.forEach(s=>{ ls('warnings_'+s.id,[]).forEach(w=>{ if((w.reason||'').includes(empName)) warnings.push(w); }); });
  var obs = ls('onboardings', []).filter(o=>o.name===empName);
  var promo = STEP_PROMO[emp.step] || STEP_PROMO[0];

  // スキル達成率（評価のskill_*項目）
  var skillRate = 0, skillItems = [];
  if (myEval) {
    var sk = EVAL_CRITERIA.filter(c=>c.group==='スキル');
    var got = sk.reduce((a,c)=>a+(myEval.scores[c.key]||0),0);
    skillRate = Math.round(got/(sk.length*2)*100);
    skillItems = sk.map(c=>({label:c.label, score:myEval.scores[c.key]||0}));
  }

  var html = '';

  // ① 現在のステータス
  html += `<div class="card"><div class="card-title"><i class="ti ti-id-badge"></i>現在のステータス</div>
    <div class="kpi-grid">
      ${kpi('役割', ROLE_CONFIG[emp.role].label, emp.emp, 'var(--tm)')}
      ${kpi('Step', 'STEP '+emp.step, promo.role, 'var(--accent)')}
      ${kpi('Tip Rate', curTip?curTip.rate+'%':'未設定', curTip?'承認済':'—', curTip?'var(--green)':'var(--muted)')}
      ${kpi('勤務開始', emp.hireDate||'—', '', 'var(--muted)')}
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px">所属: ${store.name}${(emp.support||[]).length?' · 応援可: '+emp.support.map(id=>(STORES.find(s=>s.id===id)||{name:id}).name).join(','):''}</div>
  </div>`;

  // ② スキル進捗
  html += `<div class="card"><div class="card-title"><i class="ti ti-stairs-up"></i>スキル進捗
    <span style="margin-left:auto;font-size:12px;color:var(--muted)">達成 ${skillRate}%</span></div>
    <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="background:var(--accent2);width:${skillRate}%"></div></div>`;
  if (skillItems.length) {
    skillItems.forEach(s => {
      var label = s.score>=2?'習得済':s.score===1?'習得中':'未習得';
      var col = s.score>=2?'tag-green':s.score===1?'tag-yellow':'tag-gray';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px">${s.label}</span><span class="tag ${col}">${label} (${s.score}/2)</span></div>`;
    });
    var next = skillItems.filter(s=>s.score<2)[0];
    if (next) html += `<div class="alert alert-warning" style="margin-top:10px;padding:8px 10px"><i class="ti ti-arrow-up-right"></i>次に習得すべき: <strong>${next.label}</strong></div>`;
  } else {
    html += `<p style="color:var(--muted);font-size:13px">行動評価は未入力です</p>`;
  }
  html += '</div>';

  // ②-2 ポジションスキル（承認制）+ 教育候補
  var empStoreId = emp.store==='ALL'?STORES[0].id:emp.store;
  var positions = getStorePositions(empStoreId);
  var psk = getEmpSkills(empName);
  var apPos = positions.filter(p=>psk[p]&&psk[p].status==='承認'&&psk[p].level>=1);
  var missing = positions.filter(p=>!apPos.includes(p));
  html += `<div class="card"><div class="card-title"><i class="ti ti-checkbox"></i>対応可能ポジション (${apPos.length}/${positions.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${apPos.length?apPos.map(p=>{var lv=psk[p].level;return `<span class="tag tag-green">${p} Lv${lv}</span>`;}).join(''):'<span style="color:var(--muted);font-size:13px">承認済みなし</span>'}</div>`;
  if (missing.length) {
    var nextP = missing[0];
    html += `<div class="alert alert-warning" style="padding:8px 10px;margin-bottom:6px"><i class="ti ti-arrow-up-right"></i>次に覚えるべき: <strong>${nextP}</strong></div>
      <div style="font-size:12px;color:var(--accent2)"><i class="ti ti-school" style="font-size:13px"></i> 推奨教育: ${missing.slice(0,3).map(p=>SKILL_TRAINING[p]||p).filter((v,i,a)=>a.indexOf(v)===i).join(' / ')}</div>`;
  } else {
    html += `<div class="alert alert-success" style="padding:8px 10px"><i class="ti ti-trophy"></i>全ポジション習得済み！</div>`;
  }
  // 差戻し中の項目
  var rejected = positions.filter(p=>psk[p]&&psk[p].status==='差戻し');
  if (rejected.length) {
    html += `<div style="font-size:12px;color:var(--red);margin-top:8px">差戻し中: ${rejected.map(p=>`${p}${psk[p].mgrComment?'('+psk[p].mgrComment+')':''}`).join(', ')}</div>`;
  }
  html += '</div>';

  // ③ 教育進捗
  html += `<div class="card"><div class="card-title"><i class="ti ti-school"></i>教育進捗</div>`;
  if (obs.length) {
    obs.forEach(ob => {
      var obTmpl = ob.template || [];
      var obDone = ob.done || [];
      html += `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">${ob.store} 研修</span><span class="tag ${(ob.progress||0)>=100?'tag-green':'tag-blue'}">${ob.progress||0}%</span></div>
        <div class="progress-bar" style="margin:4px 0"><div class="progress-fill" style="background:var(--accent2);width:${ob.progress||0}%"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${obTmpl.slice(0,6).map(t=>`<span class="tag ${obDone.includes(t.id)?'tag-green':'tag-gray'}" style="font-size:9px">${t.label.slice(0,10)}</span>`).join('')}</div>
      </div>`;
    });
  } else {
    html += `<p style="color:var(--muted);font-size:13px">教育プログラムなし</p>`;
  }
  html += '</div>';

  // ④ 次の目標
  html += `<div class="card"><div class="card-title"><i class="ti ti-flag"></i>次の目標</div>
    <div class="kpi-grid" style="margin-bottom:10px">
      ${kpi('次のStep', promo.next?'STEP '+promo.next:'最上位', promo.role, 'var(--accent)')}
      ${kpi('次のTip候補', emp.step>=1?'90〜100%':'80%', '目安', 'var(--green)')}
    </div>
    <div style="font-size:12px;font-weight:600;margin-bottom:4px">昇格に必要な条件</div>
    ${promo.cond.map(c=>`<div style="font-size:12px;color:var(--muted);padding:2px 0">・${c}</div>`).join('')}
  </div>`;

  // ⑤ 評価履歴
  html += `<div class="card"><div class="card-title"><i class="ti ti-history"></i>評価履歴</div>`;
  if (evalHist.length) {
    evalHist.slice().reverse().forEach(h => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">査定 ${h.pct}%</div><span class="tag tag-green">STEP ${h.step}</span></div><div class="approval-meta">${h.date}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">査定履歴なし</p>`; }
  if (tipReqs.length) {
    html += `<div style="font-size:12px;font-weight:600;margin:8px 0 4px">Tip Rate履歴</div>`;
    tipReqs.slice().reverse().slice(0,4).forEach(r=>{
      html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>${r.rate}% ${r.reason?'· '+r.reason:''}</span><span class="tag ${r.status==='承認'?'tag-green':r.status==='却下'?'tag-red':'tag-yellow'}" style="font-size:9px">${r.status}</span></div>`;
    });
  }
  html += '</div>';

  // ⑥ Attendance / Daily Ops履歴
  html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-stats"></i>Attendance / Daily Ops</div>`;
  if (warnings.length) {
    html += `<div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px">注意ログ (${warnings.length})</div>`;
    warnings.slice().reverse().slice(0,4).forEach(w=>{
      html += `<div style="font-size:12px;color:var(--muted);padding:3px 0">・${w.date} ${w.reason}</div>`;
    });
  } else {
    html += `<div class="alert alert-success" style="padding:8px 10px"><i class="ti ti-circle-check"></i>注意ログなし・良好です</div>`;
  }
  html += '</div>';

  // 本人操作
  if (!isManagerView && (curRole==='crew'||curRole==='sl')) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-pencil"></i>自己評価・申請</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="go('evaluation')"><i class="ti ti-star"></i> 自己評価入力</button>
        <button class="btn btn-secondary btn-sm" onclick="go('tiprate')"><i class="ti ti-coin"></i> Tip Rate申請</button>
        <button class="btn btn-secondary btn-sm" onclick="go('onboarding')"><i class="ti ti-school"></i> 教育受講</button>
        <button class="btn btn-secondary btn-sm" onclick="go('goals')"><i class="ti ti-target"></i> Goal確認</button>
      </div>
    </div>`;
  }
  return html;
}

function renderMypage() {
  var rc = ROLE_CONFIG[curRole];
  var isCrewView = (curRole==='crew' || curRole==='sl');
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var me = rc.name;

  var html = `<div class="mypage-header">
    <div class="mypage-avatar">${me[0]}</div>
    <div><div style="font-size:16px;font-weight:700">${isCrewView?'おはようございます、'+me+'さん':me}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">${rc.label} · ${curStore==='ALL'?'全店舗':store.name}</div>
    <span class="tag tag-blue" style="margin-top:6px;">${new Date().toLocaleDateString('ja')} · My Dashboard</span>
    </div>
  </div>`;

  if (!isCrewView) {
    // 管理者は従来のPGD中心
    html += `<div class="section-header" style="margin-bottom:8px"><div class="section-title" style="font-size:15px"><i class="ti ti-rocket" style="color:var(--accent)"></i> Personal Growth Dashboard</div></div>`;
    html += renderPGD(me, false);
    return html;
  }

  /* ===== Crew My Dashboard（優先順位順） ===== */
  var emp = getEmployees().find(e=>e.name===me);
  var week = getWeekStr();
  var allGoals = ls('goals_v2', []);
  var storeGoals = allGoals.filter(g=>g.scope==='store' && (g.storeId===storeId||g.storeId==='ALL'));
  var personalGoals = allGoals.filter(g=>g.scope==='personal' && g.owner===me);

  // 1. 店舗Goal / 週間Goal
  html += `<div class="card"><div class="card-title"><i class="ti ti-target" style="color:var(--accent)"></i>今週のGoal</div>`;
  if (storeGoals.length) {
    storeGoals.forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100),100);
      html += `<div class="goal-item"><div class="goal-header"><div class="goal-title">${g.title}</div><span class="tag tag-blue">${g.period}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background:var(--accent2);width:${prog}%"></div></div>
        <div class="store-meta">${prog}% · ${g.current||0}/${g.target} ${g.unit||''}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">店舗Goalは未設定です</p>`; }
  if (personalGoals.length) {
    personalGoals.forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100),100);
      html += `<div class="goal-item"><div class="goal-header"><div class="goal-title"><i class="ti ti-user-star" style="font-size:12px;color:var(--green)"></i> ${g.title}</div><span class="tag tag-blue">${g.period}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background:var(--green);width:${prog}%"></div></div>
        <div class="store-meta">${prog}% · 個人Goal</div></div>`;
    });
  }
  html += '</div>';

  // 2. 今日・今週の自分のシフト
  var plan = getShiftPlan(storeId, week);
  html += `<div class="card"><div class="card-title"><i class="ti ti-calendar-check"></i>今週のシフト
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('shift_staff')">詳細</button></div>`;
  var myShifts = [];
  if (plan && plan.status==='公開済') {
    myShifts = Object.keys(plan.cells).filter(k=>plan.cells[k]===me);
  }
  if (myShifts.length) {
    myShifts.forEach(k=>{ var p=k.split('_'); html += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)"><span>${p[0]}曜 ${p[1]}</span><span style="color:var(--muted)">${p[2]}</span></div>`; });
  } else { html += `<p style="color:var(--muted);font-size:13px">公開シフトはまだありません。Availabilityを提出しましょう</p>`; }
  html += '</div>';

  // 3. 個人タスク
  var myTasks = getTasks().filter(t=>t.assignee===me && t.status!=='完了');
  html += `<div class="card"><div class="card-title"><i class="ti ti-list-check"></i>今日のタスク</div>`;
  if (myTasks.length) {
    myTasks.forEach(t => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${t.title}</div><span class="tag ${t.priority==='高'?'tag-red':'tag-yellow'}">${t.priority||'低'}</span></div>
        <div class="approval-meta">${t.due?'期限 '+t.due:''} · 進捗 ${t.progress||0}%</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">担当タスクはありません</p>`; }
  html += '</div>';

  // 4-5. スキルレベル現在地 + 次に強化すべきスキル
  var positions = getStorePositions(storeId);
  var psk = getEmpSkills(me);
  var apPos = positions.filter(p=>psk[p]&&psk[p].status==='承認'&&psk[p].level>=1);
  var missing = positions.filter(p=>!apPos.includes(p));
  html += `<div class="card"><div class="card-title"><i class="ti ti-stairs-up"></i>スキルレベル現在地
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('skill')">スキル申請</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">できるポジション (${apPos.length}/${positions.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${apPos.length?apPos.map(p=>`<span class="tag tag-green">${p} Lv${psk[p].level}</span>`).join(''):'<span style="color:var(--muted);font-size:12px">承認済みなし</span>'}</div>`;
  if (missing.length) {
    html += `<div class="alert alert-warning" style="padding:8px 10px"><i class="ti ti-arrow-up-right"></i>次に強化すべき: <strong>${missing[0]}</strong> <span style="font-size:11px">（推奨教育: ${SKILL_TRAINING[missing[0]]||missing[0]}）</span></div>`;
  } else {
    html += `<div class="alert alert-success" style="padding:8px 10px"><i class="ti ti-trophy"></i>全ポジション習得済み！</div>`;
  }
  html += '</div>';

  // 6. Tip Rate申請状況
  var tipReqs = ls('tip_requests', []).filter(r=>r.name===me);
  var curTip = tipReqs.filter(r=>r.status==='承認').slice(-1)[0];
  var pendingTip = tipReqs.filter(r=>r.status==='申請中').slice(-1)[0];
  html += `<div class="card"><div class="card-title"><i class="ti ti-coin"></i>Tip Rate
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('tiprate')">申請</button></div>
    <div style="display:flex;gap:8px">
      ${kpi('現在', curTip?curTip.rate+'%':'未設定', curTip?'承認済':'—', curTip?'var(--green)':'var(--muted)')}
      ${kpi('申請中', pendingTip?pendingTip.rate+'%':'なし', pendingTip?'承認待ち':'—', pendingTip?'var(--yellow)':'var(--muted)')}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">※ Tip RateはSkill Level自己評価から申請できます</p>
  </div>`;

  // 7. 給与予定（Estimated Pay）
  var wage = WAGE[curRole]||16;
  var weekHours = 0;
  if (plan && plan.status==='公開済') {
    myShifts.forEach(k=>{ var period=k.split('_')[1]; weekHours += (SHIFT_HOURS[period]||4); });
  }
  var regularH = Math.min(weekHours, 40);
  var otH = Math.max(weekHours-40, 0);
  var estPay = regularH*wage + otH*wage*1.5;
  html += `<div class="card"><div class="card-title"><i class="ti ti-cash"></i>給与予定 (Estimated Pay)</div>
    <div class="kpi-grid">
      ${kpi('今週勤務', weekHours+'h', '公開シフト', 'var(--tm)')}
      ${kpi('Regular', regularH+'h', '通常', 'var(--tm)')}
      ${kpi('Overtime', otH+'h', '残業', otH?'var(--yellow)':'var(--muted)')}
      ${kpi('見込給与', '$'+Math.round(estPay), '今週', 'var(--green)')}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">※ 見込み（確定給与ではありません）。Toast勤怠連携後に実績反映。次回支払予定: 隔週金曜</p>
  </div>`;

  // 8. 休暇申請
  var myVac = ls('my_vacations', []);
  html += `<div class="card"><div class="card-title"><i class="ti ti-beach"></i>休暇申請
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('vacation')">申請</button></div>`;
  if (myVac.length) {
    myVac.slice(-2).reverse().forEach(v => {
      var sc = v.status==='承認'?'tag-green':v.status==='却下'?'tag-red':'tag-yellow';
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${v.startDate}〜${v.endDate}</div><span class="tag ${sc}">${v.status}</span></div><div class="approval-meta">${v.type}</div></div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">申請履歴なし</p>`; }
  html += '</div>';

  // 9. Growth Hub（My Page内に埋め込み）
  var posts = ls('growthhub', []);
  html += `<div class="card"><div class="card-title"><i class="ti ti-message-circle"></i>Growth Hub
    <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openGHModal()"><i class="ti ti-plus"></i> 相談・質問</button></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">相談・質問・改善提案を投稿できます</p>`;
  var myPosts = posts.filter(p=>p.author===me).slice(-3).reverse();
  if (myPosts.length) {
    myPosts.forEach(p => {
      html += `<div class="approval-item"><div class="approval-header"><div class="approval-title">${p.title}</div><span class="tag tag-blue">${p.type}</span></div>
        ${(p.replies||[]).length?`<div style="font-size:11px;color:var(--green);margin-top:4px"><i class="ti ti-message"></i> 管理者から${p.replies.length}件の返信</div>`:'<div style="font-size:11px;color:var(--muted);margin-top:4px">返信待ち</div>'}</div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">投稿はまだありません</p>`; }
  html += '</div>';

  return html;
}
