<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Funergy Growth OS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3245;
  --tm: #e2e8f0;
  --muted: #6b7591;
  --accent: #f07820;
  --accent2: #3b82f6;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --rbd: #7f1d1d;
  --radius: 10px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--tm); min-height: 100vh; }

/* ====== LOGIN ====== */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(ellipse at 20% 50%, #1a1030 0%, #0f1117 60%);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 420px;
}
.login-logo {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.role-section { margin-bottom: 20px; }
.role-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.role-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all .15s;
  text-align: left;
}
.role-btn:hover { border-color: var(--accent); background: #2a1f10; }
.role-btn-label { font-size: 10px; color: var(--muted); }
.role-btn-name { font-size: 14px; font-weight: 600; margin-top: 2px; }
.store-picker { display: none; margin-top: 12px; }
.store-picker.active { display: block; }
.store-picker-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.store-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  border-left: 3px solid transparent;
}
.store-btn.sel { background: #1a2030; border-color: var(--accent2); border-left-color: var(--accent2); }
.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .9; }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

/* ====== APP SHELL ====== */
#app-shell { display: none; min-height: 100vh; }
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  position: sticky; top: 0; z-index: 100;
  gap: 12px;
}
.topbar-logo { font-weight: 800; font-size: 15px; letter-spacing: -.3px; }
.topbar-logo span { color: var(--accent); }
.topbar-store {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.topbar-role-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
}
.logout-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
}
.logout-btn:hover { color: var(--tm); border-color: var(--muted); }

/* ====== NAV ====== */
.nav-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  display: flex;
  overflow-x: auto;
  gap: 2px;
  scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }
.nav-btn {
  white-space: nowrap;
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
  background: none;
  border-left: none; border-right: none; border-top: none;
}
.nav-btn:hover { color: var(--tm); }
.nav-btn.active { color: var(--tm); border-bottom-color: var(--accent); }
.nav-btn i { font-size: 14px; }
.subnav-bar {
  background: var(--bg);
  padding: 8px;
  display: flex;
  overflow-x: auto;
  gap: 6px;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.subnav-bar:empty { display: none; }
.subnav-bar::-webkit-scrollbar { display: none; }
.subnav-chip {
  white-space: nowrap;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}
.subnav-chip.active { color: #fff; background: var(--accent); border-color: var(--accent); }
.subnav-chip i { font-size: 13px; }


/* ====== MAIN ====== */
.main { padding: 16px; max-width: 900px; margin: 0 auto; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media(min-width:600px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
.kpi {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}
.kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.kpi-value { font-size: 20px; font-weight: 700; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.tag-green { background: #052e1a; color: var(--green); }
.tag-red { background: #2a0a0a; color: var(--red); }
.tag-yellow { background: #2a1f00; color: var(--yellow); }
.tag-blue { background: #0a1a3a; color: var(--accent2); }
.tag-gray { background: var(--surface2); color: var(--muted); }

/* store rows */
.store-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color .15s;
}
.store-row:hover { border-color: var(--accent2); }
.store-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.store-name { font-weight: 600; font-size: 13px; flex: 1; }
.store-meta { font-size: 12px; color: var(--muted); }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* task list */
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.task-item:last-child { border-bottom: none; }
.task-check {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
  transition: all .15s;
}
.task-check.done { background: var(--green); border-color: var(--green); }
.task-text { flex: 1; font-size: 13px; }
.task-text.done { text-decoration: line-through; color: var(--muted); }
.task-phase { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--tm);
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font);
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent2);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn {
  padding: 10px 18px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface2); color: var(--tm); border: 1px solid var(--border); }
.btn-success { background: var(--green); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* section header */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.section-title { font-size: 16px; font-weight: 700; }
.section-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* alert */
.alert {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 13px;
}
.alert-warning { background: #2a1a00; border: 1px solid #5a3500; color: var(--yellow); }
.alert-danger { background: #2a0a0a; border: 1px solid var(--rbd); color: var(--red); }
.alert-success { background: #052e1a; border: 1px solid #0a5e30; color: var(--green); }

/* phase filter */
.phase-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.phase-tab {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .15s;
}
.phase-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* shift grid */
.shift-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.shift-day { text-align: center; }
.shift-day-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.shift-slot {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 4px;
  font-size: 11px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 3px;
  transition: all .15s;
}
.shift-slot.sel { background: #1a2a40; border-color: var(--accent2); color: var(--accent2); }
.shift-slot:hover { border-color: var(--muted); }

/* inventory table */
.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.inv-table th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border); }
.inv-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.inv-table tr:last-child td { border-bottom: none; }
.inv-input {
  width: 70px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--tm);
  padding: 4px 8px;
  font-size: 12px;
  text-align: right;
}
.inv-input:focus { outline: none; border-color: var(--accent2); }

/* staff list */
.staff-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
}
.staff-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.staff-name { font-size: 13px; font-weight: 600; }
.staff-role { font-size: 11px; color: var(--muted); }

/* eval */
.eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.eval-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.eval-name { font-size: 12px; font-weight: 600; }
.eval-step { font-size: 11px; color: var(--muted); }
.step-dots { display: flex; gap: 4px; margin-top: 6px; }
.step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.step-dot.filled { background: var(--accent); border-color: var(--accent); }

/* approval */
.approval-item {
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
}
.approval-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.approval-title { font-size: 13px; font-weight: 600; }
.approval-meta { font-size: 11px; color: var(--muted); }
.approval-actions { display: flex; gap: 6px; margin-top: 10px; }

/* notification dot */
.notif-dot {
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  display: inline-block;
}

/* access denied */
.access-denied {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.access-denied i { font-size: 40px; margin-bottom: 12px; display: block; }

/* goal */
.goal-item {
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
}
.goal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.goal-title { font-size: 13px; font-weight: 600; }
.goal-progress { font-size: 12px; color: var(--muted); }

/* mypage */
.mypage-header {
  background: linear-gradient(135deg, #1a1d27, #22263a);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  display: flex; gap: 16px; align-items: center;
}
.mypage-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-flame" style="font-size:24px;color:#fff;"></i></div>
    <div class="login-title">Funergy Growth OS</div>
    <div class="login-sub">役割を選んでログイン（デモ）</div>

    <div class="role-section">
      <div class="role-section-label">マネジメント</div>
      <div class="role-grid">
        <div class="role-btn" onclick="selectRole('ceo')">
          <div class="role-btn-label">経営</div>
          <div class="role-btn-name">CEO / Tac</div>
        </div>
        <div class="role-btn" onclick="selectRole('gm')">
          <div class="role-btn-label">GM</div>
          <div class="role-btn-name">GM / Moto</div>
        </div>
        <div class="role-btn" onclick="selectRole('office')">
          <div class="role-btn-label">経理</div>
          <div class="role-btn-name">Office / Marcia</div>
        </div>
        <div class="role-btn" onclick="selectRole('am')">
          <div class="role-btn-label">エリアMG</div>
          <div class="role-btn-name">AM / Yuki</div>
        </div>
      </div>
    </div>

    <div class="role-section">
      <div class="role-section-label">店舗スタッフ</div>
      <div class="role-grid">
        <div class="role-btn" onclick="selectRole('sl')">
          <div class="role-btn-label">Store Leader</div>
          <div class="role-btn-name">SL / 店長</div>
        </div>
        <div class="role-btn" onclick="selectRole('crew')">
          <div class="role-btn-label">スタッフ</div>
          <div class="role-btn-name">Crew</div>
        </div>
      </div>
    </div>

    <div id="store-picker" class="store-picker">
      <div class="store-picker-label">担当店舗を選択</div>
      <div class="store-grid" id="store-grid"></div>
    </div>

    <p class="login-err" id="login-err">店舗を選択してください</p>
    <button class="login-btn" id="login-btn" onclick="doLogin()" disabled>ログイン</button>
  </div>
</div>

<!-- ====== APP SHELL ====== -->
<div id="app-shell">
  <div class="topbar">
    <div class="topbar-logo">Fun<span>OS</span></div>
    <div class="topbar-store" id="topbar-store" onclick="openStoreSwitcher()">
      <i class="ti ti-chevron-down" style="font-size:12px;"></i>
    </div>
    <div class="topbar-right">
      <div class="topbar-role-badge" id="topbar-role"></div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="nav-bar" id="nav-bar"></div>
  <div class="subnav-bar" id="subnav-bar"></div>
  <div class="main" id="main-content"></div>
</div>

<!-- ====== MODALS ====== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
/* ============================================================
   SUPABASE / TOAST 連携設定
============================================================ */
const SUPABASE_URL = 'https://tgbhgxzehzeouopklhje.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnYmhneHplaHplb3VvcGtsaGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTIzODAsImV4cCI6MjA5NjY4ODM4MH0.A0cdXLDONy_HPvQhaHbfP-flsNYImg0ZFJd5AIQihdM';
const TOAST_SYNC_FN = SUPABASE_URL + '/functions/v1/hyper-worker';

async function fetchToastSales(guid, dateFrom, dateTo) {
  try {
    var url = SUPABASE_URL + '/rest/v1/toast_sales?restaurant_guid=eq.' + encodeURIComponent(guid)
      + '&business_date=gte.' + dateFrom + '&business_date=lte.' + dateTo + '&order=business_date.asc';
    var res = await fetch(url, { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) { console.error('fetchToastSales', e); return []; }
}
async function syncToastDay(guid, businessDateYmd) {
  var res = await fetch(TOAST_SYNC_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + SUPABASE_ANON },
    body: JSON.stringify({ restaurantGuid: guid, businessDate: businessDateYmd }),
  });
  return await res.json();
}
async function syncStoreActualsFromToast(storeId, guid, days) {
  if (!guid) return { error: 'GUID未設定' };
  var rows = await fetchToastSales(guid, days[0].date, days[days.length-1].date);
  var byDate = {}; rows.forEach(r=>{ byDate[r.business_date] = r; });
  var actuals = getDailyActuals(storeId);
  var updated = 0;
  days.forEach(d => {
    var r = byDate[d.date];
    if (r) {
      var prev = actuals[d.date] || {};
      actuals[d.date] = Object.assign({}, prev, {
        actual: Number(r.net_sales)||0,
        guests: r.guest_count!=null ? Number(r.guest_count) : prev.guests,
        toast: true,
      });
      updated++;
    }
  });
  setDailyActuals(storeId, actuals);
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = Object.values(actuals).reduce((a,v)=>a+(v.actual||0),0); saveBudgets(budgets); }
  return { updated, fetched: rows.length };
}

/* 期間一括: dateFrom〜dateTo の各日をEdge Function経由でToastから取得→DB保存。
   進捗をonProgress(コールバック)で通知。月をまたいで daily_actuals_ にも反映。 */
async function fetchToastRange(storeId, guid, dateFromISO, dateToISO, onProgress) {
  if (!guid) return { error: 'GUID未設定' };
  var start = new Date(dateFromISO+'T00:00:00');
  var end = new Date(dateToISO+'T00:00:00');
  var ok=0, fail=0, total=0, sumSales=0;
  // 日付リスト生成
  var dates = [];
  for (var d=new Date(start); d<=end; d.setDate(d.getDate()+1)) dates.push(new Date(d));
  total = dates.length;
  for (var i=0; i<dates.length; i++) {
    var dt = dates[i];
    var ymd = dt.toISOString().slice(0,10).replace(/-/g,'');
    var iso = dt.toISOString().slice(0,10);
    try {
      var r = await syncToastDay(guid, ymd);
      if (r && r.ok) {
        ok++; sumSales += Number(r.net_sales)||0;
        // daily_actuals に即反映（月キーは年月で分かれるが getDailyActuals は店舗単位なのでそのまま）
        var actuals = getDailyActuals(storeId);
        var prev = actuals[iso] || {};
        actuals[iso] = Object.assign({}, prev, { actual: Number(r.net_sales)||0, guests: r.guests!=null?Number(r.guests):prev.guests, toast:true });
        setDailyActuals(storeId, actuals);
      } else { fail++; }
    } catch(e) { fail++; }
    if (onProgress) onProgress(i+1, total, ok, fail);
    // レート制限対策: 少し待つ
    await new Promise(res=>setTimeout(res, 250));
  }
  // 月次実績も更新
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = Object.values(getDailyActuals(storeId)).reduce((a,v)=>a+(v.actual||0),0); saveBudgets(budgets); }
  return { ok, fail, total, sumSales };
}

/* レシピ原価計算: Σ(単価 ÷ 歩留% × 使用量) */
function calcRecipeCost(recipe) {
  var ings = getIngredients();
  var total = 0;
  (recipe.items||[]).forEach(it => {
    var ing = ings.find(x=>x.code===it.code);
    if (ing) {
      var yld = ing.yield > 0 ? ing.yield/100 : 1;
      total += (ing.price / yld) * it.qty;
    }
  });
  return total;
}
function recipeCostRate(recipe) {
  var cost = calcRecipeCost(recipe);
  return recipe.price > 0 ? (cost/recipe.price*100) : 0;
}
function catName(code) { var c = getCategories().find(c=>c.code===code); return c?c.name:'未分類'; }
function catClass(code) { var c = getCategories().find(c=>c.code===code); return c?c.cls:'food'; }
function className(clsId) { var c = CLASSES.find(c=>c.id===clsId); return c?c.name:'その他'; }
function classColor(clsId) { var c = CLASSES.find(c=>c.id===clsId); return c?c.color:'#888'; }

  pendingRole = role;

  document.querySelectorAll('.role-btn').forEach(b => b.style.borderColor = '');

  if (!pendingRole) return;
  if (['sl','crew','am'].includes(pendingRole) && !pendingStore) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  curRole = pendingRole;
  curStore = pendingStore || 'ALL';

  if (curRole === 'sl') {
    var found = STORES.find(s => s.id === curStore);
    curSLName = found ? found.am : 'Store Leader';
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  initApp();
}

function doLogout() {
  curRole = null; curStore = null;
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  pendingRole = null; pendingStore = null;
  document.querySelectorAll('.role-btn').forEach(b => b.style.borderColor = '');

  document.getElementById('login-btn').disabled = true;
}

function initApp() {

  buildNav();
  // Default page
  var groups = groupsForRole();
  curPage = (curRole==='crew') ? 'mypage' : (groups[0] ? groups[0].children[0] : 'mypage');
  curGroup = groupOfPage(curPage).id;
  renderPage(curPage);

function buildNav() {
  var groups = groupsForRole();
  if (!curGroup || !groups.find(g=>g.id===curGroup)) curGroup = groupOfPage(curPage).id;
  var nav = document.getElementById('nav-bar');
  nav.innerHTML = groups.map(g =>
    `<button class="nav-btn ${g.id===curGroup?'active':''}" onclick="goGroup('${g.id}')"><i class="ti ${g.icon}"></i>${g.label}</button>`
  ).join('');
  // サブメニュー
  var sub = document.getElementById('subnav-bar');
  var group = groups.find(g=>g.id===curGroup);
  if (group && group.children.length > 1) {
    sub.innerHTML = group.children.map(pid => {
      var item = navItemById(pid);
      return `<button class="subnav-chip ${pid===curPage?'active':''}" onclick="go('${pid}')"><i class="ti ${item.icon}"></i>${item.label}</button>`;
    }).join('');
  } else { sub.innerHTML = ''; }
}

function openStoreCmd() {
  curPage = 'store_cmd';
  document.getElementById('main-content').innerHTML = renderStoreCmd();
  window.scrollTo(0,0);
}

function goGroup(groupId) {
  var groups = groupsForRole();
  var g = groups.find(x=>x.id===groupId);
  if (!g) return;
  curGroup = groupId;
  // グループの最初の子ページへ

}

function go(page) {
  curPage = page;
  curGroup = groupOfPage(page).id;

}

function pct(a,b) { return b ? Math.round(a/b*100) : 0; }
function fmtK(v) { return v >= 1000 ? '$' + Math.round(v/1000) + 'k' : '$' + v; }
function getPeriod() { var d = new Date(); return d.getFullYear() + '.' + (d.getMonth()+1); }
function kpi(label, value, sub, color) {
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value" style="color:${color||'var(--tm)'}">${value}</div><div class="kpi-sub">${sub}</div></div>`;
}
function getVisibleStores() {
  if (curStore === 'ALL') return activeStores();
  if (curRole === 'am') return activeStores().filter(s => AM_STORES.includes(s.id));
  return activeStores().filter(s => s.id === curStore);
}
function storeData(id) {
  var d = DEMO_BUDGET[id] || {b:200000,a:190000,fc:30,labor:28};
  var sp = pct(d.a, d.b);
  var status = sp >= 100 ? 'good' : sp >= 90 ? 'warn' : 'danger';
  return Object.assign({}, d, {id, name:(STORES.find(s=>s.id===id)||{name:id}).name,
    color:(STORES.find(s=>s.id===id)||{color:'#888'}).color, sp, status});
}

function renderDashboard() {
  var rc = ROLE_CONFIG[curRole];
  if (!rc.financial) return renderMypage();
  var stores = getVisibleStores().map(s => storeData(s.id));
  var tB = stores.reduce((a,s)=>a+s.b,0);
  var tA = stores.reduce((a,s)=>a+s.a,0);
  var tp = pct(tA,tB);
  var avgFC = stores.length ? Math.round(stores.reduce((a,s)=>a+s.fc,0)/stores.length*10)/10 : 0;
  var avgL = stores.length ? Math.round(stores.reduce((a,s)=>a+s.labor,0)/stores.length*10)/10 : 0;
  var danger = stores.filter(s=>s.status==='danger');

  var html = '';
  if (danger.length) {
    html += `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div>
      <p style="font-size:12px;font-weight:600;margin-bottom:4px;">要対応 ${danger.length}店舗</p>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">
        ${danger.map(s=>`<span class="tag tag-red" style="cursor:pointer" onclick="switchStore('${s.id}');go('budget')">${s.name} ${s.sp}%</span>`).join('')}
      </div></div></div>`;
  }

  html += `<div class="kpi-grid" style="margin-bottom:12px;">
    <div class="kpi" style="cursor:pointer" onclick="go('budget')"><div class="kpi-label">売上合計 <i class="ti ti-chevron-right" style="font-size:10px"></i></div><div class="kpi-value" style="color:${tp>=100?'var(--green)':tp>=90?'var(--yellow)':'var(--red)'}">${fmtK(tA)}</div><div class="kpi-sub">予算比 ${tp}% / ${fmtK(tB)}</div></div>
    <div class="kpi" style="cursor:pointer" onclick="go('budget')"><div class="kpi-label">予算達成率 <i class="ti ti-chevron-right" style="font-size:10px"></i></div><div class="kpi-value" style="color:${tp>=100?'var(--green)':tp>=90?'var(--yellow)':'var(--red)'}">${tp}%</div><div class="kpi-sub">${getPeriod()}</div></div>
    <div class="kpi" style="cursor:pointer" onclick="go('foodcost')"><div class="kpi-label">平均原価率 <i class="ti ti-chevron-right" style="font-size:10px"></i></div><div class="kpi-value" style="color:${avgFC>0&&avgFC<=31?'var(--green)':'var(--red)'}">${avgFC}%</div><div class="kpi-sub">目標 29〜31%</div></div>
    <div class="kpi" style="cursor:pointer" onclick="go('labor')"><div class="kpi-label">平均Labor <i class="ti ti-chevron-right" style="font-size:10px"></i></div><div class="kpi-value" style="color:${avgL<=29?'var(--green)':'var(--red)'}">${avgL}%</div><div class="kpi-sub">目標 ≤29%</div></div>
  </div>`;

  // 今日のタスク（ログインユーザー関連）
  var me = rc.name;
  var allTasks = getTasks();
  var today = new Date().toISOString().slice(0,10);
  var myTasks = allTasks.filter(t=>t.status!=='完了' && (t.assignee===me || t.assignee===''));
  var overdue = myTasks.filter(t=>t.due && t.due < today);
  var todayTasks = myTasks.filter(t=>t.due===today);
  var approvalsAll = ls('approvals', []).filter(a=>a.status==='pending');
  // Required未完了（全可視店舗）
  var reqAlerts = [];
  getVisibleStores().forEach(s=>{ var ops=getDailyOps(s.id); var inc=ops.filter(t=>t.required&&!t.done); if(inc.length) reqAlerts.push({store:s.name, count:inc.length, id:s.id}); });

  if (myTasks.length || approvalsAll.length || reqAlerts.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-sun" style="color:var(--accent)"></i>今日やること</div>`;
    if (overdue.length) html += `<div style="font-size:12px;color:var(--red);margin-bottom:4px"><i class="ti ti-alert-circle"></i> 期限切れ ${overdue.length}件: ${overdue.slice(0,3).map(t=>t.title).join(', ')}</div>`;
    if (todayTasks.length) html += `<div style="font-size:12px;color:var(--yellow);margin-bottom:4px"><i class="ti ti-clock"></i> 本日期限 ${todayTasks.length}件: ${todayTasks.slice(0,3).map(t=>t.title).join(', ')}</div>`;
    if (approvalsAll.length) html += `<div style="font-size:12px;margin-bottom:4px;cursor:pointer" onclick="go('approval')"><i class="ti ti-checkbox" style="color:var(--accent2)"></i> 承認待ち ${approvalsAll.length}件 <i class="ti ti-chevron-right" style="font-size:10px"></i></div>`;
    reqAlerts.forEach(r=>{ html += `<div style="font-size:12px;color:var(--red);margin-bottom:4px;cursor:pointer" onclick="switchStore('${r.id}');openStoreCmd()"><i class="ti ti-alert-triangle"></i> ${r.store}: Required未完了 ${r.count}件</div>`; });
    var otherTasks = myTasks.filter(t=>!overdue.includes(t)&&!todayTasks.includes(t));
    if (otherTasks.length) html += `<div style="font-size:12px;color:var(--muted);margin-top:4px;cursor:pointer" onclick="go('tasks')">その他のタスク ${otherTasks.length}件 <i class="ti ti-chevron-right" style="font-size:10px"></i></div>`;
    html += '</div>';
  }

  html += `<div class="card"><div class="card-title"><i class="ti ti-building-store"></i>店舗別状況</div>`;
  stores.forEach(s => {
    var color = s.status==='good'?'var(--green)':s.status==='warn'?'var(--yellow)':'var(--red)';
    var tagClass = s.status==='good'?'tag-green':s.status==='warn'?'tag-yellow':'tag-red';
    html += `<div class="store-row">
      <div class="store-dot" style="background:${s.color}"></div>
      <div style="flex:1" onclick="switchStore('${s.id}');go('budget')">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="store-name">${s.name}</div>
          <span class="tag ${tagClass}">${s.sp}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="background:${color};width:${Math.min(s.sp,100)}%"></div></div>
        <div class="store-meta">${fmtK(s.a)} / ${fmtK(s.b)} | FC ${s.fc}% | Labor ${s.labor}%</div>
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="event.stopPropagation();switchStore('${s.id}');openStoreCmd()"><i class="ti ti-building-store"></i></button>
    </div>`;
  });
  html += '</div>';

  // Approvals pending
  var approvals = ls('approvals', []);
  var pending = approvals.filter(a => a.status === 'pending');
  if (pending.length) {
    html += `<div class="card"><div class="card-title"><i class="ti ti-clock" style="color:var(--yellow)"></i>承認待ち <span class="tag tag-yellow">${pending.length}</span></div>
      ${pending.slice(0,3).map(a=>`<div class="approval-item">
        <div class="approval-header"><div class="approval-title">${a.title}</div><span class="tag tag-gray">${a.type}</span></div>
        <div class="approval-meta">${a.from} · ${a.store} · ${a.date}</div>
      </div>`).join('')}
      ${pending.length>3?`<p style="font-size:12px;color:var(--muted);margin-top:8px;cursor:pointer" onclick="go('approval')">+ ${pending.length-3}件を見る</p>`:''}
    </div>`;
  }

  return html;
}

function renderStoreCmd() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var ops = getDailyOps(storeId);
  var opsDone = ops.filter(t=>t.done).length;
  var reqItems = ops.filter(t=>t.required);
  var reqIncomplete = reqItems.filter(t=>!t.done);
  var goals = ls('goals_v2', []).filter(g=>g.scope==='store' && (g.storeId===storeId || g.storeId==='ALL'));
  var tasks = getTasks().filter(t=>(t.store===storeId||t.store==='ALL') && t.status!=='完了');
  var canEdit = ROLE_CONFIG[curRole].canCreate;
  var dailyComplete = ops.length>0 && opsDone===ops.length;

  var html = `<div class="section-header">
    <div><div class="section-title"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${store.color};margin-right:8px;"></span>${store.name}</div>
    <div class="section-sub">Store Command Center · ${new Date().toLocaleDateString('ja')}</div></div>
    ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="go('required')"><i class="ti ti-settings"></i> Ops設定</button>`:''}
  </div>`;

  // Required未完了アラート
  if (reqIncomplete.length) {
    html += `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div>
      <p style="font-size:12px;font-weight:600">Required未完了 ${reqIncomplete.length}件 — Daily完了できません</p>
      <div style="font-size:11px;margin-top:2px">${reqIncomplete.map(t=>t.phase+': '+t.text).join(' / ')}</div></div></div>`;
  } else if (dailyComplete) {
    html += `<div class="alert alert-success"><i class="ti ti-circle-check"></i>本日のDaily Operationsは全て完了しています 🎉</div>`;
  }

  // 本日/今週のGoal
  html += `<div class="card"><div class="card-title"><i class="ti ti-target" style="color:var(--accent)"></i>本日・今週のGoal
    ${canEdit?`<button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="go('goals')">管理</button>`:''}</div>`;
  if (goals.length) {
    goals.slice(0,4).forEach(g => {
      var prog = Math.min(Math.round((g.current||0)/g.target*100), 100);
      var color = prog>=100?'var(--green)':prog>=70?'var(--yellow)':'var(--accent2)';
      html += `<div class="goal-item">
        <div class="goal-header"><div class="goal-title">${g.title}</div><span class="tag tag-blue">${g.period}</span></div>
        <div style="display:flex;align-items:center;gap:8px;"><div class="progress-bar" style="flex:1"><div class="progress-fill" style="background:${color};width:${prog}%"></div></div><div class="goal-progress">${prog}%</div></div>
        <div class="store-meta">${g.current||0} / ${g.target} ${g.unit||''}</div>
      </div>`;
    });
  } else { html += `<p style="color:var(--muted);font-size:13px">本日のGoalは未設定です</p>`; }
  html += '</div>';

  // ===== Daily Operations（フェーズ順の司令塔） =====
  html += `<div class="card"><div class="card-title"><i class="ti ti-checklist"></i>Daily Operations
    <span style="margin-left:auto;font-size:12px;color:var(--muted)">${opsDone}/${ops.length} 完了</span></div>
    <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="background:${dailyComplete?'var(--green)':'var(--accent2)'};width:${ops.length?Math.round(opsDone/ops.length*100):0}%"></div></div>`;

  // フェーズごとに順番表示（次にやるべきフェーズを強調）
  var nextPhaseFound = false;
  DAILY_PHASES.forEach((phase, pi) => {
    var pItems = ops.filter(t=>t.phase===phase);
    if (!pItems.length) return;
    var pDone = pItems.filter(t=>t.done).length;
    var allDone = pDone===pItems.length;
    var isNext = !allDone && !nextPhaseFound;
    if (isNext) nextPhaseFound = true;
    var icon = allDone?'ti-circle-check':isNext?'ti-player-play':'ti-circle';
    var iconColor = allDone?'var(--green)':isNext?'var(--accent)':'var(--muted)';
    html += `<div style="margin-bottom:10px;${isNext?'background:#1a1f10;border:1px solid #3a3510;border-radius:8px;padding:8px':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <i class="ti ${icon}" style="color:${iconColor};font-size:16px"></i>
        <span style="font-weight:600;font-size:13px">${pi+1}. ${phase}</span>
        ${isNext?'<span class="tag tag-yellow" style="font-size:9px">次にやる</span>':''}
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${pDone}/${pItems.length}</span>
      </div>`;
    pItems.forEach(t => {
      html += `<div class="task-item" style="padding:5px 0 5px 24px">
        <div class="task-check${t.done?' done':''}" onclick="toggleDailyOp('${storeId}','${t.id}')">${t.done?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}</div>
        <div style="flex:1"><div class="task-text${t.done?' done':''}" style="font-size:13px">${t.text} ${t.required?'<span class="tag tag-red" style="font-size:9px;padding:1px 5px">必須</span>':''}${t.photo?'<i class="ti ti-camera" style="font-size:11px;color:var(--muted)"></i>':''}</div>
        ${t.done&&t.by?`<div class="task-phase">完了: ${t.by}</div>`:''}</div>
      </div>`;
    });
    if (canEdit) html += `<button class="btn btn-secondary btn-sm" style="margin-left:24px;margin-top:4px" onclick="openDailyOpsAdd('${storeId}','${phase}')"><i class="ti ti-plus"></i> 追加</button>`;
    html += '</div>';
  });

  // Daily完了ボタン
  html += `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:12px">`;
  if (dailyComplete) {
    html += `<button class="btn btn-success" style="width:100%" onclick="completeDailyOps('${storeId}')"><i class="ti ti-flag-check"></i> Daily完了を記録</button>`;
  } else {
    html += `<button class="btn btn-secondary" style="width:100%;opacity:.6" disabled>Daily完了（${ops.length-opsDone}件 残っています）</button>`;
  }
  html += '</div></div>';

  // クイックアクション（店舗運用）
  html += `<div class="card"><div class="card-title"><i class="ti ti-bolt"></i>店舗運用</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="go('inventory')"><i class="ti ti-box"></i> 棚卸</button>
      <button class="btn btn-secondary btn-sm" onclick="go('order')"><i class="ti ti-clipboard-list"></i> 発注</button>
      ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="go('tasks')"><i class="ti ti-list-check"></i> タスク (${tasks.length})</button>`:''}
      ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="go('required')"><i class="ti ti-alert-circle"></i> Required</button>`:''}
    </div>
  </div>`;
  return html;
}

  hist.push({date:new Date().toLocaleString('ja'), by:ROLE_CONFIG[curRole].name, count:ops.length});

  showToast('Daily Operations完了を記録しました 🎉', 'success');

/* ============================================================
   ① 予実管理 (曜日別 客数×客単価, 複数根拠の積み上げ)
   予算 = Σ 各根拠
     基礎型:   Σ(曜日 客数×客単価) × 月の週数
     施策/イベント型: 予想客数 × 予想客単価 (× 日数)
============================================================ */
const DOW = ['月','火','水','木','金','土','日'];
const BASIS_TYPES = [
  {id:'base',  label:'基礎（曜日別）', desc:'通常営業。曜日ごとの客数×客単価×週数'},
  {id:'plan',  label:'施策',          desc:'新規施策。予想客数×予想客単価×日数（例:テイクアウト）'},
  {id:'event', label:'イベント',      desc:'単発イベント。予想客数×予想客単価×日数'},
];
function weeksInMonth() { return 4.3; }

function getBudgets() {
  var def = STORES.map(s => {
    var d = DEMO_BUDGET[s.id] || {b:200000, a:190000};
    // 基礎根拠を逆算（均等割の仮データ）
    var perDay = Math.round(d.b/30);
    var base = {id:'bs1', type:'base', name:'既存店ベース', days:DOW.map(()=>({guests:Math.round(perDay/25), spend:25}))};
    return {storeId:s.id, period:getPeriod(), bases:[base], actual:d.a, status:'承認済'};
  });
  return ls('budgets_v2', def);
}
function saveBudgets(b) { lsSet('budgets_v2', b); }

function basisAmount(basis) {
  if (basis.type === 'base') {
    var week = (basis.days||[]).reduce((a,d)=>a + (parseFloat(d.guests)||0)*(parseFloat(d.spend)||0), 0);
    return week * weeksInMonth();
  } else {
    return (parseFloat(basis.guests)||0) * (parseFloat(basis.spend)||0) * (parseFloat(basis.days)||1);
  }
}
function budgetTotal(b) { return (b.bases||[]).reduce((a,bs)=>a+basisAmount(bs),0); }

var budgetTab = 'summary';
function renderBudget() {
  var html = `<div class="section-header">
    <div><div class="section-title">予実管理</div><div class="section-sub">${getPeriod()}</div></div>
  </div>
  <div class="phase-tabs">
    <div class="phase-tab${budgetTab==='summary'?' active':''}" onclick="setBudgetTab('summary')">サマリー</div>
    <div class="phase-tab${budgetTab==='daily'?' active':''}" onclick="setBudgetTab('daily')">日次進捗</div>
  </div>`;
  if (budgetTab==='daily') return html + renderBudgetDaily();
  return html + renderBudgetSummary();
}
function setBudgetTab(t) { budgetTab = t; renderPage('budget'); }

function renderBudgetSummary() {
  var budgets = getBudgets();
  var stores = getVisibleStores();
  var visible = budgets.filter(b => stores.find(s=>s.id===b.storeId));

  var tB = visible.reduce((a,b)=>a+budgetTotal(b),0);
  var tA = visible.reduce((a,b)=>a+b.actual,0);
  var tp = pct(tA, tB);
  var canEdit = ROLE_CONFIG[curRole].canCreate;

  var html = `<div class="kpi-grid" style="margin-bottom:12px;">
    ${kpi('予算合計', fmtK(Math.round(tB)), '対象 '+visible.length+'店', 'var(--muted)')}
    ${kpi('実績合計', fmtK(tA), '今月', tp>=100?'var(--green)':'var(--red)')}
    ${kpi('達成率', tp+'%', tp>=100?'達成':'未達', tp>=100?'var(--green)':tp>=90?'var(--yellow)':'var(--red)')}
    ${kpi('差異', fmtK(Math.abs(tA-Math.round(tB))), tA>=tB?'▲超過':'▼不足', tA>=tB?'var(--green)':'var(--red)')}
  </div>`;

  visible.forEach(b => {
    var s = STORES.find(x=>x.id===b.storeId) || {name:b.storeId, color:'#888'};
    var total = budgetTotal(b);
    var sp = pct(b.actual, total);
    var color = sp>=100?'var(--green)':sp>=90?'var(--yellow)':'var(--red)';
    var statusTag = b.status==='承認済'?'tag-green':b.status==='承認待ち'?'tag-yellow':'tag-gray';
    html += `<div class="card">
      <div class="approval-header">
        <div class="card-title" style="color:${s.color};margin:0"><span class="store-dot" style="background:${s.color}"></span>${s.name}</div>
        <span class="tag ${statusTag}">${b.status}</span>
      </div>
      <div class="kpi-grid" style="margin:8px 0;">
        ${kpi('予算', fmtK(Math.round(total)), b.bases.length+'根拠', 'var(--muted)')}
        ${kpi('実績', fmtK(b.actual), '今月', color)}
        ${kpi('達成率', sp+'%', sp>=100?'達成':'未達', color)}
        ${kpi('差異', fmtK(Math.abs(b.actual-Math.round(total))), b.actual>=total?'▲':'▼', b.actual>=total?'var(--green)':'var(--red)')}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="background:${color};width:${Math.min(sp,100)}%"></div></div>
      <div style="margin-top:8px">${b.bases.map(bs=>{
        var t=BASIS_TYPES.find(x=>x.id===bs.type)||{label:bs.type};
        return `<div style="font-size:11px;color:var(--muted);display:flex;justify-content:space-between;padding:2px 0">
          <span><span class="tag ${bs.type==='base'?'tag-blue':bs.type==='plan'?'tag-green':'tag-yellow'}" style="font-size:9px;padding:1px 5px">${t.label}</span> ${bs.name}</span>
          <span>${fmtK(Math.round(basisAmount(bs)))}</span></div>`;
      }).join('')}</div>
      ${canEdit?`<div class="approval-actions">
        <button class="btn btn-secondary btn-sm" onclick="openBudgetEditor('${b.storeId}')"><i class="ti ti-edit"></i> 予算編集</button>
        <button class="btn btn-secondary btn-sm" onclick="openActualModal('${b.storeId}')"><i class="ti ti-coin"></i> 月次実績</button>
        ${b.status==='承認待ち'&&ROLE_CONFIG[curRole].canApprove?`<button class="btn btn-success btn-sm" onclick="approveBudget('${b.storeId}')"><i class="ti ti-check"></i> 承認</button>`:''}
      </div>`:''}
    </div>`;
  });
  return html;
}

/* ============================================================
   日次進捗ビュー (予算自動展開 + 実績/天気/イベント入力 + 累計達成率)
   管轄店舗に応じて単店→複数→全店集計を切替
============================================================ */
var dailyStoreScope = 'current'; // 'current'=当該店, or storeId, or 'ALL'
var dailyMonthOffset = 0; // 0=今月, -1=先月...
function monthDays() {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth() + dailyMonthOffset;
  var ref = new Date(y, m, 1);
  y = ref.getFullYear(); m = ref.getMonth();
  var days = new Date(y, m+1, 0).getDate();
  var arr = [];
  for (var d=1; d<=days; d++) {
    var dt = new Date(y, m, d);
    arr.push({day:d, date:`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, dow:DOW[(dt.getDay()+6)%7]});
  }
  return arr;
}
function dailyMonthLabel() {
  var now = new Date();
  var ref = new Date(now.getFullYear(), now.getMonth()+dailyMonthOffset, 1);
  return `${ref.getFullYear()}年${ref.getMonth()+1}月`;
}
function shiftDailyMonth(delta) { dailyMonthOffset += delta; renderPage('budget'); }
/* 基礎根拠から曜日別の日次予算を取得 */
function dayBudgetFromBases(b, dow) {
  var base = (b.bases||[]).find(x=>x.type==='base');
  if (!base || !base.days) return 0;
  var idx = DOW.indexOf(dow);
  if (idx<0) return 0;
  var d = base.days[idx]||{guests:0,spend:0};
  var lunchD = base.days[idx];
  // base.days は1日分の客数×単価。L/D合算済の想定で日商を返す
  return (parseFloat(d.guests)||0)*(parseFloat(d.spend)||0);
}
function getDailyActuals(storeId) { return ls('daily_actuals_'+storeId, {}); }
function setDailyActuals(storeId, data) { lsSet('daily_actuals_'+storeId, data); }

function dailyScopeStores() {
  // 管轄店舗（getVisibleStores）に応じて対象店舗を返す
  var vis = getVisibleStores();
  if (dailyStoreScope==='ALL') return vis;
  if (dailyStoreScope==='current') return [vis[0]];
  var s = vis.find(x=>x.id===dailyStoreScope);
  return s ? [s] : [vis[0]];
}

function renderBudgetDaily() {
  var vis = getVisibleStores();
  var multiStore = vis.length > 1;
  var scopeStores = dailyScopeStores();
  var days = monthDays();
  var budgets = getBudgets();

  var html = '';
  // 店舗スコープ切替（管轄が複数店ある場合）
  if (multiStore) {
    html += `<div class="phase-tabs" style="margin-bottom:8px">
      <div class="phase-tab${dailyStoreScope==='ALL'?' active':''}" onclick="setDailyScope('ALL')">全${vis.length}店集計</div>
      ${vis.map(s=>`<div class="phase-tab${dailyStoreScope===s.id?' active':''}" onclick="setDailyScope('${s.id}')">${s.name}</div>`).join('')}
    </div>`;
  } else {
    dailyStoreScope = 'current';
  }

  var isAgg = dailyStoreScope==='ALL' && multiStore;
  var title = isAgg ? `全${vis.length}店集計` : (scopeStores[0]||{name:'—'}).name;

  // 月間累計サマリー
  var todayStr = new Date().toISOString().slice(0,10);
  var sumBudget=0, sumActual=0, sumBudgetToToday=0;
  days.forEach(d => {
    scopeStores.forEach(s => {
      var b = budgets.find(x=>x.storeId===s.id);
      var override = (getDailyActuals(s.id)[d.date]||{});
      var dayBud = override.budget!=null ? override.budget : (b?dayBudgetFromBases(b,d.dow):0);
      sumBudget += dayBud;
      if (d.date<=todayStr) sumBudgetToToday += dayBud;
      sumActual += (override.actual!=null?override.actual:0);
    });
  });
  var paceRate = sumBudgetToToday ? Math.round(sumActual/sumBudgetToToday*1000)/10 : 0;
  var monthRate = sumBudget ? Math.round(sumActual/sumBudget*1000)/10 : 0;

  html += `<div class="card"><div class="card-title"><i class="ti ti-chart-line"></i>${title} 月間進捗</div>
    <div class="kpi-grid">
      ${kpi('月間予算', fmtK(Math.round(sumBudget)), getPeriod(), 'var(--muted)')}
      ${kpi('実績累計', fmtK(Math.round(sumActual)), '本日まで', 'var(--tm)')}
      ${kpi('対予算ペース', paceRate+'%', '本日時点', paceRate>=100?'var(--green)':paceRate>=90?'var(--yellow)':'var(--red)')}
      ${kpi('月間達成率', monthRate+'%', '対月予算', monthRate>=100?'var(--green)':'var(--muted)')}
    </div>
  </div>`;

  // Toast連携 + 天気/祝日（単店ビューのみ）
  if (!isAgg && scopeStores[0]) {
    var sStore = scopeStores[0];
    var hasGuid = !!sStore.toastGuid;
    html += `<div class="card"><div class="card-title"><i class="ti ti-plug-connected" style="color:var(--accent2)"></i>データ連携</div>`;
    if (hasGuid) {
      html += `<p style="font-size:12px;color:var(--muted);margin-bottom:8px">${sStore.name} のToast売上を取得して実績に反映します</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="doToastSync('${sStore.id}','${sStore.toastGuid}')"><i class="ti ti-refresh"></i> DBから実績反映</button>
          <button class="btn btn-secondary btn-sm" onclick="doToastFetchToday('${sStore.id}','${sStore.toastGuid}')"><i class="ti ti-cloud-download"></i> 昨日分をToastから取得</button>
          <button class="btn btn-secondary btn-sm" onclick="openRangeModal('${sStore.id}','${sStore.toastGuid}')"><i class="ti ti-calendar-plus"></i> 期間一括取り込み</button>
        </div>`;
    } else {
      html += `<div class="alert alert-warning" style="padding:8px 10px;margin-bottom:8px"><i class="ti ti-alert-circle"></i><div style="font-size:12px">${sStore.name} のToast GUID未設定。<button class="btn btn-secondary btn-sm" style="margin-left:6px" onclick="openGuidModal('${sStore.id}')">GUID設定</button></div></div>`;
    }
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
        <button class="btn btn-secondary btn-sm" onclick="doWeatherSync('${sStore.id}')"><i class="ti ti-cloud"></i> 天気・祝日を自動取得</button>
      </div>
      <div id="toast-sync-status" style="font-size:11px;color:var(--muted);margin-top:8px"></div>
    </div>`;
  }

  // 日次テーブル
  var canEdit = ROLE_CONFIG[curRole].canCreate;
  html += `<div class="card" style="overflow-x:auto"><div class="card-title"><i class="ti ti-calendar"></i>日次一覧

function weatherIcon(w) {
  var map = {'快晴':'☀️','晴':'🌤️','曇':'☁️','小雨':'🌦️','雨':'🌧️','嵐':'⛈️','雪':'❄️','霧':'🌫️'};
  return map[w] || (w?w:'-');
}

/* WMO天気コード → 内部天気区分（細分化）
   0=快晴, 1-2=晴, 3=曇, 45/48=霧, 51-55=小雨(霧雨), 56-67=雨,
   71-77=雪, 80-82=雨(にわか), 85-86=雪, 95-99=嵐 */
function wmoToWeather(code) {
  if (code===0) return '快晴';
  if (code>=1 && code<=2) return '晴';
  if (code===3) return '曇';
  if (code>=45 && code<=48) return '霧';
  if (code>=51 && code<=57) return '小雨';   // 霧雨レベル
  if (code>=61 && code<=67) return '雨';     // 本降り
  if (code>=71 && code<=77) return '雪';
  if (code>=80 && code<=82) return '雨';     // にわか雨
  if (code>=85 && code<=86) return '雪';
  if (code>=95) return '嵐';
  return '曇';
}

/* 店舗座標（緯度経度）。未設定はHonolulu既定 */
function storeLatLng(storeId) {
  var coords = {
    'F02': [21.3069, -157.8583], // Tenkichi (Honolulu付近)
    'F04-A': [21.3870, -157.9320], // Aiea
    'F04-K': [21.2840, -157.8010], // Kaimuki
    'F04-P': [21.2970, -157.8420], // Piikoi
    'F03': [21.2790, -157.8290], // Waikiki
    'F01': [21.3300, -157.8900], // ToriTon
    'F05': [21.3400, -157.9300], // Marujuu
  };
  return coords[storeId] || [21.3069, -157.8583];
}

/* Open-Meteoで期間の日別天気を取得（過去/未来両対応） */
async function fetchWeatherRange(storeId, dateFrom, dateTo) {
  var ll = storeLatLng(storeId);
  var today = new Date().toISOString().slice(0,10);
  var out = {};
  // 過去分（〜昨日）は archive、当日以降は forecast。両方取って統合。
  async function pull(url) {
    try {
      var res = await fetch(url);
      if (!res.ok) return;
      var j = await res.json();
      if (j.daily && j.daily.time && j.daily.weathercode) {
        j.daily.time.forEach((t,i)=>{ out[t] = wmoToWeather(j.daily.weathercode[i]); });
      } else if (j.daily && j.daily.time && j.daily.weather_code) {
        j.daily.time.forEach((t,i)=>{ out[t] = wmoToWeather(j.daily.weather_code[i]); });
      }
    } catch(e) { console.error('weather pull', e); }
  }
  // archive: dateFrom 〜 min(dateTo, 昨日)
  var yest = new Date(); yest.setDate(yest.getDate()-1);
  var yestISO = yest.toISOString().slice(0,10);
  if (dateFrom <= yestISO) {
    var archEnd = dateTo < yestISO ? dateTo : yestISO;
    await pull(`https://archive-api.open-meteo.com/v1/archive?latitude=${ll[0]}&longitude=${ll[1]}&start_date=${dateFrom}&end_date=${archEnd}&daily=weathercode&timezone=Pacific%2FHonolulu`);
  }
  // forecast: 今日以降（dateToが今日以降の場合）
  if (dateTo >= today) {
    await pull(`https://api.open-meteo.com/v1/forecast?latitude=${ll[0]}&longitude=${ll[1]}&daily=weathercode&forecast_days=16&timezone=Pacific%2FHonolulu`);
  }
  return out;
}

/* ハワイ州の祝日（連邦＋州独自）。年で計算 */
function usHolidays(year) {
  function nthWeekday(month, weekday, n) { // month 0-based, weekday 0=Sun
    var d = new Date(year, month, 1);
    var add = (weekday - d.getDay() + 7) % 7 + (n-1)*7;
    return new Date(year, month, 1+add);
  }
  function lastWeekday(month, weekday) {
    var d = new Date(year, month+1, 0);
    var sub = (d.getDay() - weekday + 7) % 7;
    return new Date(year, month+1, 0-sub);
  }
  function iso(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  var h = {};
  // 連邦祝日
  h[`${year}-01-01`] = '🎍元日';
  h[iso(nthWeekday(0,1,3))] = 'MLK Day';
  h[iso(nthWeekday(1,1,3))] = "Presidents' Day";
  h[iso(lastWeekday(4,1))] = 'Memorial Day';
  h[`${year}-06-19`] = 'Juneteenth';
  h[`${year}-07-04`] = '🎆Independence Day';
  h[iso(nthWeekday(8,1,1))] = 'Labor Day';
  h[`${year}-11-11`] = 'Veterans Day';
  h[iso(nthWeekday(10,4,4))] = '🦃Thanksgiving';
  h[`${year}-12-25`] = '🎄Christmas';
  // ハワイ州独自の祝日
  h[`${year}-03-26`] = 'Prince Kūhiō Day(HI)';                 // 3/26固定
  h[iso(nthWeekday(2,5,1))] = h[iso(nthWeekday(2,5,1))] || ''; // placeholder防止
  h[`${year}-06-11`] = 'King Kamehameha Day(HI)';              // 6/11固定
  h[iso(nthWeekday(7,5,3))] = 'Statehood Day(HI)';             // 8月第3金曜
  // 選挙日(偶数年・11月第1月曜の翌火曜)
  if (year % 2 === 0) {
    var firstMon = nthWeekday(10,1,1);
    var electionDay = new Date(year,10,firstMon.getDate()+1);
    h[iso(electionDay)] = 'Election Day(HI)';
  }
  // 空文字は除去
  Object.keys(h).forEach(k=>{ if(!h[k]) delete h[k]; });
  return h;
}
function holidayFor(dateISO) {
  var y = parseInt(dateISO.slice(0,4));
  var h = usHolidays(y);
  return h[dateISO] || '';
}

async function fetchWeatherForView(storeId, days) {
  var from = days[0].date, to = days[days.length-1].date;
  var wmap = await fetchWeatherRange(storeId, from, to);
  if (!Object.keys(wmap).length) return { error: '天気取得に失敗しました（本番URLで再試行してください）' };
  var actuals = getDailyActuals(storeId);
  var updated = 0;
  days.forEach(d => {
    if (wmap[d.date]) {
      var prev = actuals[d.date] || {};
      // 手入力天気がなければ自動反映
      if (!prev.weather || prev.weatherAuto) {
        actuals[d.date] = Object.assign({}, prev, { weather: wmap[d.date], weatherAuto: true });
        updated++;
      }
    }
    // 祝日をイベント欄へ（手入力イベントがなければ）
    var hol = holidayFor(d.date);
    if (hol) {
      var p = actuals[d.date] || {};
      if (!p.event || p.eventAuto) {
        actuals[d.date] = Object.assign({}, p, { event: hol, eventAuto: true });
      }
    }
  });
  setDailyActuals(storeId, actuals);
  return { updated };
}

    </div>`;

  if (t.type === 'base') {
    html += `<div class="form-group"><label class="form-label">曜日別 客数 × 客単価</label>
      <table class="inv-table"><thead><tr><th>曜日</th><th>客数</th><th>客単価$</th><th>日商</th></tr></thead><tbody>
      ${DOW.map((d,i)=>{
        var day=t.days[i]||{guests:0,spend:0};
        var sub=(parseFloat(day.guests)||0)*(parseFloat(day.spend)||0);
        return `<tr><td>${d}</td>
          <td><input class="inv-input" type="number" value="${day.guests}" onchange="updateBasisDay(${i},'guests',this.value,'${storeId}')" style="width:55px"></td>
          <td><input class="inv-input" type="number" value="${day.spend}" onchange="updateBasisDay(${i},'spend',this.value,'${storeId}')" style="width:55px"></td>
          <td style="color:var(--muted)">$${sub.toFixed(0)}</td></tr>`;
      }).join('')}
      </tbody></table>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">週商 × ${weeksInMonth()}週 = 月間</div>
    </div>`;
  } else {
    html += `<div class="form-row">
      <div class="form-group"><label class="form-label">予想客数</label><input class="form-input" id="bs-guests" type="number" value="${t.guests||0}" onchange="updateBasisField('guests',this.value,'${storeId}')"></div>
      <div class="form-group"><label class="form-label">予想客単価 $</label><input class="form-input" id="bs-spend" type="number" value="${t.spend||0}" onchange="updateBasisField('spend',this.value,'${storeId}')"></div>
    </div>
    <div class="form-group"><label class="form-label">実施日数（月内）</label><input class="form-input" id="bs-days" type="number" value="${t.days_count||1}" onchange="updateBasisField('days_count',this.value,'${storeId}')"></div>`;
  }

  html += `<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;border-top:1px solid var(--border);margin-top:8px">
      <span>この根拠の予算</span><span style="color:var(--accent)">${fmtK(Math.round(amount))}</span></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="openBudgetEditor('${storeId}')">戻る</button>
      <button class="btn btn-primary" onclick="saveBasis('${storeId}')">保存</button>
    </div>`;
  openModal(html);
}
function changeBasisType(storeId, type) {
  basisTmp.name = document.getElementById('bs-name').value;
  basisTmp.type = type;
  if (type==='base' && !basisTmp.days) basisTmp.days = DOW.map(()=>({guests:0,spend:0}));
  renderBasisBody(storeId);
}
function updateBasisDay(i, field, val, storeId) {
  basisTmp.name = document.getElementById('bs-name').value;
  basisTmp.days[i][field] = parseFloat(val)||0;
  renderBasisBody(storeId);
}
function updateBasisField(field, val, storeId) {
  basisTmp.name = document.getElementById('bs-name').value;
  basisTmp[field] = parseFloat(val)||0;
  renderBasisBody(storeId);
}
function saveBasis(storeId) {
  basisTmp.name = document.getElementById('bs-name').value.trim() || '無題の根拠';
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  var idx = b.bases.findIndex(x=>x.id===basisTmp.id);
  if (idx>=0) b.bases[idx] = basisTmp; else b.bases.push(basisTmp);
  saveBudgets(budgets);
  showToast('根拠を保存しました', 'success');
  openBudgetEditor(storeId);
}
function deleteBasis(storeId, basisId) {
  if (!confirm('この根拠を削除しますか？')) return;
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  b.bases = b.bases.filter(x=>x.id!==basisId);
  saveBudgets(budgets);
  openBudgetEditor(storeId);
}
function submitBudget(storeId) {
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.status='承認待ち'; saveBudgets(budgets); }
  closeModalDirect();
  showToast('予算を承認申請しました', 'success');
  renderPage('budget');
}
function approveBudget(storeId) {
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.status = '承認済'; saveBudgets(budgets); showToast('予算を承認しました', 'success'); renderPage('budget'); }
}
function openActualModal(storeId) {
  var b = getBudgets().find(x=>x.storeId===storeId);
  openModal(`<div class="modal-title">実績入力 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">実績売上 ($)（Toast連携前は手入力）</label><input class="form-input" id="ba-actual" type="number" value="${b.actual}"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveActual('${storeId}')">保存</button></div>`);
}
function saveActual(storeId) {
  var budgets = getBudgets();
  var b = budgets.find(x=>x.storeId===storeId);
  if (b) { b.actual = parseFloat(document.getElementById('ba-actual').value)||0; saveBudgets(budgets); }
  closeModalDirect();
  showToast('実績を保存しました', 'success');

}

/* ============================================================
   FOOD COST (レシピ原価と連動)
============================================================ */
/* ============================================================
   Food Cost 精度向上 (日次=発注ベース / 月次=棚卸ベース) + 買い出し
============================================================ */
var fcTab = 'daily';
function getPurchases(storeId) { return ls('purchases_'+storeId, []); }   // 買い出し
function monthOrderTotal(storeId) {
  // 今月の発注確定〜送信済の合計（仕入れ）
  var orders = ls('orders_'+storeId, []);
  return orders.filter(o=>['発注確定','送信済','電話確認済','納品完了'].includes(o.status))
    .reduce((a,o)=>a+(o.amount||0),0);
}
function monthPurchaseTotal(storeId) {
  return getPurchases(storeId).reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
}
function dailyOrderTotal(storeId, dateStr) {
  var orders = ls('orders_'+storeId, []);
  var d = dateStr || new Date().toLocaleDateString('ja');
  return orders.filter(o=>o.date===d).reduce((a,o)=>a+(o.amount||0),0);
}

function renderFoodcost() {
  if (!ROLE_CONFIG[curRole].financial && curRole !== 'sl') return financialBlocked();
  var storeId = curStore==='ALL'?STORES[0].id:curStore;
  var store = STORES.find(s=>s.id===storeId)||STORES[0];

  var html = `<div class="section-header"><div><div class="section-title">${store.name} · Food Cost</div><div class="section-sub">目標 29〜31%</div></div></div>
  <div class="phase-tabs">
    <div class="phase-tab${fcTab==='daily'?' active':''}" onclick="setFcTab('daily')">日次（簡易）</div>
    <div class="phase-tab${fcTab==='monthly'?' active':''}" onclick="setFcTab('monthly')">月次（実績）</div>
    <div class="phase-tab${fcTab==='shopping'?' active':''}" onclick="setFcTab('shopping')">買い出し</div>
    <div class="phase-tab${fcTab==='menu'?' active':''}" onclick="setFcTab('menu')">メニュー別</div>
  </div>`;

  if (fcTab==='daily') html += renderFcDaily(storeId, store);
  else if (fcTab==='monthly') html += renderFcMonthly(storeId, store);
  else if (fcTab==='shopping') html += renderFcShopping(storeId, store);
  else html += renderFcMenu();
  return html;
}
function setFcTab(t) { fcTab = t; renderPage('foodcost'); }

/* 日次: 実績原価率 = 発注金額合計 ÷ 売上 */
function renderFcDaily(storeId, store) {
  var data = storeData(storeId);
  var dailySales = Math.round(data.a/30); // 仮: 月商÷30
  var todayOrder = dailyOrderTotal(storeId);
  var todayShopping = getPurchases(storeId).filter(p=>p.date===new Date().toLocaleDateString('ja')).reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
  var totalCost = todayOrder + todayShopping;
  var rate = dailySales ? Math.round(totalCost/dailySales*1000)/10 : 0;
  var color = rate<=31?'var(--green)':rate<=33?'var(--yellow)':'var(--red)';

  var html = `<div class="alert alert-success" style="padding:8px 12px"><i class="ti ti-info-circle"></i><div style="font-size:12px">日次は<strong>発注金額合計 ÷ 売上</strong>の簡易原価率です（速報値）</div></div>
  <div class="card"><div class="card-title"><i class="ti ti-calendar-stats"></i>本日の簡易原価率</div>
    <div class="kpi-grid">
      ${kpi('発注金額', '$'+todayOrder.toLocaleString(), '本日発注', 'var(--tm)')}
      ${kpi('買い出し', '$'+todayShopping.toLocaleString(), '本日購入', 'var(--tm)')}
      ${kpi('売上(仮)', '$'+dailySales.toLocaleString(), 'Toast連携前', 'var(--muted)')}
      ${kpi('簡易原価率', rate+'%', '目標≤31%', color)}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">※ 売上はToast連携後に実数反映。現在は月商÷30の仮値</p>
  </div>`;
  return html;
}

/* 月次: 使用原価 = 期首棚卸 + 仕入(発注+買い出し) - 期末棚卸 / 原価率 = 使用原価 ÷ 売上 */
function renderFcMonthly(storeId, store) {
  var data = storeData(storeId);
  var fc = ls('fc_monthly_'+storeId, {beginInv:0, endInv:0, sales:data.a});
  var orderTotal = monthOrderTotal(storeId);
  var purchaseTotal = monthPurchaseTotal(storeId);
  var purchases = orderTotal + purchaseTotal;
  var usedCost = (parseFloat(fc.beginInv)||0) + purchases - (parseFloat(fc.endInv)||0);
  var sales = parseFloat(fc.sales)||data.a;
  var rate = sales ? Math.round(usedCost/sales*1000)/10 : 0;
  var target = 30;
  var color = rate<=31?'var(--green)':rate<=33?'var(--yellow)':'var(--red)';

  var html = `<div class="alert alert-warning" style="padding:8px 12px"><i class="ti ti-info-circle"></i><div style="font-size:12px">月次は<strong>期首棚卸 + 仕入 − 期末棚卸 = 使用原価</strong>で精度の高い実績原価率を算出</div></div>
  <div class="card"><div class="card-title"><i class="ti ti-calculator"></i>月次実績原価率
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="openFcMonthlyModal('${storeId}')"><i class="ti ti-edit"></i> 棚卸額入力</button></div>
    <table class="inv-table"><tbody>
      <tr><td>期首棚卸額 ${fc.beginAuto?'<span class="tag tag-blue" style="font-size:8px">前月末から自動</span>':''}</td><td style="text-align:right">$${(parseFloat(fc.beginInv)||0).toLocaleString()}</td></tr>
      <tr><td>月間仕入れ（発注確定分）</td><td style="text-align:right">$${orderTotal.toLocaleString()}</td></tr>
      <tr><td>買い出し合計</td><td style="text-align:right">$${purchaseTotal.toLocaleString()}</td></tr>
      <tr><td>期末棚卸額</td><td style="text-align:right">− $${(parseFloat(fc.endInv)||0).toLocaleString()}</td></tr>
      <tr style="font-weight:700"><td>使用原価</td><td style="text-align:right;color:var(--accent)">$${usedCost.toLocaleString()}</td></tr>
      <tr><td>売上</td><td style="text-align:right">$${sales.toLocaleString()}</td></tr>
    </tbody></table>
    <div class="kpi-grid" style="margin-top:10px">
      ${kpi('実績原価率', rate+'%', '使用原価÷売上', color)}
      ${kpi('目標原価率', target+'%', '基準', 'var(--muted)')}
      ${kpi('差異', (rate-target>0?'+':'')+(Math.round((rate-target)*10)/10)+'%', rate<=target?'良好':'超過', rate<=target?'var(--green)':'var(--red)')}
    </div>
  </div>`;
  return html;
}
function openFcMonthlyModal(storeId) {
  var data = storeData(storeId);
  var fc = ls('fc_monthly_'+storeId, {beginInv:0, endInv:0, sales:data.a});
  openModal(`<div class="modal-title">月次原価 入力 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="form-group"><label class="form-label">期首棚卸額 ($) ${fc.beginAuto?'※前月末から自動反映済。修正すると履歴に残ります':''}</label><input class="form-input" id="fc-begin" type="number" value="${fc.beginInv||0}"></div>
    <div class="form-group"><label class="form-label">期末棚卸額 ($)（月次棚卸確定で自動更新）</label><input class="form-input" id="fc-end" type="number" value="${fc.endInv||0}"></div>
    <div class="form-group"><label class="form-label">売上 ($)（Toast連携前は手入力）</label><input class="form-input" id="fc-sales" type="number" value="${fc.sales||data.a}"></div>
    <p style="font-size:11px;color:var(--muted)">仕入れ・買い出しは発注/買い出しデータから自動集計されます。期首棚卸額は前月末の期末棚卸を自動反映します。</p>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModalDirect()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveFcMonthly('${storeId}')">保存</button></div>`);
}
function saveFcMonthly(storeId) {
  var prev = ls('fc_monthly_'+storeId, {});
  var newBegin = parseFloat(document.getElementById('fc-begin').value)||0;
  var history = prev.history || [];
  if (prev.beginInv!==undefined && prev.beginInv!==newBegin) {
    history = history.concat([{date:new Date().toLocaleDateString('ja'), edit:'期首修正', from:prev.beginInv, to:newBegin, by:ROLE_CONFIG[curRole].name}]);
  }
  lsSet('fc_monthly_'+storeId, {
    beginInv: newBegin,
    endInv: parseFloat(document.getElementById('fc-end').value)||0,
    sales: parseFloat(document.getElementById('fc-sales').value)||0,
    beginAuto: false, history,
  });
  closeModalDirect();
  showToast('月次原価データを保存しました', 'success');
  renderPage('foodcost');
}

function openPurchaseModal(storeId) {

/* ============================================================
   ⑧ Inventory (Daily日次 / Monthly月間 で作業分離)
   - Daily : 主要食材のみ・数量チェック中心（簡易）
   - Monthly : 全品目フル・理論在庫比較・差異・ロス算出
   理論在庫 = 前回棚卸 + 入荷 - 理論消費
============================================================ */
function getInvItems(storeId) {
  var ings = getIngredients();
  // daily: 主要食材フラグ(既定で食材区分の上位/お酒)。dailyフラグは設定で変更可
  var def = ings.map((i,idx) => ({code:i.code, name:i.name, unit:i.unit, cls:catClass(i.cat),
    par: 20, last: 0, received: 0, consumed: 0, count:'',
    daily: (catClass(i.cat)==='food' || catClass(i.cat)==='liquor') ? (idx%2===0) : false }));
  return ls('inv_'+storeId, def);
}
function setInvItems(storeId, items) { lsSet('inv_'+storeId, items); }

var invMode = 'daily';   // 'daily' | 'monthly'
var invClassFilter = 'all';
function renderInventory() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var allItems = getInvItems(storeId);
  // モードで対象を絞る
  var items = invMode==='daily' ? allItems.filter(i=>i.daily) : allItems;
  var filtered = invClassFilter==='all' ? items : items.filter(i=>i.cls===invClassFilter);
  var classCounts = {}; CLASSES.forEach(c=>classCounts[c.id]=items.filter(i=>i.cls===c.id).length);
  var canConfig = ROLE_CONFIG[curRole].canCreate;

  var html = `<div class="section-header">
    <div><div class="section-title">${store.name} · 棚卸</div><div class="section-sub">${new Date().toLocaleDateString('ja')}</div></div>
    <div style="display:flex;gap:6px">
      ${invMode==='daily'&&canConfig?`<button class="btn btn-secondary btn-sm" onclick="openDailySetModal('${storeId}')"><i class="ti ti-settings"></i> Daily項目</button>`:''}
      <button class="btn btn-secondary btn-sm" onclick="showInvHistory('${storeId}')"><i class="ti ti-history"></i> 履歴</button>
      <button class="btn btn-success btn-sm" onclick="saveInventory('${storeId}')"><i class="ti ti-device-floppy"></i> 確定</button>
    </div>
  </div>`;

  // モード切替（Daily / Monthly）
  html += `<div class="phase-tabs">
    <div class="phase-tab${invMode==='daily'?' active':''}" onclick="setInvMode('daily')"><i class="ti ti-sun" style="font-size:12px"></i> Daily日次</div>
    <div class="phase-tab${invMode==='monthly'?' active':''}" onclick="setInvMode('monthly')"><i class="ti ti-calendar-month" style="font-size:12px"></i> Monthly月間</div>
  </div>`;

  html += `<div class="alert ${invMode==='daily'?'alert-success':'alert-warning'}" style="padding:8px 12px">
    <i class="ti ti-info-circle"></i><div style="font-size:12px">${invMode==='daily'
      ? 'Daily：主要食材のみ。日次の数量チェック用。' 
      : 'Monthly：全品目フル棚卸。理論在庫との差異・ロスを算出します。'}</div></div>`;

  // 区分フィルタ（Monthlyのみ細かく）
  if (invMode==='monthly') {
    html += `<div class="phase-tabs">
      <div class="phase-tab${invClassFilter==='all'?' active':''}" onclick="setInvFilter('all')">全区分 (${items.length})</div>
      ${CLASSES.map(c=>`<div class="phase-tab${invClassFilter===c.id?' active':''}" style="${invClassFilter===c.id?`background:${c.color};border-color:${c.color}`:''}" onclick="setInvFilter('${c.id}')">${c.name} (${classCounts[c.id]})</div>`).join('')}
    </div>`;
  }

  html += `<div class="card"><table class="inv-table">`;
  if (invMode==='daily') {
    html += `<thead><tr><th>アイテム</th><th>PAR</th><th>現在庫</th><th>状態</th></tr></thead><tbody>`;
    filtered.forEach(it => {
      var cnt = it.count===''?null:parseFloat(it.count);
      var statusHtml;
      if (cnt===null) statusHtml='<span class="tag tag-gray">未</span>';
      else { var ratio=it.par>0?cnt/it.par:1; statusHtml= ratio>=0.7?'<span class="tag tag-green">OK</span>':ratio>=0.3?'<span class="tag tag-yellow">要注意</span>':'<span class="tag tag-red">要発注</span>'; }
      html += `<tr>
        <td style="font-weight:600">${it.name}<div style="font-size:11px;color:var(--muted);font-weight:400">${className(it.cls)} · ${it.unit}</div></td>
        <td style="color:var(--muted)">${it.par}</td>
        <td><input class="inv-input" type="number" step="0.1" min="0" value="${it.count}" onchange="updateInv('${storeId}','${it.code}',this.value)" placeholder="0"></td>
        <td>${statusHtml}</td>
      </tr>`;
    });
  } else {
    html += `<thead><tr><th>アイテム</th><th>理論</th><th>実棚</th><th>差異</th></tr></thead><tbody>`;
    filtered.forEach(it => {
      var theory = (parseFloat(it.last)||0)+(parseFloat(it.received)||0)-(parseFloat(it.consumed)||0);
      var actual = it.count===''?null:parseFloat(it.count);
      var diff = actual===null?null:actual-theory;
      var diffHtml = diff===null?'<span class="tag tag-gray">未入力</span>':Math.abs(diff)<0.01?'<span class="tag tag-green">±0</span>':`<span class="tag ${diff<0?'tag-red':'tag-yellow'}">${diff>0?'+':''}${diff.toFixed(1)}</span>`;
      html += `<tr>
        <td style="font-weight:600">${it.name}<div style="font-size:11px;color:var(--muted);font-weight:400">${className(it.cls)} · ${it.unit}</div></td>
        <td style="color:var(--muted)">${theory.toFixed(1)}</td>
        <td><input class="inv-input" type="number" step="0.1" min="0" value="${it.count}" onchange="updateInv('${storeId}','${it.code}',this.value)" placeholder="0"></td>
        <td>${diffHtml}</td>
      </tr>`;
    });
  }
  if (!filtered.length) html += `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">${invMode==='daily'?'Daily項目が未設定です（右上「Daily項目」で選択）':'項目なし'}</td></tr>`;
  html += `</tbody></table></div>`;

  // Monthly差異サマリー
  if (invMode==='monthly') {
    var counted = items.filter(i=>i.count!=='');
    if (counted.length) {
      var shortages = counted.filter(i=>{var t=(parseFloat(i.last)||0)+(parseFloat(i.received)||0)-(parseFloat(i.consumed)||0);return (parseFloat(i.count)-t)<-0.01;});
      html += `<div class="card"><div class="card-title"><i class="ti ti-alert-triangle" style="color:${shortages.length?'var(--red)':'var(--green)'}"></i>差異サマリー</div>
        <div class="kpi-grid">
          ${kpi('カウント済', counted.length+'/'+items.length, '進捗', 'var(--tm)')}
          ${kpi('差異あり', counted.filter(i=>{var t=(parseFloat(i.last)||0)+(parseFloat(i.received)||0)-(parseFloat(i.consumed)||0);return Math.abs(parseFloat(i.count)-t)>=0.01;}).length, '要確認', 'var(--yellow)')}
          ${kpi('棚卸ロス', shortages.length, 'マイナス差異', shortages.length?'var(--red)':'var(--green)')}
        </div></div>`;
    }
  }
  return html;
}

function saveInventory(storeId) {
  var allItems = getInvItems(storeId);
  var scope = invMode==='daily' ? allItems.filter(i=>i.daily) : allItems;
  var counted = scope.filter(i=>i.count!=='');
  if (!counted.length) { alert('棚卸数を入力してください'); return; }
  var histKey = invMode==='daily' ? 'inv_hist_daily_'+storeId : 'inv_hist_'+storeId;
  var hist = ls(histKey, []);
  var snapshot = {date:new Date().toLocaleString('ja'), by:ROLE_CONFIG[curRole].name, mode:invMode,
    lines: counted.map(i=>{
      var t=(parseFloat(i.last)||0)+(parseFloat(i.received)||0)-(parseFloat(i.consumed)||0);
      return {name:i.name, cls:i.cls, theory:t, actual:parseFloat(i.count), diff:parseFloat(i.count)-t};
    })};
  hist.push(snapshot);
  lsSet(histKey, hist);
  // Monthly のみ繰越（Dailyは数量チェックなので繰越しない）
  if (invMode==='monthly') {
    // 棚卸総額を算出（実棚×単価）して期末在庫額として記録
    var ings = getIngredients();
    var invValue = counted.reduce((a,i)=>{ var ing=ings.find(x=>x.code===i.code); return a + (ing?ing.price:0)*(parseFloat(i.count)||0); }, 0);
    invValue = Math.round(invValue);
    // 当月のFood Cost: 今回をendInv、前回のendInvをbeginInvに自動反映
    var fc = ls('fc_monthly_'+storeId, {beginInv:0, endInv:0, sales:0});
    var prevEnd = fc.endInv || 0;
    var newFc = {beginInv:prevEnd, endInv:invValue, sales:fc.sales||storeData(storeId).a,
      beginAuto:true, history:(fc.history||[]).concat([{date:new Date().toLocaleDateString('ja'), endInv:invValue, by:ROLE_CONFIG[curRole].name}])};
    lsSet('fc_monthly_'+storeId, newFc);
    allItems.forEach(i=>{ if(i.count!==''){ i.last = parseFloat(i.count); i.received=0; i.consumed=0; i.count=''; } });
  } else {
    scope.forEach(i=>{ var it=allItems.find(x=>x.code===i.code); if(it) it.count=''; });
  }
  setInvItems(storeId, allItems);
  // 自動発注算出（基準在庫比較→必要数→発注単位丸め→業者別）
  var drafts = computeAutoOrders(storeId, counted);
  if (drafts.length) {
    var totalItems = drafts.reduce((a,d)=>a+d.lines.length,0);
    showToast(`棚卸を記録。${drafts.length}業者・${totalItems}品目の発注ドラフトを自動作成しました`, 'success');
    // Orderingタスク自動生成
    var tasks = getTasks();
    tasks.push({id:'tk'+Date.now(), title:`[自動] ${(STORES.find(s=>s.id===storeId)||{name:storeId}).name} 発注確認 (${drafts.length}業者)`,
      assignee:'', store:storeId, priority:'高', due:new Date().toISOString().slice(0,10), progress:0, status:'進行中', created:new Date().toLocaleDateString('ja')});
    lsSet('tasks_all', tasks);
  } else {
    showToast(invMode==='daily'?'Daily棚卸を記録しました（発注不要）':'月間棚卸を確定しました', 'success');
  }
  renderPage('inventory');
}

/* 自動発注算出: 必要数 = 基準在庫 − 現在庫 + 予測使用量 − 発注済 → 発注ロットへ丸め → 業者別 */
function computeAutoOrders(storeId, countedItems) {
  var ings = getIngredients();
  var vendorGroups = {};
  countedItems.forEach(ci => {
    var ing = ings.find(x=>x.code===ci.code);
    if (!ing) return;
    var current = parseFloat(ci.count)||0;
    var forecast = Math.round((ing.par||20)*0.4); // 予測使用量（仮: PARの40%）
    var ordered = 0; // 発注済（簡易: 0）
    var need = (ing.par||20) - current + forecast - ordered;
    if (need <= (ing.minStock||0)) return; // 最低在庫以下にならなければスキップ... ここは need<=0でスキップ
    if (need <= 0) return;
    var lot = ing.lot||1;
    var orderQty = Math.ceil(need/lot)*lot; // 発注単位丸め
    var vendor = ing.vendor;
    if (!vendor || vendor==='自家製') return;
    if (!vendorGroups[vendor]) vendorGroups[vendor] = [];
    vendorGroups[vendor].push({code:ing.code, name:ing.name, unit:ing.unit, need:Math.round(need*10)/10, qty:orderQty, price:ing.price});
  });
  var drafts = [];
  Object.keys(vendorGroups).forEach(vname => {
    var lines = vendorGroups[vname];
    var amount = lines.reduce((a,l)=>a+l.price*l.qty,0);
    drafts.push({id:'ao'+Date.now()+Math.random().toString(36).slice(2,5), storeId, vendor:vname, lines, amount,
      status:'自動作成', date:new Date().toLocaleDateString('ja'), deliveryDate:'', auto:true});
  });
  if (drafts.length) {
    var all = ls('orders_'+storeId, []);
    all = all.concat(drafts);
    lsSet('orders_'+storeId, all);
  }
  return drafts;
}

  var render = (arr,label) => arr.length ? arr.slice().reverse().slice(0,6).map(h=>{

      <div class="approval-meta">${h.by} · ${h.lines.length}品目</div></div>`;
  }).join('') : `<p style="color:var(--muted);font-size:13px">${label}履歴なし</p>`;
  openModal(`<div class="modal-title">棚卸履歴 <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="role-section-label">Monthly月間</div>${render(mHist,'月間')}

}

/* ============================================================
   ⑨ 発注管理 (作成→承認→送信→履歴・業者連動)
============================================================ */
function renderOrder() {
  var storeId = curStore === 'ALL' ? STORES[0].id : curStore;
  var store = STORES.find(s=>s.id===storeId) || STORES[0];
  var orders = ls('orders_'+storeId, []);
  var html = `<div class="section-header">
