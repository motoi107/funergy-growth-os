<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- bright to deep orange -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A3D"/>
      <stop offset="48%" stop-color="#F0661F"/>
      <stop offset="100%" stop-color="#D2490B"/>
    </linearGradient>
    <!-- soft top sheen -->
    <radialGradient id="sheen" cx="30%" cy="22%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7A2A04" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- rounded square background (iOS superellipse-ish via large radius) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <!-- subtle inner depth ring -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#sheen)"/>

  <!-- FG wordmark, large, centered-left -->
  <g filter="url(#textShadow)">
    <text x="476" y="528" text-anchor="middle" dominant-baseline="central"
      font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="800"
      font-size="410" letter-spacing="-16" fill="#FFFFFF">FG</text>
  </g>

  <!-- small plus, upper right corner -->
  <g>
    <circle cx="812" cy="232" r="92" fill="#FFFFFF"/>
    <g stroke="#F0661F" stroke-width="32" stroke-linecap="round">
      <line x1="812" y1="190" x2="812" y2="274"/>
      <line x1="770" y1="232" x2="854" y2="232"/>
    </g>
  </g>
</svg>
